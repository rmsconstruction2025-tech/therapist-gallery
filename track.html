<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>Track Your Therapist — Feel Free Spa</title>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.css"/>
  <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.js"></script>

  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#1a1a2e;overflow:hidden}

    #map{position:fixed;top:0;left:0;right:0;bottom:0;z-index:1}

    /* ── overlays ── */
    .top-bar{position:fixed;top:0;left:0;right:0;z-index:1000;padding:12px 14px;display:flex;align-items:center;justify-content:space-between;pointer-events:none}
    .logo-pill{background:rgba(26,26,46,0.92);backdrop-filter:blur(10px);border-radius:14px;padding:7px 13px;display:flex;align-items:center;gap:6px;pointer-events:auto}
    .eta-pill-top{background:rgba(26,26,46,0.92);backdrop-filter:blur(10px);border-radius:20px;padding:7px 14px;display:flex;align-items:center;gap:6px;color:#fff;font-size:12px;font-weight:600}

    /* ── bottom sheet ── */
    .sheet{position:fixed;bottom:0;left:0;right:0;z-index:1000;background:#1a1a2e;border-radius:22px 22px 0 0;padding:14px 20px 36px}
    .handle{width:36px;height:4px;background:rgba(255,255,255,0.18);border-radius:2px;margin:0 auto 14px}
    .eta-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
    .eta-badge{background:#ff6b35;color:#fff;border-radius:20px;padding:5px 16px;font-size:14px;font-weight:700}
    .prog-track{width:100%;height:3px;background:rgba(255,255,255,0.1);border-radius:2px;overflow:hidden;margin-bottom:16px}
    .prog-fill{height:100%;background:#ff6b35;border-radius:2px;transition:width 1.2s ease}
    .t-row{display:flex;align-items:center;gap:12px;padding-top:14px;border-top:0.5px solid rgba(255,255,255,0.08)}
    .avatar{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,#ff6b35,#f7931e);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:#fff;flex-shrink:0}
    .call-btn{width:100%;margin-top:14px;background:rgba(255,255,255,0.07);border:0.5px solid rgba(255,255,255,0.15);border-radius:13px;padding:14px;color:#fff;font-size:14px;font-weight:600;text-align:center;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;font-family:inherit}
    .call-btn:active{background:rgba(255,255,255,0.12)}

    /* ── screens ── */
    #loading-screen,#error-screen{position:fixed;inset:0;z-index:9999;background:#1a1a2e;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;text-align:center;padding:32px;gap:16px}
    .spinner{width:38px;height:38px;border:3px solid rgba(255,107,53,0.25);border-top-color:#ff6b35;border-radius:50%;animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .arrived-banner{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:2000;background:#1a1a2e;border:2px solid #ff6b35;border-radius:20px;padding:24px 36px;text-align:center;color:#fff}

    /* hide Leaflet attribution on mobile */
    .leaflet-control-attribution{display:none}
  </style>
</head>
<body>

<!-- Loading -->
<div id="loading-screen">
  <span style="font-size:36px">🚗</span>
  <div class="spinner"></div>
  <p style="font-size:13px;color:rgba(255,255,255,0.5)">Finding your therapist…</p>
</div>

<!-- Error -->
<div id="error-screen" style="display:none">
  <span style="font-size:52px">🔒</span>
  <h2 style="font-size:20px;font-weight:600" id="err-title">Link Expired</h2>
  <p style="font-size:14px;color:rgba(255,255,255,0.5);max-width:270px" id="err-msg">This tracking link is no longer active.</p>
  <p style="font-size:13px;margin-top:8px;color:rgba(255,255,255,0.3)">Please contact Feel Free Spa for help.</p>
</div>

<!-- Map -->
<div id="map"></div>

<!-- Top bar -->
<div class="top-bar" id="topBar" style="display:none">
  <div class="logo-pill">
    <span style="font-size:16px">🚗</span>
    <span style="font-size:12px;font-weight:700;color:#ff6b35">Feel Free</span>
    <span style="font-size:12px;color:rgba(255,255,255,0.7)">Spa</span>
  </div>
  <div class="eta-pill-top">
    <span style="color:#ff6b35;font-size:8px">●</span>
    <span id="eta-top">Live</span>
  </div>
</div>

<!-- Bottom sheet -->
<div class="sheet" id="sheet" style="display:none">
  <div class="handle"></div>
  <div class="eta-row">
    <span style="font-size:13px;color:rgba(255,255,255,0.45)">Therapist on the way</span>
    <span class="eta-badge" id="eta-badge">Live</span>
  </div>
  <div class="prog-track"><div class="prog-fill" id="prog" style="width:15%"></div></div>
  <div class="t-row">
    <div class="avatar" id="t-avatar">?</div>
    <div style="flex:1;min-width:0">
      <p style="font-size:14px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis" id="t-name">—</p>
      <p style="font-size:12px;color:rgba(255,255,255,0.45);margin-top:2px">
        <span style="width:7px;height:7px;border-radius:50%;background:#22c55e;display:inline-block;margin-right:4px;vertical-align:middle"></span>
        En route to you
      </p>
    </div>
    <div style="text-align:right;flex-shrink:0">
      <p style="font-size:12px;color:rgba(255,255,255,0.4)" id="t-service">—</p>
      <p style="font-size:11px;color:rgba(255,255,255,0.25);margin-top:2px" id="t-updated">—</p>
    </div>
  </div>
  <button class="call-btn" id="callBtn">📞 Call Spa</button>
</div>

<script>
// ── Firebase ──────────────────────────────────────────────────────────────
firebase.initializeApp({
  apiKey:            "AIzaSyAw7KXjgZaHM833PZDwTLUSNGNk7WJx_sY",
  authDomain:        "therapist-gallery.firebaseapp.com",
  projectId:         "therapist-gallery",
  storageBucket:     "therapist-gallery.firebasestorage.app",
  messagingSenderId: "826400735387",
  appId:             "1:826400735387:web:379974d8aa913786f0063e"
});
const db = firebase.firestore();

// ── Car SVG (orange, top-down Rapido style) ───────────────────────────────
const CAR_SVG = `<svg width="32" height="54" viewBox="0 0 32 54" xmlns="http://www.w3.org/2000/svg">
  <ellipse cx="16" cy="50" rx="11" ry="4" fill="rgba(0,0,0,0.2)"/>
  <rect x="3" y="7" width="26" height="40" rx="9" fill="#ff6b35"/>
  <rect x="5" y="11" width="22" height="15" rx="3" fill="rgba(255,255,255,0.55)"/>
  <rect x="5" y="30" width="22" height="9" rx="2.5" fill="rgba(255,255,255,0.25)"/>
  <rect x="3" y="7" width="8" height="5" rx="1.5" fill="#fbbf24"/>
  <rect x="21" y="7" width="8" height="5" rx="1.5" fill="#fbbf24"/>
  <rect x="3" y="42" width="7" height="5" rx="1" fill="#ef4444"/>
  <rect x="22" y="42" width="7" height="5" rx="1" fill="#ef4444"/>
  <rect x="0" y="8" width="5" height="13" rx="2.5" fill="#c74e20"/>
  <rect x="27" y="8" width="5" height="13" rx="2.5" fill="#c74e20"/>
  <rect x="0" y="33" width="5" height="13" rx="2.5" fill="#c74e20"/>
  <rect x="27" y="33" width="5" height="13" rx="2.5" fill="#c74e20"/>
  <rect x="6" y="21" width="20" height="3" rx="1.5" fill="rgba(255,255,255,0.75)"/>
  <rect x="8" y="26" width="16" height="2" rx="1" fill="rgba(255,255,255,0.45)"/>
</svg>`;

// ── State ─────────────────────────────────────────────────────────────────
let map, carMarker, carAngle = 0, prevLat = null, prevLng = null;
let watchUnsub = null;

// ── Helpers ───────────────────────────────────────────────────────────────
const $ = id => document.getElementById(id);
const initials = n => (n||'?').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);

function timeSince(ts) {
  if (!ts) return '';
  const s = Math.floor((Date.now() - (ts.toMillis ? ts.toMillis() : +ts)) / 1000);
  if (s < 15) return 'just now';
  if (s < 60)  return s + 's ago';
  return Math.floor(s / 60) + 'm ago';
}

function bearing(lat1, lng1, lat2, lng2) {
  const dLng = (lng2 - lng1) * Math.PI / 180;
  const φ1 = lat1 * Math.PI / 180, φ2 = lat2 * Math.PI / 180;
  const y = Math.sin(dLng) * Math.cos(φ2);
  const x = Math.cos(φ1) * Math.sin(φ2) - Math.sin(φ1) * Math.cos(φ2) * Math.cos(dLng);
  return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
}

function getToken() {
  const p = new URLSearchParams(window.location.search);
  return p.get('t') || p.get('token') || '';
}

function showError(title, msg) {
  $('loading-screen').style.display = 'none';
  $('error-screen').style.display   = 'flex';
  $('err-title').textContent = title || 'Link Expired';
  $('err-msg').textContent   = msg   || 'This tracking link is no longer active.';
}

// ── Map init ──────────────────────────────────────────────────────────────
function initMap(lat, lng) {
  map = L.map('map', {
    center: [lat, lng], zoom: 15,
    zoomControl: false, attributionControl: false
  });
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 18 }).addTo(map);

  carMarker = L.marker([lat, lng], {
    icon: L.divIcon({ html: CAR_SVG, iconSize:[32,54], iconAnchor:[16,27], className:'' }),
    zIndexOffset: 1000
  }).addTo(map);
}

function moveCar(lat, lng, updatedAt) {
  if (!map || !carMarker) return;

  // Rotate car toward direction of movement
  if (prevLat !== null && prevLng !== null) {
    const moved = Math.abs(lat - prevLat) > 0.00002 || Math.abs(lng - prevLng) > 0.00002;
    if (moved) {
      carAngle = bearing(prevLat, prevLng, lat, lng);
      const el = carMarker.getElement();
      if (el) {
        const svg = el.querySelector('svg');
        if (svg) svg.style.transform = `rotate(${carAngle}deg)`;
        el.style.transformOrigin = '50% 50%';
      }
    }
  }

  carMarker.setLatLng([lat, lng]);
  map.panTo([lat, lng], { animate: true, duration: 1.2 });
  prevLat = lat; prevLng = lng;

  $('t-updated').textContent = timeSince(updatedAt);
}

// ── Main ──────────────────────────────────────────────────────────────────
async function main() {
  const token = getToken();
  if (!token) { showError('Invalid Link', 'No tracking token found.'); return; }

  // 1. Load tracking link doc
  let linkSnap;
  try { linkSnap = await db.collection('trackingLinks').doc(token).get(); }
  catch(e) { showError('Error', 'Could not load tracking info.'); return; }

  if (!linkSnap.exists) { showError('Link Not Found', 'This link does not exist or has been removed.'); return; }
  const link = linkSnap.data();

  if (!link.active) { showError('Link Expired', 'This tracking link is no longer active.'); return; }
  if (link.expiresAt && link.expiresAt.toDate && link.expiresAt.toDate() < new Date()) {
    showError('Link Expired', 'This tracking link has expired.'); return;
  }

  // 2. Load therapist
  let tSnap;
  try { tSnap = await db.collection('therapists').doc(link.therapistDocId).get(); }
  catch(e) { showError('Error', 'Could not load therapist info.'); return; }

  if (!tSnap.exists) { showError('Not Found', 'Therapist not found.'); return; }
  const t = tSnap.data();

  // 3. Populate UI
  const name = t.name || link.therapistName || 'Your Therapist';
  $('t-name').textContent    = name;
  $('t-avatar').textContent  = initials(name);
  $('t-service').textContent = link.serviceName || 'Spa Service';

  // 4. Init map
  const lat = t.location?.lat || 13.15;
  const lng = t.location?.lng || 79.92;
  initMap(lat, lng);
  prevLat = lat; prevLng = lng;

  // 5. Show UI
  $('loading-screen').style.display = 'none';
  $('topBar').style.display  = 'flex';
  $('sheet').style.display   = 'block';

  // 6. Real-time location updates via onSnapshot
  watchUnsub = db.collection('therapists').doc(link.therapistDocId).onSnapshot(snap => {
    if (!snap.exists) return;
    const d = snap.data();
    if (!d.location) return;
    moveCar(d.location.lat, d.location.lng, d.locationUpdatedAt);
  });

  // 7. Update "last updated" text every 20s
  setInterval(() => {
    // Re-fetch last snapshot time from marker position (already stored in DOM text)
    // Just refresh the time display
    const el = $('t-updated');
    if (el && el._ts) el.textContent = timeSince(el._ts);
  }, 20000);
}

// ── Spa phone ─────────────────────────────────────────────────────────────
$('callBtn').onclick = () => { window.location.href = 'tel:+91XXXXXXXXXX'; };

main();
</script>
</body>
</html>
