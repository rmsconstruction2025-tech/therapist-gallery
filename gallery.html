// ── Sound alert (Web Audio API — no file needed) ──────
function playAlert(type='new') {
  try {
    const ctx = new (window.AudioContext||window.webkitAudioContext)();
    const seqs = {
      new:    [[880,0.00],[1100,0.18],[880,0.36],[1100,0.54]],
      accept: [[660,0.00],[880,0.18],[1100,0.36]],
    };
    (seqs[type]||seqs.new).forEach(([freq,t])=>{
      const o=ctx.createOscillator(), g=ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.frequency.value=freq; o.type='sine';
      g.gain.setValueAtTime(0.25, ctx.currentTime+t);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+t+0.16);
      o.start(ctx.currentTime+t); o.stop(ctx.currentTime+t+0.18);
    });
  } catch(e){}
}

// ══════════════════════════════════════════════════════
//  APP
// ══════════════════════════════════════════════════════
function App() {
  const [status,      setStatus]      = useState('loading'); // loading|invalid|expired|info|gallery
  const [tokenData,   setTokenData]   = useState(null);
  const [client,      setClient]      = useState({name:'',phone:''});
  const [isBlurred,   setIsBlurred]   = useState(false);
  const [isDuplicate, setIsDuplicate] = useState(false);
  const tokenStr = getTokenFromUrl();

  // ── Multi-tab / multi-window guard ──
  // If this link is already open in another tab/window, block this one.
  useEffect(() => {
    if (!tokenStr) return;
    let bc;
    let guardTimeout;
    try {
      bc = new BroadcastChannel(`ffs_gallery_${tokenStr}`);
      bc.onmessage = (e) => {
        if (e.data === 'tab_opened') {
          // Another tab just opened the same link — tell it we're already here
          bc.postMessage('tab_taken');
        } else if (e.data === 'tab_taken') {
          // Primary tab responded — this window is a duplicate
          clearTimeout(guardTimeout);
          setIsDuplicate(true);
        }
      };
      // Announce this tab opened
      bc.postMessage('tab_opened');
      // If no 'tab_taken' arrives within 300ms, we are the primary tab
      guardTimeout = setTimeout(() => {}, 300);
    } catch(e) { /* BroadcastChannel not supported — fail silently */ }
    return () => {
      clearTimeout(guardTimeout);
      if (bc) bc.close();
    };
  }, [tokenStr]);

  // Privacy protection
  useEffect(() => {
    const block = e => e.preventDefault();
    document.addEventListener('contextmenu', block);
    document.addEventListener('copy',        block);
    document.addEventListener('cut',         block);
    document.addEventListener('dragstart',   block);
    document.addEventListener('selectstart', block);

    // Hide gallery whenever page becomes hidden (tab switch, app switcher, notification pull-down)
    const onVis = () => { if (document.hidden) setIsBlurred(true); };
    document.addEventListener('visibilitychange', onVis);

    // Also catch window losing focus (works on some Android browsers)
    const onBlur = () => setIsBlurred(true);
    window.addEventListener('blur', onBlur);

    const onTouch = e => { if (e.target.tagName==='IMG'||e.target.tagName==='VIDEO') e.preventDefault(); };
    document.addEventListener('touchstart', onTouch, {passive:false});
    const onKey = e => {
      if (e.key==='PrintScreen'||(e.ctrlKey&&e.key==='p')||(e.metaKey&&e.shiftKey&&['3','4','5','s'].includes(e.key))) {
        e.preventDefault(); alert('Screenshots are not permitted.');
      }
    };
    document.addEventListener('keydown', onKey);
    return () => {
      document.removeEventListener('contextmenu', block);
      document.removeEventListener('copy',        block);
      document.removeEventListener('cut',         block);
      document.removeEventListener('dragstart',   block);
      document.removeEventListener('selectstart', block);
      document.removeEventListener('visibilitychange', onVis);
      window.removeEventListener('blur', onBlur);
      document.removeEventListener('touchstart',  onTouch);
      document.removeEventListener('keydown',     onKey);
    };
  }, []);

  // Token validation
  useEffect(() => {
    if (!tokenStr) { setStatus('invalid'); return; }
    (async () => {
      try {
        const snap = await db.collection('galleryTokens').where('token','==',tokenStr).get();
        if (snap.empty) { setStatus('invalid'); return; }
        const data = {id:snap.docs[0].id,...snap.docs[0].data()};
        if (data.expiresAt?.toDate?.() < new Date()) { setStatus('expired'); return; }
        setTokenData(data);
        if (data.clientName && data.clientPhone) {
          setClient({name:data.clientName, phone:data.clientPhone});
          setStatus('gallery');
        } else {
          setStatus('info');
        }
      } catch(err) { console.error(err); setStatus('invalid'); }
    })();
  }, [tokenStr]);

  // Block duplicate tab/window
  if (isDuplicate) return (
    <FullScreen>
      <div style={{fontSize:'3rem',marginBottom:'16px'}}>🔒</div>
      <h2 style={msgTitle}>Already Open</h2>
      <p style={msgSub}>This gallery link is already open in another window or tab. Please use that window to continue.</p>
      <p style={{color:'var(--muted)',fontSize:'0.78rem',marginTop:'16px',opacity:0.6}}>Close the other window first, then refresh this page.</p>
    </FullScreen>
  );

  if (status==='loading') return <FullScreen><span className="spin" style={{fontSize:'2.5rem',color:'var(--gold)'}}>✦</span><p style={{color:'var(--muted)',marginTop:'16px'}}>Validating access…</p></FullScreen>;
  if (status==='invalid') return <FullScreen><div style={{fontSize:'3rem',color:'var(--gold)',marginBottom:'16px'}}>⚠</div><h2 style={msgTitle}>Invalid Link</h2><p style={msgSub}>This gallery link is invalid.</p></FullScreen>;
  if (status==='expired') return <FullScreen><div style={{fontSize:'3rem',color:'var(--gold)',marginBottom:'16px'}}>⏱</div><h2 style={msgTitle}>Link Expired</h2><p style={msgSub}>This gallery link has expired. Please contact us for a new link.</p></FullScreen>;
  if (status==='info')    return <ClientInfoForm tokenData={tokenData} onConfirmed={(n,p)=>{ setClient({name:n,phone:p}); setStatus('gallery'); }}/>;

  return (
    <div style={{position:'relative'}}>
      <div style={{background:'rgba(212,175,55,.07)',borderBottom:'1px solid rgba(212,175,55,.2)',color:'var(--muted)',fontSize:'0.75rem',textAlign:'center',padding:'10px 20px'}}>
        ⚠ Screenshots or sharing are not allowed. All images carry your personal watermark. Note: complete technical prevention is not guaranteed.
      </div>

      {/* Page watermark removed — watermark only on photo canvas */}

      {/* Blur overlay on tab switch */}
      {isBlurred && (
        <div onClick={()=>setIsBlurred(false)} style={{position:'fixed',inset:0,zIndex:2000,background:'rgba(0,0,0,.92)',backdropFilter:'blur(12px)',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:'20px',cursor:'pointer'}}>
          <p style={{color:'var(--muted)',fontSize:'1.1rem'}}>Gallery hidden for privacy.</p>
          <button style={{background:'linear-gradient(135deg,var(--gold-dark),var(--gold))',color:'#0a0a0a',border:'none',borderRadius:'10px',padding:'12px 32px',fontSize:'0.95rem',fontWeight:'700'}}>Tap to Resume</button>
        </div>
      )}

      <TherapistGallery tokenData={tokenData} clientName={client.name} clientPhone={client.phone} isBlurred={isBlurred}/>
    </div>
  );
}

// ══════════════════════════════════════════════════════

function ClientInfoForm({ tokenData, onConfirmed }) {

            </div>
            {phErr&&<p style={{color:'var(--danger)',fontSize:'0.8rem'}}>{phErr}</p>}
          </div>
          <p style={{color:'var(--muted)',fontSize:'0.78rem',lineHeight:'1.6',background:'rgba(212,175,55,.04)',border:'1px solid var(--border-gold)',borderRadius:'8px',padding:'12px',textAlign:'center'}}>
            Your name and number will appear as a watermark on all images to prevent unauthorised sharing.
          </p>
          <button type="submit" disabled={saving} style={{background:'linear-gradient(135deg,var(--gold-dark),var(--gold))',color:'#0a0a0a',border:'none',borderRadius:'10px',padding:'15px',fontSize:'0.95rem',fontWeight:'700',letterSpacing:'1px',marginTop:'8px',minHeight:'50px'}}>
            {saving?<span className="spin">✦</span>:'Access Gallery →'}

// ══════════════════════════════════════════════════════
//  THERAPIST GALLERY
// ══════════════════════════════════════════════════════
const DAY_KEYS = ['sun','mon','tue','wed','thu','fri','sat'];
const DAY_FULL = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

function getFilterInfo(tokenData) {
  if (tokenData?.bookType === 'later' && tokenData?.scheduledDate) {
    const [y,m,d] = tokenData.scheduledDate.split('-').map(Number);
    const date = new Date(y, m-1, d);
    return {
      dayKey:  DAY_KEYS[date.getDay()],
      label:   `${DAY_FULL[date.getDay()]} (${tokenData.scheduledDate})`,
    };
  }
  const today = new Date();
  return { dayKey: DAY_KEYS[today.getDay()], label: DAY_FULL[today.getDay()] };
}

function TherapistGallery({ tokenData, clientName, clientPhone, isBlurred }) {
  const [therapists, setTherapists] = useState([]);
  const [loading,    setLoading]    = useState(true);

  const filterInfo = getFilterInfo(tokenData);

  useEffect(()=>{
    (async()=>{
      try {
        // Book Later: fetch all therapists (offline status doesn't matter for future dates)
        // Book Now: only fetch therapists currently online
        const isBookLater = tokenData?.bookType === 'later';
        const query = isBookLater
          ? db.collection('therapists').get()
          : db.collection('therapists').where('available','==',true).get();
        const snap = await query;
        const all = snap.docs.map(d=>({id:d.id,...d.data()}));
        // Filter by working hours; hide therapists currently in an active session
        const filtered = all.filter(t => {
          if (t.sessionActive === true) return false; // busy with another client
          const wh = t.workingHours;
          if (!wh) return true; // no hours configured → always show
          return wh[filterInfo.dayKey]?.on === true;
        });
        setTherapists(filtered);
      } finally { setLoading(false); }
    })();
  },[]);

  return (
    <div style={{minHeight:'100vh',filter:isBlurred?'blur(24px)':'none',transition:'filter .3s'}}>
      <header style={{textAlign:'center',padding:'40px 20px 30px',borderBottom:'1px solid var(--border)',background:'radial-gradient(ellipse at 50% -20%,#1a1000,transparent 60%)'}}>
        <div style={{fontSize:'1.8rem',color:'var(--gold)',marginBottom:'10px'}}>✦</div>
        <h1 style={{fontSize:'1.8rem',fontWeight:'700',color:'var(--gold)',letterSpacing:'3px',marginBottom:'8px'}}>Our Therapists</h1>
        <p style={{color:'var(--muted)',fontSize:'0.9rem'}}>Welcome, <span style={{color:'var(--gold)'}}>{clientName}</span></p>
        <div style={{marginTop:'12px',display:'inline-flex',alignItems:'center',gap:'6px',background:'rgba(212,175,55,0.1)',border:'1px solid rgba(212,175,55,0.25)',borderRadius:'20px',padding:'5px 16px',fontSize:'0.8rem',color:'var(--muted)'}}>
          📅 Showing therapists available on <strong style={{color:'var(--gold)',marginLeft:'4px'}}>{filterInfo.label}</strong>
        </div>
      </header>
      {loading
        ? <div style={{display:'flex',flexDirection:'column',alignItems:'center',padding:'80px 20px'}}><span className="spin" style={{fontSize:'2rem',color:'var(--gold)'}}>✦</span><p style={{color:'var(--muted)',marginTop:'12px'}}>Loading gallery…</p></div>
        : therapists.length===0
          ? <div style={{textAlign:'center',padding:'80px 20px',color:'var(--muted)'}}>No therapists available on {filterInfo.label}.</div>
          : <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(300px,1fr))',gap:'24px',padding:'32px 20px',maxWidth:'1100px',margin:'0 auto'}}>
              {therapists.map(t=><TherapistCard key={t.id} therapist={t} tokenData={tokenData} clientName={clientName} clientPhone={clientPhone}/>)}
            </div>
      }
      <footer style={{textAlign:'center',color:'var(--muted)',fontSize:'0.75rem',padding:'20px',borderTop:'1px solid var(--border)'}}>
        All images are watermarked with your identity. Sharing is strictly prohibited.
      </footer>
    </div>
  );
}

// Parse Google Maps URL → {lat, lng} or null
function parseGoogleMapsUrl(url) {
  const patterns = [
    /@(-?\d+\.?\d*),(-?\d+\.?\d*)/,
    /\?q=(-?\d+\.?\d*),(-?\d+\.?\d*)/,
    /ll=(-?\d+\.?\d*),(-?\d+\.?\d*)/,
    /place\/[^/]+\/@(-?\d+\.?\d*),(-?\d+\.?\d*)/,
  ];
  for (const p of patterns) {
    const m = url.match(p);
    if (m) return { lat: parseFloat(m[1]), lng: parseFloat(m[2]) };
  }
  return null;
}

function BookingModal({ therapist, clientName, clientPhone, tokenData, onClose }) {
  const lockedDate = tokenData?.bookType === 'later' ? (tokenData.scheduledDate || '') : '';
  const [step,         setStep]         = useState('choose');
  const [timeLeft,     setTimeLeft]     = useState(180);
  const [form,         setForm]         = useState({ date: lockedDate, time:'', notes:'' });
  const [saving,       setSaving]       = useState(false);
  const [mapUrl,       setMapUrl]       = useState('');
  const [locError,     setLocError]     = useState('');
  const [gpsLoading,   setGpsLoading]   = useState(false);
  const timerRef    = useRef(null);
  const unsubRef    = useRef(null);
  const bookingIdRef = useRef(null);
  const SECS = 180;

  // ── Cleanup on unmount ──
  useEffect(()=>{
    return ()=>{
      clearInterval(timerRef.current);
      if(unsubRef.current){ unsubRef.current(); unsubRef.current=null; }
    };
  },[]);

  // ── Resume from sessionStorage if page was refreshed mid-wait ──
  useEffect(()=>{
    try {
      const pending = JSON.parse(sessionStorage.getItem('pendingBooking')||'null');
      if(!pending || pending.therapistId !== therapist.id) return;
      bookingIdRef.current = pending.bookingId;
      const rem = Math.ceil((pending.endAt - Date.now()) / 1000);
      if(rem <= 0){
        db.collection('bookings').doc(pending.bookingId).update({status:'expired'}).catch(()=>{});
        sessionStorage.removeItem('pendingBooking');
        setStep('expired');
        return;
      }
      setTimeLeft(rem);
      setStep('waiting');
      const endAt = pending.endAt;
      timerRef.current = setInterval(()=>{
        const remaining = Math.ceil((endAt - Date.now()) / 1000);
        if(remaining <= 0){
          clearInterval(timerRef.current);
          if(unsubRef.current){ unsubRef.current(); unsubRef.current=null; }
          db.collection('bookings').doc(pending.bookingId).update({status:'expired'}).catch(()=>{});
          sessionStorage.removeItem('pendingBooking');
          setStep('expired');
        } else { setTimeLeft(remaining); }
      }, 500);
      unsubRef.current = db.collection('bookings').doc(pending.bookingId).onSnapshot(snap=>{
        if(!snap.exists) return;
        const s = snap.data().status;
        if(s==='accepted'||s==='admin_pending'||s==='confirmed'){
          clearInterval(timerRef.current);
          if(unsubRef.current){ unsubRef.current(); unsubRef.current=null; }
          sessionStorage.removeItem('pendingBooking');
          playAlert('accept');
          setStep('accepted');
        } else if(s==='declined'){
          clearInterval(timerRef.current);
          if(unsubRef.current){ unsubRef.current(); unsubRef.current=null; }
          sessionStorage.removeItem('pendingBooking');
          setStep('declined');
        }
      });
    } catch(e){}
  },[]);

  const getGPS = ()=>new Promise(resolve=>{
    if(!navigator.geolocation){ resolve(null); return; }
    navigator.geolocation.getCurrentPosition(
      p=>resolve({lat:p.coords.latitude, lng:p.coords.longitude}),
      ()=>resolve(null),
      {timeout:6000, maximumAge:60000}
    );
  });

  // Submit "Book Now" after location is chosen
  const submitBookNow = async (loc)=>{
    setStep('loading');
    try {
      // ── Duplicate guard: one active booking per client at a time ──
      const dupSnap = await db.collection('bookings')
        .where('clientPhone', '==', clientPhone)
        .where('status', 'in', ['pending','accepted','admin_pending'])
        .limit(1).get();
      if(!dupSnap.empty){
        const dup     = dupSnap.docs[0];
        const dupData = dup.data();
        const expiresMs = dupData.expiresAt?.toMillis?.() || 0;
        if(expiresMs > Date.now()){
          // An active booking already exists — resume it instead of creating another
          bookingIdRef.current = dup.id;
          const rem = Math.ceil((expiresMs - Date.now()) / 1000);
          sessionStorage.setItem('pendingBooking', JSON.stringify({
            bookingId: dup.id, endAt: expiresMs, therapistId: therapist.id,
          }));
          setTimeLeft(rem);
          timerRef.current = setInterval(()=>{
            const r2 = Math.ceil((expiresMs - Date.now()) / 1000);
            if(r2 <= 0){
              clearInterval(timerRef.current);
              if(unsubRef.current){ unsubRef.current(); unsubRef.current=null; }
              db.collection('bookings').doc(dup.id).update({status:'expired'}).catch(()=>{});
              sessionStorage.removeItem('pendingBooking');
              setStep('expired');
            } else { setTimeLeft(r2); }
          }, 500);
          unsubRef.current = db.collection('bookings').doc(dup.id).onSnapshot(snap=>{
            if(!snap.exists) return;
            const s = snap.data().status;
            if(s==='accepted'||s==='admin_pending'||s==='confirmed'){
              clearInterval(timerRef.current);
              if(unsubRef.current){ unsubRef.current(); unsubRef.current=null; }
              sessionStorage.removeItem('pendingBooking');
              playAlert('accept');
              setStep('accepted');
            } else if(s==='declined'){
              clearInterval(timerRef.current);
              if(unsubRef.current){ unsubRef.current(); unsubRef.current=null; }
              sessionStorage.removeItem('pendingBooking');
              setStep('declined');
            }
          });
          setStep('waiting');
          return;
        }
      }

      const expiresAt = new Date(Date.now() + SECS * 1000);
      const ref = await db.collection('bookings').add({
        therapistDocId: therapist.id,
        therapistId:    therapist.therapistId,
        therapistName:  therapist.name || therapist.therapistId,
        clientName,
        clientPhone,          // stored for admin only — never shown to therapist
        clientLocation: loc,
        bookingType:    'now',
        status:         'pending',
        createdAt:      FieldValue.serverTimestamp(),
        expiresAt:      firebase.firestore.Timestamp.fromDate(expiresAt),
      });

      // Save booking to sessionStorage so refresh restores the timer
      bookingIdRef.current = ref.id;
      const endAt = Date.now() + SECS * 1000;
      sessionStorage.setItem('pendingBooking', JSON.stringify({
        bookingId: ref.id,
        endAt,
        therapistId: therapist.id,
      }));

      // Countdown timer
      timerRef.current = setInterval(()=>{
        const rem = Math.ceil((endAt - Date.now()) / 1000);
        if(rem <= 0){
          clearInterval(timerRef.current);
          if(unsubRef.current){ unsubRef.current(); unsubRef.current=null; }
          db.collection('bookings').doc(ref.id).update({status:'expired'}).catch(()=>{});
          sessionStorage.removeItem('pendingBooking');
          setStep('expired');
        } else { setTimeLeft(rem); }
      }, 500);

      // Watch for therapist response
      unsubRef.current = db.collection('bookings').doc(ref.id).onSnapshot(snap=>{
        if(!snap.exists) return;
        const s = snap.data().status;
        if(s==='accepted'||s==='admin_pending'||s==='confirmed'){
          clearInterval(timerRef.current);
          if(unsubRef.current){ unsubRef.current(); unsubRef.current=null; }
          sessionStorage.removeItem('pendingBooking');
          playAlert('accept');
          setStep('accepted');
        } else if(s==='declined'){
          clearInterval(timerRef.current);
          if(unsubRef.current){ unsubRef.current(); unsubRef.current=null; }
          sessionStorage.removeItem('pendingBooking');
          setStep('declined');
        }
      });

      setStep('waiting');
    } catch(err){ alert(`Error: ${err.message}`); setStep('choose'); }
  };

  // "Book Now" button → show location step first
  const handleBookNow = ()=>{ setLocError(''); setStep('location'); };

  const handleUseGPS = async ()=>{
    setGpsLoading(true); setLocError('');
    const loc = await getGPS();
    setGpsLoading(false);
    if(loc){ submitBookNow(loc); }
    else { setLocError('Could not get location. Please enter a Google Maps link below.'); }
  };

  const handleUseMapUrl = ()=>{
    if(!mapUrl.trim()){ setLocError('Please paste a Google Maps link.'); return; }
    const parsed = parseGoogleMapsUrl(mapUrl.trim());
    if(parsed){ submitBookNow(parsed); }
    else { setLocError('Invalid link. Open Google Maps → Share → Copy Link, then paste here.'); }
  };

  const handleBookLater = async ()=>{
    if(!form.date||!form.time) return;
    setSaving(true);
    try {
      // Duplicate guard: check for existing scheduled booking same client+date+time
      const dupSnap = await db.collection('bookings')
        .where('clientPhone','==',clientPhone)
        .where('status','in',['scheduled','confirmed'])
        .where('scheduledDate','==',form.date)
        .where('scheduledTime','==',form.time)
        .limit(1).get();
      if(!dupSnap.empty){ alert('You already have a booking for this date and time.'); setSaving(false); return; }
      const loc = await Promise.race([getGPS(), new Promise(r=>setTimeout(()=>r(null),4000))]);
      await db.collection('bookings').add({
        therapistDocId: therapist.id,
        therapistId:    therapist.therapistId,
        therapistName:  therapist.name || therapist.therapistId,
        clientName,
        clientPhone,          // stored for admin only — never shown to therapist
        clientLocation: loc,
        bookingType:    'later',
        scheduledDate:  form.date,
        scheduledTime:  form.time,
        notes:          form.notes.trim(),
        status:         'scheduled',
        createdAt:      FieldValue.serverTimestamp(),
      });
      setStep('later-done');
    } catch(err){ alert(`Error: ${err.message}`); }
    finally{ setSaving(false); }
  };

  // ── Expired option handlers ──
  const handleBookWithAdmin = async ()=>{
    if(!bookingIdRef.current) return;
    setSaving(true);
    try {
      await db.collection('bookings').doc(bookingIdRef.current).update({
        status: 'admin_pending',
        needsTherapistAssignment: true,
        adminRequestedAt: FieldValue.serverTimestamp(),
      });
      sessionStorage.removeItem('pendingBooking');
      setStep('admin-sent');
    } catch(e){ alert('Error: ' + e.message); }
    finally{ setSaving(false); }
  };

  const handleChooseAnother = ()=>{
    sessionStorage.removeItem('pendingBooking');
    onClose();
  };

  const fmtTime = s=>`${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;
  const urgent = timeLeft < 60;

  const overlay  = {position:'fixed',inset:0,background:'rgba(0,0,0,0.93)',zIndex:9999,display:'flex',alignItems:'center',justifyContent:'center',padding:'20px'};
  const card     = {background:'var(--surface)',border:'1px solid rgba(212,175,55,0.4)',borderRadius:'20px',padding:'28px 24px',width:'100%',maxWidth:'380px',position:'relative'};
  const btnClose = {position:'absolute',top:'14px',right:'16px',background:'none',border:'none',color:'var(--muted)',fontSize:'1.3rem',cursor:'pointer',lineHeight:'1'};
  const inp      = {background:'var(--elevated)',border:'1px solid var(--border)',borderRadius:'10px',padding:'12px 14px',color:'var(--text)',fontSize:'0.95rem',width:'100%',outline:'none'};
  const lbl      = {color:'var(--muted)',fontSize:'0.7rem',letterSpacing:'1px',textTransform:'uppercase',display:'block',marginBottom:'5px'};
  const goldBtn  = {background:'linear-gradient(135deg,#a07820,#d4af37)',color:'#000',border:'none',borderRadius:'10px',padding:'14px',fontWeight:'700',fontSize:'0.92rem',cursor:'pointer',width:'100%',minHeight:'48px'};

  return (
    <div style={overlay}>
      <div className="fade-in" style={card}>

        {/* Therapist avatar + name */}
        <div style={{textAlign:'center',marginBottom:'20px'}}>
          <div style={{width:'52px',height:'52px',borderRadius:'50%',overflow:'hidden',border:'2px solid rgba(212,175,55,0.4)',margin:'0 auto 8px'}}>
            {therapist.imageUrl
              ? <img src={therapist.imageUrl} style={{width:'100%',height:'100%',objectFit:'cover'}}/>
              : <div style={{width:'100%',height:'100%',background:'var(--elevated)',display:'flex',alignItems:'center',justifyContent:'center',color:'var(--gold)',fontSize:'1.4rem'}}>✦</div>
            }
          </div>
          <p style={{color:'var(--gold)',fontWeight:'700',fontSize:'0.95rem'}}>{therapist.name||therapist.therapistId}</p>
          {therapist.speciality&&<p style={{color:'var(--muted)',fontSize:'0.74rem',marginTop:'2px'}}>{therapist.speciality}</p>}
        </div>

        {/* ── Choose ── */}
        {step==='choose'&&(<>
          <button onClick={onClose} style={btnClose}>✕</button>
          <h2 style={{textAlign:'center',color:'var(--text)',fontSize:'1rem',fontWeight:'600',marginBottom:'14px'}}>How would you like to book?</h2>
          <div style={{display:'flex',flexDirection:'column',gap:'10px'}}>
            <button onClick={handleBookNow} style={{...goldBtn,display:'flex',flexDirection:'column',alignItems:'center',gap:'3px',padding:'16px 12px'}}>
              <span style={{fontSize:'1.5rem',lineHeight:'1'}}>⚡</span>
              <span>Book Now</span>
              <span style={{fontSize:'0.7rem',opacity:0.65,fontWeight:'400'}}>Request immediate appointment</span>
            </button>
            <button onClick={()=>setStep('later-form')} style={{background:'var(--elevated)',color:'var(--text)',border:'1px solid var(--border)',borderRadius:'10px',padding:'16px 12px',fontWeight:'600',fontSize:'0.9rem',cursor:'pointer',display:'flex',flexDirection:'column',alignItems:'center',gap:'3px'}}>
              <span style={{fontSize:'1.5rem',lineHeight:'1'}}>📅</span>
              <span>Book Later</span>
              <span style={{fontSize:'0.7rem',color:'var(--muted)',fontWeight:'400'}}>{lockedDate ? `Scheduled: ${lockedDate}` : 'Schedule a future appointment'}</span>
            </button>
          </div>
        </>)}

        {/* ── Location Step ── */}
        {step==='location'&&(<>
          <button onClick={()=>setStep('choose')} style={btnClose}>✕</button>
          <h2 style={{textAlign:'center',color:'var(--text)',fontSize:'1rem',fontWeight:'600',marginBottom:'6px'}}>Where should the therapist come?</h2>
          <p style={{textAlign:'center',color:'var(--muted)',fontSize:'0.78rem',marginBottom:'18px'}}>Share your location so the therapist can reach you</p>

          {/* GPS option */}
          <button onClick={handleUseGPS} disabled={gpsLoading}
            style={{...goldBtn,display:'flex',alignItems:'center',justifyContent:'center',gap:'10px',marginBottom:'14px'}}>
            {gpsLoading
              ? <><span className="spin">✦</span> Getting location…</>
              : <>📍 Use My Current Location</>
            }
          </button>

          {/* Divider */}
          <div style={{display:'flex',alignItems:'center',gap:'10px',marginBottom:'14px'}}>
            <div style={{flex:1,height:'1px',background:'var(--border)'}}/>
            <span style={{color:'var(--muted)',fontSize:'0.75rem'}}>OR</span>
            <div style={{flex:1,height:'1px',background:'var(--border)'}}/>
          </div>

          {/* Maps URL option */}
          <div style={{marginBottom:'10px'}}>
            <label style={lbl}>Paste Google Maps Link</label>
            <input
              type="url"
              value={mapUrl}
              onChange={e=>{setMapUrl(e.target.value);setLocError('');}}
              placeholder="https://maps.google.com/…"
              style={{...inp,marginBottom:'10px'}}
            />
            <p style={{color:'var(--muted)',fontSize:'0.72rem',marginBottom:'10px'}}>
              Open Google Maps → long-press your location → Share → Copy link
            </p>
            <button onClick={handleUseMapUrl}
              style={{background:'var(--elevated)',color:'var(--text)',border:'1px solid var(--border-gold)',borderRadius:'10px',padding:'12px',fontWeight:'600',fontSize:'0.88rem',cursor:'pointer',width:'100%',minHeight:'44px'}}>
              🗺️ Use This Location
            </button>
          </div>

          {locError&&<p style={{color:'var(--danger)',fontSize:'0.78rem',marginTop:'8px',textAlign:'center'}}>{locError}</p>}
        </>)}

        {/* ── Loading ── */}
        {step==='loading'&&(
          <div style={{textAlign:'center',padding:'20px 0'}}>
            <span className="spin" style={{fontSize:'2.2rem',color:'var(--gold)',display:'block',marginBottom:'12px'}}>✦</span>
            <p style={{color:'var(--muted)',fontSize:'0.9rem'}}>Sending request…</p>
          </div>
        )}

        {/* ── Waiting ── */}
        {step==='waiting'&&(
          <div style={{textAlign:'center'}}>
            <div style={{fontSize:'2.4rem',marginBottom:'8px'}}>⏳</div>
            <h2 style={{color:'var(--text)',fontSize:'1.05rem',fontWeight:'700',marginBottom:'4px'}}>Request Sent!</h2>
            <p style={{color:'var(--muted)',fontSize:'0.82rem',marginBottom:'18px'}}>Waiting for therapist to accept…</p>
            <div style={{width:'90px',height:'90px',borderRadius:'50%',border:`3px solid ${urgent?'#e74c3c':'rgba(212,175,55,0.5)'}`,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',margin:'0 auto 16px',background:urgent?'rgba(231,76,60,.07)':'rgba(212,175,55,.04)',transition:'border-color .4s'}}>
              <span style={{fontSize:'1.5rem',fontWeight:'700',color:urgent?'#e74c3c':'var(--gold)',fontFamily:'monospace'}}>{fmtTime(timeLeft)}</span>
              <span style={{fontSize:'0.58rem',color:'var(--muted)',letterSpacing:'1px'}}>LEFT</span>
            </div>
            <p style={{color:'var(--muted)',fontSize:'0.75rem'}}>Auto-cancels if not accepted within 3 mins</p>
          </div>
        )}

        {/* ── Accepted ── */}
        {step==='accepted'&&(
          <div style={{textAlign:'center'}}>
            <div style={{fontSize:'3rem',marginBottom:'10px'}}>✅</div>
            <h2 style={{color:'#27ae60',fontSize:'1.15rem',fontWeight:'700',marginBottom:'8px'}}>Therapist Accepted!</h2>
            <p style={{color:'var(--muted)',fontSize:'0.85rem',marginBottom:'12px'}}>
              <strong style={{color:'var(--text)'}}>{therapist.name||therapist.therapistId}</strong> has accepted your request.
            </p>
            <div style={{background:'rgba(212,175,55,0.08)',border:'1px solid var(--border-gold)',borderRadius:'12px',padding:'14px',marginBottom:'16px',textAlign:'left'}}>
              <p style={{color:'var(--gold)',fontSize:'0.85rem',fontWeight:'700',marginBottom:'5px'}}>⏳ Next: Admin Confirmation</p>
              <p style={{color:'var(--muted)',fontSize:'0.8rem',lineHeight:'1.6'}}>Admin will verify and confirm your appointment. Confirmation will be sent to your WhatsApp.</p>
            </div>
            <a href={`https://wa.me/${ADMIN_WHATSAPP}?text=${encodeURIComponent('Hi, my booking with '+(therapist.name||therapist.therapistId)+' has been accepted. Kindly confirm my appointment. — '+clientName)}`}
              target="_blank" rel="noopener noreferrer"
              style={{display:'block',background:'#25D366',color:'#fff',borderRadius:'10px',padding:'13px',fontWeight:'700',textDecoration:'none',marginBottom:'10px',fontSize:'0.9rem',textAlign:'center'}}>
              💬 Contact Admin on WhatsApp
            </a>
            <button onClick={onClose} style={{...goldBtn,background:'transparent',border:'1px solid var(--border)',color:'var(--muted)'}}>Close</button>
          </div>
        )}

        {/* ── Declined ── */}
        {step==='declined'&&(
          <div style={{textAlign:'center'}}>
            <div style={{fontSize:'3rem',marginBottom:'10px'}}>😔</div>
            <h2 style={{color:'var(--text)',fontSize:'1.05rem',fontWeight:'700',marginBottom:'8px'}}>Therapist Unavailable</h2>
            <p style={{color:'var(--muted)',fontSize:'0.85rem',marginBottom:'20px'}}>This therapist couldn't accept right now.</p>
            <div style={{display:'flex',flexDirection:'column',gap:'10px'}}>
              <button onClick={handleBookWithAdmin} disabled={saving}
                style={{...goldBtn,display:'flex',flexDirection:'column',alignItems:'center',gap:'3px',padding:'16px 12px'}}>
                {saving?<span className="spin">✦</span>:<>
                  <span style={{fontSize:'1.4rem',lineHeight:'1'}}>👨‍💼</span>
                  <span>Book with Admin</span>
                  <span style={{fontSize:'0.7rem',opacity:0.65,fontWeight:'400'}}>We'll assign the best available therapist</span>
                </>}
              </button>
              <button onClick={handleChooseAnother}
                style={{background:'var(--elevated)',color:'var(--text)',border:'1px solid var(--border)',borderRadius:'10px',padding:'16px 12px',fontWeight:'600',fontSize:'0.9rem',cursor:'pointer',display:'flex',flexDirection:'column',alignItems:'center',gap:'3px',width:'100%',minHeight:'48px'}}>
                <span style={{fontSize:'1.4rem',lineHeight:'1'}}>🔄</span>
                <span>Choose Another Therapist</span>
                <span style={{fontSize:'0.7rem',color:'var(--muted)',fontWeight:'400'}}>Go back and select someone else</span>
              </button>
            </div>
          </div>
        )}

        {/* ── Expired (timer ran out) ── */}
        {step==='expired'&&(
          <div style={{textAlign:'center'}}>
            <div style={{fontSize:'2.8rem',marginBottom:'10px'}}>⏰</div>
            <h2 style={{color:'var(--text)',fontSize:'1.05rem',fontWeight:'700',marginBottom:'6px'}}>Time's Up</h2>
            <p style={{color:'var(--muted)',fontSize:'0.82rem',marginBottom:'22px',lineHeight:'1.5'}}>
              <strong style={{color:'var(--text)'}}>{therapist.name||therapist.therapistId}</strong> didn't respond in time. What would you like to do?
            </p>
            <div style={{display:'flex',flexDirection:'column',gap:'10px'}}>
              <button onClick={handleBookWithAdmin} disabled={saving}
                style={{...goldBtn,display:'flex',flexDirection:'column',alignItems:'center',gap:'3px',padding:'16px 12px'}}>
                {saving?<span className="spin">✦</span>:<>
                  <span style={{fontSize:'1.4rem',lineHeight:'1'}}>👨‍💼</span>
                  <span>Book with Admin</span>
                  <span style={{fontSize:'0.7rem',opacity:0.65,fontWeight:'400'}}>We'll assign the best available therapist</span>
                </>}
              </button>
              <button onClick={handleChooseAnother}
                style={{background:'var(--elevated)',color:'var(--text)',border:'1px solid var(--border)',borderRadius:'10px',padding:'16px 12px',fontWeight:'600',fontSize:'0.9rem',cursor:'pointer',display:'flex',flexDirection:'column',alignItems:'center',gap:'3px',width:'100%',minHeight:'48px'}}>
                <span style={{fontSize:'1.4rem',lineHeight:'1'}}>🔄</span>
                <span>Choose Another Therapist</span>
                <span style={{fontSize:'0.7rem',color:'var(--muted)',fontWeight:'400'}}>Go back and select someone else</span>
              </button>
            </div>
          </div>
        )}

        {/* ── Admin Sent ── */}
        {step==='admin-sent'&&(
          <div style={{textAlign:'center'}}>
            <div style={{fontSize:'3rem',marginBottom:'10px'}}>✅</div>
            <h2 style={{color:'#27ae60',fontSize:'1.1rem',fontWeight:'700',marginBottom:'8px'}}>Request Sent to Admin!</h2>
            <p style={{color:'var(--muted)',fontSize:'0.83rem',marginBottom:'16px',lineHeight:'1.6'}}>
              Our admin will assign the best available therapist and contact you on WhatsApp to confirm.
            </p>
            <button onClick={onClose} style={{...goldBtn,background:'transparent',border:'1px solid var(--border)',color:'var(--muted)'}}>Done ✓</button>
          </div>
        )}

        {/* ── Book Later Form ── */}
        {step==='later-form'&&(<>
          <button onClick={()=>setStep('choose')} style={btnClose}>✕</button>
          <h2 style={{textAlign:'center',color:'var(--text)',fontSize:'1rem',fontWeight:'600',marginBottom:'18px'}}>Schedule Appointment</h2>
          <div style={{display:'flex',flexDirection:'column',gap:'14px'}}>
            <div>
              <label style={lbl}>Date {lockedDate && <span style={{opacity:0.55,fontStyle:'italic',textTransform:'none'}}>· set by admin</span>}</label>
              <input type="date" value={form.date} min={new Date().toISOString().split('T')[0]}
                onChange={e=>{ if(!lockedDate) setForm(f=>({...f,date:e.target.value})); }}
                style={{...inp, opacity: lockedDate ? 0.65 : 1, cursor: lockedDate ? 'not-allowed' : 'auto'}}
                readOnly={!!lockedDate}/>
            </div>
            <div>
              <label style={lbl}>Time</label>
              <input type="time" value={form.time}
                onChange={e=>setForm(f=>({...f,time:e.target.value}))} style={inp}/>
            </div>
            <div>
              <label style={lbl}>Notes <span style={{opacity:0.45}}>(optional)</span></label>
              <textarea value={form.notes} onChange={e=>setForm(f=>({...f,notes:e.target.value}))}
                rows={2} placeholder="Any special requests or preferences…"
                style={{...inp,resize:'none',fontFamily:'inherit'}}/>
            </div>
            <button onClick={handleBookLater} disabled={!form.date||!form.time||saving}
              style={{...goldBtn,opacity:(!form.date||!form.time)?0.5:1}}>
              {saving?<span className="spin">✦</span>:'Confirm Booking'}
            </button>
          </div>
        </>)}

        {/* ── Later Done ── */}
        {step==='later-done'&&(
          <div style={{textAlign:'center'}}>
            <div style={{fontSize:'3rem',marginBottom:'10px'}}>🎉</div>
            <h2 style={{color:'var(--gold)',fontSize:'1.15rem',fontWeight:'700',marginBottom:'8px'}}>Appointment Scheduled!</h2>
            <p style={{color:'var(--muted)',fontSize:'0.83rem',marginBottom:'10px'}}>Booking with <strong style={{color:'var(--text)'}}>{therapist.name||therapist.therapistId}</strong> submitted.</p>
            <div style={{background:'var(--elevated)',borderRadius:'10px',padding:'10px 16px',marginBottom:'14px',border:'1px solid rgba(212,175,55,0.3)',display:'inline-block',textAlign:'left'}}>
              <p style={{color:'var(--gold)',fontSize:'0.88rem',fontWeight:'600'}}>📅 {form.date}</p>
              <p style={{color:'var(--gold)',fontSize:'0.88rem',fontWeight:'600'}}>🕐 {form.time}</p>
            </div>
            <p style={{color:'var(--muted)',fontSize:'0.76rem',marginBottom:'14px'}}>Your appointment is listed as <strong style={{color:'var(--gold)'}}>upcoming</strong>. Admin and therapist have been notified.</p>
            <a href={`https://wa.me/${ADMIN_WHATSAPP}?text=${encodeURIComponent('Hi, I just scheduled an upcoming appointment with '+(therapist.name||therapist.therapistId)+' for '+form.date+' at '+form.time+'. Please confirm. — '+clientName)}`}
              target="_blank" rel="noopener noreferrer"
              style={{display:'block',background:'#25D366',color:'#fff',borderRadius:'10px',padding:'12px',fontWeight:'700',textDecoration:'none',marginBottom:'10px',fontSize:'0.88rem',textAlign:'center'}}>
              💬 Contact Admin on WhatsApp
            </a>
            <button onClick={onClose} style={goldBtn}>Done ✓</button>
          </div>
        )}

      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════════
//  THERAPIST CARD
// ══════════════════════════════════════════════════════
function TherapistCard({ therapist, tokenData, clientName, clientPhone }) {
  const [viewCount,    setViewCount]    = useState(0);
  const [limitReached, setLimitReached] = useState(false);
  const [isVisible,    setIsVisible]    = useState(false);
  const [timeLeft,     setTimeLeft]     = useState(0);
  const [loading,      setLoading]      = useState(false);
  const [canvasUrl,    setCanvasUrl]    = useState('');
  const [showBooking,  setShowBooking]  = useState(false);
  const timerRef  = useRef(null);
  const canvasRef = useRef(null);
  const videoRef  = useRef(null);
  const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) || (navigator.platform==='MacIntel'&&navigator.maxTouchPoints>1);

  // Feed canvas stream into video (non-iOS only — iOS doesn't support captureStream)
  useEffect(()=>{
    if (isIOS || !isVisible || !canvasRef.current || !videoRef.current) return;
    try {
      const stream = canvasRef.current.captureStream(1);
      videoRef.current.srcObject = stream;
      videoRef.current.play().catch(()=>{});
    } catch(e) {}
    return ()=>{ try { if(videoRef.current) videoRef.current.srcObject=null; } catch(e){} };
  },[isVisible, canvasUrl]);

  const tokenId    = tokenData?.id                  || '';
  const maxViews   = tokenData?.maxViewsPerImage    ?? 2;
  const viewSecs   = tokenData?.viewDurationSeconds ?? 3;
  const countDocId = `${tokenId}_${therapist.id}`;

  useEffect(()=>{
    db.collection('viewCounts').doc(countDocId).get().then(snap=>{
      if (snap.exists) { const c=snap.data().count||0; setViewCount(c); if(c>=maxViews) setLimitReached(true); }
    });
    // Auto-reopen booking modal if this therapist has a pending booking in sessionStorage
    try {
      const pending = JSON.parse(sessionStorage.getItem('pendingBooking')||'null');
      if(pending && pending.therapistId === therapist.id) setShowBooking(true);
    } catch(e){}
    return ()=>clearInterval(timerRef.current);
  },[]);

  const buildCanvas = useCallback(()=>{
    return new Promise(resolve=>{
      const canvas = canvasRef.current;
      if (!canvas) { resolve(therapist.imageUrl); return; }
      const img = new Image();
      // Do NOT set crossOrigin for base64 data URLs — it breaks canvas on iOS Safari
      img.onload = ()=>{
        const W=img.naturalWidth||img.width, H=img.naturalHeight||img.height;
        canvas.width=W; canvas.height=H;
        const ctx=canvas.getContext('2d');
        ctx.drawImage(img,0,0,W,H);
        const ts=new Date().toLocaleString('en-IN');
        // Heavy diagonal watermark — repeated across entire photo
        ctx.save();
        ctx.globalAlpha=0.38; ctx.fillStyle='#ffffff';
        ctx.font=`bold ${Math.max(18,W*0.045)}px Arial`;
        ctx.rotate(-Math.PI/7);
        const step=Math.max(90,W*0.32);
        for(let y=-H;y<H*2;y+=step)
          for(let x=-W;x<W*2;x+=step*1.5){
            ctx.fillText(clientName,x,y);
            ctx.fillText(`+91${clientPhone}`,x,y+Math.max(22,W*0.042));
          }
        ctx.restore();
        // Bold top banner
        ctx.save();
        ctx.fillStyle='rgba(0,0,0,0.55)';
        ctx.fillRect(0,0,W,Math.max(44,H*0.09));
        ctx.globalAlpha=1; ctx.fillStyle='#ffcc00';
        ctx.font=`bold ${Math.max(13,W*0.032)}px Arial`;
        ctx.textAlign='center';
        ctx.fillText(`FOR: ${clientName}  |  +91${clientPhone}`,W/2,Math.max(28,H*0.062));
        ctx.restore();
        // Bold bottom stamp
        ctx.save();
        ctx.fillStyle='rgba(0,0,0,0.55)';
        ctx.fillRect(0,H-Math.max(44,H*0.09),W,Math.max(44,H*0.09));
        ctx.globalAlpha=1; ctx.fillStyle='#ffcc00';
        ctx.font=`bold ${Math.max(11,W*0.026)}px Arial`;
        ctx.textAlign='center';
        ctx.fillText(`${clientName} | +91${clientPhone} | ${ts}`,W/2,H-Math.max(14,H*0.025));
        ctx.restore();
        resolve(canvas.toDataURL('image/jpeg',0.92));
      };
      img.onerror=()=>resolve(therapist.imageUrl);
      img.src=therapist.imageUrl;
    });
  },[therapist.imageUrl,clientName,clientPhone]);

  const handleView = async ()=>{
    if(limitReached||isVisible||loading) return;
    setLoading(true);
    try {
      const snap = await db.collection('viewCounts').doc(countDocId).get();
      const live  = snap.exists ? (snap.data().count||0) : 0;
      if(live>=maxViews){ setViewCount(live); setLimitReached(true); return; }

      await db.collection('viewCounts').doc(countDocId).set({
        count: FieldValue.increment(1), lastViewedAt: FieldValue.serverTimestamp(),
        therapistId:therapist.id, tokenId,
      },{merge:true});

      await db.collection('viewLogs').add({
        token:tokenId, therapistId:therapist.id,
        clientName, clientPhone,
        viewedAt:FieldValue.serverTimestamp(),
        viewCount:live+1, userAgent:navigator.userAgent,
      });

      const newCount=live+1;
      setViewCount(newCount);
      if(newCount>=maxViews) setLimitReached(true);

      const url=await buildCanvas();
      setCanvasUrl(url);
      setIsVisible(true); setTimeLeft(viewSecs);
      // Use wall-clock timer so iOS background throttling doesn't break countdown
      const endAt = Date.now() + viewSecs * 1000;
      const tick = () => {
        const rem = Math.ceil((endAt - Date.now()) / 1000);
        if (rem <= 0) {
          clearInterval(timerRef.current);
          setIsVisible(false); setCanvasUrl(''); setTimeLeft(0);
        } else {
          setTimeLeft(rem);
        }
      };
      timerRef.current = setInterval(tick, 400); // poll at 400ms for accuracy
    } catch(err){ console.error(err); }
    finally{ setLoading(false); }
  };

  const bookUrl=()=>{
    const msg=encodeURIComponent(`Hi, I choose therapist ID: ${therapist.therapistId}. My name is ${clientName} and my number is ${clientPhone}.`);
    return `https://wa.me/${ADMIN_WHATSAPP}?text=${msg}`;
  };

  const watermarkText=`${clientName} | +91${clientPhone}`;

  return (
    <div style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:'16px',overflow:'hidden',boxShadow:'0 4px 24px rgba(0,0,0,.4)'}}>
      <canvas ref={canvasRef} style={{display:'none'}}/>
      <div style={{position:'relative',aspectRatio:'3/4',background:'#0d0d0d',overflow:'hidden'}}>

        {/* Solid black background — no blurred preview to screenshot */}
        <div style={{position:'absolute',inset:0,background:'#0a0a0a'}}/>

        {/* Watermarked photo */}
        {isVisible&&canvasUrl&&(
          <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center'}}>
            {isIOS
              /* iOS: show watermarked <img> directly — captureStream not supported */
              ? <img src={canvasUrl} onContextMenu={e=>e.preventDefault()} style={{width:'100%',height:'100%',objectFit:'cover',display:'block',WebkitUserSelect:'none',userSelect:'none'}}/>
              /* Android/Desktop: live canvas stream into <video> so screenshots show black */
              : <video ref={videoRef} poster={canvasUrl} muted playsInline autoPlay onContextMenu={e=>e.preventDefault()} style={{width:'100%',height:'100%',objectFit:'cover',display:'block'}}/>
            }
            {/* Countdown */}
            <div style={{position:'absolute',top:'10px',right:'10px',zIndex:10,background:'rgba(0,0,0,.7)',color:'var(--gold)',borderRadius:'20px',padding:'4px 12px',fontSize:'0.85rem',fontWeight:'700'}}>{timeLeft}s</div>
          </div>
        )}

        {/* Hidden overlay */}
        {!isVisible&&(
          <div style={{position:'absolute',inset:0,zIndex:6,display:'flex',alignItems:'center',justifyContent:'center',background:'rgba(0,0,0,.5)',backdropFilter:'blur(2px)'}}>
            {limitReached
              ? <div style={{textAlign:'center',padding:'20px'}}>
                  <div style={{fontSize:'1.6rem'}}>🚫</div>
                  <p style={{marginTop:'8px',fontSize:'0.85rem',color:'var(--muted)'}}>View limit reached</p>
                  <p style={{fontSize:'0.75rem',color:'var(--muted)',marginTop:'4px'}}>({viewCount}/{maxViews} views used)</p>
                </div>
              : <button onClick={handleView} disabled={loading} style={{display:'flex',flexDirection:'column',alignItems:'center',gap:'6px',background:'linear-gradient(135deg,var(--gold-dark),var(--gold))',color:'#0a0a0a',border:'none',borderRadius:'12px',padding:'16px 28px',fontSize:'0.95rem',fontWeight:'700',cursor:'pointer',boxShadow:'0 4px 20px rgba(212,175,55,.3)'}}>
                  {loading?<span className="spin">✦</span>:<><span style={{fontSize:'1.4rem'}}>👁</span><span>View Photo</span><span style={{fontSize:'0.75rem',color:'rgba(10,10,10,.6)'}}>{viewCount}/{maxViews} views</span></>}
                </button>
            }
          </div>
        )}
      </div>

      {/* Footer */}
      <div style={{padding:'14px 18px',display:'flex',flexDirection:'column',gap:'10px'}}>
        <div>
          <p style={{color:'var(--gold)',fontSize:'1rem',fontWeight:'700',letterSpacing:'1px'}}>{therapist.name || therapist.therapistId}</p>
          {therapist.speciality && (
            <p style={{color:'var(--muted)',fontSize:'0.78rem',marginTop:'3px'}}>💆 {therapist.speciality}</p>
          )}
          {therapist.workStart && therapist.workEnd && (
            <p style={{color:'var(--muted)',fontSize:'0.76rem',marginTop:'2px'}}>🕐 {therapist.workStart} – {therapist.workEnd}</p>
          )}
          {therapist.bio && (
            <p style={{color:'var(--muted)',fontSize:'0.76rem',marginTop:'4px',lineHeight:'1.5',fontStyle:'italic'}}>{therapist.bio}</p>
          )}
        </div>
        <button onClick={()=>setShowBooking(true)} style={{background:'linear-gradient(135deg,#1a6e2e,#25a240)',color:'#fff',border:'none',borderRadius:'8px',padding:'11px 16px',fontSize:'0.85rem',fontWeight:'700',cursor:'pointer',display:'block',boxShadow:'0 2px 12px rgba(37,162,64,.3)',textAlign:'center',width:'100%'}}>
          📅 Book Appointment
        </button>
        {showBooking&&<BookingModal therapist={therapist} clientName={clientName} clientPhone={clientPhone} tokenData={tokenData} onClose={()=>setShowBooking(false)}/>}
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════════
//  PAGE WATERMARK (fixed over entire page)
// ══════════════════════════════════════════════════════
function PageWatermark({ name, phone }) {
  const text = `${name} · ${phone}`;
  return (
    <div style={{position:'fixed',inset:0,overflow:'hidden',pointerEvents:'none',zIndex:1000}}>
      {Array.from({length:40},(_,i)=>(
        <span key={i} style={{position:'absolute',left:`${(i%4)*28}%`,top:`${Math.floor(i/4)*14}%`,transform:'rotate(-22deg)',whiteSpace:'nowrap',fontSize:'11px',color:'rgba(255,255,255,.04)',fontWeight:'700',letterSpacing:'1px',fontFamily:'monospace',pointerEvents:'none'}}>
          {text}
        </span>
      ))}
    </div>
  );
}

// ── Shared ──────────────────────────────────────────────
function FullScreen({children}) {
  return <div style={{minHeight:'100vh',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',background:'radial-gradient(ellipse at 50% 0%,#1a1000,var(--bg) 65%)',padding:'40px 20px',textAlign:'center'}}>{children}</div>;
}
const msgTitle={fontSize:'1.5rem',color:'var(--gold)',fontWeight:'700',letterSpacing:'1px',marginBottom:'12px'};
const msgSub={color:'var(--muted)',fontSize:'0.95rem',maxWidth:'360px',lineHeight:'1.6'};
const labelSt={color:'var(--muted)',fontSize:'0.76rem',letterSpacing:'1.2px',textTransform:'uppercase'};
const inputSt={background:'var(--elevated)',border:'1px solid',borderRadius:'10px',padding:'13px 16px',color:'var(--text)',fontSize:'1rem',outline:'none',width:'100%'};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
