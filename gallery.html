<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ════════════════════════════════════════════════════════

const FIREBASE_CONFIG = {

// ── Distance helpers ──────────────────────────────────
function haversine(lat1, lng1, lat2, lng2) {
  const R = 6371;
  const toRad = x => x * Math.PI / 180;
  const dLat = toRad(lat2 - lat1);
  const dLng = toRad(lng2 - lng1);
  const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}
function fmtDist(km) {
  return km < 1 ? `${Math.round(km*1000)} m` : `${km.toFixed(1)} km`;
}

// ── Sound alert (Web Audio API — no file needed) ──────
function playAlert(type='new') {
  try {
    const ctx = new (window.AudioContext||window.webkitAudioContext)();
    const seqs = {
      new:    [[880,0.00],[1100,0.18],[880,0.36],[1100,0.54]],
      accept: [[660,0.00],[880,0.18],[1100,0.36]],
    };
    (seqs[type]||seqs.new).forEach(([freq,t])=>{
      const o=ctx.createOscillator(), g=ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.frequency.value=freq; o.type='sine';
      g.gain.setValueAtTime(0.25, ctx.currentTime+t);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+t+0.16);
      o.start(ctx.currentTime+t); o.stop(ctx.currentTime+t+0.18);
    });
  } catch(e){}
}
// ════════════════════════════════════════════════════════

if (!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
const db      = firebase.firestore();
const FieldValue = firebase.firestore.FieldValue;

function getTokenFromUrl() {
  return new URLSearchParams(window.location.search).get('token') || '';
}

// ══════════════════════════════════════════════════════
//  APP
// ══════════════════════════════════════════════════════
function App() {
  const [status,      setStatus]      = useState('loading'); // loading|invalid|expired|info|loc-prompt|gallery
  const [tokenData,   setTokenData]   = useState(null);
  const [client,      setClient]      = useState({name:'',phone:''});
  const [clientLoc,   setClientLoc]   = useState(null);
  const [isBlurred,   setIsBlurred]   = useState(false);
  const [isDuplicate, setIsDuplicate] = useState(false);
  const tokenStr = getTokenFromUrl();

  // ── Multi-tab / multi-window guard ──
  // If this link is already open in another tab/window, block this one.
  useEffect(() => {
    if (!tokenStr) return;
    let bc;
    let guardTimeout;
    try {
      bc = new BroadcastChannel(`ffs_gallery_${tokenStr}`);
      bc.onmessage = (e) => {
        if (e.data === 'tab_opened') {
          // Another tab just opened the same link — tell it we're already here
          bc.postMessage('tab_taken');
        } else if (e.data === 'tab_taken') {
          // Primary tab responded — this window is a duplicate
          clearTimeout(guardTimeout);
          setIsDuplicate(true);
        }
      };
      // Announce this tab opened
      bc.postMessage('tab_opened');
      // If no 'tab_taken' arrives within 300ms, we are the primary tab
      guardTimeout = setTimeout(() => {}, 300);
    } catch(e) { /* BroadcastChannel not supported — fail silently */ }
    return () => {
      clearTimeout(guardTimeout);
      if (bc) bc.close();
    };
  }, [tokenStr]);

  // Privacy protection
  useEffect(() => {
    const block = e => e.preventDefault();
    document.addEventListener('contextmenu', block);
    document.addEventListener('copy',        block);
    document.addEventListener('cut',         block);
    document.addEventListener('dragstart',   block);
    document.addEventListener('selectstart', block);

    // Hide gallery whenever page becomes hidden (tab switch, app switcher, notification pull-down)
    const onVis = () => { if (document.hidden) setIsBlurred(true); };
    document.addEventListener('visibilitychange', onVis);

    // Also catch window losing focus (works on some Android browsers)
    const onBlur = () => setIsBlurred(true);
    window.addEventListener('blur', onBlur);

    const onTouch = e => { if (e.target.tagName==='IMG'||e.target.tagName==='VIDEO') e.preventDefault(); };
    document.addEventListener('touchstart', onTouch, {passive:false});
    const onKey = e => {
      if (e.key==='PrintScreen'||(e.ctrlKey&&e.key==='p')||(e.metaKey&&e.shiftKey&&['3','4','5','s'].includes(e.key))) {
        e.preventDefault(); alert('Screenshots are not permitted.');
      }
    };
    document.addEventListener('keydown', onKey);
    return () => {
      document.removeEventListener('contextmenu', block);
      document.removeEventListener('copy',        block);
      document.removeEventListener('cut',         block);
      document.removeEventListener('dragstart',   block);
      document.removeEventListener('selectstart', block);
      document.removeEventListener('visibilitychange', onVis);
      window.removeEventListener('blur', onBlur);
      document.removeEventListener('touchstart',  onTouch);
      document.removeEventListener('keydown',     onKey);
    };
  }, []);

  // Token validation
  useEffect(() => {
    if (!tokenStr) { setStatus('invalid'); return; }
    (async () => {
      try {
        const snap = await db.collection('galleryTokens').where('token','==',tokenStr).get();
        if (snap.empty) { setStatus('invalid'); return; }
        const data = {id:snap.docs[0].id,...snap.docs[0].data()};
        if (data.expiresAt?.toDate?.() < new Date()) { setStatus('expired'); return; }
        setTokenData(data);
        if (data.clientName && data.clientPhone) {
          setClient({name:data.clientName, phone:data.clientPhone});
          setStatus('loc-prompt');
        } else {
          setStatus('info');
        }
      } catch(err) { console.error(err); setStatus('invalid'); }
    })();
  }, [tokenStr]);

  // Block duplicate tab/window
  if (isDuplicate) return (
    <FullScreen>
      <div style={{fontSize:'3rem',marginBottom:'16px'}}>🔒</div>
      <h2 style={msgTitle}>Already Open</h2>
      <p style={msgSub}>This gallery link is already open in another window or tab. Please use that window to continue.</p>
      <p style={{color:'var(--muted)',fontSize:'0.78rem',marginTop:'16px',opacity:0.6}}>Close the other window first, then refresh this page.</p>
    </FullScreen>
  );

  if (status==='loading') return <FullScreen><span className="spin" style={{fontSize:'2.5rem',color:'var(--gold)'}}>✦</span><p style={{color:'var(--muted)',marginTop:'16px'}}>Validating access…</p></FullScreen>;
  if (status==='invalid') return <FullScreen><div style={{fontSize:'3rem',color:'var(--gold)',marginBottom:'16px'}}>⚠</div><h2 style={msgTitle}>Invalid Link</h2><p style={msgSub}>This gallery link is invalid.</p></FullScreen>;
  if (status==='expired') return <FullScreen><div style={{fontSize:'3rem',color:'var(--gold)',marginBottom:'16px'}}>⏱</div><h2 style={msgTitle}>Link Expired</h2><p style={msgSub}>This gallery link has expired. Please contact us for a new link.</p></FullScreen>;
  if (status==='info')    return <ClientInfoForm tokenData={tokenData} onConfirmed={(n,p)=>{ setClient({name:n,phone:p}); setStatus('loc-prompt'); }}/>;
  if (status==='loc-prompt') return <LocationPrompt onDone={loc=>{ if(loc){ setClientLoc(loc); setStatus('gallery'); } }}/>;

  return (
    <div style={{position:'relative'}}>
      <div style={{background:'rgba(212,175,55,.07)',borderBottom:'1px solid rgba(212,175,55,.2)',color:'var(--muted)',fontSize:'0.75rem',textAlign:'center',padding:'10px 20px'}}>
        ⚠ Screenshots or sharing are not allowed. All images carry your personal watermark. Note: complete technical prevention is not guaranteed.
      </div>

      {/* Page watermark removed — watermark only on photo canvas */}

      {/* Blur overlay on tab switch */}
      {isBlurred && (
        <div onClick={()=>setIsBlurred(false)} style={{position:'fixed',inset:0,zIndex:2000,background:'rgba(0,0,0,.92)',backdropFilter:'blur(12px)',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:'20px',cursor:'pointer'}}>
          <p style={{color:'var(--muted)',fontSize:'1.1rem'}}>Gallery hidden for privacy.</p>
          <button style={{background:'linear-gradient(135deg,var(--gold-dark),var(--gold))',color:'#0a0a0a',border:'none',borderRadius:'10px',padding:'12px 32px',fontSize:'0.95rem',fontWeight:'700'}}>Tap to Resume</button>
        </div>
      )}

      <TherapistGallery tokenData={tokenData} clientName={client.name} clientPhone={client.phone} clientLoc={clientLoc} isBlurred={isBlurred}/>
    </div>
  );
}

// ══════════════════════════════════════════════════════
//  CLIENT INFO FORM
// ══════════════════════════════════════════════════════
function ClientInfoForm({ tokenData, onConfirmed }) {
  const [name,   setName]   = useState(tokenData?.clientName  || '');
  const [phone,  setPhone]  = useState(tokenData?.clientPhone || '');
  const [nameErr,setNameErr]= useState('');
  const [phErr,  setPhErr]  = useState('');
  const [saving, setSaving] = useState(false);

  const handle = async (e) => {
    e.preventDefault(); setNameErr(''); setPhErr('');
    let ok = true;
    if (!name.trim()) { setNameErr('Please enter your name.'); ok=false; }
    if (!/^[6-9]\d{9}$/.test(phone.replace(/\s/g,''))) { setPhErr('Enter a valid 10-digit India mobile number starting with 6, 7, 8, or 9.'); ok=false; }
    if (!ok) return;
    setSaving(true);
    try {
      await db.collection('galleryTokens').doc(tokenData.id).update({clientName:name.trim(),clientPhone:phone.trim(),used:true});
      onConfirmed(name.trim(), phone.trim());
    } catch(err) { alert(`Error: ${err.message}`); }
    finally { setSaving(false); }
  };

  return (
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'radial-gradient(ellipse at 50% 0%,#1a1000,var(--bg) 65%)',padding:'20px'}}>

        <div style={{fontSize:'2.2rem',color:'var(--gold)',marginBottom:'14px'}}>✦</div>
        <h1 style={{fontSize:'1.6rem',fontWeight:'700',color:'var(--gold)',letterSpacing:'2px',marginBottom:'8px'}}>Welcome</h1>
        <p style={{color:'var(--muted)',fontSize:'0.88rem',marginBottom:'36px'}}>Please enter your details to access the gallery.</p>
        <form onSubmit={handle} style={{display:'flex',flexDirection:'column',gap:'20px',textAlign:'left'}}>
          <div style={{display:'flex',flexDirection:'column',gap:'7px'}}>
            <label style={labelSt}>Your Name</label>
            <input type="text" value={name} onChange={e=>setName(e.target.value)} style={{...inputSt,borderColor:nameErr?'var(--danger)':'var(--border)'}} placeholder="Full name" required/>
            {nameErr&&<p style={{color:'var(--danger)',fontSize:'0.8rem'}}>{nameErr}</p>}
          </div>
          <div style={{display:'flex',flexDirection:'column',gap:'7px'}}>
            <label style={labelSt}>WhatsApp Number (India)</label>
            <div style={{display:'flex'}}>
              <span style={{background:'var(--elevated)',border:'1px solid var(--border)',borderRight:'none',borderRadius:'10px 0 0 10px',padding:'13px 12px',color:'var(--muted)',fontSize:'0.95rem',whiteSpace:'nowrap'}}>+91</span>
              <input type="tel" value={phone} onChange={e=>setPhone(e.target.value.replace(/\D/g,'').slice(0,10))} style={{...inputSt,borderRadius:'0 10px 10px 0',borderLeft:'none',flex:1,borderColor:phErr?'var(--danger)':'var(--border)'}} placeholder="9876543210" maxLength={10} required/>
            </div>
            {phErr&&<p style={{color:'var(--danger)',fontSize:'0.8rem'}}>{phErr}</p>}
          </div>
          <p style={{color:'var(--muted)',fontSize:'0.78rem',lineHeight:'1.6',background:'rgba(212,175,55,.04)',border:'1px solid var(--border-gold)',borderRadius:'8px',padding:'12px',textAlign:'center'}}>
            Your name and number will appear as a watermark on all images to prevent unauthorised sharing.
          </p>
          <button type="submit" disabled={saving} style={{background:'linear-gradient(135deg,var(--gold-dark),var(--gold))',color:'#0a0a0a',border:'none',borderRadius:'10px',padding:'15px',fontSize:'0.95rem',fontWeight:'700',letterSpacing:'1px',marginTop:'8px',minHeight:'50px'}}>
            {saving?<span className="spin">✦</span>:'Access Gallery →'}
          </button>
        </form>
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════════
//  LOCATION PROMPT
// ══════════════════════════════════════════════════════
// Chennai centre + service radius
const CHENNAI = { lat: 13.0827, lng: 80.2707, radiusKm: 50 };

function distKm(lat1, lng1, lat2, lng2) {
  const R = 6371, dLat = (lat2-lat1)*Math.PI/180, dLng = (lng2-lng1)*Math.PI/180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function LocationPrompt({ onDone }) {
  const [phase,   setPhase]   = useState('idle'); // idle | loading | denied | outside | ok
  const [distKmVal, setDistKmVal] = useState(null);

  const ask = () => {
    setPhase('loading');
    if (!navigator.geolocation) { setPhase('denied'); return; }
    navigator.geolocation.getCurrentPosition(
      p => {
        const { latitude: lat, longitude: lng } = p.coords;
        const d = distKm(lat, lng, CHENNAI.lat, CHENNAI.lng);
        setDistKmVal(Math.round(d));
        if (d <= CHENNAI.radiusKm) {
          setPhase('ok');
          setTimeout(() => onDone({ lat, lng }), 800);
        } else {
          setPhase('outside');
        }
      },
      () => setPhase('denied'),
      { timeout: 10000, maximumAge: 0, enableHighAccuracy: true }
    );
  };

  const wrap = (children) => (
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'radial-gradient(ellipse at 50% 0%,#1a1000,var(--bg) 65%)',padding:'24px'}}>

        {children}
      </div>
    </div>
  );

  // ── Location denied ──
  if (phase === 'denied') return wrap(<>
    <div style={{fontSize:'3rem',marginBottom:'14px'}}>🚫</div>
    <h2 style={{color:'var(--danger)',fontSize:'1.2rem',fontWeight:'700',marginBottom:'10px'}}>Location Access Required</h2>
    <p style={{color:'var(--muted)',fontSize:'0.85rem',lineHeight:'1.7',marginBottom:'24px'}}>
      Location permission was denied. You must allow location access to use this service.<br/><br/>
      Please enable it in your browser settings and try again.
    </p>
    <div style={{background:'rgba(231,76,60,0.08)',border:'1px solid rgba(231,76,60,0.2)',borderRadius:'12px',padding:'14px',marginBottom:'20px',textAlign:'left'}}>
      <p style={{color:'var(--muted)',fontSize:'0.78rem',lineHeight:'1.6'}}>
        <strong style={{color:'var(--text)'}}>How to enable:</strong><br/>
        Tap the 🔒 or ℹ️ icon in your browser address bar → Site Settings → Location → Allow
      </p>
    </div>
    <button onClick={()=>setPhase('idle')}
      style={{background:'linear-gradient(135deg,#a07820,#d4af37)',color:'#000',border:'none',borderRadius:'12px',padding:'14px',width:'100%',fontWeight:'700',fontSize:'0.9rem',cursor:'pointer'}}>
      Try Again
    </button>
  </>);

  // ── Outside Chennai ──
  if (phase === 'outside') return wrap(<>
    <div style={{fontSize:'3rem',marginBottom:'14px'}}>🗺️</div>
    <h2 style={{color:'var(--danger)',fontSize:'1.15rem',fontWeight:'700',marginBottom:'10px'}}>Service Not Available</h2>
    <p style={{color:'var(--muted)',fontSize:'0.85rem',lineHeight:'1.7',marginBottom:'20px'}}>
      Our service is currently available only within <strong style={{color:'var(--gold)'}}>Chennai</strong>.
    </p>
    <div style={{background:'rgba(212,175,55,0.06)',border:'1px solid rgba(212,175,55,0.15)',borderRadius:'12px',padding:'14px',marginBottom:'24px'}}>
      <p style={{color:'var(--muted)',fontSize:'0.82rem'}}>
        Your detected location is <strong style={{color:'var(--text)'}}>~{distKmVal} km</strong> from Chennai.
      </p>
    </div>
    <p style={{color:'var(--muted)',fontSize:'0.78rem',opacity:0.7}}>Contact us if you believe this is an error.</p>
  </>);

  // ── Verified ──
  if (phase === 'ok') return wrap(<>
    <div style={{width:'64px',height:'64px',borderRadius:'50%',background:'rgba(39,174,96,0.12)',border:'2px solid rgba(39,174,96,0.35)',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 16px'}}>
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#27ae60" strokeWidth="2.5"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
    <h2 style={{color:'#27ae60',fontSize:'1.15rem',fontWeight:'700',marginBottom:'8px'}}>Location Verified</h2>
    <p style={{color:'var(--muted)',fontSize:'0.85rem'}}>Chennai confirmed. Opening gallery…</p>
  </>);

  // ── Idle / Loading ──
  return wrap(<>
    <div style={{fontSize:'3.5rem',marginBottom:'14px'}}>📍</div>
    <h2 style={{color:'var(--gold)',fontSize:'1.3rem',fontWeight:'700',letterSpacing:'1px',marginBottom:'10px'}}>Location Required</h2>
    <p style={{color:'var(--muted)',fontSize:'0.85rem',lineHeight:'1.65',marginBottom:'8px'}}>
      This service is available <strong style={{color:'var(--gold)'}}>only in Chennai</strong>.
    </p>
    <p style={{color:'var(--muted)',fontSize:'0.82rem',lineHeight:'1.6',marginBottom:'28px'}}>

      {phase==='loading'
        ? <><div style={{width:'18px',height:'18px',border:'2px solid rgba(0,0,0,0.2)',borderTopColor:'#000',borderRadius:'50%',animation:'spin .7s linear infinite'}}/> Verifying location…</>
        : <>📍 Allow Location &amp; Continue</>
      }
    </button>
    <p style={{color:'var(--muted)',fontSize:'0.72rem',marginTop:'16px',opacity:0.6,lineHeight:1.6}}>

const DAY_KEYS = ['sun','mon','tue','wed','thu','fri','sat'];
const DAY_FULL = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

function getFilterInfo(tokenData) {
  if (tokenData?.bookType === 'later' && tokenData?.scheduledDate) {
    const [y,m,d] = tokenData.scheduledDate.split('-').map(Number);
    const date = new Date(y, m-1, d);
    return {
      dayKey:  DAY_KEYS[date.getDay()],
      label:   `${DAY_FULL[date.getDay()]} (${tokenData.scheduledDate})`,
    };
  }
  const today = new Date();
  return { dayKey: DAY_KEYS[today.getDay()], label: DAY_FULL[today.getDay()] };
}

function TherapistGallery({ tokenData, clientName, clientPhone, clientLoc, isBlurred }) {
  const [therapists, setTherapists] = useState([]);
  const [loading,    setLoading]    = useState(true);

  // Track which therapist has an active pending booking (only one allowed at a time)
  const [pendingTherapistId, setPendingTherapistId] = useState(() => {
    try {
      const p = JSON.parse(sessionStorage.getItem('pendingBooking') || 'null');
      return p?.therapistId || null;
    } catch(e) { return null; }
  });

  const filterInfo = getFilterInfo(tokenData);
  const hasPinnedTherapists = Array.isArray(tokenData?.selectedTherapistIds) && tokenData.selectedTherapistIds.length > 0;

  // Compute display list — sort by distance when client location is known
  const displayList = React.useMemo(() => {
    if (!clientLoc) return therapists;
    const withDist = therapists.map(t => {
      const tLat = t.location?.lat ?? t.lat ?? null;
      const tLng = t.location?.lng ?? t.lng ?? null;
      const dist = (tLat != null && tLng != null)
        ? haversine(clientLoc.lat, clientLoc.lng, tLat, tLng)
        : null;
      return { ...t, _dist: dist };
    });
    return withDist.sort((a, b) => {
      if (a._dist != null && b._dist != null) return a._dist - b._dist;
      if (a._dist != null) return -1;
      if (b._dist != null) return 1;
      return 0;
    });
  }, [therapists, clientLoc]);

  const hasDistances = clientLoc && displayList.some(t => t._dist != null);

  useEffect(()=>{
    (async()=>{
      try {
        const pinnedIds = tokenData?.selectedTherapistIds;
        const hasPinned = Array.isArray(pinnedIds) && pinnedIds.length > 0;
        let filtered;

        // Always fetch online therapists
        const onlineSnap = await db.collection('therapists').where('available','==',true).get();
        const onlineAll = onlineSnap.docs.map(d=>({id:d.id,...d.data()}));

        // Also query active bookings to catch busy therapists
        let busyDocIds = new Set();
        try {
          const activeSnap = await db.collection('bookings')
            .where('status','in',['on_way','in_session']).get();
          activeSnap.docs.forEach(d => {
            const tid = d.data().therapistDocId;
            if (tid) busyDocIds.add(tid);
          });
        } catch(e) { /* ignore if rules block */ }

        // Filter online therapists normally
        const onlineFiltered = onlineAll.filter(t => {
          if (!t.imageUrl) return false;
          if (t.sessionActive === true) return false;
          if (busyDocIds.has(t.id)) return false;
          const wh = t.workingHours;
          if (!wh) return true;
          return wh[filterInfo.dayKey]?.on === true;
        });

        if (hasPinned) {
          // Fetch pinned therapists directly (bypass online/hours/photo filters)
          const results = await Promise.allSettled(pinnedIds.map(id=>db.collection('therapists').doc(id).get()));
          const pinnedList = results
            .filter(r=>r.status==='fulfilled' && r.value.exists)
            .map(r=>({id:r.value.id,...r.value.data()}));

          // Merge: pinned first, then online therapists not already in pinned list
          const pinnedIdSet = new Set(pinnedList.map(t=>t.id));
          const onlineOnly = onlineFiltered.filter(t=>!pinnedIdSet.has(t.id));
          filtered = [...pinnedList, ...onlineOnly];
        } else {
          filtered = onlineFiltered;
        }

        // Sort: Online first → recently seen → older (priority + lastActiveAt desc)
        const statusPriority = t => {
          if (t.available) return 0;
          const ts = t.lastActiveAt?.toMillis?.() ?? 0;
          if (ts && (Date.now() - ts) < 30 * 60 * 1000) return 1; // seen < 30 min
          return 2;
        };
        filtered.sort((a, b) => {
          const pa = statusPriority(a), pb = statusPriority(b);
          if (pa !== pb) return pa - pb;
          // Same priority → most recently active first
          return (b.lastActiveAt?.toMillis?.() ?? 0) - (a.lastActiveAt?.toMillis?.() ?? 0);
        });

        setTherapists(filtered);
      } finally { setLoading(false); }
    })();
  },[]);

  return (
    <div style={{minHeight:'100dvh',filter:isBlurred?'blur(24px)':'none',transition:'filter .3s'}}>

      {/* ── Header ── */}
      <header className="gallery-header">
        <div className="header-ornament">
          <span className="line"></span>
          <span className="diamond"></span>
          <span className="line r"></span>
        </div>
        <h1 className="header-title">Our Therapists</h1>
        <p className="header-sub">Welcome, <strong>{clientName}</strong></p>
        {!hasPinnedTherapists && (
          <div className="header-badge">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="var(--gold)" strokeWidth="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            Available on <strong style={{color:'var(--gold-light)',marginLeft:'2px'}}>{filterInfo.label}</strong>
          </div>
        )}
        {hasDistances && (
          <div className="header-badge" style={{marginLeft:'6px',borderColor:'rgba(39,174,96,.25)',color:'rgba(39,174,96,.8)'}}>
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#27ae60" strokeWidth="2.5"><circle cx="12" cy="10" r="3"/><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/></svg>
            Sorted by distance
          </div>
        )}
      </header>

      {/* ── Body ── */}
      {loading
        ? <div style={{display:'flex',flexDirection:'column',alignItems:'center',padding:'80px 20px',gap:'16px'}}>
            <div style={{width:'48px',height:'48px',borderRadius:'50%',border:'2px solid rgba(212,175,55,.15)',borderTopColor:'var(--gold)',animation:'spin .9s linear infinite'}}/>
            <p style={{color:'rgba(122,113,104,.7)',fontSize:'0.82rem',letterSpacing:'1px',textTransform:'uppercase'}}>Loading gallery…</p>
          </div>
        : therapists.length === 0
          ? <div style={{textAlign:'center',padding:'80px 20px',color:'var(--muted)'}}>No therapists available on {filterInfo.label}.</div>
          : <div className="gallery-grid">
              {displayList.map((t,i) => (
                <TherapistCard
                  key={t.id}
                  therapist={t}
                  tokenData={tokenData}
                  clientName={clientName}
                  clientPhone={clientPhone}
                  isNearest={!!(hasDistances && i===0 && t._dist!=null)}
                  pendingTherapistId={pendingTherapistId}
                  onPendingChange={setPendingTherapistId}
                />
              ))}
            </div>
      }

      <footer style={{textAlign:'center',color:'rgba(122,113,104,0.45)',fontSize:'0.7rem',padding:'24px 20px',borderTop:'1px solid rgba(212,175,55,0.08)',letterSpacing:'0.8px',textTransform:'uppercase'}}>
        All images are watermarked · Sharing is strictly prohibited
      </footer>
    </div>
  );
}

// Parse Google Maps URL → {lat, lng} or null
function parseGoogleMapsUrl(url) {
  const patterns = [
    /@(-?\d+\.?\d*),(-?\d+\.?\d*)/,
    /\?q=(-?\d+\.?\d*),(-?\d+\.?\d*)/,
    /ll=(-?\d+\.?\d*),(-?\d+\.?\d*)/,
    /place\/[^/]+\/@(-?\d+\.?\d*),(-?\d+\.?\d*)/,
  ];
  for (const p of patterns) {
    const m = url.match(p);
    if (m) return { lat: parseFloat(m[1]), lng: parseFloat(m[2]) };
  }
  return null;
}

              <input type="text" value={form.name} onChange={e=>{setForm(f=>({...f,name:e.target.value}));setErrors(x=>({...x,name:''}));}}
                placeholder="Enter your name" style={inp(errors.name)}/>
              {errTxt(errors.name)}
            </div>
            <div>
              <label style={lbl}>Mobile Number</label>
              <input type="tel" value={form.phone} readOnly
                style={{...inp(false),opacity:0.6,cursor:'not-allowed',userSelect:'none'}}/>
            </div>
            <button onClick={nextFromDetails} style={goldBtn}>Next →</button>
          </div>
        )}

        {/* ══ STEP 2: Location ══ */}
        {step==='location'&&(
          <div style={{display:'flex',flexDirection:'column',gap:'14px'}}>
            <div>
              <h2 style={{color:'var(--text)',fontSize:'1rem',fontWeight:'700',marginBottom:'2px'}}>Your Location</h2>
              <p style={{color:'var(--muted)',fontSize:'0.75rem'}}>So the therapist can reach you</p>
            </div>

            <button onClick={handleUseGPS} disabled={gpsLoading}
              style={{...goldBtn,display:'flex',alignItems:'center',justifyContent:'center',gap:'8px'}}>
              {gpsLoading
                ? <><div style={{width:'16px',height:'16px',border:'2px solid rgba(0,0,0,0.3)',borderTopColor:'#080600',borderRadius:'50%',animation:'spin .7s linear infinite'}}/> Getting location…</>
                : <><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#080600" strokeWidth="2.5"><circle cx="12" cy="10" r="3"/><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/></svg> Use My Current Location</>
              }
            </button>

            <div style={{display:'flex',alignItems:'center',gap:'10px'}}>
              <div style={{flex:1,height:'1px',background:'rgba(255,255,255,0.07)'}}/>
              <span style={{color:'var(--muted)',fontSize:'0.72rem',fontWeight:'600'}}>OR</span>
              <div style={{flex:1,height:'1px',background:'rgba(255,255,255,0.07)'}}/>
            </div>

            <div>
              <label style={lbl}>Paste Google Maps Link *</label>
              <input type="url" value={mapUrlInput} onChange={e=>{setMapUrlInput(e.target.value);setLocError('');}}
                placeholder="https://maps.google.com/…" style={inp(locError)}/>
              <p style={{color:'var(--muted)',fontSize:'0.68rem',marginTop:'5px'}}>Open Google Maps → long-press your location → Share → Copy link</p>
              {locError&&<p style={{color:'#e74c3c',fontSize:'0.72rem',marginTop:'4px'}}>{locError}</p>}
            </div>

            <div style={{display:'flex',gap:'8px'}}>
              <button onClick={()=>setStep('details')} style={{...ghostBtn,flex:'0 0 auto',width:'auto',padding:'12px 16px'}}>← Back</button>
              <button onClick={handleUseMapLink} style={{...ghostBtn,flex:1,border:'1px solid rgba(212,175,55,0.25)',color:'var(--gold)'}}>Use This Link</button>
            </div>
          </div>
        )}

        {/* ══ STEP 3: Appointment Details ══ */}
        {step==='appointment'&&(
          <div style={{display:'flex',flexDirection:'column',gap:'14px'}}>
            <div>
              <h2 style={{color:'var(--text)',fontSize:'1rem',fontWeight:'700',marginBottom:'2px'}}>Appointment Details</h2>
              {locationData&&<p style={{color:'rgba(39,174,96,0.8)',fontSize:'0.72rem',display:'flex',alignItems:'center',gap:'4px'}}>
                <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#27ae60" strokeWidth="2.5"><circle cx="12" cy="10" r="3"/><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/></svg>
                Location captured
              </p>}
            </div>

            {/* ── Massage Type ── */}
            <div>
              <label style={lbl}>Massage Type *</label>
              <div style={{display:'flex',gap:'8px',flexWrap:'wrap'}}>
                {SERVICE_TYPES.map(s=>{
                  const active = form.serviceType===s;
                  const colors = {
                    'Wet Massage':  {bg:'rgba(52,152,219,0.15)', border:'rgba(52,152,219,0.5)',  active:'rgba(52,152,219,0.3)',  text:'#5dade2'},
                    'Oil Massage':  {bg:'rgba(212,175,55,0.12)', border:'rgba(212,175,55,0.45)', active:'rgba(212,175,55,0.25)', text:'#d4af37'},
                    'Dry Massage':  {bg:'rgba(231,76,60,0.1)',   border:'rgba(231,76,60,0.4)',   active:'rgba(231,76,60,0.2)',   text:'#e74c3c'},
                  };
                  const c = colors[s];
                  return (
                    <button key={s} onClick={()=>{setForm(f=>({...f,serviceType:s}));setErrors(x=>({...x,serviceType:''}));}}
                      style={{flex:'1 1 auto',padding:'10px 8px',borderRadius:'10px',border:`1.5px solid ${active?c.border:'rgba(255,255,255,0.1)'}`,
                        background:active?c.active:c.bg,color:active?c.text:'rgba(255,255,255,0.5)',

            {/* ── Duration ── */}
            <div>
              <label style={lbl}>Duration *</label>
              <div style={{display:'flex',flexDirection:'column',gap:'8px'}}>
                {DURATION_OPTIONS.map(d=>{
                  const active = form.duration===d.value;

                    <button key={d.value} onClick={()=>{setForm(f=>({...f,duration:d.value}));setErrors(x=>({...x,duration:''}));}}

              </div>
              {errTxt(errors.duration)}
            </div>

            {/* ── Date + Time ── */}
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'10px'}}>
              <div>
                <label style={lbl}>Date *</label>
                <input type="date" value={form.date} min={today}
                  onChange={e=>{setForm(f=>({...f,date:e.target.value}));setErrors(x=>({...x,date:''}));}}

              </div>
              <div>
                <label style={lbl}>Time *</label>
                <input type="time" value={form.time}
                  onChange={e=>{setForm(f=>({...f,time:e.target.value}));setErrors(x=>({...x,time:''}));}}

              </div>
            </div>

            {/* ── Admin Notes ── */}
            <div>
              <label style={{...lbl,display:'flex',alignItems:'center',gap:'5px'}}>
                Special Notes
                <span style={{background:'rgba(212,175,55,0.12)',color:'rgba(212,175,55,0.7)',fontSize:'0.6rem',padding:'2px 6px',borderRadius:'4px',fontWeight:'700',letterSpacing:'0.5px',textTransform:'uppercase'}}>Admin only</span>
              </label>
              <textarea value={form.adminNotes} onChange={e=>setForm(f=>({...f,adminNotes:e.target.value}))}
                rows={2} placeholder="Visible to admin only, not shared with therapist…"
                style={{...inp(false),resize:'none'}}/>
            </div>

            <div style={{display:'flex',gap:'8px'}}>
              <button onClick={()=>setStep('location')} style={{...ghostBtn,flex:'0 0 auto',width:'auto',padding:'12px 16px'}}>← Back</button>
              <button onClick={handleSubmit} disabled={saving} style={{...goldBtn,flex:1}}>
                {saving?<div style={{width:'18px',height:'18px',border:'2px solid rgba(0,0,0,0.3)',borderTopColor:'#080600',borderRadius:'50%',animation:'spin .7s linear infinite',margin:'0 auto'}}/>:'Confirm Booking'}
              </button>
            </div>
          </div>
        )}

        {/* ══ EXTRAS INFO ══ */}
        {step==='extras'&&(
          <div style={{textAlign:'center'}}>
            <div style={{fontSize:'2.5rem',marginBottom:'14px'}}>✨</div>
            <h2 style={{color:'var(--gold)',fontSize:'1.05rem',fontWeight:'800',marginBottom:'10px',letterSpacing:'0.3px'}}>Extras Available!</h2>
            <div style={{background:'rgba(212,175,55,0.07)',border:'1px solid rgba(212,175,55,0.2)',borderRadius:'14px',padding:'18px 16px',marginBottom:'20px',textAlign:'left',display:'flex',flexDirection:'column',gap:'12px'}}>
              <div style={{display:'flex',gap:'12px',alignItems:'flex-start'}}>
                <span style={{fontSize:'1.2rem',flexShrink:0}}>💬</span>
                <p style={{color:'var(--text)',fontSize:'0.85rem',lineHeight:1.6}}>
                  You can ask your therapist about <strong style={{color:'var(--gold)'}}>extra services</strong> directly during your session.
                </p>
              </div>
              <div style={{height:'1px',background:'rgba(212,175,55,0.1)'}}/>
              <div style={{display:'flex',gap:'12px',alignItems:'flex-start'}}>
                <span style={{fontSize:'1.2rem',flexShrink:0}}>💵</span>
                <p style={{color:'var(--text)',fontSize:'0.85rem',lineHeight:1.6}}>
                  Extra charges are <strong style={{color:'var(--gold)'}}>paid directly to the therapist</strong> inside the service — not included in your booking amount.
                </p>
              </div>
            </div>
            <button onClick={()=>setStep('done')}
              style={{...goldBtn,fontSize:'1rem',padding:'15px',letterSpacing:'0.5px'}}>
              OK, Got It!
            </button>
          </div>
        )}

        {/* ══ LOADING ══ */}
        {step==='loading'&&(
          <div style={{textAlign:'center',padding:'30px 0'}}>
            <div style={{width:'44px',height:'44px',border:'3px solid rgba(212,175,55,.15)',borderTopColor:'var(--gold)',borderRadius:'50%',animation:'spin .9s linear infinite',margin:'0 auto 14px'}}/>
            <p style={{color:'var(--muted)',fontSize:'0.85rem',letterSpacing:'0.5px'}}>Sending booking request…</p>
          </div>
        )}

        {/* ══ DONE ══ */}
        {step==='done'&&bookingResult&&(
          <div style={{textAlign:'center'}}>
            <div style={{width:'64px',height:'64px',borderRadius:'50%',background:'rgba(39,174,96,0.1)',border:'2px solid rgba(39,174,96,0.35)',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 14px'}}>
              <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#27ae60" strokeWidth="2.5"><polyline points="20 6 9 17 4 12"/></svg>
            </div>
            <h2 style={{color:'#27ae60',fontSize:'1.15rem',fontWeight:'800',marginBottom:'6px'}}>Booking Sent!</h2>
            <p style={{color:'var(--muted)',fontSize:'0.8rem',marginBottom:'18px',lineHeight:1.5}}>
              Your appointment request has been sent to <strong style={{color:'var(--text)'}}>{bookingResult.therapistName}</strong> and admin. You'll be notified upon confirmation.
            </p>

            {/* Summary card */}
            <div style={{background:'rgba(212,175,55,0.05)',border:'1px solid rgba(212,175,55,0.15)',borderRadius:'14px',padding:'14px 16px',marginBottom:'18px',textAlign:'left',display:'flex',flexDirection:'column',gap:'9px'}}>
              <div style={{display:'flex',alignItems:'center',gap:'8px'}}>
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="rgba(212,175,55,0.6)" strokeWidth="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
                <span style={{color:'rgba(255,255,255,0.7)',fontSize:'0.8rem'}}><span style={{color:'var(--muted)',fontSize:'0.68rem'}}>Service: </span>{bookingResult.service}{bookingResult.duration&&<span style={{color:'var(--gold)',marginLeft:'6px'}}>· {bookingResult.duration}</span>}</span>
              </div>
              <div style={{display:'flex',alignItems:'center',gap:'8px'}}>
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="rgba(212,175,55,0.6)" strokeWidth="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                <span style={{color:'rgba(255,255,255,0.7)',fontSize:'0.8rem'}}>{bookingResult.date}</span>
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="rgba(212,175,55,0.6)" strokeWidth="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                <span style={{color:'rgba(255,255,255,0.7)',fontSize:'0.8rem'}}>{bookingResult.time}</span>
              </div>
              {bookingResult.mapsUrl&&(
                <div style={{display:'flex',alignItems:'center',gap:'8px'}}>
                  <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="rgba(212,175,55,0.6)" strokeWidth="2"><circle cx="12" cy="10" r="3"/><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/></svg>
                  <a href={bookingResult.mapsUrl} target="_blank" rel="noopener noreferrer" style={{color:'var(--gold)',fontSize:'0.8rem',textDecoration:'none'}}>View location on Maps</a>
                </div>
              )}
            </div>

            <button onClick={()=>{ sessionStorage.removeItem('pendingBooking'); onClose(); }} style={goldBtn}>Done</button>
          </div>
        )}

      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════════
//  THERAPIST CARD
// ══════════════════════════════════════════════════════
function TherapistCard({ therapist, tokenData, clientName, clientPhone, isNearest, pendingTherapistId, onPendingChange }) {
  const [viewCount,    setViewCount]    = useState(0);
  const [limitReached, setLimitReached] = useState(false);
  const [isVisible,    setIsVisible]    = useState(false);
  const [timeLeft,     setTimeLeft]     = useState(0);
  const [loading,      setLoading]      = useState(false);
  const [canvasUrl,    setCanvasUrl]    = useState('');
  const [showBooking,  setShowBooking]  = useState(false);
  const timerRef  = useRef(null);
  const canvasRef = useRef(null);
  const videoRef  = useRef(null);
  const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) || (navigator.platform==='MacIntel'&&navigator.maxTouchPoints>1);

  // Feed canvas stream into video (non-iOS only — iOS doesn't support captureStream)
  useEffect(()=>{
    if (isIOS || !isVisible || !canvasRef.current || !videoRef.current) return;
    try {
      const stream = canvasRef.current.captureStream(1);
      videoRef.current.srcObject = stream;
      videoRef.current.play().catch(()=>{});
    } catch(e) {}
    return ()=>{ try { if(videoRef.current) videoRef.current.srcObject=null; } catch(e){} };
  },[isVisible, canvasUrl]);

  const tokenId    = tokenData?.id                  || '';
  const maxViews   = tokenData?.maxViewsPerImage    ?? 2;
  const viewSecs   = tokenData?.viewDurationSeconds ?? 3;
  const countDocId = `${tokenId}_${therapist.id}`;

  useEffect(()=>{
    db.collection('viewCounts').doc(countDocId).get().then(snap=>{
      if (snap.exists) { const c=snap.data().count||0; setViewCount(c); if(c>=maxViews) setLimitReached(true); }
    });
    // Auto-reopen booking modal if this therapist has a pending booking in sessionStorage
    try {
      const pending = JSON.parse(sessionStorage.getItem('pendingBooking')||'null');
      if(pending && pending.therapistId === therapist.id) setShowBooking(true);
    } catch(e){}
    return ()=>clearInterval(timerRef.current);
  },[]);

  const buildCanvas = useCallback(()=>{
    return new Promise(resolve=>{
      const canvas = canvasRef.current;
      if (!canvas) { resolve(therapist.imageUrl); return; }
      const img = new Image();
      // Do NOT set crossOrigin for base64 data URLs — it breaks canvas on iOS Safari
      img.onload = ()=>{
        const W=img.naturalWidth||img.width, H=img.naturalHeight||img.height;
        canvas.width=W; canvas.height=H;
        const ctx=canvas.getContext('2d');
        ctx.drawImage(img,0,0,W,H);
        const ts=new Date().toLocaleString('en-IN');
        // Heavy diagonal watermark — repeated across entire photo
        ctx.save();
        ctx.globalAlpha=0.38; ctx.fillStyle='#ffffff';
        ctx.font=`bold ${Math.max(18,W*0.045)}px Arial`;
        ctx.rotate(-Math.PI/7);
        const step=Math.max(90,W*0.32);
        for(let y=-H;y<H*2;y+=step)
          for(let x=-W;x<W*2;x+=step*1.5){
            ctx.fillText(clientName,x,y);
            ctx.fillText(`+91${clientPhone}`,x,y+Math.max(22,W*0.042));
          }
        ctx.restore();
        // Bold top banner
        ctx.save();
        ctx.fillStyle='rgba(0,0,0,0.55)';
        ctx.fillRect(0,0,W,Math.max(44,H*0.09));
        ctx.globalAlpha=1; ctx.fillStyle='#ffcc00';
        ctx.font=`bold ${Math.max(13,W*0.032)}px Arial`;
        ctx.textAlign='center';
        ctx.fillText(`FOR: ${clientName}  |  +91${clientPhone}`,W/2,Math.max(28,H*0.062));
        ctx.restore();
        // Bold bottom stamp
        ctx.save();
        ctx.fillStyle='rgba(0,0,0,0.55)';
        ctx.fillRect(0,H-Math.max(44,H*0.09),W,Math.max(44,H*0.09));
        ctx.globalAlpha=1; ctx.fillStyle='#ffcc00';
        ctx.font=`bold ${Math.max(11,W*0.026)}px Arial`;
        ctx.textAlign='center';
        ctx.fillText(`${clientName} | +91${clientPhone} | ${ts}`,W/2,H-Math.max(14,H*0.025));
        ctx.restore();
        resolve(canvas.toDataURL('image/jpeg',0.92));
      };
      img.onerror=()=>resolve(therapist.imageUrl);
      img.src=therapist.imageUrl;
    });
  },[therapist.imageUrl,clientName,clientPhone]);

  const handleView = async ()=>{
    if(limitReached||isVisible||loading) return;
    setLoading(true);
    try {
      const snap = await db.collection('viewCounts').doc(countDocId).get();
      const live  = snap.exists ? (snap.data().count||0) : 0;
      if(live>=maxViews){ setViewCount(live); setLimitReached(true); return; }

      await db.collection('viewCounts').doc(countDocId).set({
        count: FieldValue.increment(1), lastViewedAt: FieldValue.serverTimestamp(),
        therapistId:therapist.id, tokenId,
      },{merge:true});

      await db.collection('viewLogs').add({
        token:tokenId, therapistId:therapist.id,
        clientName, clientPhone,
        viewedAt:FieldValue.serverTimestamp(),
        viewCount:live+1, userAgent:navigator.userAgent,
      });

      const newCount=live+1;
      setViewCount(newCount);
      if(newCount>=maxViews) setLimitReached(true);

      const url=await buildCanvas();
      setCanvasUrl(url);
      setIsVisible(true); setTimeLeft(viewSecs);
      // Use wall-clock timer so iOS background throttling doesn't break countdown
      const endAt = Date.now() + viewSecs * 1000;
      const tick = () => {
        const rem = Math.ceil((endAt - Date.now()) / 1000);
        if (rem <= 0) {
          clearInterval(timerRef.current);
          setIsVisible(false); setCanvasUrl(''); setTimeLeft(0);
        } else {
          setTimeLeft(rem);
        }
      };
      timerRef.current = setInterval(tick, 400); // poll at 400ms for accuracy
    } catch(err){ console.error(err); }
    finally{ setLoading(false); }
  };

  const bookUrl=()=>{
    const msg=encodeURIComponent(`Hi, I choose therapist ID: ${therapist.therapistId}. My name is ${clientName} and my number is ${clientPhone}.`);
    return `https://wa.me/${ADMIN_WHATSAPP}?text=${msg}`;
  };

  const watermarkText=`${clientName} | +91${clientPhone}`;

  // ── Availability status ──────────────────────────────
  const getOnlineStatus = () => {
    if (therapist.available) return { dot:'#27ae60', label:'Online', pulse:true };
    const ts = therapist.lastActiveAt?.toMillis?.() ?? 0;
    if (!ts) return { dot:'#555', label:'Offline', pulse:false };
    const ago = (Date.now() - ts) / 60000; // minutes
    if (ago < 5)   return { dot:'#f39c12', label:'Just now',            pulse:false };
    if (ago < 30)  return { dot:'#f39c12', label:`${Math.floor(ago)}m ago`, pulse:false };
    if (ago < 120) return { dot:'#888',    label:`${Math.floor(ago)}m ago`, pulse:false };
    if (ago < 1440)return { dot:'#555',    label:`${Math.floor(ago/60)}h ago`,   pulse:false };
    return            { dot:'#555',        label:'Offline',             pulse:false };
  };
  const status = getOnlineStatus();

  const DAYS = [{k:'mon',l:'M'},{k:'tue',l:'T'},{k:'wed',l:'W'},{k:'thu',l:'T'},{k:'fri',l:'F'},{k:'sat',l:'S'},{k:'sun',l:'S'}];
  const wh = therapist.workingHours;
  const hasSchedule = wh && Object.values(wh).some(d=>d?.on);
  const initials = (therapist.name||'?').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2)||'?';

  return (
  <>
    <div className={`t-card fade-up${isNearest&&therapist._dist!=null?' nearest':''}`}>
      <canvas ref={canvasRef} style={{display:'none'}}/>

      {/* ══ Photo area ══ */}
      <div className="t-photo">
        {/* Initials placeholder (behind everything) */}
        <div style={{position:'absolute',inset:0,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:'10px',background:'linear-gradient(160deg,#181410,#0a0806)'}}>
          <div style={{width:'72px',height:'72px',borderRadius:'50%',background:'rgba(212,175,55,0.07)',border:'1px solid rgba(212,175,55,0.18)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'1.6rem',fontWeight:'700',color:'rgba(212,175,55,0.35)'}}>
            {initials}
          </div>
          {!therapist.imageUrl && <p style={{color:'rgba(122,113,104,0.5)',fontSize:'0.7rem',letterSpacing:'0.5px'}}>No photo uploaded</p>}
        </div>

        {/* Opaque screen — prevents seeing unmasked photo */}
        <div style={{position:'absolute',inset:0,background:'#0a0806',zIndex:1}}/>

      {/* ── Status pill ── top-left corner ── */}
      <div style={{position:'absolute',top:'12px',left:'12px',zIndex:20,display:'flex',alignItems:'center',gap:'5px',background:'rgba(0,0,0,0.75)',backdropFilter:'blur(10px)',WebkitBackdropFilter:'blur(10px)',borderRadius:'20px',padding:'5px 11px',border:`1px solid ${status.dot}33`}}>
        <div style={{position:'relative',width:'7px',height:'7px',flexShrink:0}}>
          <div style={{position:'absolute',inset:0,borderRadius:'50%',background:status.dot}}/>
          {status.pulse && <div style={{position:'absolute',inset:'-4px',borderRadius:'50%',background:status.dot,opacity:.4,animation:'pulseRing 1.6s ease-out infinite'}}/>}
        </div>
        <span style={{fontSize:'0.62rem',fontWeight:'700',color:'#fff',letterSpacing:'0.4px'}}>{status.label}</span>
      </div>

      {/* Nearest badge */}
      {isNearest && therapist._dist!=null && (
        <div style={{position:'absolute',top:'12px',right:'12px',zIndex:20,background:'linear-gradient(135deg,#0f5c22,#1e9638)',color:'#fff',fontSize:'0.58rem',fontWeight:'800',borderRadius:'10px',padding:'4px 10px',letterSpacing:'0.8px',boxShadow:'0 2px 12px rgba(30,150,56,.4)'}}>
          ★ NEAREST
        </div>
      )}

      {/* ── Watermarked photo (when visible) ── */}
      {isVisible && canvasUrl && (
        <div style={{position:'absolute',inset:0,zIndex:2}}>
          {isIOS
            ? <img src={canvasUrl} onContextMenu={e=>e.preventDefault()} style={{width:'100%',height:'100%',objectFit:'cover',display:'block',WebkitUserSelect:'none',userSelect:'none'}}/>
            : <video ref={videoRef} poster={canvasUrl} muted playsInline autoPlay onContextMenu={e=>e.preventDefault()} style={{width:'100%',height:'100%',objectFit:'cover',display:'block'}}/>
          }
          {/* Countdown pill */}
          <div style={{position:'absolute',top:'12px',right:'12px',zIndex:10,background:'rgba(0,0,0,0.8)',color:'var(--gold)',borderRadius:'16px',padding:'4px 13px',fontSize:'0.85rem',fontWeight:'800',letterSpacing:'0.5px',backdropFilter:'blur(6px)'}}>{timeLeft}s</div>
        </div>
      )}

      {/* ── View Photo overlay (when photo hidden) ── */}
      {therapist.imageUrl && !isVisible && (
        <div style={{position:'absolute',inset:0,zIndex:5,display:'flex',alignItems:'center',justifyContent:'center'}}>
          {limitReached
            ? <div style={{textAlign:'center'}}>
                <div style={{width:'52px',height:'52px',borderRadius:'50%',background:'rgba(231,76,60,.1)',border:'1px solid rgba(231,76,60,.3)',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 10px'}}>
                  <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#e74c3c" strokeWidth="2"><circle cx="12" cy="12" r="10"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/></svg>
                </div>
                <p style={{fontSize:'0.8rem',color:'rgba(255,255,255,.5)',fontWeight:'600'}}>View limit reached</p>
                <p style={{fontSize:'0.7rem',color:'rgba(255,255,255,.25)',marginTop:'3px'}}>{viewCount}/{maxViews} views used</p>
              </div>
            : <button onClick={handleView} disabled={loading} className="view-btn">
                {loading
                  ? <svg width="20" height="20" viewBox="0 0 24 24" fill="#5a3c00" className="spin"><circle cx="12" cy="12" r="10" stroke="#5a3c00" strokeWidth="2" fill="none"/><path d="M12 6v6l4 2" stroke="#0a0800" strokeWidth="2"/></svg>
                  : <>
                      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#0a0800" strokeWidth="2.2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                      <span>View Photo</span>
                      <span style={{fontSize:'0.66rem',opacity:0.55,fontWeight:'600'}}>{viewCount}/{maxViews} uses</span>
                    </>
                }
              </button>
          }
        </div>
      )}

      </div>{/* end .t-photo */}

      {/* ══ Info panel — below photo, never overlaps ══ */}
      <div className="t-panel">

        {/* Name + speciality */}
        <div>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:'6px',marginBottom:'3px'}}>
            <p style={{color:'var(--gold)',fontSize:'1.02rem',fontWeight:'700',letterSpacing:'0.8px',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',lineHeight:1.15,textShadow:'0 1px 6px rgba(0,0,0,.8)'}}>
              {therapist.name || therapist.therapistId}
            </p>
            {/* distance pill */}
            {therapist._dist!=null && (
              <span style={{flexShrink:0,fontSize:'0.6rem',color:isNearest?'#27ae60':'rgba(122,113,104,0.9)',whiteSpace:'nowrap',letterSpacing:'0.2px'}}>
                ~{fmtDist(therapist._dist)}
              </span>
            )}
          </div>
          {therapist.speciality && (
            <p style={{color:'rgba(122,113,104,0.9)',fontSize:'0.72rem',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',letterSpacing:'0.3px'}}>{therapist.speciality}</p>
          )}
        </div>

        {/* Bio — full text, wraps to 3 lines max */}
        {therapist.bio && (
          <p style={{color:'rgba(162,153,140,0.75)',fontSize:'0.71rem',lineHeight:1.55,fontStyle:'italic',display:'-webkit-box',WebkitLineClamp:3,WebkitBoxOrient:'vertical',overflow:'hidden'}}>{therapist.bio}</p>
        )}

        {/* Working schedule */}
        {(hasSchedule || therapist.workStart) && (
          <div style={{background:'rgba(212,175,55,0.06)',border:'1px solid rgba(212,175,55,0.12)',borderRadius:'10px',padding:'8px 10px',display:'flex',flexDirection:'column',gap:'7px'}}>
            {/* Label row */}
            <div style={{display:'flex',alignItems:'center',gap:'5px'}}>
              <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="rgba(212,175,55,0.5)" strokeWidth="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
              <span style={{fontSize:'0.58rem',fontWeight:'800',color:'rgba(212,175,55,0.45)',letterSpacing:'1.2px',textTransform:'uppercase'}}>Working Schedule</span>
            </div>
            {/* Day pills */}
            {hasSchedule && (
              <div className="day-pills">
                {DAYS.map(({k,l})=>(
                  <div key={k} className={`dp ${wh[k]?.on?'on':'off'}`}>{l}</div>
                ))}
              </div>
            )}
            {/* Time range */}
            {therapist.workStart && therapist.workEnd && (
              <div style={{display:'flex',alignItems:'center',gap:'5px'}}>
                <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="rgba(212,175,55,0.45)" strokeWidth="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                <span style={{fontSize:'0.72rem',fontWeight:'700',color:'rgba(212,175,55,0.7)',letterSpacing:'0.4px'}}>{therapist.workStart} – {therapist.workEnd}</span>
              </div>
            )}
          </div>
        )}

        {/* Book button — locked if another booking is pending */}
        {pendingTherapistId && pendingTherapistId !== therapist.id
          ? <div style={{width:'100%',minHeight:'48px',display:'flex',alignItems:'center',justifyContent:'center',gap:'7px',background:'rgba(255,255,255,0.04)',border:'1px solid rgba(255,255,255,0.08)',borderRadius:'13px',fontSize:'0.8rem',color:'rgba(122,113,104,0.7)',letterSpacing:'0.3px',cursor:'not-allowed'}}>
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
              Booking in progress…
            </div>
          : <button
              onClick={()=>{ setShowBooking(true); onPendingChange(therapist.id); }}
              className="book-btn"
            >
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2.2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
              Book Appointment
            </button>
        }
      </div>
    </div>

    {/* BookingModal OUTSIDE .t-card so card's CSS transform doesn't trap fixed positioning */}
    {showBooking && <BookingModal
      therapist={therapist}
      clientName={clientName}
      clientPhone={clientPhone}
      tokenData={tokenData}
      onClose={()=>{ setShowBooking(false); onPendingChange(null); }}
    />}
  </>
  );
}

// ══════════════════════════════════════════════════════
//  PAGE WATERMARK (fixed over entire page)
// ══════════════════════════════════════════════════════
function PageWatermark({ name, phone }) {
  const text = `${name} · ${phone}`;
  return (
    <div style={{position:'fixed',inset:0,overflow:'hidden',pointerEvents:'none',zIndex:1000}}>
      {Array.from({length:40},(_,i)=>(
        <span key={i} style={{position:'absolute',left:`${(i%4)*28}%`,top:`${Math.floor(i/4)*14}%`,transform:'rotate(-22deg)',whiteSpace:'nowrap',fontSize:'11px',color:'rgba(255,255,255,.04)',fontWeight:'700',letterSpacing:'1px',fontFamily:'monospace',pointerEvents:'none'}}>
          {text}
        </span>
      ))}
    </div>
  );
}

// ── Shared ──────────────────────────────────────────────
function FullScreen({children}) {
  return <div style={{minHeight:'100vh',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',background:'radial-gradient(ellipse at 50% 0%,#1a1000,var(--bg) 65%)',padding:'40px 20px',textAlign:'center'}}>{children}</div>;
}
const msgTitle={fontSize:'1.5rem',color:'var(--gold)',fontWeight:'700',letterSpacing:'1px',marginBottom:'12px'};
const msgSub={color:'var(--muted)',fontSize:'0.95rem',maxWidth:'360px',lineHeight:'1.6'};
const labelSt={color:'var(--muted)',fontSize:'0.76rem',letterSpacing:'1.2px',textTransform:'uppercase'};
const inputSt={background:'var(--elevated)',border:'1px solid',borderRadius:'10px',padding:'13px 16px',color:'var(--text)',fontSize:'1rem',outline:'none',width:'100%'};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
