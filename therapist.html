// ── Register service worker + request push permission ──
let _setNotifStatus = null; // set by component

async function setupPushNotifications(docId, setStatus) {
  if (setStatus) _setNotifStatus = setStatus;
  const report = (msg) => { console.log('[FCM]', msg); if (_setNotifStatus) _setNotifStatus(msg); };
  try {
    if (!('Notification' in window) || !('serviceWorker' in navigator)) { report('unsupported'); return; }
    const current = Notification.permission;
    report('perm:' + current);
    if (current === 'denied') { report('denied'); return; }
    const perm = current === 'granted' ? 'granted' : await Notification.requestPermission();
    report('perm:' + perm);
    if (perm !== 'granted') { report('not-granted'); return; }
    report('registering-sw');
    const sw = await navigator.serviceWorker.register('/firebase-messaging-sw.js');
    await sw.update(); // force fresh SW
    report('getting-token');
    const token = await messaging.getToken({ vapidKey: VAPID_KEY, serviceWorkerRegistration: sw });
    if (token) {
      report('saving-token');
      await db.collection('therapists').doc(docId).update({ fcmToken: token });
      report('granted');
      console.log('FCM token saved ✓', token.slice(0,20)+'...');
    } else {
      report('no-token');
    }
    // Token refresh handled automatically by Firebase SDK
  } catch(e) {
    report('error:' + e.message);
    console.error('[FCM] Error:', e);
  }
}

// ── Persistent Audio Context (mobile-safe) ───────────
let _actx = null;
function getACtx() {
  if (!_actx) {
    try { _actx = new (window.AudioContext||window.webkitAudioContext)(); } catch(e){ return null; }
  }
  if (_actx.state === 'suspended') { _actx.resume().catch(()=>{}); }
  return _actx;
}
// Unlock audio on first user touch — critical for iOS/Android
['touchstart','touchend','click','keydown'].forEach(ev=>{
  document.addEventListener(ev, function unlock(){
    getACtx();
    ['touchstart','touchend','click','keydown'].forEach(e=>document.removeEventListener(e,unlock,true));
  }, {once:true, capture:true, passive:true});
});

function _playTones(ctx, type) {
  if (navigator.vibrate) navigator.vibrate(type==='new' ? [200,100,200,100,200] : [150,80,150]);
  const seqs = {
    new:    [[1000,0.00,0.18],[1400,0.20,0.18],[1000,0.40,0.18],[1400,0.60,0.18],[1000,0.80,0.18]],
    accept: [[660,0.00,0.25],[880,0.28,0.25],[1100,0.56,0.25]],
  };
  (seqs[type]||seqs.new).forEach(([freq,t,dur])=>{
    const o=ctx.createOscillator(), g=ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.frequency.value=freq;
    o.type = type==='new' ? 'sawtooth' : 'square';
    g.gain.setValueAtTime(0, ctx.currentTime+t);
    g.gain.linearRampToValueAtTime(0.6, ctx.currentTime+t+0.01);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+t+dur);
    o.start(ctx.currentTime+t); o.stop(ctx.currentTime+t+dur+0.02);
  });
}
function playAlert(type='new') {
  try {
    const ctx = getACtx();
    if (!ctx) return;
    if (ctx.state === 'suspended') {
      // Resume then play — fires when user first taps anything
      ctx.resume().then(() => _playTones(ctx, type)).catch(()=>{});
      return;
    }
    _playTones(ctx, type);
  } catch(e){}
}

// ── Resize image to base64 ────────────────────────────
const resizeToBase64 = (f) => new Promise((resolve, reject) => {
  const img = new Image();
  const url = URL.createObjectURL(f);
  img.onload = () => {
    const MAX = 900;
    let w = img.width, h = img.height;
    if (w > MAX || h > MAX) {
      if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
      else        { w = Math.round(w * MAX / h); h = MAX; }
    }
    const canvas = document.createElement('canvas');
    canvas.width = w; canvas.height = h;
    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
    URL.revokeObjectURL(url);
    resolve(canvas.toDataURL('image/jpeg', 0.82));
  };
  img.onerror = reject;
  img.src = url;
});

//  CROP MODAL

function CropModal({ src, onConfirm, onCancel }) {
  const canvasRef = useRef(null);
  const [scale, setScale] = useState(1);
  const [offset, setOffset] = useState({ x: 0, y: 0 });
  const [dragging, setDragging] = useState(false);
  const dragStart = useRef({ x: 0, y: 0 });
  const imgEl = useRef(null);
  const W = 300, H = 400;

  useEffect(() => {
    const img = new Image();
    imgEl.current = img;
    img.onload = () => {
      const s = Math.max(W / img.width, H / img.height);
      setScale(s);
      setOffset({ x: (W - img.width * s) / 2, y: (H - img.height * s) / 2 });
    };
    img.src = src;
  }, [src]);

  useEffect(() => {
    const canvas = canvasRef.current;
    const img = imgEl.current;
    if (!canvas || !img || !img.complete || !img.naturalWidth) return;
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, W, H);
    ctx.drawImage(img, offset.x, offset.y, img.width * scale, img.height * scale);
  }, [scale, offset]);

  const getPoint = (e) => e.touches ? e.touches[0] : e;

  const onDown = (e) => {
    e.preventDefault();
    setDragging(true);
    const p = getPoint(e);
    dragStart.current = { x: p.clientX - offset.x, y: p.clientY - offset.y };
  };
  const onMove = (e) => {
    if (!dragging) return;
    e.preventDefault();
    const p = getPoint(e);
    setOffset({ x: p.clientX - dragStart.current.x, y: p.clientY - dragStart.current.y });
  };
  const onUp = () => setDragging(false);
  const onWheel = (e) => setScale(s => Math.max(0.3, Math.min(s - e.deltaY * 0.001, 6)));

  const confirm = () => onConfirm(canvasRef.current.toDataURL('image/jpeg', 0.88));

  return (
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.93)',zIndex:9999,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'20px'}}>
      <p style={{color:'var(--gold)',marginBottom:'6px',fontWeight:'700',fontSize:'0.9rem',letterSpacing:'1px'}}>ADJUST PHOTO</p>
      <p style={{color:'var(--muted)',fontSize:'0.75rem',marginBottom:'14px'}}>Drag to reposition · Pinch or slider to zoom</p>
      <div style={{borderRadius:'12px',overflow:'hidden',border:'2px solid var(--border-gold)'}}>
        <canvas ref={canvasRef} width={W} height={H}
          style={{display:'block',cursor:dragging?'grabbing':'grab',touchAction:'none'}}
          onMouseDown={onDown} onMouseMove={onMove} onMouseUp={onUp} onMouseLeave={onUp}
          onTouchStart={onDown} onTouchMove={onMove} onTouchEnd={onUp}
          onWheel={onWheel}
        />
      </div>
      <div style={{marginTop:'14px',width:'100%',maxWidth:'300px'}}>
        <label style={{color:'var(--muted)',fontSize:'0.75rem'}}>Zoom</label>
        <input type="range" min="0.3" max="6" step="0.05" value={scale}
          onChange={e=>setScale(Number(e.target.value))}
          style={{width:'100%',marginTop:'4px',accentColor:'var(--gold)'}}
        />
      </div>
      <div style={{display:'flex',gap:'12px',marginTop:'18px',width:'100%',maxWidth:'300px'}}>
        <button onClick={onCancel} style={{flex:1,padding:'12px',background:'transparent',border:'1px solid var(--border)',color:'var(--muted)',borderRadius:'10px',fontSize:'0.85rem'}}>Cancel</button>
        <button onClick={confirm} style={{flex:1,padding:'12px',background:'var(--gold)',border:'none',color:'#000',borderRadius:'10px',fontSize:'0.85rem',fontWeight:'700'}}>✓ Use Photo</button>
      </div>
    </div>
  );
}

// Distance between two GPS coords (km)
function haversineKm(lat1,lng1,lat2,lng2){
  const R=6371, dLat=(lat2-lat1)*Math.PI/180, dLng=(lng2-lng1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R*2*Math.asin(Math.sqrt(a));
}
function fmtDist(km){
  if(km<1) return `${Math.round(km*1000)} m`;
  return `${km.toFixed(1)} km`;
}

        date:           today,
        serviceType:    booking.serviceType || 'Massage',
        amount,
        clientName:     booking.clientName || '',
        duration:       booking.duration   || '60 min',
        notes:          booking.notes      || '',
        bookingId:      booking.id,
        createdAt:      FieldValue.serverTimestamp(),
      });
      // ── Increment attendance session count + earnings ────
      await db.collection('attendance').doc(`${session.docId}_${today}`).set({
        therapistDocId: session.docId,
        therapistId:    session.therapistId,
        date:           today,
        sessions:       FieldValue.increment(1),
        earnings:       FieldValue.increment(amount),
      }, { merge: true });
      showMsg(`Session complete! ₹${amount.toLocaleString('en-IN')} added to earnings.`);
    } catch(err) { showMsg(`Error: ${err.message}`, 'error'); }
  };

  // Enable push notifications once on first load
  const pushSetupRef = useRef(false);
  useEffect(()=>{
    if(!pushSetupRef.current && session?.docId){
      pushSetupRef.current = true;
      setupPushNotifications(session.docId, setNotifStatus);
    }
  },[]);

  const fetchProfile = async () => {
    setLoading(true);
    try {
      const snap = await db.collection('therapists').doc(session.docId).get();
      if (snap.exists) {
        const d = snap.data();
        setData(d);
        setName(d.name || '');
        setAvailable(d.available ?? false);
        setWorkingHours(d.workingHours || defaultHours());
        setSpeciality(d.speciality || '');
        setBio(d.bio || '');
        setPhone(d.phone || '');
      }
    } finally { setLoading(false); }
  };

  const showMsg = (text, type='success') => {
    setMsg(text); setMsgType(type);
    setTimeout(() => setMsg(''), 3000);
  };

  const save = async (field, updates, label) => {
    setSaving(field);
    try {
      await db.collection('therapists').doc(session.docId).update(updates);
      setData(prev => ({ ...prev, ...updates }));
      showMsg(`${label} saved!`);
    } catch(err) { showMsg(`Error: ${err.message}`, 'error'); }
    finally { setSaving(''); }
  };

  const handleToggleDuty = async () => {
    const next = !available;
    setAvailable(next);
    try {
      await db.collection('therapists').doc(session.docId).update({ available: next });
      // ── Attendance tracking ──────────────────────────────
      const today  = new Date().toISOString().split('T')[0];
      const attRef = db.collection('attendance').doc(`${session.docId}_${today}`);
      if (next) {
        // Going ON duty → write checkIn if not already set today
        const snap = await attRef.get();
        if (!snap.exists || !snap.data()?.checkIn) {
          await attRef.set({
            therapistDocId: session.docId,
            therapistId:    session.therapistId,
            date:           today,
            checkIn:        FieldValue.serverTimestamp(),
            sessions:       0,
            earnings:       0,
            status:         'present',
          }, { merge: true });
        }
      } else {
        // Going OFF duty → write checkOut + compute hours + status
        const snap = await attRef.get();
        if (snap.exists && snap.data()?.checkIn) {
          const checkInMs  = snap.data().checkIn.toMillis();
          const hoursOnDuty = parseFloat(((Date.now() - checkInMs) / 3600000).toFixed(2));
          await attRef.update({
            checkOut:    FieldValue.serverTimestamp(),
            hoursOnDuty,
            status:      hoursOnDuty >= 4 ? 'present' : 'half-day',
          });
        }
      }
      showMsg(next ? 'Duty ON — you are now visible to clients' : 'Duty OFF — profile hidden from clients');
    } catch(err) { setAvailable(!next); showMsg(`Error: ${err.message}`, 'error'); }
  };

  const pickFile = (f) => {
    if (!f || !f.type.startsWith('image/')) return;
    setFile(f);
    const r = new FileReader();
    r.onloadend = () => { setCropSrc(r.result); setShowCrop(true); };
    r.readAsDataURL(f);
  };

  const handleCropConfirm = (croppedDataUrl) => {
    setPreview(croppedDataUrl);
    setShowCrop(false);
  };

  const handleCropCancel = () => {
    setFile(null); setCropSrc(null); setShowCrop(false);
  };

  const handleUploadPhoto = async () => {
    if (!preview) return;
    setUploading(true);
    try {
      const imageUrl = preview; // already cropped base64
      await db.collection('therapists').doc(session.docId).update({ imageUrl });
      setData(prev => ({ ...prev, imageUrl }));
      setFile(null); setPreview(null);
      showMsg('Profile photo updated!');
    } catch(err) { showMsg(`Upload failed: ${err.message}`, 'error'); }
    finally { setUploading(false); }
  };

  // Profile completion score
  const completion = React.useMemo(() => {
    if (!data) return 0;
    const hasHours = data.workingHours && Object.values(data.workingHours).some(d=>d.on);
    const checks = [!!data.imageUrl, !!data.name, !!hasHours, !!data.speciality, !!data.bio];
    return Math.round((checks.filter(Boolean).length / checks.length) * 100);
  }, [data]);

  const [activeTab, setActiveTab] = useState('home');

  if (loading) return <Center><span className="spin" style={{fontSize:'2rem',color:'var(--gold)'}}>✦</span></Center>;

  if (showCrop) return <CropModal src={cropSrc} onConfirm={handleCropConfirm} onCancel={handleCropCancel}/>;

  const fmt = (t) => { if (!t) return ''; const [h,m]=t.split(':'); const hr=+h; return `${hr===0?12:hr>12?hr-12:hr}:${m} ${hr<12?'AM':'PM'}`; };

  const tabs = [
    { id:'home',       icon:'home',       label:'Home',       badge: pendingBookings.length + newScheduledCount },
    { id:'earnings',   icon:'earnings',   label:'Earnings',   badge: 0 },
    { id:'attendance', icon:'attendance', label:'Attend.',    badge: 0 },
    { id:'profile',    icon:'profile',    label:'Profile',    badge: completion<100?1:0 },
  ];

  const TAB_ICONS = {
    home: (active) => (
      <svg width="22" height="22" viewBox="0 0 24 24" fill={active?'var(--gold)':'var(--muted)'} xmlns="http://www.w3.org/2000/svg">
        <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
      </svg>
    ),
    earnings: (active) => (
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke={active?'var(--gold)':'var(--muted)'} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <circle cx="12" cy="12" r="10"/><path d="M12 6v2m0 8v2m-4-6h8"/>
        <path d="M14.5 9.5A2.5 2.5 0 0012 7a2.5 2.5 0 000 5 2.5 2.5 0 010 5 2.5 2.5 0 01-2.5-2.5"/>
      </svg>
    ),
    attendance: (active) => (
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke={active?'var(--gold)':'var(--muted)'} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
        <polyline points="9 16 11 18 15 14"/>
      </svg>
    ),
    profile: (active) => (
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke={active?'var(--gold)':'var(--muted)'} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/>
      </svg>
    ),
  };

  return (
    <div style={{maxWidth:'600px',margin:'0 auto',display:'flex',flexDirection:'column',minHeight:'100vh',background:'var(--bg)'}}>

      {/* Toast */}
      {msg&&(
        <div style={{position:'fixed',top:'12px',left:'50%',transform:'translateX(-50%)',zIndex:50,padding:'10px 20px',borderRadius:'10px',background:msgType==='success'?'rgba(39,174,96,.9)':'rgba(231,76,60,.9)',color:'#fff',fontSize:'0.83rem',fontWeight:'600',boxShadow:'0 4px 20px rgba(0,0,0,.4)',whiteSpace:'nowrap'}}>
          {msgType==='success'?'✓':'✕'} {msg}
        </div>
      )}

      {/* ── TAB CONTENT ── */}
      <div style={{flex:1,overflowY:'auto',paddingBottom:'80px'}}>

        {/* ══ HOME TAB ══ */}
        {activeTab==='home'&&<HomeTab
          session={session}
          data={data}
          available={available}
          onToggleDuty={handleToggleDuty}
          pendingBookings={pendingBookings}
          allBookings={allBookings}
          myGPS={myGPS}
          onAccept={acceptBooking}
          onDecline={declineBooking}
          onMarkComplete={markComplete}
          onUpdateStatus={updateSessionStatus}
          onViewEarnings={()=>setActiveTab('earnings')}
          onLogout={onLogout}
        />}

        {/* ══ EARNINGS TAB ══ */}
        {activeTab==='earnings'&&<div style={{padding:'16px'}}><EarningsTab session={session}/></div>}

        {/* ══ ATTENDANCE TAB ══ */}
        {activeTab==='attendance'&&<div style={{padding:'16px'}}><AttendanceTab session={session}/></div>}

        {/* ══ PROFILE TAB ══ */}
        {activeTab==='profile'&&(<div style={{display:'flex',flexDirection:'column',gap:'16px',padding:'16px'}}>

          {/* Profile photo */}
          <div style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:'16px',padding:'20px'}}>
            <SectionTitle>Profile Photo</SectionTitle>
            <div style={{display:'flex',gap:'16px',alignItems:'flex-start',flexWrap:'wrap'}}>
              <div style={{width:'90px',height:'110px',borderRadius:'10px',overflow:'hidden',border:'2px solid var(--border-gold)',flexShrink:0,background:'#0d0d0d'}}>
                {(preview||data?.imageUrl)
                  ?<img src={preview||data?.imageUrl} style={{width:'100%',height:'100%',objectFit:'cover'}}/>
                  :<div style={{width:'100%',height:'100%',display:'flex',alignItems:'center',justifyContent:'center',color:'var(--muted)',fontSize:'1.6rem'}}>✦</div>
                }
              </div>
              <div style={{flex:1,minWidth:'160px'}}>
                <div style={{border:'2px dashed var(--border-gold)',borderRadius:'10px',padding:'18px',cursor:'pointer',background:'var(--elevated)',textAlign:'center'}} onClick={()=>!uploading&&fileRef.current?.click()}>
                  <div style={{fontSize:'1.5rem',marginBottom:'5px'}}>📷</div>
                  <p style={{color:'var(--muted)',fontSize:'0.8rem'}}>{file?file.name:(data?.imageUrl?'Tap to change':'Tap to upload')}</p>
                </div>
                <input ref={fileRef} type="file" accept="image/*" style={{display:'none'}} onChange={e=>pickFile(e.target.files[0])}/>
                {file&&(
                  <div style={{display:'flex',gap:'8px',marginTop:'10px'}}>
                    <button onClick={()=>{setFile(null);setPreview(null);}} style={{flex:1,padding:'9px',background:'transparent',border:'1px solid var(--border)',color:'var(--muted)',borderRadius:'8px',fontSize:'0.8rem'}}>Cancel</button>
                    <button onClick={handleUploadPhoto} disabled={uploading} style={{...goldBtn,flex:1,padding:'9px',fontSize:'0.8rem'}}>
                      {uploading?<span className="spin">✦</span>:'Save'}
                    </button>
                  </div>
                )}
              </div>
            </div>
            <div style={{marginTop:'14px'}}>
              <div style={{display:'flex',justifyContent:'space-between',marginBottom:'5px'}}>
                <span style={{fontSize:'0.7rem',color:'var(--muted)',letterSpacing:'1px'}}>PROFILE COMPLETE</span>
                <span style={{fontSize:'0.7rem',color:completion===100?'var(--success)':'var(--gold)',fontWeight:'700'}}>{completion}%</span>
              </div>
              <div style={{height:'4px',borderRadius:'2px',background:'var(--border)'}}>
                <div style={{height:'100%',borderRadius:'2px',width:`${completion}%`,background:'linear-gradient(90deg,var(--gold-dark),var(--gold))',transition:'width .4s'}}/>
              </div>
            </div>
          </div>

          {/* Profile details */}
          <div style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:'16px',padding:'20px'}}>
            <SectionTitle>Personal Details</SectionTitle>
            <div style={{display:'flex',flexDirection:'column',gap:'14px'}}>
              <div>
                <label style={labelSt}>Display Name</label>
                <div style={{display:'flex',gap:'8px',marginTop:'6px'}}>
                  <input type="text" value={name} onChange={e=>setName(e.target.value)} style={{...inputSt,flex:1}} placeholder="Your name shown to clients"/>
                  <button onClick={()=>save('name',{name:name.trim()},'Name')} disabled={saving==='name'||!name.trim()} style={{...goldBtn,padding:'11px 16px',fontSize:'0.82rem',flexShrink:0}}>
                    {saving==='name'?<span className="spin">✦</span>:'Save'}
                  </button>
                </div>
              </div>
              <div>
                <label style={labelSt}>Speciality / Services</label>
                <div style={{display:'flex',gap:'8px',marginTop:'6px'}}>
                  <input type="text" value={speciality} onChange={e=>setSpeciality(e.target.value)} style={{...inputSt,flex:1}} placeholder="e.g. Swedish Massage, Deep Tissue"/>
                  <button onClick={()=>save('speciality',{speciality:speciality.trim()},'Speciality')} disabled={saving==='speciality'} style={{...goldBtn,padding:'11px 16px',fontSize:'0.82rem',flexShrink:0}}>
                    {saving==='speciality'?<span className="spin">✦</span>:'Save'}
                  </button>
                </div>
              </div>
              <div>
                <label style={labelSt}>WhatsApp Number (for admin)</label>
                <div style={{display:'flex',gap:'8px',marginTop:'6px'}}>
                  <div style={{display:'flex',flex:1}}>
                    <span style={{background:'var(--elevated)',border:'1px solid var(--border)',borderRight:'none',borderRadius:'10px 0 0 10px',padding:'12px 10px',color:'var(--muted)',fontSize:'0.88rem',whiteSpace:'nowrap'}}>+91</span>
                    <input type="tel" value={phone} onChange={e=>setPhone(e.target.value.replace(/\D/g,'').slice(0,10))} style={{...inputSt,borderRadius:'0 10px 10px 0',borderLeft:'none',flex:1}} placeholder="9876543210" maxLength={10}/>
                  </div>
                  <button onClick={()=>save('phone',{phone:phone.trim()},'Phone')} disabled={saving==='phone'} style={{...goldBtn,padding:'11px 16px',fontSize:'0.82rem',flexShrink:0}}>
                    {saving==='phone'?<span className="spin">✦</span>:'Save'}
                  </button>
                </div>
                <p style={{color:'var(--muted)',fontSize:'0.7rem',marginTop:'4px'}}>Used by admin to send you booking confirmations</p>
              </div>

              {/* Push Notification Status */}
              <div style={{background: notifStatus==='granted' ? 'rgba(34,197,94,0.08)' : 'rgba(239,68,68,0.08)', border:`1px solid ${notifStatus==='granted'?'rgba(34,197,94,0.3)':'rgba(239,68,68,0.3)'}`, borderRadius:'12px', padding:'14px 16px', display:'flex', alignItems:'center', justifyContent:'space-between', gap:'12px'}}>
                <div style={{display:'flex',alignItems:'center',gap:'10px'}}>
                  <span style={{fontSize:'1.3rem'}}>{notifStatus==='granted'?'🔔':'🔕'}</span>
                  <div>
                    <p style={{fontWeight:600,fontSize:'0.88rem',margin:0,color: notifStatus==='granted'?'#22c55e':'#ef4444'}}>
                      {notifStatus==='granted' ? '✅ Notifications ON' : notifStatus==='denied' ? '🚫 Notifications BLOCKED' : `⚙️ ${notifStatus||'Checking...'}`}
                    </p>
                    <p style={{fontSize:'0.72rem',color:'var(--muted)',margin:0,marginTop:'2px'}}>
                      {notifStatus==='granted' ? 'You will receive push alerts for new bookings' : notifStatus==='denied' ? 'Go to Chrome Settings → Site Settings → Notifications → Allow' : 'Tap Enable — must allow browser permission'}
                    </p>
                  </div>
                </div>
                {notifStatus !== 'granted' && notifStatus !== 'denied' && (
                  <button onClick={()=>setupPushNotifications(session?.docId, setNotifStatus)} style={{background:'#ef4444',color:'#fff',border:'none',borderRadius:'8px',padding:'8px 14px',fontSize:'0.82rem',fontWeight:600,cursor:'pointer',flexShrink:0}}>
                    Enable
                  </button>
                )}
              </div>
              <div>
                <label style={labelSt}>Short Bio</label>
                <textarea value={bio} onChange={e=>setBio(e.target.value)} rows={3} style={{...inputSt,resize:'none',lineHeight:'1.5',marginTop:'6px'}} placeholder="Brief description about yourself…"/>
                <button onClick={()=>save('bio',{bio:bio.trim()},'Bio')} disabled={saving==='bio'} style={{...goldBtn,padding:'9px',fontSize:'0.82rem',width:'100%',marginTop:'8px'}}>
                  {saving==='bio'?<span className="spin">✦</span>:'Save Bio'}
                </button>
              </div>
            </div>
          </div>

          {/* Working Hours — weekly */}
          <div style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:'16px',padding:'20px'}}>
            <SectionTitle>Working Hours</SectionTitle>
            <div style={{display:'flex',flexDirection:'column',gap:'10px',marginBottom:'16px'}}>
              {DAYS.map(day=>{
                const dh = workingHours[day] || {on:false,start:'09:00',end:'18:00'};
                const setDay = patch => setWorkingHours(prev=>({...prev,[day]:{...prev[day],...patch}}));
                return (
                  <div key={day} style={{display:'flex',alignItems:'center',gap:'10px',padding:'10px 12px',background:'rgba(255,255,255,0.03)',borderRadius:'10px',border:`1px solid ${dh.on?'rgba(212,175,55,.3)':'var(--border)'}`}}>
                    {/* Day toggle */}
                    <button onClick={()=>setDay({on:!dh.on})} style={{
                      minWidth:'88px',padding:'5px 10px',borderRadius:'20px',border:'none',cursor:'pointer',fontSize:'0.75rem',fontWeight:'700',letterSpacing:'0.3px',fontFamily:'inherit',
                      background: dh.on ? 'var(--gold)' : 'rgba(255,255,255,0.06)',
                      color: dh.on ? '#1a1209' : 'var(--muted)',
                      transition:'all 0.2s',
                    }}>
                      {DAY_LABELS[day].slice(0,3).toUpperCase()}
                    </button>
                    {dh.on ? (
                      <>
                        <input type="time" value={dh.start} onChange={e=>setDay({start:e.target.value})}
                          style={{flex:1,background:'var(--bg)',border:'1px solid var(--border)',borderRadius:'8px',padding:'7px 10px',color:'var(--text)',fontSize:'0.85rem',fontFamily:'inherit',colorScheme:'dark',minWidth:0}}/>
                        <span style={{color:'var(--muted)',fontSize:'0.8rem',flexShrink:0}}>to</span>
                        <input type="time" value={dh.end} onChange={e=>setDay({end:e.target.value})}
                          style={{flex:1,background:'var(--bg)',border:'1px solid var(--border)',borderRadius:'8px',padding:'7px 10px',color:'var(--text)',fontSize:'0.85rem',fontFamily:'inherit',colorScheme:'dark',minWidth:0}}/>
                      </>
                    ) : (
                      <span style={{color:'var(--muted)',fontSize:'0.82rem',flex:1}}>Day off</span>
                    )}
                  </div>
                );
              })}
            </div>
            <button onClick={()=>save('hours',{workingHours},'Working Hours')} disabled={saving==='hours'} style={{...goldBtn,padding:'13px',fontSize:'0.9rem',width:'100%'}}>
              {saving==='hours'?<span className="spin">✦</span>:'Save Working Hours'}
            </button>
          </div>

          {/* Therapist ID + Logout */}
          <div style={{background:'rgba(212,175,55,.04)',border:'1px solid var(--border-gold)',borderRadius:'12px',padding:'16px',display:'flex',alignItems:'center',justifyContent:'space-between',gap:'12px'}}>
            <div>
              <p style={{color:'var(--muted)',fontSize:'0.68rem',letterSpacing:'1.5px',textTransform:'uppercase',marginBottom:'5px'}}>My Therapist ID</p>
              <p style={{color:'var(--gold)',fontFamily:'monospace',fontSize:'0.9rem',fontWeight:'700'}}>{session.therapistId}</p>
            </div>
            <button onClick={()=>{navigator.clipboard?.writeText(session.therapistId).then(()=>showMsg('ID copied!'));}} style={{background:'transparent',border:'1px solid var(--border-gold)',color:'var(--gold)',borderRadius:'8px',padding:'8px 14px',fontSize:'0.78rem',flexShrink:0}}>
              Copy
            </button>
          </div>
          <button onClick={onLogout} style={{background:'transparent',border:'1px solid var(--border)',color:'var(--muted)',borderRadius:'10px',padding:'12px',fontSize:'0.85rem',width:'100%'}}>
            Sign Out
          </button>

        </div>)}

      </div>

      {/* ── BOTTOM TAB BAR ── */}
      <nav style={{position:'fixed',bottom:0,left:'50%',transform:'translateX(-50%)',width:'100%',maxWidth:'600px',background:'var(--surface)',borderTop:'1px solid var(--border)',display:'flex',zIndex:20,paddingBottom:'env(safe-area-inset-bottom,0px)'}}>
        {tabs.map(t=>(
          <button key={t.id} onClick={()=>{ setActiveTab(t.id); if(t.id==='home') setNewScheduledCount(0); }}
            style={{flex:1,padding:'10px 4px 8px',background:'none',border:'none',cursor:'pointer',display:'flex',flexDirection:'column',alignItems:'center',gap:'4px',position:'relative'}}>
            {t.badge>0&&(
              <span style={{position:'absolute',top:'6px',right:'calc(50% - 18px)',background:'var(--danger)',color:'#fff',borderRadius:'8px',padding:'1px 5px',fontSize:'0.6rem',fontWeight:'700',lineHeight:'1.3',minWidth:'16px',textAlign:'center'}}>
                {t.badge}
              </span>
            )}
            {TAB_ICONS[t.icon](activeTab===t.id)}
            <span style={{fontSize:'0.63rem',fontWeight:'700',letterSpacing:'0.3px',color:activeTab===t.id?'var(--gold)':'var(--muted)',textTransform:'uppercase'}}>{t.label}</span>
            {activeTab===t.id&&<div style={{position:'absolute',top:0,left:'25%',right:'25%',height:'2px',background:'var(--gold)',borderRadius:'0 0 2px 2px'}}/>}
          </button>
        ))}
      </nav>

    </div>
  );
}

// ══════════════════════════════════════════════════════
//  HOME TAB
// ══════════════════════════════════════════════════════
function HomeTab({ session, data, available, onToggleDuty, pendingBookings, allBookings, myGPS, onAccept, onDecline, onMarkComplete, onUpdateStatus, onViewEarnings, onLogout }) {
  const [earnings,      setEarnings]      = useState([]);
  const [earningsLoaded,setEarningsLoaded]= useState(false);
  const [markingId,     setMarkingId]     = useState(null);
  const [markAmount,    setMarkAmount]    = useState('');
  const [markSaving,    setMarkSaving]    = useState(false);
  const [homeTab,       setHomeTab]       = useState('today'); // 'today'|'upcoming'|'history'
  const [expandedId,    setExpandedId]    = useState(null);

  const handleMarkComplete = async (b) => {
    if (!markAmount || isNaN(Number(markAmount)) || Number(markAmount) <= 0) return;
    setMarkSaving(true);
    try {
      await onMarkComplete(b, Number(markAmount));
      setMarkingId(null); setMarkAmount('');
    } finally { setMarkSaving(false); }
  };

  useEffect(()=>{
    db.collection('earnings').where('therapistDocId','==',session.docId).limit(200).get()
      .then(snap=>{ setEarnings(snap.docs.map(d=>d.data())); setEarningsLoaded(true); })
      .catch(()=>setEarningsLoaded(true));
  },[]);

  const now        = new Date();
  const weekStart  = new Date(now); weekStart.setDate(now.getDate()-now.getDay()); weekStart.setHours(0,0,0,0);
  const monthStart = new Date(now.getFullYear(),now.getMonth(),1);
  const weekTotal  = earnings.filter(e=>e.date&&new Date(e.date)>=weekStart).reduce((s,e)=>s+(e.amount||0),0);
  const monthTotal = earnings.filter(e=>e.date&&new Date(e.date)>=monthStart).reduce((s,e)=>s+(e.amount||0),0);
  const fmtMoney   = n=>Number(n||0).toLocaleString('en-IN');

  const hr        = now.getHours();
  const greeting  = hr<12?'Good morning':hr<17?'Good afternoon':'Good evening';
  const firstName = (data?.name||session.name||'').split(' ')[0]||'there';
  const todayStr  = now.toLocaleDateString('en-CA');
  const todayStart= new Date(now); todayStart.setHours(0,0,0,0);

  const todayBookings = allBookings.filter(b=>{
    if(['confirmed','accepted','admin_pending','on_way','in_session','completed'].includes(b.status)){
      const d=b.createdAt?.toDate?.(); return d&&d>=todayStart;
    }
    if(b.status==='scheduled'&&b.scheduledDate===todayStr) return true;
    return false;
  }).sort((a,b)=>(a.scheduledTime||'').localeCompare(b.scheduledTime||''));

  const upcomingBookings = allBookings.filter(b=>
    b.status==='scheduled'&&b.scheduledDate&&b.scheduledDate>todayStr
  ).sort((a,b)=>a.scheduledDate===b.scheduledDate
    ?(a.scheduledTime||'').localeCompare(b.scheduledTime||'')
    :a.scheduledDate.localeCompare(b.scheduledDate));

  const historyBookings = allBookings.filter(b=>
    b.status==='completed'||b.status==='declined'
  ).sort((a,b)=>(b.createdAt?.toMillis?.()??0)-(a.createdAt?.toMillis?.()??0));

  const firstPending = pendingBookings[0]||null;

  const fmtDate = d => new Date(d).toLocaleDateString('en-IN',{weekday:'short',day:'numeric',month:'short'});
  const timeAgoStr = b=>{
    const d=b.createdAt?.toDate?.(); if(!d) return '';
    const s=(Date.now()-d)/1000;
    if(s<3600) return `${Math.floor(s/60)}m ago`;
    if(s<86400) return `${Math.floor(s/3600)}h ago`;
    return d.toLocaleDateString('en-IN',{day:'numeric',month:'short'});
  };

    <button onClick={()=>setHomeTab(id)} style={{flex:1,background:'transparent',border:'none',borderBottom:`2px solid ${homeTab===id?'var(--gold)':'transparent'}`,padding:'10px 4px',fontSize:'0.68rem',fontWeight:'700',letterSpacing:'0.5px',textTransform:'uppercase',cursor:'pointer',fontFamily:'inherit',color:homeTab===id?'var(--gold)':'var(--muted)',position:'relative',transition:'color .15s'}}>

    </button>
  );

  return (
    <div style={{display:'flex',flexDirection:'column',padding:'24px 0 8px'}}>

      <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',gap:'12px',padding:'0 16px'}}>

          <p style={{fontSize:'0.82rem',color:'var(--muted)',marginBottom:'3px'}}>{greeting},</p>
          <h1 style={{fontSize:'1.55rem',fontWeight:'700',color:'var(--text)',lineHeight:'1.1'}}>{firstName}</h1>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:'10px',flexShrink:0,paddingTop:'2px'}}>
          <button onClick={onToggleDuty} style={{display:'flex',alignItems:'center',gap:'6px',padding:'8px 16px',borderRadius:'20px',border:'none',cursor:'pointer',fontFamily:'inherit',background:available?'rgba(39,174,96,0.15)':'rgba(100,100,100,0.12)'}}>
            <div style={{width:'8px',height:'8px',borderRadius:'50%',background:available?'#27ae60':'var(--muted)',boxShadow:available?'0 0 7px #27ae60':'none',flexShrink:0}}/>

        </div>
      </div>

      {/* ⚠️ No photo warning — hidden from gallery until uploaded */}
      {!data?.imageUrl&&(
        <div style={{margin:'14px 16px 0',borderRadius:'14px',overflow:'hidden',border:'1px solid rgba(255,165,0,0.4)',background:'rgba(255,140,0,0.07)'}}>
          <div style={{display:'flex',gap:'12px',alignItems:'flex-start',padding:'14px 16px'}}>
            <div style={{fontSize:'1.5rem',flexShrink:0,lineHeight:1}}>📷</div>
            <div style={{flex:1}}>
              <p style={{fontWeight:'700',fontSize:'0.88rem',color:'#ffa500',marginBottom:'4px'}}>Profile photo missing</p>
              <p style={{fontSize:'0.78rem',color:'var(--muted)',lineHeight:'1.45'}}>You are currently <strong style={{color:'#ffa500'}}>not visible</strong> in the client gallery. Upload a profile photo to start receiving bookings.</p>
            </div>
          </div>
          <div style={{borderTop:'1px solid rgba(255,165,0,0.2)',padding:'10px 16px',background:'rgba(255,140,0,0.05)',display:'flex',alignItems:'center',justifyContent:'space-between'}}>

            :upcomingBookings.map(b=>{
              const isOpen=expandedId===b.id;

              return(
                <div key={b.id} onClick={()=>setExpandedId(isOpen?null:b.id)}

      {/* ══ HISTORY TAB ══ */}
      {homeTab==='history'&&(
        <div style={{padding:'16px 16px 8px',display:'flex',flexDirection:'column',gap:'7px'}}>
          {historyBookings.length===0
            ?<div style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:'14px',padding:'32px',textAlign:'center',color:'var(--muted)',fontSize:'0.85rem'}}>No booking history yet</div>
            :historyBookings.map(b=>{
              const isDone=b.status==='completed';
              const earnEntry=earnings.find(e=>e.bookingId===b.id);
              return(
                <div key={b.id} style={{display:'flex',alignItems:'center',gap:'12px',background:'var(--surface)',border:'1px solid var(--border)',borderRadius:'12px',padding:'11px 14px'}}>

                    background:isDone?'rgba(39,174,96,0.1)':'rgba(231,76,60,0.08)',

                  <div style={{flex:1,minWidth:0}}>

              );
            })
          }
        </div>
      )}

    </div>
  );
}

// ══════════════════════════════════════════════════════
//  BOOKING REQUEST CARD (with countdown timer)
// ══════════════════════════════════════════════════════
function BookingRequestCard({ booking: b, myGPS, onAccept, onDecline }) {
  const [secs, setSecs] = useState(()=>{
    const elapsed = b.createdAt?.toDate ? Math.floor((Date.now()-b.createdAt.toDate())/1000) : 0;
    return Math.max(0, 180-elapsed);
  });

  useEffect(()=>{
    if(secs<=0) return;
    const t=setInterval(()=>setSecs(s=>Math.max(0,s-1)),1000);
    return ()=>clearInterval(t);
  },[]);

  const mins=Math.floor(secs/60), ss=secs%60;
  const timerStr=`${mins}:${String(ss).padStart(2,'0')}`;
  const timerColor=secs<30?'#e74c3c':secs<60?'#f39c12':'#e74c3c';
  const initial=(b.clientName||'?')[0].toUpperCase();
  const dist=(myGPS&&b.clientLocation&&b.clientLocation.lat)?haversineKm(myGPS.lat,myGPS.lng,b.clientLocation.lat,b.clientLocation.lng):null;

  return (
    <div className="booking-alert" style={{background:'rgba(231,76,60,0.06)',border:'2px solid rgba(231,76,60,0.45)',borderRadius:'16px',padding:'16px'}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'14px'}}>
        <div style={{display:'flex',alignItems:'center',gap:'7px'}}>
          <div style={{width:'8px',height:'8px',borderRadius:'50%',background:'#e74c3c',boxShadow:'0 0 6px #e74c3c'}}/>
          <span style={{fontSize:'0.7rem',fontWeight:'700',color:'#e74c3c',letterSpacing:'1.5px',textTransform:'uppercase'}}>New Request</span>
        </div>
        <span style={{fontSize:'1rem',fontWeight:'700',color:timerColor,fontFamily:'monospace',letterSpacing:'1px'}}>{timerStr}</span>
      </div>
      <div style={{display:'flex',alignItems:'center',gap:'10px',marginBottom:'10px'}}>
        <div style={{width:'40px',height:'40px',borderRadius:'50%',background:'rgba(212,175,55,0.12)',border:'1px solid rgba(212,175,55,0.25)',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:'700',color:'var(--gold)',fontSize:'1.05rem',flexShrink:0}}>
          {initial}
        </div>
        <div style={{minWidth:0}}>
          <p style={{fontWeight:'700',fontSize:'0.95rem',color:'var(--text)',marginBottom:'2px'}}>{b.clientName||'Client'}</p>
          <p style={{fontSize:'0.74rem',color:'var(--muted)',display:'flex',alignItems:'center',gap:'4px',flexWrap:'wrap'}}>
            <span style={{color:'var(--gold)'}}>⚡</span><span>Immediate</span>
            {dist!==null&&<><span>·</span><span>{fmtDist(dist)}</span></>}
          </p>
        </div>
      </div>
      {(b.serviceType||b.notes||b.duration)&&(
        <p style={{fontSize:'0.82rem',color:'var(--muted)',marginBottom:'14px',display:'flex',alignItems:'center',gap:'5px'}}>
          <span>📋</span><span>{[b.serviceType,b.duration].filter(Boolean).join(', ')||b.notes||''}</span>
        </p>
      )}
      {b.clientLocation&&b.clientLocation.lat&&(
        <a href={`https://maps.google.com?q=${b.clientLocation.lat},${b.clientLocation.lng}`} target="_blank" rel="noopener noreferrer"
          style={{color:'var(--gold)',fontSize:'0.78rem',textDecoration:'none',display:'inline-flex',alignItems:'center',gap:'4px',marginBottom:'14px'}}>
          📍 Open in Maps
        </a>
      )}
      {b.clientLocation&&b.clientLocation.address&&!b.clientLocation.lat&&(
        <p style={{fontSize:'0.78rem',color:'var(--muted)',marginBottom:'14px',display:'flex',alignItems:'center',gap:'4px'}}>
          📍 {b.clientLocation.address}
        </p>
      )}
      <div style={{display:'flex',gap:'10px'}}>
        <button onClick={()=>onDecline(b)} style={{flex:1,background:'rgba(231,76,60,0.1)',color:'var(--danger)',border:'1px solid rgba(231,76,60,0.3)',borderRadius:'12px',padding:'14px',fontWeight:'700',fontSize:'0.9rem',cursor:'pointer',minHeight:'50px',fontFamily:'inherit'}}>
          ✕ Decline
        </button>
        <button onClick={()=>onAccept(b)} style={{flex:2,background:'#27ae60',color:'#fff',border:'none',borderRadius:'12px',padding:'14px',fontWeight:'700',fontSize:'0.9rem',cursor:'pointer',minHeight:'50px',fontFamily:'inherit'}}>
          ✓ Accept
        </button>
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════════
//  EARNINGS TAB
// ══════════════════════════════════════════════════════
function EarningsTab({ session }) {
  const [entries,  setEntries]  = useState([]);
  const [loading,  setLoading]  = useState(true);
  const [showForm, setShowForm] = useState(false);
  const [saving,   setSaving]   = useState(false);
  const [filter,   setFilter]   = useState('month');
  const [form,     setForm]     = useState({
    date:        new Date().toISOString().split('T')[0],
    serviceType: 'Massage',
    amount:      '',
    clientName:  '',
    duration:    '60 min',
    notes:       ''
  });

  const load = async () => {
    setLoading(true);
    try {
      const snap = await db.collection('earnings')
        .where('therapistDocId', '==', session.docId)
        .limit(200).get();
      const docs = snap.docs.map(d=>({id:d.id,...d.data()}))
        .sort((a,b)=>{ if(a.date&&b.date) return b.date.localeCompare(a.date); return 0; });
      setEntries(docs);
    } catch(e) { console.error('earnings load error:', e); }
    setLoading(false);
  };

  useEffect(()=>{ load(); },[]);

  const handleAdd = async (e) => {
    e.preventDefault();
    if (!form.amount || isNaN(Number(form.amount)) || Number(form.amount) <= 0) {
      alert('Please enter a valid amount.'); return;
    }
    setSaving(true);
    try {
      await db.collection('earnings').add({
        therapistDocId: session.docId,
        therapistId:    session.therapistId,
        date:           form.date,
        serviceType:    form.serviceType,
        amount:         Number(form.amount),
        clientName:     form.clientName.trim(),
        duration:       form.duration,
        notes:          form.notes.trim(),
        createdAt:      FieldValue.serverTimestamp()
      });
      setForm(f=>({...f, amount:'', clientName:'', notes:'', date: new Date().toISOString().split('T')[0]}));
      setShowForm(false);
      load();
    } catch(e) { alert(`Error saving: ${e.message}`); }
    setSaving(false);
  };

  const handleDelete = async (entry) => {
    if (!confirm('Delete this earning entry?')) return;
    try {
      await db.collection('earnings').doc(entry.id).delete();
      setEntries(prev=>prev.filter(e=>e.id!==entry.id));
    } catch(e) { alert(`Error: ${e.message}`); }
  };

  const now        = new Date();
  const weekStart  = new Date(now); weekStart.setDate(now.getDate()-now.getDay()); weekStart.setHours(0,0,0,0);
  const monthStart = new Date(now.getFullYear(), now.getMonth(), 1);

  const inWeek  = e => e.date && new Date(e.date) >= weekStart;
  const inMonth = e => e.date && new Date(e.date) >= monthStart;

  const weekTotal  = entries.filter(inWeek).reduce((s,e)=>s+(e.amount||0),0);
  const monthTotal = entries.filter(inMonth).reduce((s,e)=>s+(e.amount||0),0);
  const avgSession = entries.length ? Math.round(entries.reduce((s,e)=>s+(e.amount||0),0)/entries.length) : 0;

  const filtered = filter==='week' ? entries.filter(inWeek) : filter==='month' ? entries.filter(inMonth) : entries;

  const SVC_ICON  = {'Massage':'💆','Facial':'✨','Body Wrap':'🌿','Head Massage':'💭','Other':'💰'};
  const SVC_COLOR = {'Massage':'#d4af37','Facial':'#a78bfa','Body Wrap':'#34d399','Head Massage':'#63b3ed','Other':'#64748b'};
  const sc  = s => SVC_COLOR[s] || '#64748b';
  const fmt = n => Number(n||0).toLocaleString('en-IN');
  const eInSt = {...inputSt, marginTop:'5px'};

  return (
    <div style={{display:'flex',flexDirection:'column',gap:'14px'}}>
      <div style={{background:'var(--surface)',border:'1px solid var(--border-gold)',borderRadius:'16px',padding:'18px'}}>
        <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:'16px'}}>
          <div>
            <p style={{fontSize:'0.65rem',color:'var(--muted)',textTransform:'uppercase',letterSpacing:'1.5px',marginBottom:'4px'}}>This Week</p>
            <p style={{fontSize:'1.8rem',fontWeight:'700',color:'var(--gold)',margin:0,lineHeight:'1'}}>₹{loading?'—':fmt(weekTotal)}</p>
          </div>
          <button onClick={()=>setShowForm(v=>!v)}
            style={{background:showForm?'rgba(231,76,60,0.1)':'rgba(212,175,55,0.1)',border:`1px solid ${showForm?'rgba(231,76,60,0.3)':'rgba(212,175,55,0.35)'}`,borderRadius:'10px',padding:'9px 14px',color:showForm?'var(--danger)':'var(--gold)',fontSize:'0.83rem',fontWeight:'700',cursor:'pointer'}}>
            {showForm?'✕ Cancel':'+ Add Entry'}
          </button>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:'8px'}}>
          {[['This Month',`₹${fmt(monthTotal)}`],['Sessions',String(entries.length)],['Avg / Session',`₹${fmt(avgSession)}`]].map(([l,v])=>(
            <div key={l} style={{background:'var(--elevated)',borderRadius:'10px',padding:'9px 10px',textAlign:'center'}}>
              <p style={{fontSize:'0.9rem',fontWeight:'700',color:'var(--text)',margin:0}}>{loading?'—':v}</p>
              <p style={{fontSize:'0.62rem',color:'var(--muted)',margin:'3px 0 0',lineHeight:'1.2'}}>{l}</p>
            </div>
          ))}
        </div>
      </div>

      {showForm&&(
        <div className="fade-in" style={{background:'var(--surface)',border:'1px solid var(--border-gold)',borderRadius:'16px',padding:'18px'}}>
          <p style={{fontWeight:'700',fontSize:'0.82rem',color:'var(--gold)',marginBottom:'14px',letterSpacing:'1.5px',textTransform:'uppercase'}}>New Earning Entry</p>
          <form onSubmit={handleAdd} style={{display:'flex',flexDirection:'column',gap:'12px'}}>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'10px'}}>
              <div>
                <label style={labelSt}>Date</label>
                <input type="date" value={form.date} onChange={e=>setForm(f=>({...f,date:e.target.value}))} style={{...eInSt,colorScheme:'dark'}} required/>
              </div>
              <div>
                <label style={labelSt}>Service</label>
                <select value={form.serviceType} onChange={e=>setForm(f=>({...f,serviceType:e.target.value}))} style={eInSt}>
                  {['Massage','Facial','Body Wrap','Head Massage','Other'].map(s=><option key={s}>{s}</option>)}
                </select>
              </div>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'10px'}}>
              <div>
                <label style={labelSt}>Amount ₹ <span style={{color:'var(--danger)'}}>*</span></label>
                <input type="number" min="1" value={form.amount} onChange={e=>setForm(f=>({...f,amount:e.target.value}))} style={eInSt} placeholder="1200" required/>
              </div>
              <div>
                <label style={labelSt}>Duration</label>
                <select value={form.duration} onChange={e=>setForm(f=>({...f,duration:e.target.value}))} style={eInSt}>
                  {['30 min','45 min','60 min','90 min','120 min'].map(d=><option key={d}>{d}</option>)}
                </select>
              </div>
            </div>
            <div>
              <label style={labelSt}>Client Name <span style={{fontSize:'0.65rem',color:'var(--muted)'}}>(optional)</span></label>
              <input type="text" value={form.clientName} onChange={e=>setForm(f=>({...f,clientName:e.target.value}))} style={eInSt} placeholder="First name only"/>
            </div>
            <div>
              <label style={labelSt}>Notes <span style={{fontSize:'0.65rem',color:'var(--muted)'}}>(optional)</span></label>
              <input type="text" value={form.notes} onChange={e=>setForm(f=>({...f,notes:e.target.value}))} style={eInSt} placeholder="Any notes…"/>
            </div>
            <button type="submit" disabled={saving} style={{...goldBtn,padding:'14px',fontSize:'0.9rem',width:'100%',marginTop:'2px',justifyContent:'center',display:'flex',alignItems:'center',gap:'8px'}}>
              {saving?<span className="spin">✦</span>:'Save Entry ✓'}
            </button>
          </form>
        </div>
      )}

      <div style={{display:'flex',gap:'7px'}}>
        {[['week','This Week'],['month','This Month'],['all','All Time']].map(([k,l])=>(
          <button key={k} onClick={()=>setFilter(k)}
            style={{padding:'6px 14px',borderRadius:'20px',border:`1px solid ${filter===k?'rgba(212,175,55,0.4)':'var(--border)'}`,background:filter===k?'rgba(212,175,55,0.1)':'transparent',color:filter===k?'var(--gold)':'var(--muted)',fontSize:'0.75rem',fontWeight:filter===k?'700':'500',cursor:'pointer'}}>
            {l}
          </button>
        ))}
      </div>

      <div style={{display:'flex',flexDirection:'column',gap:'8px'}}>
        {loading
          ? <div style={{textAlign:'center',padding:'32px',color:'var(--muted)'}}><span className="spin" style={{color:'var(--gold)'}}>✦</span></div>
          : filtered.length===0
            ? <div style={{textAlign:'center',padding:'32px',background:'var(--surface)',border:'1px solid var(--border)',borderRadius:'16px'}}>
                <p style={{fontSize:'1.5rem',marginBottom:'8px'}}>💰</p>
                <p style={{color:'var(--muted)',fontSize:'0.85rem'}}>No entries{filter!=='all'?` for this ${filter}`:''}</p>
                <p style={{color:'var(--muted)',fontSize:'0.75rem',marginTop:'4px'}}>Tap "+ Add Entry" above to record</p>
              </div>
            : filtered.map(e=>(
                <div key={e.id} style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:'13px',padding:'12px 14px',display:'flex',alignItems:'center',gap:'10px'}}>
                  <div style={{width:'3px',height:'42px',background:sc(e.serviceType),borderRadius:'3px',flexShrink:0}}/>
                  <div style={{width:'34px',height:'34px',background:`${sc(e.serviceType)}18`,borderRadius:'9px',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'1.05rem',flexShrink:0}}>
                    {SVC_ICON[e.serviceType]||'💰'}
                  </div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'2px'}}>
                      <span style={{fontSize:'0.88rem',fontWeight:'700',color:'var(--text)'}}>{e.serviceType}</span>
                      <span style={{fontSize:'0.95rem',fontWeight:'700',color:'var(--gold)',flexShrink:0,marginLeft:'8px'}}>₹{fmt(e.amount)}</span>
                    </div>
                    <p style={{fontSize:'0.7rem',color:'var(--muted)',margin:0}}>
                      {e.date} · {e.duration}{e.clientName?` · ${e.clientName}`:''}
                    </p>
                    {e.notes&&<p style={{fontSize:'0.68rem',color:'var(--muted)',margin:'2px 0 0',fontStyle:'italic'}}>"{e.notes}"</p>}
                  </div>
                  <button onClick={()=>handleDelete(e)}
                    style={{background:'transparent',border:'none',color:'var(--muted)',cursor:'pointer',fontSize:'0.9rem',padding:'4px 6px',flexShrink:0,borderRadius:'6px'}}
                    onMouseEnter={el=>el.currentTarget.style.color='var(--danger)'}
                    onMouseLeave={el=>el.currentTarget.style.color='var(--muted)'}>✕</button>
                </div>
              ))
        }
      </div>
    </div>
  );
}


// ══════════════════════════════════════════════════════
//  ATTENDANCE TAB
// ══════════════════════════════════════════════════════
function AttendanceTab({ session }) {
  const [records, setRecords] = useState([]);
  const [loading, setLoading] = useState(true);
  const [tab,     setTab]     = useState('cal');
  const [selDay,  setSelDay]  = useState(null);

  const now         = new Date();
  const todayStr    = now.toISOString().split('T')[0];
  const yr          = now.getFullYear();
  const mo          = now.getMonth();
  const daysInMonth = new Date(yr, mo+1, 0).getDate();
  const monthStart  = `${yr}-${String(mo+1).padStart(2,'0')}-01`;
  const monthEnd    = `${yr}-${String(mo+1).padStart(2,'0')}-${String(daysInMonth).padStart(2,'0')}`;

  useEffect(()=>{
    setLoading(true);
    db.collection('attendance')
      .where('therapistDocId','==',session.docId)
      .where('date','>=',monthStart)
      .where('date','<=',monthEnd)
      .get()
      .then(snap=>{ setRecords(snap.docs.map(d=>({id:d.id,...d.data()}))); setLoading(false); })
      .catch(()=>setLoading(false));
  },[]);

  const byDate = {};
  records.forEach(r=>{ byDate[r.date]=r; });
  const todayRec = byDate[todayStr]||null;

  const getStatus = (dayNum)=>{
    const ds   = `${yr}-${String(mo+1).padStart(2,'0')}-${String(dayNum).padStart(2,'0')}`;
    const date = new Date(yr,mo,dayNum);
    if(ds>todayStr) return 'future';
    if(date.getDay()===0) return 'weekend';
    const r = byDate[ds];
    if(!r) return 'absent';
    return r.status||'present';
  };

  const S_COLOR = { present:'#27ae60','half-day':'#f39c12',absent:'#e74c3c',weekend:'#1e1e1e',future:'transparent' };
  const S_TEXT  = { present:'#9be09b','half-day':'#f5c86f',absent:'#f1a8a8',weekend:'#444',future:'#333' };
  const S_LABEL = { present:'Present','half-day':'Half day',absent:'Absent',weekend:'Weekend',future:'' };

  const presentCount  = records.filter(r=>r.status==='present').length;
  const halfCount     = records.filter(r=>r.status==='half-day').length;
  const absentCount   = Array.from({length:daysInMonth},(_,i)=>i+1).filter(d=>getStatus(d)==='absent').length;
  const totalHours    = records.reduce((s,r)=>s+(r.hoursOnDuty||0),0);
  const totalSessions = records.reduce((s,r)=>s+(r.sessions||0),0);
  const totalEarnings = records.reduce((s,r)=>s+(r.earnings||0),0);

  const fmtTime = ts=>{ if(!ts?.toDate) return '—'; return ts.toDate().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',hour12:true}); };
  const fmtHrs  = h=>{ if(!h) return '—'; const hr=Math.floor(h),min=Math.round((h-hr)*60); return min>0?`${hr}h ${min}m`:`${hr}h`; };

  const firstDow = new Date(yr,mo,1).getDay();
  const tabBtn = (id,lbl)=>(
    <button onClick={()=>setTab(id)} style={{flex:1,background:'transparent',border:'none',
      borderBottom:`2px solid ${tab===id?'var(--gold)':'transparent'}`,
      padding:'9px 4px',fontSize:'0.68rem',fontWeight:'700',letterSpacing:'0.5px',textTransform:'uppercase',
      cursor:'pointer',fontFamily:'inherit',color:tab===id?'var(--gold)':'var(--muted)',transition:'color .15s',marginBottom:'-1px'}}>
      {lbl}
    </button>
  );

  const selDs  = selDay?`${yr}-${String(mo+1).padStart(2,'0')}-${String(selDay).padStart(2,'0')}`:null;
  const selRec = selDs?byDate[selDs]||null:null;

  if(loading) return <div style={{textAlign:'center',padding:'60px',color:'var(--muted)'}}><span className="spin" style={{color:'var(--gold)',fontSize:'1.5rem'}}>✦</span></div>;

  return (
    <div style={{display:'flex',flexDirection:'column',gap:'14px'}}>
      <div style={{background:todayRec?'rgba(39,174,96,0.06)':'var(--surface)',
        border:`1px solid ${todayRec?'rgba(39,174,96,0.3)':'var(--border)'}`,borderRadius:'16px',padding:'16px'}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'10px'}}>
          <span style={{fontSize:'0.68rem',color:'var(--muted)',textTransform:'uppercase',letterSpacing:'1px'}}>
            Today — {now.toLocaleDateString('en-IN',{weekday:'short',day:'numeric',month:'short'})}
          </span>
          {todayRec&&<span style={{fontSize:'0.62rem',fontWeight:'700',padding:'3px 10px',borderRadius:'20px',
            background:S_COLOR[todayRec.status]+'22',color:S_COLOR[todayRec.status],
            border:`1px solid ${S_COLOR[todayRec.status]}44`}}>{S_LABEL[todayRec.status]}</span>}
        </div>
        {todayRec?(
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:'8px'}}>
            {[['Check in',fmtTime(todayRec.checkIn)],['On duty',fmtHrs(todayRec.hoursOnDuty)],['Sessions',String(todayRec.sessions||0)]].map(([l,v])=>(
              <div key={l} style={{background:'var(--elevated)',borderRadius:'10px',padding:'9px 6px',textAlign:'center'}}>
                <p style={{fontSize:'1rem',fontWeight:'700',color:'var(--text)',margin:0}}>{v}</p>
                <p style={{fontSize:'0.6rem',color:'var(--muted)',margin:'3px 0 0',textTransform:'uppercase',letterSpacing:'0.5px'}}>{l}</p>
              </div>
            ))}
          </div>
        ):(
          <p style={{fontSize:'0.82rem',color:'var(--muted)',textAlign:'center',padding:'6px 0'}}>
            Toggle duty <strong style={{color:'var(--gold)'}}>ON</strong> to start today's check-in
          </p>
        )}
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:'8px'}}>
        {[
          [`${presentCount}${halfCount>0?` +${halfCount}½`:''}`, 'Present','#27ae60'],
          [String(absentCount),'Absent','#e74c3c'],
          [`${totalHours.toFixed(0)}h`,'Hours','var(--text)'],
        ].map(([v,l,c])=>(
          <div key={l} style={{background:'var(--elevated)',border:'1px solid var(--border)',borderRadius:'12px',padding:'11px 8px',textAlign:'center'}}>
            <p style={{fontSize:'1.15rem',fontWeight:'700',color:c,marginBottom:'3px'}}>{v}</p>
            <p style={{fontSize:'0.6rem',color:'var(--muted)',textTransform:'uppercase',letterSpacing:'0.5px'}}>{l}</p>
          </div>
        ))}
      </div>
      <div style={{display:'flex',borderBottom:'1px solid var(--border)'}}>
        {tabBtn('cal','Calendar')}{tabBtn('log','Log')}{tabBtn('streak','Streak')}
      </div>
      {tab==='cal'&&(
        <div>
          <p style={{fontSize:'0.75rem',fontWeight:'700',color:'var(--gold)',textAlign:'center',marginBottom:'12px',letterSpacing:'1px'}}>
            {now.toLocaleDateString('en-IN',{month:'long',year:'numeric'})}
          </p>
          <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:'3px',marginBottom:'4px',textAlign:'center'}}>
            {['Su','Mo','Tu','We','Th','Fr','Sa'].map(d=><div key={d} style={{fontSize:'0.62rem',color:'var(--muted)',paddingBottom:'4px'}}>{d}</div>)}
          </div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:'3px'}}>
            {Array.from({length:firstDow},(_,i)=><div key={'e'+i}/>)}
            {Array.from({length:daysInMonth},(_,i)=>{
              const day=i+1, s=getStatus(day), isToday=day===now.getDate(), isSel=selDay===day;
              const ds2=`${yr}-${String(mo+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
              return(
                <div key={day} onClick={()=>{ if(s!=='future') setSelDay(isSel?null:day); }}
                  style={{aspectRatio:'1',borderRadius:'8px',background:S_COLOR[s],
                    border:isToday?`2px solid var(--gold)`:isSel?`2px solid rgba(255,255,255,0.7)`:'2px solid transparent',
                    cursor:s!=='future'?'pointer':'default',opacity:s==='future'?0.2:1,
                    display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:'2px'}}>
                  <span style={{fontSize:'0.7rem',fontWeight:'700',color:S_TEXT[s]}}>{day}</span>
                  {(s==='present'||s==='half-day')&&(byDate[ds2]?.sessions>0)&&(
                    <div style={{width:'4px',height:'4px',borderRadius:'50%',background:'rgba(255,255,255,0.6)'}}/>
                  )}
                </div>
              );
            })}
          </div>
          <div style={{display:'flex',gap:'10px',flexWrap:'wrap',marginTop:'12px',justifyContent:'center'}}>
            {[['#27ae60','Present'],['#f39c12','Half day'],['#e74c3c','Absent']].map(([c,l])=>(
              <div key={l} style={{display:'flex',alignItems:'center',gap:'4px'}}>
                <div style={{width:'10px',height:'10px',borderRadius:'3px',background:c}}/>
                <span style={{fontSize:'0.65rem',color:'var(--muted)'}}>{l}</span>
              </div>
            ))}
          </div>
          {selDay&&(
            <div style={{marginTop:'12px',background:'var(--elevated)',border:'1px solid var(--border)',borderRadius:'12px',padding:'12px 14px'}}>
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'10px'}}>
                <span style={{fontSize:'0.78rem',fontWeight:'700',color:'var(--text)'}}>
                  {new Date(yr,mo,selDay).toLocaleDateString('en-IN',{weekday:'short',day:'numeric',month:'short'})}
                </span>
                <span style={{fontSize:'0.62rem',fontWeight:'700',padding:'2px 9px',borderRadius:'20px',
                  background:S_COLOR[getStatus(selDay)]+'22',color:S_COLOR[getStatus(selDay)],
                  border:`1px solid ${S_COLOR[getStatus(selDay)]}44`}}>
                  {S_LABEL[getStatus(selDay)]}
                </span>
              </div>
              <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:'8px'}}>
                {[['Check in',selRec?fmtTime(selRec.checkIn):'—'],['Hours',selRec?fmtHrs(selRec.hoursOnDuty):'—'],['Sessions',selRec?String(selRec.sessions||0):'—']].map(([l,v])=>(
                  <div key={l} style={{background:'var(--surface)',borderRadius:'9px',padding:'9px 6px',textAlign:'center',border:'1px solid var(--border)'}}>
                    <p style={{fontSize:'0.9rem',fontWeight:'700',color:'var(--text)',margin:0}}>{v}</p>
                    <p style={{fontSize:'0.6rem',color:'var(--muted)',margin:'3px 0 0',textTransform:'uppercase',letterSpacing:'0.5px'}}>{l}</p>
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>
      )}
      {tab==='log'&&(
        <div style={{display:'flex',flexDirection:'column',gap:'7px'}}>
          {records.length===0?(
            <div style={{textAlign:'center',padding:'40px',background:'var(--surface)',border:'1px solid var(--border)',borderRadius:'14px'}}>
              <p style={{color:'var(--muted)',fontSize:'0.85rem'}}>No records this month</p>
              <p style={{color:'var(--muted)',fontSize:'0.75rem',marginTop:'4px'}}>Toggle duty ON to start tracking</p>
            </div>
          ):records.sort((a,b)=>b.date.localeCompare(a.date)).map(r=>{
            const c=S_COLOR[r.status]||'#888';
            return(
              <div key={r.id} style={{display:'flex',alignItems:'center',gap:'10px',background:'var(--surface)',border:'1px solid var(--border)',borderRadius:'12px',padding:'11px 14px'}}>
                <div style={{width:'8px',height:'8px',borderRadius:'50%',background:c,flexShrink:0}}/>
                <div style={{flex:1,minWidth:0}}>
                  <p style={{fontWeight:'700',fontSize:'0.83rem',color:'var(--text)',marginBottom:'2px'}}>
                    {new Date(r.date+'T00:00:00').toLocaleDateString('en-IN',{weekday:'short',day:'numeric',month:'short'})}
                  </p>
                  <p style={{fontSize:'0.68rem',color:'var(--muted)'}}>
                    {fmtTime(r.checkIn)} → {r.checkOut?fmtTime(r.checkOut):'ongoing'} · {r.sessions||0} sessions
                  </p>
                </div>
                <div style={{textAlign:'right',flexShrink:0}}>
                  <span style={{fontSize:'0.62rem',fontWeight:'700',padding:'2px 9px',borderRadius:'20px',background:c+'22',color:c,border:`1px solid ${c}44`}}>
                    {S_LABEL[r.status]||r.status}
                  </span>
                  {r.earnings>0&&<p style={{fontSize:'0.7rem',color:'var(--gold)',fontWeight:'700',marginTop:'3px'}}>₹{(r.earnings||0).toLocaleString('en-IN')}</p>}
                </div>
              </div>
            );
          })}
        </div>
      )}
      {tab==='streak'&&(
        <div style={{display:'flex',flexDirection:'column',gap:'14px'}}>
          {(()=>{
            let streak=0;
            for(let d=now.getDate();d>=1;d--){
              const ds=`${yr}-${String(mo+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
              if(new Date(yr,mo,d).getDay()===0) continue;
              const r=byDate[ds];
              if(r&&(r.status==='present'||r.status==='half-day')) streak++;
              else if(ds<todayStr) break;
            }
            return(
              <div style={{textAlign:'center',padding:'12px 0 4px'}}>
                <p style={{fontSize:'3rem',fontWeight:'700',color:'var(--gold)',lineHeight:'1'}}>{streak}</p>
                <p style={{fontSize:'0.78rem',color:'var(--muted)',marginTop:'4px'}}>day streak 🔥</p>
              </div>
            );
          })()}
          <div>
            <p style={{fontSize:'0.62rem',color:'var(--muted)',textTransform:'uppercase',letterSpacing:'1.5px',marginBottom:'8px'}}>This month</p>
            <div style={{display:'flex',gap:'4px',flexWrap:'wrap'}}>
              {Array.from({length:daysInMonth},(_,i)=>{
                const day=i+1, s=getStatus(day);
                return(
                  <div key={day} style={{width:'28px',height:'28px',borderRadius:'6px',background:S_COLOR[s],
                    opacity:s==='future'?0.2:1,display:'flex',alignItems:'center',justifyContent:'center'}}>
                    <span style={{fontSize:'0.55rem',fontWeight:'700',color:S_TEXT[s]}}>{day}</span>
                  </div>
                );
              })}
            </div>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'8px'}}>
            {[
              ['Sessions', totalSessions,'var(--text)'],
              ['Earnings',`₹${totalEarnings.toLocaleString('en-IN')}`,'var(--gold)'],
              ['Days present',`${presentCount+halfCount}/${daysInMonth}`,'#27ae60'],
              ['Total hours',`${totalHours.toFixed(0)}h`,'var(--text)'],
            ].map(([l,v,c])=>(
              <div key={l} style={{background:'var(--elevated)',border:'1px solid var(--border)',borderRadius:'12px',padding:'12px'}}>
                <p style={{fontSize:'0.65rem',color:'var(--muted)',textTransform:'uppercase',letterSpacing:'0.5px',marginBottom:'5px'}}>{l}</p>
                <p style={{fontSize:'1.15rem',fontWeight:'700',color:c,margin:0}}>{v}</p>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

// ── Shared ────────────────────────────────────────────
function SectionTitle({ children, action }) {
  return (
    <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'8px',marginTop:'4px'}}>
      <h3 style={{fontSize:'0.68rem',fontWeight:'700',color:'var(--muted)',letterSpacing:'2px',textTransform:'uppercase',margin:0}}>{children}</h3>
      {action}
    </div>
  );
}

function Center({ children, style={} }) {
  return <div style={{display:'flex',alignItems:'center',justifyContent:'center',...style}}>{children}</div>;
}

const labelSt = {
  display:'block',fontSize:'0.7rem',fontWeight:'600',color:'var(--muted)',
  textTransform:'uppercase',letterSpacing:'1px',marginBottom:'6px'
};
const inputSt = {
  width:'100%',background:'var(--elevated)',border:'1px solid var(--border)',borderRadius:'10px',
  padding:'12px 14px',fontSize:'0.9rem',color:'var(--text)',fontFamily:'inherit',
  outline:'none',boxSizing:'border-box',transition:'border-color .15s'
};
const goldBtn = {
  background:'rgba(212,175,55,0.12)',border:'1px solid rgba(212,175,55,0.35)',borderRadius:'12px',
  padding:'12px 20px',color:'var(--gold)',fontWeight:'700',fontSize:'0.85rem',
  cursor:'pointer',fontFamily:'inherit',display:'flex',alignItems:'center',gap:'6px'
};

// ── Boot ──────────────────────────────────────────────
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
