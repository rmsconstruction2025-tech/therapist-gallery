//  ADMIN DIRECT BOOKING FORM
// ══════════════════════════════════════════════════════
function AdminBookingForm({ therapistList, onClose }) {
  const [type,        setType]        = useState('now'); // 'now'|'later'
  const [clientName,  setClientName]  = useState('');
  const [clientPhone, setClientPhone] = useState('');
  const [serviceType, setServiceType] = useState(SPA_SERVICES[0]);
  const [duration,    setDuration]    = useState('60 min');
  const [therapistId, setTherapistId] = useState('');
  const [notes,       setNotes]       = useState('');
  const [schedDate,   setSchedDate]   = useState('');
  const [schedTime,   setSchedTime]   = useState('');
  const [locMethod,   setLocMethod]   = useState('text'); // 'text'|'link'|'gps'
  const [locText,     setLocText]     = useState('');
  const [locLink,     setLocLink]     = useState('');
  const [gpsCoords,   setGpsCoords]   = useState(null);
  const [gpsLoading,  setGpsLoading]  = useState(false);
  const [saving,      setSaving]      = useState(false);
  const [err,         setErr]         = useState('');
  const [done,        setDone]        = useState(false);

  const getGPS = () => {
    if (!navigator.geolocation) { setErr('GPS not available in this browser'); return; }
    setGpsLoading(true);
    navigator.geolocation.getCurrentPosition(
      p => { setGpsCoords({lat:p.coords.latitude,lng:p.coords.longitude}); setGpsLoading(false); },
      () => { setErr('Could not get location. Check browser permissions.'); setGpsLoading(false); },
      { enableHighAccuracy:true, timeout:10000 }
    );
  };

  const parseMapLink = (url) => {
    const patterns = [/@(-?\d+\.?\d*),(-?\d+\.?\d*)/, /q=(-?\d+\.?\d*),(-?\d+\.?\d*)/];
    for (const p of patterns) {
      const m = url.match(p);
      if (m) {
        const lat = parseFloat(m[1]), lng = parseFloat(m[2]);
        if (!isNaN(lat) && !isNaN(lng)) return {lat, lng};
      }
    }
    return null;
  };

  const handleSubmit = async (e) => {
    e.preventDefault();
    if (!clientName.trim()) { setErr('Client name is required'); return; }
    if (type === 'later' && (!schedDate || !schedTime)) { setErr('Date and time required for scheduled booking'); return; }
    setSaving(true); setErr('');
    try {
      let clientLocation = null;
      if (locMethod==='text'  && locText.trim())  clientLocation = { address: locText.trim() };
      if (locMethod==='link'  && locLink.trim())  clientLocation = parseMapLink(locLink.trim()) || { address: locLink.trim() };
      if (locMethod==='gps'   && gpsCoords)       clientLocation = gpsCoords;

      const t = therapistList.find(x=>x.id===therapistId);
      const payload = {
        clientName:      clientName.trim(),
        clientPhone:     clientPhone.trim(), // stored in Firestore — NEVER displayed to therapist
        serviceType,
        duration,
        notes:           notes.trim(),
        status:          type==='now' ? 'confirmed' : 'scheduled',
        bookedByAdmin:   true,
        confirmedAt:     FieldValue.serverTimestamp(),
        createdAt:       FieldValue.serverTimestamp(),
      };
      if (clientLocation) payload.clientLocation = clientLocation;
      if (therapistId) {
        payload.therapistDocId    = therapistId;
        payload.therapistId       = t?.therapistId || therapistId;
        payload.therapistName     = t?.name || t?.therapistId || therapistId;
        payload.therapistPhone    = t?.phone || null;
        payload.therapistAccepted = true;
      }
      if (type==='later') {
        payload.bookingType   = 'later';
        payload.scheduledDate = schedDate;
        payload.scheduledTime = schedTime;
      } else {
        payload.bookingType   = 'now';
      }
      await db.collection('bookings').add(payload);
      setDone(true);
      setTimeout(onClose, 1500);
    } catch(e) { setErr(e.message); }
    setSaving(false);
  };

  const INP = {width:'100%',background:'var(--elevated)',border:'1px solid var(--border)',borderRadius:'9px',padding:'9px 14px',color:'var(--text)',fontSize:'0.88rem',outline:'none',fontFamily:'inherit'};
  const LBL = {display:'block',fontSize:'0.7rem',color:'var(--muted)',letterSpacing:'1px',textTransform:'uppercase',fontWeight:'600',marginBottom:'5px'};

  if (done) return (
    <div className="fade-in" style={{background:'rgba(46,204,113,0.07)',border:'1px solid rgba(46,204,113,0.35)',borderRadius:'12px',padding:'20px',textAlign:'center'}}>
      <div style={{fontSize:'1.6rem',marginBottom:'6px'}}>✅</div>
      <p style={{color:'#2ecc71',fontWeight:'700',fontSize:'0.9rem'}}>Booking created successfully!</p>
    </div>
  );

  return (
    <div className="fade-in" style={{background:'var(--card)',border:'1px solid var(--border-gold)',borderRadius:'14px',padding:'20px'}}>
      <p style={{fontWeight:'700',fontSize:'0.9rem',color:'var(--gold)',marginBottom:'14px',letterSpacing:'1px',textTransform:'uppercase'}}>New Booking</p>

      <form onSubmit={handleSubmit} style={{display:'flex',flexDirection:'column',gap:'14px'}}>
        {/* Book type toggle */}
        <div style={{display:'flex',gap:'8px'}}>
          {[['now','⚡ Book Now','Immediate — confirmed right away'],['later','📅 Book Later','Scheduled date & time']].map(([v,l,sub])=>(
            <button key={v} type="button" onClick={()=>setType(v)}
              style={{flex:1,padding:'10px 8px',borderRadius:'10px',cursor:'pointer',textAlign:'left',
                border:`1px solid ${type===v?'var(--gold)':'var(--border)'}`,
                background:type===v?'rgba(212,175,55,0.09)':'transparent',
                color:type===v?'var(--gold)':'var(--muted)',
                fontSize:'0.82rem',fontWeight:type===v?'700':'500',fontFamily:'inherit',transition:'all .15s'}}>
              <p style={{margin:0}}>{l}</p>
              <p style={{margin:'2px 0 0',fontSize:'0.65rem',opacity:.75,fontWeight:'400'}}>{sub}</p>
            </button>
          ))}
        </div>

        {/* Client */}
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'10px'}} className="form-grid">
          <div>
            <label style={LBL}>Client Name *</label>
            <input type="text" value={clientName} onChange={e=>setClientName(e.target.value)} style={INP} placeholder="Full name" required/>
          </div>
          <div>
            <label style={LBL}>Phone <span style={{fontWeight:400,fontSize:'0.7rem',letterSpacing:0,color:'#555',textTransform:'none'}}>(admin only)</span></label>
            <input type="tel" value={clientPhone} onChange={e=>setClientPhone(e.target.value)} style={INP} placeholder="9876543210"/>
          </div>
        </div>

        {/* Service + Duration */}
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'10px'}} className="form-grid">
          <div>
            <label style={LBL}>Service</label>
            <select value={serviceType} onChange={e=>setServiceType(e.target.value)} style={INP}>
              {SPA_SERVICES.map(s=><option key={s}>{s}</option>)}
            </select>
          </div>
          <div>
            <label style={LBL}>Duration</label>
            <select value={duration} onChange={e=>setDuration(e.target.value)} style={INP}>
              {['30 min','45 min','60 min','90 min','120 min'].map(d=><option key={d}>{d}</option>)}
            </select>
          </div>
        </div>

        {/* Therapist */}
        <div>
          <label style={LBL}>Assign Therapist <span style={{fontWeight:400,fontSize:'0.7rem',letterSpacing:0,color:'#555',textTransform:'none'}}>(optional)</span></label>
          <select value={therapistId} onChange={e=>setTherapistId(e.target.value)} style={INP}>
            <option value="">— Not assigned yet —</option>
            {therapistList.map(t=>(
              <option key={t.id} value={t.id}>{t.name||t.therapistId}{t.available?' 🟢':''}</option>
            ))}
          </select>
        </div>

        {/* Date + Time for Book Later */}
        {type==='later'&&(
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'10px'}} className="form-grid">
            <div>
              <label style={LBL}>Date *</label>
              <input type="date" value={schedDate} onChange={e=>setSchedDate(e.target.value)}
                style={{...INP,colorScheme:'dark'}} min={new Date().toISOString().split('T')[0]} required/>
            </div>
            <div>
              <label style={LBL}>Time *</label>
              <input type="time" value={schedTime} onChange={e=>setSchedTime(e.target.value)}
                style={{...INP,colorScheme:'dark'}} required/>
            </div>
          </div>
        )}

        {/* Location */}
        <div>
          <label style={LBL}>Client Location</label>
          <div style={{display:'flex',gap:'6px',marginBottom:'8px'}}>
            {[['text','📝 Address'],['link','🗺️ Maps Link'],['gps','📍 GPS']].map(([v,l])=>(
              <button key={v} type="button" onClick={()=>setLocMethod(v)}
                style={{flex:1,padding:'7px 4px',borderRadius:'8px',cursor:'pointer',
                  border:`1px solid ${locMethod===v?'rgba(212,175,55,0.5)':'var(--border)'}`,
                  background:locMethod===v?'rgba(212,175,55,0.08)':'transparent',
                  color:locMethod===v?'var(--gold)':'var(--muted)',
                  fontSize:'0.72rem',fontWeight:locMethod===v?'700':'500',fontFamily:'inherit',transition:'all .15s'}}>
                {l}
              </button>
            ))}
          </div>
          {locMethod==='text'&&(
            <textarea value={locText} onChange={e=>setLocText(e.target.value)} rows={2}
              placeholder="e.g. 123 Main St, Apartment 4B, Chennai — or any landmark"
              style={{...INP,resize:'none',lineHeight:'1.5'}}/>
          )}
          {locMethod==='link'&&(
            <div style={{display:'flex',flexDirection:'column',gap:'6px'}}>
              <input type="text" value={locLink} onChange={e=>setLocLink(e.target.value)}
                placeholder="Paste Google Maps link (lat/lng auto-extracted)"
                style={INP}/>
              {locLink&&(()=>{
                const p=parseMapLink(locLink);
                return p
                  ? <p style={{fontSize:'0.72rem',color:'#2ecc71'}}>✓ Coords detected: {p.lat.toFixed(5)}, {p.lng.toFixed(5)}</p>
                  : <p style={{fontSize:'0.72rem',color:'var(--muted)'}}>No coords found — address will be saved as text</p>;
              })()}
            </div>
          )}
          {locMethod==='gps'&&(
            <div style={{display:'flex',alignItems:'center',gap:'10px',flexWrap:'wrap'}}>
              <button type="button" onClick={getGPS} disabled={gpsLoading}
                style={{padding:'9px 16px',borderRadius:'9px',border:'1px solid rgba(212,175,55,0.35)',
                  background:'rgba(212,175,55,0.08)',color:'var(--gold)',cursor:'pointer',
                  fontSize:'0.82rem',fontWeight:'700',fontFamily:'inherit',
                  opacity:gpsLoading?.6:1}}>
                {gpsLoading?'Getting location…':'📍 Get Current Location'}
              </button>
              {gpsCoords&&(
                <a href={`https://maps.google.com?q=${gpsCoords.lat},${gpsCoords.lng}`} target="_blank" rel="noopener noreferrer"
                  style={{fontSize:'0.75rem',color:'#2ecc71',fontFamily:'monospace',textDecoration:'none'}}>
                  ✓ {gpsCoords.lat.toFixed(5)}, {gpsCoords.lng.toFixed(5)} ↗
                </a>
              )}
            </div>
          )}
        </div>

        {/* Notes */}
        <div>
          <label style={LBL}>Notes <span style={{fontWeight:400,fontSize:'0.7rem',letterSpacing:0,color:'#555',textTransform:'none'}}>(optional)</span></label>
          <input type="text" value={notes} onChange={e=>setNotes(e.target.value)} style={INP} placeholder="Any special instructions…"/>
        </div>

        {err&&<div style={{background:'var(--danger-bg)',border:'1px solid rgba(231,76,60,.3)',borderRadius:'8px',padding:'9px 14px',color:'var(--danger)',fontSize:'0.82rem'}}>{err}</div>}

        <div style={{display:'flex',gap:'8px'}}>
          <button type="button" onClick={onClose} style={{flex:1,padding:'11px',borderRadius:'9px',border:'1px solid var(--border)',background:'transparent',color:'var(--muted)',fontSize:'0.85rem',cursor:'pointer',fontFamily:'inherit'}}>Cancel</button>
          <button type="submit" disabled={saving} className="btn btn-gold" style={{flex:2,padding:'11px',fontSize:'0.88rem',borderRadius:'9px'}}>
            {saving?<span className="spin">✦</span>:type==='now'?'⚡ Confirm Now':'📅 Schedule Booking'}
          </button>
        </div>
      </form>
    </div>
  );
}

// ── Attendance Admin ────────────────────────────────────
function AttendanceAdmin() {
  const [therapists,  setTherapists]  = useState([]);
  const [records,     setRecords]     = useState([]);
  const [loading,     setLoading]     = useState(true);
  const [selTherapist,setSelTherapist]= useState(null);

  const now         = new Date();
  const yr          = now.getFullYear();
  const mo          = now.getMonth();
  const daysInMonth = new Date(yr, mo+1, 0).getDate();
  const todayStr    = now.toISOString().split('T')[0];
  const monthStart  = `${yr}-${String(mo+1).padStart(2,'0')}-01`;
  const monthEnd    = `${yr}-${String(mo+1).padStart(2,'0')}-${String(daysInMonth).padStart(2,'0')}`;

  useEffect(()=>{
    Promise.all([
      db.collection('therapists').get(),
      db.collection('attendance').get()
    ]).then(([tSnap, aSnap])=>{
      setTherapists(tSnap.docs.map(d=>({id:d.id,...d.data()})));
      // Filter client-side — avoids composite index requirement
      setRecords(aSnap.docs.map(d=>({id:d.id,...d.data()})).filter(r=>r.date>=monthStart&&r.date<=monthEnd));
      setLoading(false);
    }).catch(()=>setLoading(false));
  },[]);

  const S_COLOR = { present:'#27ae60','half-day':'#f39c12',absent:'#e74c3c','no-data':'#222',weekend:'#1a1a1a',future:'transparent' };
  const S_LABEL = { present:'Present','half-day':'Half','no-data':'—',absent:'Absent',weekend:'',future:'' };

  const getTherapistRecords = (docId) => records.filter(r=>r.therapistDocId===docId);

  const getStatus = (docId, dayNum) => {
    const ds   = `${yr}-${String(mo+1).padStart(2,'0')}-${String(dayNum).padStart(2,'0')}`;
    const date = new Date(yr, mo, dayNum);
    if (ds > todayStr) return 'future';
    if (date.getDay() === 0) return 'weekend';
    const recs = getTherapistRecords(docId);
    const r = recs.find(x=>x.date===ds);
    if (r) return r.status||'present';
    const firstDate = recs.length>0 ? recs.reduce((m,x)=>x.date<m?x.date:m, recs[0].date) : null;
    if (firstDate && ds>=firstDate && ds<todayStr) return 'absent';
    return 'no-data';
  };

  const summaryFor = (docId) => {
    const recs = getTherapistRecords(docId);
    return {
      present:  recs.filter(r=>r.status==='present').length,
      half:     recs.filter(r=>r.status==='half-day').length,
      absent:   Array.from({length:daysInMonth},(_,i)=>i+1).filter(d=>getStatus(docId,d)==='absent').length,
      hours:    recs.reduce((s,r)=>s+(r.hoursOnDuty||0),0),
      sessions: recs.reduce((s,r)=>s+(r.sessions||0),0),
      today:    recs.find(r=>r.date===todayStr)||null,
    };
  };

  const fmtTime = ts=>{ if(!ts?.toDate) return '—'; return ts.toDate().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',hour12:true}); };
  const fmtHrs  = h=>{ if(!h) return '—'; const hr=Math.floor(h),min=Math.round((h-hr)*60); return min>0?`${hr}h ${min}m`:`${hr}h`; };

  if (loading) return <div style={{padding:'60px',textAlign:'center',color:'var(--muted)'}}>Loading…</div>;

  // ── Detail view ──────────────────────────────────────
  if (selTherapist) {
    const t = selTherapist;
    const recs = getTherapistRecords(t.id);
    const byDate = {};
    recs.forEach(r=>{ byDate[r.date]=r; });
    const firstDow = new Date(yr,mo,1).getDay();

    return (
      <div>
        <button onClick={()=>setSelTherapist(null)}
          style={{marginBottom:'20px',background:'transparent',border:'1px solid var(--border)',borderRadius:'8px',padding:'7px 14px',color:'var(--muted)',cursor:'pointer',fontSize:'0.82rem',display:'flex',alignItems:'center',gap:'6px'}}>
          ← Back
        </button>
        <div style={{display:'flex',alignItems:'center',gap:'14px',marginBottom:'24px'}}>
          {t.imageUrl
            ?<img src={t.imageUrl} style={{width:'52px',height:'52px',borderRadius:'50%',objectFit:'cover'}}/>
            :<div style={{width:'52px',height:'52px',borderRadius:'50%',background:'rgba(212,175,55,0.1)',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:'700',color:'var(--gold)',fontSize:'1.2rem'}}>{(t.name||'?')[0]}</div>
          }
          <div>
            <p style={{fontWeight:'700',fontSize:'1.1rem',color:'var(--text)'}}>{t.name}</p>
            <p style={{fontSize:'0.75rem',color:'var(--muted)'}}>{now.toLocaleDateString('en-IN',{month:'long',year:'numeric'})}</p>
          </div>
        </div>
        {/* Month stats */}
        <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:'10px',marginBottom:'24px'}}>
          {[
            [summaryFor(t.id).present + (summaryFor(t.id).half>0?` +${summaryFor(t.id).half}½`:''),'Present','#27ae60'],
            [String(summaryFor(t.id).absent),'Absent','#e74c3c'],
            [`${summaryFor(t.id).hours.toFixed(0)}h`,'Hours','var(--text)'],
            [String(summaryFor(t.id).sessions),'Sessions','var(--gold)'],
          ].map(([v,l,c])=>(
            <div key={l} style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:'12px',padding:'14px 10px',textAlign:'center'}}>
              <p style={{fontSize:'1.3rem',fontWeight:'700',color:c,margin:0}}>{v}</p>
              <p style={{fontSize:'0.65rem',color:'var(--muted)',marginTop:'4px',textTransform:'uppercase',letterSpacing:'0.5px'}}>{l}</p>
            </div>
          ))}
        </div>
        {/* Calendar */}
        <div style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:'16px',padding:'20px',marginBottom:'20px'}}>
          <p style={{textAlign:'center',fontWeight:'700',color:'var(--gold)',marginBottom:'14px',letterSpacing:'1px'}}>
            {now.toLocaleDateString('en-IN',{month:'long',year:'numeric'})}
          </p>
          <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:'3px',marginBottom:'6px',textAlign:'center'}}>
            {['Su','Mo','Tu','We','Th','Fr','Sa'].map(d=><div key={d} style={{fontSize:'0.65rem',color:'var(--muted)',paddingBottom:'4px'}}>{d}</div>)}
          </div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:'3px'}}>
            {Array.from({length:firstDow},(_,i)=><div key={'e'+i}/>)}
            {Array.from({length:daysInMonth},(_,i)=>{
              const day=i+1, s=getStatus(t.id,day), isToday=day===now.getDate();
              return(
                <div key={day} style={{aspectRatio:'1',borderRadius:'6px',background:S_COLOR[s],
                  border:isToday?`2px solid var(--gold)`:'2px solid transparent',
                  opacity:(s==='future'||s==='no-data')?0.25:1,
                  display:'flex',alignItems:'center',justifyContent:'center'}}>
                  <span style={{fontSize:'0.65rem',fontWeight:'700',color:s==='present'?'#9be09b':s==='half-day'?'#f5c86f':s==='absent'?'#f1a8a8':'#444'}}>{day}</span>
                </div>
              );
            })}
          </div>
          <div style={{display:'flex',gap:'12px',flexWrap:'wrap',marginTop:'14px',justifyContent:'center'}}>
            {[['#27ae60','Present'],['#f39c12','Half day'],['#e74c3c','Absent']].map(([c,l])=>(
              <div key={l} style={{display:'flex',alignItems:'center',gap:'4px'}}>
                <div style={{width:'10px',height:'10px',borderRadius:'3px',background:c}}/>
                <span style={{fontSize:'0.65rem',color:'var(--muted)'}}>{l}</span>
              </div>
            ))}
          </div>
        </div>
        {/* Log */}
        <div style={{display:'flex',flexDirection:'column',gap:'7px'}}>
          {recs.length===0
            ?<div style={{textAlign:'center',padding:'32px',background:'var(--surface)',border:'1px solid var(--border)',borderRadius:'14px',color:'var(--muted)',fontSize:'0.85rem'}}>No records this month</div>
            :recs.sort((a,b)=>b.date.localeCompare(a.date)).map(r=>{
              const c=S_COLOR[r.status]||'#888';
              return(
                <div key={r.id} style={{display:'flex',alignItems:'center',gap:'12px',background:'var(--surface)',border:'1px solid var(--border)',borderRadius:'12px',padding:'12px 16px'}}>
                  <div style={{width:'8px',height:'8px',borderRadius:'50%',background:c,flexShrink:0}}/>
                  <div style={{flex:1}}>
                    <p style={{fontWeight:'700',fontSize:'0.85rem',color:'var(--text)',marginBottom:'2px'}}>
                      {new Date(r.date+'T00:00:00').toLocaleDateString('en-IN',{weekday:'short',day:'numeric',month:'short'})}
                    </p>
                    <p style={{fontSize:'0.72rem',color:'var(--muted)'}}>
                      {fmtTime(r.checkIn)} → {r.checkOut?fmtTime(r.checkOut):'ongoing'} · {fmtHrs(r.hoursOnDuty)} · {r.sessions||0} sessions
                    </p>
                  </div>
                  <div style={{textAlign:'right',flexShrink:0}}>
                    <span style={{fontSize:'0.65rem',fontWeight:'700',padding:'3px 10px',borderRadius:'20px',background:c+'22',color:c,border:`1px solid ${c}44`}}>
                      {S_LABEL[r.status]||r.status}
                    </span>
                    {r.earnings>0&&<p style={{fontSize:'0.75rem',color:'var(--gold)',fontWeight:'700',marginTop:'3px'}}>₹{(r.earnings||0).toLocaleString('en-IN')}</p>}
                  </div>
                </div>
              );
            })
          }
        </div>
      </div>
    );
  }

  // ── Summary list ──────────────────────────────────────
  return (
    <div>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'20px'}}>
        <div>
          <h2 style={{fontWeight:'700',fontSize:'1rem',color:'var(--text)',margin:0}}>Attendance</h2>
          <p style={{fontSize:'0.75rem',color:'var(--muted)',marginTop:'2px'}}>{now.toLocaleDateString('en-IN',{month:'long',year:'numeric'})}</p>
        </div>
      </div>
      {therapists.length===0
        ?<div style={{textAlign:'center',padding:'48px',color:'var(--muted)',fontSize:'0.9rem'}}>No therapists found</div>
        :<div style={{display:'flex',flexDirection:'column',gap:'10px'}}>
          {therapists.map(t=>{
            const s = summaryFor(t.id);
            const todayRec = s.today;
            const isOnline = t.available;
            return (
              <div key={t.id} onClick={()=>setSelTherapist(t)}
                style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:'14px',padding:'16px 18px',cursor:'pointer',transition:'border-color .15s'}}
                onMouseEnter={el=>el.currentTarget.style.borderColor='rgba(212,175,55,0.4)'}
                onMouseLeave={el=>el.currentTarget.style.borderColor='var(--border)'}>
                <div style={{display:'flex',alignItems:'center',gap:'14px',marginBottom:'12px'}}>
                  <div style={{position:'relative',flexShrink:0}}>
                    {t.imageUrl
                      ?<img src={t.imageUrl} style={{width:'44px',height:'44px',borderRadius:'50%',objectFit:'cover'}}/>
                      :<div style={{width:'44px',height:'44px',borderRadius:'50%',background:'rgba(212,175,55,0.1)',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:'700',color:'var(--gold)'}}>{(t.name||'?')[0]}</div>
                    }
                    <div style={{position:'absolute',bottom:0,right:0,width:'12px',height:'12px',borderRadius:'50%',background:isOnline?'#27ae60':'#666',border:'2px solid var(--surface)'}}/>
                  </div>
                  <div style={{flex:1,minWidth:0}}>
                    <p style={{fontWeight:'700',fontSize:'0.95rem',color:'var(--text)',marginBottom:'2px'}}>{t.name}</p>
                    <p style={{fontSize:'0.72rem',color:'var(--muted)'}}>
                      {todayRec
                        ?<span style={{color:todayRec.status==='present'?'#27ae60':todayRec.status==='half-day'?'#f39c12':'#e74c3c',fontWeight:'600'}}>Today: {S_LABEL[todayRec.status]||todayRec.status} · {fmtTime(todayRec.checkIn)} → {todayRec.checkOut?fmtTime(todayRec.checkOut):'ongoing'}</span>
                        :<span>Not checked in today</span>
                      }
                    </p>
                  </div>
                  <span style={{fontSize:'0.7rem',color:'var(--muted)',flexShrink:0}}>Details →</span>
                </div>
                {/* Mini month strip */}
                <div style={{display:'flex',gap:'3px',flexWrap:'wrap'}}>
                  {Array.from({length:daysInMonth},(_,i)=>{
                    const day=i+1, st=getStatus(t.id,day);
                    return(
                      <div key={day} title={`${day}: ${S_LABEL[st]||st}`} style={{width:'20px',height:'20px',borderRadius:'4px',
                        background:S_COLOR[st],opacity:(st==='future'||st==='no-data')?0.2:1,
                        border:day===now.getDate()?'1.5px solid var(--gold)':'1.5px solid transparent',
                        display:'flex',alignItems:'center',justifyContent:'center'}}>
                        <span style={{fontSize:'0.5rem',color:st==='present'?'#9be09b':st==='half-day'?'#f5c86f':st==='absent'?'#f1a8a8':'#333'}}>{day}</span>
                      </div>
                    );
                  })}
                </div>
                {/* Summary row */}
                <div style={{display:'flex',gap:'16px',marginTop:'10px',paddingTop:'10px',borderTop:'1px solid var(--border)'}}>
                  {[
                    [s.present+(s.half>0?`+${s.half}½`:''),'Present','#27ae60'],
                    [String(s.absent),'Absent','#e74c3c'],
                    [`${s.hours.toFixed(0)}h`,'Hours','var(--text)'],
                    [String(s.sessions),'Sessions','var(--gold)'],
                  ].map(([v,l,c])=>(
                    <div key={l} style={{textAlign:'center'}}>
                      <p style={{fontSize:'0.9rem',fontWeight:'700',color:c,margin:0}}>{v}</p>
                      <p style={{fontSize:'0.6rem',color:'var(--muted)',textTransform:'uppercase',letterSpacing:'0.5px',margin:'2px 0 0'}}>{l}</p>
                    </div>
                  ))}
                </div>
              </div>
            );
          })}
        </div>
      }
    </div>
  );
}

//  THERAPIST ACCOUNTS — create / manage therapist logins
// ══════════════════════════════════════════════════════
function TherapistAccounts() {
  const [accounts, setAccounts]   = useState([]);
  const [loading,  setLoading]    = useState(true);
  const [form,     setForm]       = useState({ name:'', pin:'' });
  const [saving,   setSaving]     = useState(false);
  const [msg,      setMsg]        = useState('');
  const [deleting, setDeleting]   = useState(null);

  const load = async () => {
    setLoading(true);
    try {
      const snap = await db.collection('therapists')
        .where('pin', '>=', '')
        .get();
      setAccounts(snap.docs.map(d => ({ id: d.id, ...d.data() })));
    } catch(e) { console.error(e); }
    setLoading(false);
  };

  useEffect(() => { load(); }, []);

  const handleCreate = async (e) => {
    e.preventDefault();
    if (!form.name.trim() || !form.pin.trim()) { setMsg('Name and PIN are required.'); return; }
    if (form.pin.length < 4) { setMsg('PIN must be at least 4 characters.'); return; }
    setSaving(true); setMsg('');
    try {
      const therapistId = `TH_${Date.now().toString(36).toUpperCase()}_${Math.random().toString(36).slice(2,6).toUpperCase()}`;
      await db.collection('therapists').add({
        therapistId,
        name:      form.name.trim(),
        pin:       form.pin.trim(),
        available: false,
        imageUrl:  '',
        createdAt: FieldValue.serverTimestamp()
      });
      setMsg(`✓ Account created! ID: ${therapistId}`);
      setForm({ name:'', pin:'' });
      load();
    } catch(e) { setMsg(`Error: ${e.message}`); }
    setSaving(false);
  };

  const handleDelete = async (acc) => {
    if (!window.confirm(`Delete therapist "${acc.name}" (${acc.therapistId})? This cannot be undone.`)) return;
    setDeleting(acc.id);
    try {
      await db.collection('therapists').doc(acc.id).delete();
      load();
    } catch(e) { alert(`Error: ${e.message}`); }
    setDeleting(null);
  };

  const handleResetPin = async (acc) => {
    const newPin = prompt(`New PIN for "${acc.name}":`);
    if (!newPin || newPin.length < 4) { alert('PIN must be at least 4 characters.'); return; }
    try {
      await db.collection('therapists').doc(acc.id).update({ pin: newPin.trim() });
      alert('PIN updated.');
    } catch(e) { alert(`Error: ${e.message}`); }
  };

  const [togglingDuty, setTogglingDuty] = useState(null);
  const handleToggleDuty = async (acc) => {
    const turningOn = !acc.onDuty;
    if(!turningOn && !window.confirm(`Mark ${acc.name} as Off Duty?`)) return;
    setTogglingDuty(acc.id);
    try {
      const updates = turningOn
        ? { onDuty: true, available: true, dutyStartedAt: FieldValue.serverTimestamp() }
        : { onDuty: false, available: false, location: null, locationUpdatedAt: FieldValue.serverTimestamp() };
      await db.collection('therapists').doc(acc.id).update(updates);
      setAccounts(prev => prev.map(a => a.id === acc.id ? { ...a, ...updates, onDuty: turningOn, available: turningOn } : a));
    } catch(e) { alert(`Error: ${e.message}`); }
    setTogglingDuty(null);
  };

  return (
    <div style={{display:'flex',flexDirection:'column',gap:'24px'}}>

      {/* Create account card */}
      <div className="card-gold" style={{padding:'24px'}}>
        <div style={{display:'flex',alignItems:'center',gap:'8px',marginBottom:'20px'}}>
          <span style={{fontSize:'1.1rem'}}>➕</span>
          <h2 style={{fontSize:'0.95rem',fontWeight:'700',color:'var(--text)'}}>Create Therapist Account</h2>
        </div>
        <form onSubmit={handleCreate} style={{display:'flex',flexDirection:'column',gap:'12px'}}>
          <div style={{display:'flex',gap:'12px',flexWrap:'wrap'}}>
            <div style={{flex:'1 1 160px'}}>
              <label className="form-label">Display Name <span style={{color:'var(--danger)'}}>*</span></label>
              <input value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))} placeholder="e.g. Priya" required className="form-input"/>
            </div>
            <div style={{flex:'1 1 120px'}}>
              <label className="form-label">PIN <span style={{color:'var(--muted)'}}>(min 4)</span></label>
              <input value={form.pin} onChange={e=>setForm(f=>({...f,pin:e.target.value}))} placeholder="e.g. 1234" required className="form-input"/>
            </div>
          </div>
          <button type="submit" disabled={saving} className="btn btn-gold btn-md" style={{width:'100%',minHeight:'46px'}}>
            {saving?<span className="spin">✦</span>:'+ Create Account'}
          </button>
        </form>
        {msg && (
          <div style={{marginTop:'14px',padding:'10px 14px',borderRadius:'8px',fontSize:'0.84rem',
            background:msg.startsWith('✓')?'var(--success-bg)':'var(--danger-bg)',
            border:`1px solid ${msg.startsWith('✓')?'rgba(46,204,113,.3)':'rgba(231,76,60,.3)'}`,
            color:msg.startsWith('✓')?'var(--success)':'var(--danger)'}}>
            {msg}
          </div>
        )}
      </div>

      {/* Accounts list */}
      <div className="card" style={{overflow:'hidden'}}>
        <div style={{padding:'16px 20px',display:'flex',alignItems:'center',justifyContent:'space-between',borderBottom:'1px solid var(--border)'}}>
          <div style={{display:'flex',alignItems:'center',gap:'10px'}}>
            <span style={{fontSize:'1rem'}}>👤</span>
            <span style={{fontWeight:'700',fontSize:'0.95rem'}}>Therapist Accounts</span>
            <span className="badge badge-gray">{accounts.length}</span>
          </div>
        </div>
        {loading ? (
          <div style={{padding:'48px',textAlign:'center'}}><span className="spin" style={{fontSize:'1.5rem',color:'var(--gold)'}}>✦</span></div>
        ) : accounts.length === 0 ? (
          <div style={{padding:'48px',textAlign:'center',color:'var(--muted)',fontSize:'0.9rem'}}>No accounts yet — create one above.</div>
        ) : (
          <>
            {accounts.map(acc=>(
              <div key={acc.id} className="item-card">
                {/* Avatar */}
                <div className="item-avatar">
                  {acc.imageUrl
                    ? <img src={acc.imageUrl} alt={acc.name} style={{width:'44px',height:'44px',borderRadius:'50%',objectFit:'cover',border:'2px solid var(--border-gold)',display:'block'}}/>
                    : <div style={{width:'44px',height:'44px',borderRadius:'50%',background:'var(--elevated)',border:'1px solid var(--border)',display:'flex',alignItems:'center',justifyContent:'center',color:'var(--muted)',fontSize:'1.1rem'}}>✦</div>
                  }
                </div>
                {/* Info */}
                <div className="item-info">
                  <div className="name">{acc.name||'—'}</div>
                  <div className="sub">{acc.therapistId}</div>
                  <div className="meta" style={{display:'flex',gap:'6px',flexWrap:'wrap'}}>
                    <span className={`badge ${acc.onDuty?'badge-green':'badge-gray'}`}>{acc.onDuty?'On Duty':'Off Duty'}</span>
                    <span className={`badge ${acc.available?'badge-green':'badge-red'}`}>{acc.available?'Available':'Unavailable'}</span>
                  </div>
                  {/* Mobile actions */}
                  <div className="item-actions-mobile">
                    <button onClick={()=>handleToggleDuty(acc)} disabled={togglingDuty===acc.id}
                      className="btn btn-sm"
                      style={{background:acc.onDuty?'rgba(231,76,60,0.12)':'rgba(46,204,113,0.12)',color:acc.onDuty?'var(--danger)':'var(--success)',border:`1px solid ${acc.onDuty?'rgba(231,76,60,0.35)':'rgba(46,204,113,0.35)'}`,minWidth:'80px'}}>
                      {togglingDuty===acc.id?<span className="spin">✦</span>:acc.onDuty?'End Duty':'Start Duty'}
                    </button>
                    <button onClick={()=>handleResetPin(acc)} className="btn btn-ghost btn-sm">Reset PIN</button>
                    <button onClick={()=>handleDelete(acc)} disabled={deleting===acc.id} className="btn btn-danger btn-sm">
                      {deleting===acc.id?<span className="spin">✦</span>:'Delete'}
                    </button>
                  </div>
                </div>
                {/* Desktop actions */}
                <div className="item-actions item-actions-desktop">
                  <button onClick={()=>handleToggleDuty(acc)} disabled={togglingDuty===acc.id}
                    className="btn btn-sm"
                    style={{background:acc.onDuty?'rgba(231,76,60,0.12)':'rgba(46,204,113,0.12)',color:acc.onDuty?'var(--danger)':'var(--success)',border:`1px solid ${acc.onDuty?'rgba(231,76,60,0.35)':'rgba(46,204,113,0.35)'}`,minWidth:'88px'}}>
                    {togglingDuty===acc.id?<span className="spin">✦</span>:acc.onDuty?'End Duty':'Start Duty'}
                  </button>
                  <button onClick={()=>handleResetPin(acc)} className="btn btn-ghost btn-sm">Reset PIN</button>
                  <button onClick={()=>handleDelete(acc)} disabled={deleting===acc.id} className="btn btn-danger btn-sm" style={{minWidth:'64px'}}>
                    {deleting===acc.id?<span className="spin">✦</span>:'Delete'}
                  </button>
                </div>
              </div>
            ))}
          </>
        )}
      </div>
    </div>
  );
}

//  BOOKINGS PANEL
// ══════════════════════════════════════════════════════
function BookingsPanel() {
  const [bookings,          setBookings]          = useState([]);
  const [loading,           setLoading]           = useState(true);
  const [filter,            setFilter]            = useState('all');
  const [therapistList,     setTherapistList]     = useState([]);
  const [selectedTherapist, setSelectedTherapist] = useState({});
  const [expandedRows,      setExpandedRows]      = useState({});
  const toggleRow = id => setExpandedRows(prev=>({...prev,[id]:!prev[id]}));
  const [search,       setSearch]       = useState('');
  const [deleting,     setDeleting]     = useState(null);
  const [confirming,   setConfirming]   = useState(null);
  const [showBookForm, setShowBookForm] = useState(false);
  const [trackingModal, setTrackingModal] = useState(null); // {url, clientName, clientPhone}
  const seenInitRef = useRef(false);

  useEffect(()=>{
    const unsub = db.collection('bookings').limit(200).onSnapshot(snap=>{
      if(seenInitRef.current){
        snap.docChanges().forEach(c=>{ if(c.type==='added') playAlert('new'); });
      }
      seenInitRef.current = true;
      setBookings(snap.docs.map(d=>({id:d.id,...d.data()}))
        .sort((a,b)=>(b.createdAt?.toMillis?.()??0)-(a.createdAt?.toMillis?.()??0)));
      setLoading(false);
    }, err=>{ console.error(err); setLoading(false); });
    return ()=>unsub();
  },[]);

  // Load available therapists for assignment dropdown
  useEffect(()=>{
    db.collection('therapists').get()
      .then(snap=>setTherapistList(snap.docs.map(d=>({id:d.id,...d.data()}))));
  },[]);

  const handleDelete = async (b)=>{
    if(!confirm(`Delete booking from ${b.clientName}?`)) return;
    setDeleting(b.id);
    try { await db.collection('bookings').doc(b.id).delete(); }
    catch(err){ alert(`Error: ${err.message}`); }
    setDeleting(null);
  };

  const updateStatus = async (b, newStatus)=>{
    setConfirming(b.id);
    // Use consistent camelCase timestamp field names (matching therapist portal)
    const tsField = {
      confirmed:  'confirmedAt',
      on_way:     'onWayAt',
      in_session: 'inSessionAt',
      completed:  'completedAt',
    }[newStatus] || `${newStatus}At`;
    try {
      await db.collection('bookings').doc(b.id).update({
        status: newStatus,
        [tsField]: FieldValue.serverTimestamp(),
      });
      // Clear stale sessionActive flag on therapist when session ends
      if(newStatus==='completed' && b.therapistDocId) {
        await db.collection('therapists').doc(b.therapistDocId).update({ sessionActive: false }).catch(()=>{});
      }
    } catch(err){ alert(`Error: ${err.message}`); }
    setConfirming(null);
  };

  const confirmBooking = async (b)=>{
    setConfirming(b.id);
    try {
      await db.collection('bookings').doc(b.id).update({
        status:'confirmed',
        confirmedAt: FieldValue.serverTimestamp(),
      });
      // Build WhatsApp messages
      const clientPhone = b.clientPhone ? '91'+b.clientPhone.replace(/\D/g,'').replace(/^91/,'') : null;
      const therapistPhone = b.therapistPhone ? '91'+b.therapistPhone.replace(/\D/g,'').replace(/^91/,'') : null;
      const therapistName = b.therapistName || b.therapistId || 'the therapist';
      const msgToClient = encodeURIComponent(
        `Hello ${b.clientName}, your appointment with ${therapistName} has been confirmed by Feel Free Spa! We will coordinate the details shortly. Thank you for choosing us!`
      );
      const msgToTherapist = encodeURIComponent(
        `Hello, your appointment with client ${b.clientName} has been confirmed. Please proceed as scheduled. Thank you!`
      );
      // Open WhatsApp for client
      if(clientPhone) window.open(`https://wa.me/${clientPhone}?text=${msgToClient}`, '_blank');
      // Slight delay then open for therapist
      if(therapistPhone) setTimeout(()=>window.open(`https://wa.me/${therapistPhone}?text=${msgToTherapist}`, '_blank'), 800);
    } catch(err){ alert(`Error: ${err.message}`); }
    setConfirming(null);
  };

  const handleShareTracking = async (b)=>{
    if(!b.therapistDocId){ alert('No therapist assigned to this booking.'); return; }
    setConfirming(b.id);
    try {
      const token = Math.random().toString(36).slice(2)+Date.now().toString(36);
      const expiresAt = firebase.firestore.Timestamp.fromDate(new Date(Date.now()+24*60*60*1000));
      await db.collection('trackingLinks').doc(token).set({
        token,
        bookingId:      b.id,
        therapistDocId: b.therapistDocId,
        therapistName:  b.therapistName||'',
        serviceName:    b.serviceName||'',
        active:         true,
        createdAt:      FieldValue.serverTimestamp(),
        expiresAt,
      });
      const url = `https://feelfreespa.in/track.html?t=${token}`;
      setTrackingModal({ url, clientName: b.clientName, clientPhone: b.clientPhone });
    } catch(err){ alert(`Error: ${err.message}`); }
    setConfirming(null);
  };

  const assignAndConfirm = async (b)=>{
    const tId = selectedTherapist[b.id];
    if(!tId){ alert('Please select a therapist first'); return; }
    setConfirming(b.id);
    try {
      const t = therapistList.find(x=>x.id===tId);
      await db.collection('bookings').doc(b.id).update({
        therapistDocId:  tId,
        therapistId:     t?.therapistId || tId,
        therapistName:   t?.name || t?.therapistId || tId,
        therapistPhone:  t?.phone || null,
        status:          'confirmed',
        needsTherapistAssignment: false,
        confirmedAt:     FieldValue.serverTimestamp(),
      });
      const clientPhone    = b.clientPhone ? '91'+b.clientPhone.replace(/\D/g,'').replace(/^91/,'') : null;
      const therapistPhone = t?.phone ? '91'+t.phone.replace(/\D/g,'').replace(/^91/,'') : null;
      const tName = t?.name || t?.therapistId || 'A therapist';
      const msgClient     = encodeURIComponent(`Hello ${b.clientName}, your appointment has been confirmed by Feel Free Spa! ${tName} will be with you shortly. Thank you!`);
      const msgTherapist  = encodeURIComponent(`Hello ${tName}, you have been assigned a new client: ${b.clientName}. Please proceed at your earliest. Thank you!`);
      if(clientPhone)    window.open(`https://wa.me/${clientPhone}?text=${msgClient}`, '_blank');
      if(therapistPhone) setTimeout(()=>window.open(`https://wa.me/${therapistPhone}?text=${msgTherapist}`, '_blank'), 800);
    } catch(err){ alert(`Error: ${err.message}`); }
    setConfirming(null);
  };

  const counts = {
    all:           bookings.length,
    pending:       bookings.filter(b=>b.status==='pending').length,
    admin_pending: bookings.filter(b=>b.status==='admin_pending').length,
    confirmed:     bookings.filter(b=>b.status==='confirmed').length,
    on_way:        bookings.filter(b=>b.status==='on_way').length,
    in_session:    bookings.filter(b=>b.status==='in_session').length,
    scheduled:     bookings.filter(b=>b.status==='scheduled').length,
    declined:      bookings.filter(b=>b.status==='declined').length,
    expired:       bookings.filter(b=>b.status==='expired').length,
  };
  const therapistAcceptedCount = bookings.filter(b=>b.status==='confirmed'&&b.therapistAccepted===true).length;

  const TABS = [
    {id:'all',           label:'All',          color:'var(--text)'},
    {id:'pending',       label:'Pending',       color:'var(--gold)'},
    {id:'admin_pending', label:'Needs Confirm', color:'#f39c12'},
    {id:'scheduled',     label:'Upcoming',      color:'#3498db'},
    {id:'confirmed',     label:'Confirmed',     color:'#2ecc71'},
    {id:'on_way',        label:'On the Way',    color:'#4a9eff'},
    {id:'in_session',    label:'In Session',    color:'#ffa500'},
    {id:'declined',      label:'Declined',      color:'#e74c3c'},
    {id:'expired',       label:'Expired',       color:'var(--muted)'},
  ];

  const STATUS_CFG = {
    pending:       {color:'var(--gold)',  bg:'rgba(212,175,55,0.12)',  border:'rgba(212,175,55,0.35)',  label:'Pending'},
    admin_pending: {color:'#f39c12',     bg:'rgba(243,156,18,0.12)',  border:'rgba(243,156,18,0.35)',  label:'Needs Confirm'},
    confirmed:     {color:'#2ecc71',     bg:'rgba(46,204,113,0.12)',  border:'rgba(46,204,113,0.35)',  label:'Confirmed'},
    accepted:      {color:'#2ecc71',     bg:'rgba(46,204,113,0.12)',  border:'rgba(46,204,113,0.35)',  label:'Accepted'},
    on_way:        {color:'#4a9eff',     bg:'rgba(74,158,255,0.12)',  border:'rgba(74,158,255,0.35)',  label:'On the Way 🚗'},
    in_session:    {color:'#ffa500',     bg:'rgba(255,165,0,0.12)',   border:'rgba(255,165,0,0.35)',   label:'In Session ✦'},
    completed:     {color:'#27ae60',     bg:'rgba(39,174,96,0.12)',   border:'rgba(39,174,96,0.35)',   label:'Completed'},
    scheduled:     {color:'#3498db',     bg:'rgba(52,152,219,0.12)',  border:'rgba(52,152,219,0.35)',  label:'Upcoming'},
    declined:      {color:'#e74c3c',     bg:'rgba(231,76,60,0.12)',   border:'rgba(231,76,60,0.35)',   label:'Declined'},
    expired:       {color:'var(--muted)',bg:'rgba(100,100,100,0.1)',  border:'rgba(100,100,100,0.25)', label:'Expired'},
  };
  const cfg = s => STATUS_CFG[s] || STATUS_CFG.expired;

  const timeAgo = b=>{
    const d=b.createdAt?.toDate?.(); if(!d) return '—';
    const s=(Date.now()-d)/1000;
    if(s<60) return 'Just now';
    if(s<3600) return `${Math.floor(s/60)}m ago`;
    if(s<86400) return `${Math.floor(s/3600)}h ago`;
    return d.toLocaleDateString('en-IN',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});
  };

  const filtered = bookings
    .filter(b=>filter==='all'||b.status===filter)
    .filter(b=>!search||
      (b.clientName||'').toLowerCase().includes(search.toLowerCase())||
      (b.therapistName||b.therapistId||'').toLowerCase().includes(search.toLowerCase()));

  return (
    <div style={{display:'flex',flexDirection:'column',gap:'16px'}}>

      {/* ── Share Tracking Modal ── */}
      {trackingModal&&(
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.65)',zIndex:9999,display:'flex',alignItems:'center',justifyContent:'center',padding:'20px'}}
          onClick={()=>setTrackingModal(null)}>
          <div style={{background:'#1a1a2e',border:'1px solid rgba(255,107,53,0.4)',borderRadius:'16px',padding:'20px',maxWidth:'380px',width:'100%'}}
            onClick={e=>e.stopPropagation()}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'14px'}}>
              <p style={{color:'#ff6b35',fontWeight:'700',fontSize:'0.9rem',margin:0}}>🚗 Live Tracking Link</p>
              <button onClick={()=>setTrackingModal(null)} style={{background:'none',border:'none',color:'rgba(255,255,255,0.5)',cursor:'pointer',fontSize:'1.1rem'}}>✕</button>
            </div>
            <p style={{fontSize:'0.75rem',color:'rgba(255,255,255,0.45)',marginBottom:'8px'}}>Send to: <span style={{color:'rgba(255,255,255,0.7)'}}>{trackingModal.clientName}</span></p>
            <div style={{background:'rgba(255,255,255,0.06)',border:'1px solid rgba(255,255,255,0.12)',borderRadius:'8px',padding:'10px 12px',display:'flex',alignItems:'center',gap:'8px',marginBottom:'12px'}}>
              <span style={{flex:1,fontSize:'0.72rem',color:'rgba(255,255,255,0.7)',wordBreak:'break-all',fontFamily:'monospace'}}>{trackingModal.url}</span>
              <button onClick={()=>navigator.clipboard.writeText(trackingModal.url).then(()=>alert('Copied!'))}
                style={{flex:'0 0 auto',background:'rgba(255,107,53,0.15)',border:'1px solid rgba(255,107,53,0.4)',borderRadius:'6px',color:'#ff6b35',padding:'5px 10px',cursor:'pointer',fontSize:'0.72rem',fontWeight:'600',whiteSpace:'nowrap',fontFamily:'inherit'}}>
                Copy
              </button>
            </div>
            {trackingModal.clientPhone&&(()=>{
              const waPhone='91'+trackingModal.clientPhone.replace(/\D/g,'').replace(/^91/,'');
              const msg=encodeURIComponent(`Hi ${trackingModal.clientName}! Your therapist is on the way 🚗\nTrack live: ${trackingModal.url}\n— Feel Free Spa`);
              return(
                <a href={`https://wa.me/${waPhone}?text=${msg}`} target="_blank" rel="noopener noreferrer"
                  style={{display:'flex',alignItems:'center',justifyContent:'center',gap:'7px',width:'100%',background:'#25D366',color:'#fff',borderRadius:'9px',padding:'11px',textDecoration:'none',fontWeight:'700',fontSize:'0.82rem'}}>
                  <span style={{fontSize:'1rem'}}>💬</span> Send via WhatsApp
                </a>
              );
            })()}
          </div>
        </div>
      )}

      {/* New Booking button + form */}
      <div>
        <button onClick={()=>setShowBookForm(v=>!v)} className={`btn btn-sm ${showBookForm?'btn-ghost':'btn-gold'}`}
          style={{gap:'6px',display:'inline-flex',alignItems:'center',marginBottom:showBookForm?'10px':'0'}}>
          {showBookForm?'✕ Cancel':'📅 New Booking'}
        </button>
        {showBookForm&&(
          <AdminBookingForm
            therapistList={therapistList}
            onClose={()=>setShowBookForm(false)}
          />
        )}
      </div>

      {/* Stats grid — click to filter */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(90px,1fr))',gap:'8px'}}>
        {TABS.filter(t=>t.id!=='all').map(t=>(
          <div key={t.id} onClick={()=>setFilter(f=>f===t.id?'all':t.id)}
            style={{background:'var(--surface)',border:`1px solid ${filter===t.id?t.color:'var(--border)'}`,borderRadius:'12px',padding:'10px 12px',cursor:'pointer',textAlign:'center',transition:'all .15s',boxShadow:filter===t.id?`0 0 0 1px ${t.color}20`:undefined,position:'relative'}}>
            <p style={{fontSize:'1.4rem',fontWeight:'700',color:t.color}}>{counts[t.id]||0}</p>
            <p style={{fontSize:'0.6rem',color:'var(--muted)',letterSpacing:'0.5px',textTransform:'uppercase',marginTop:'2px',lineHeight:'1.3'}}>{t.label}</p>
            {t.id==='admin_pending'&&(counts[t.id]||0)>0&&(
              <div style={{position:'absolute',top:'6px',right:'6px',width:'8px',height:'8px',borderRadius:'50%',background:'#f39c12',boxShadow:'0 0 6px #f39c12'}}/>
            )}
          </div>
        ))}
      </div>

      {/* Main card */}
      <div className="card" style={{overflow:'hidden'}}>

        {/* Header */}
        <div style={{padding:'14px 18px',borderBottom:'1px solid var(--border)',display:'flex',alignItems:'center',gap:'10px',flexWrap:'wrap'}}>
          <span>📋</span>
          <span style={{fontWeight:'700',fontSize:'0.95rem'}}>All Bookings</span>
          <span className="badge badge-gray">{bookings.length}</span>
          <div className="bk-header-badges" style={{display:'flex',gap:'6px',flexWrap:'wrap'}}>
          {counts.pending>0&&(
            <span style={{display:'inline-flex',alignItems:'center',padding:'2px 10px',borderRadius:'20px',fontSize:'0.7rem',fontWeight:'700',background:'rgba(212,175,55,0.15)',color:'var(--gold)',border:'1px solid rgba(212,175,55,0.4)'}}>
              🔔 {counts.pending} pending
            </span>
          )}
          {counts.admin_pending>0&&(
            <span style={{display:'inline-flex',alignItems:'center',padding:'2px 10px',borderRadius:'20px',fontSize:'0.7rem',fontWeight:'700',background:'rgba(243,156,18,0.15)',color:'#f39c12',border:'1px solid rgba(243,156,18,0.4)'}}>
              ⚡ {counts.admin_pending} need confirm
            </span>
          )}
          {therapistAcceptedCount>0&&(
            <span style={{display:'inline-flex',alignItems:'center',padding:'2px 10px',borderRadius:'20px',fontSize:'0.7rem',fontWeight:'700',background:'rgba(37,211,102,0.12)',color:'#25D366',border:'1px solid rgba(37,211,102,0.35)'}}>
              ✅ {therapistAcceptedCount} accepted
            </span>
          )}
          {counts.on_way>0&&(
            <span style={{display:'inline-flex',alignItems:'center',padding:'2px 10px',borderRadius:'20px',fontSize:'0.7rem',fontWeight:'700',background:'rgba(74,158,255,0.12)',color:'#4a9eff',border:'1px solid rgba(74,158,255,0.35)'}}>
              🚗 {counts.on_way} on way
            </span>
          )}
          {counts.in_session>0&&(
            <span style={{display:'inline-flex',alignItems:'center',padding:'2px 10px',borderRadius:'20px',fontSize:'0.7rem',fontWeight:'700',background:'rgba(255,165,0,0.12)',color:'#ffa500',border:'1px solid rgba(255,165,0,0.35)'}}>
              ✦ {counts.in_session} in session
            </span>
          )}
          </div>
        </div>

        {/* Search bar */}
        <div style={{padding:'10px 14px',borderBottom:'1px solid var(--border)'}}>
          <input type="text" value={search} onChange={e=>setSearch(e.target.value)}
            placeholder="🔍  Search client or therapist…"
            style={{width:'100%',background:'var(--elevated)',border:'1px solid var(--border)',borderRadius:'9px',padding:'8px 14px',color:'var(--text)',fontSize:'0.85rem',outline:'none',fontFamily:'inherit'}}/>
        </div>

        {/* Filter tabs — horizontal scroll on desktop, wrapping chips on mobile */}
        <div className="bk-filter-tabs">
          {TABS.map(t=>(
            <button key={t.id} onClick={()=>setFilter(t.id)}
              className={`bk-filter-tab${filter===t.id?' active-tab':''}`}
              style={{padding:'9px 13px',background:'transparent',border:'none',color:filter===t.id?t.color:'var(--muted)',fontWeight:filter===t.id?'700':'500',fontSize:'0.78rem',cursor:'pointer',whiteSpace:'nowrap',fontFamily:'inherit',borderBottom:filter===t.id?`2px solid ${t.color}`:'2px solid transparent',transition:'all .15s',display:'flex',alignItems:'center',gap:'5px',flexShrink:0}}>
              {t.label}
              {counts[t.id]>0&&(
                <span style={{background:filter===t.id?t.color:'var(--elevated)',color:filter===t.id?'#000':'var(--muted)',borderRadius:'10px',padding:'1px 6px',fontSize:'0.65rem',fontWeight:'700',minWidth:'18px',textAlign:'center'}}>
                  {counts[t.id]}
                </span>
              )}
            </button>
          ))}
        </div>

        {/* Booking rows */}
        {loading
          ? <div style={{padding:'48px',textAlign:'center'}}><span className="spin" style={{fontSize:'1.5rem',color:'var(--gold)'}}>✦</span></div>
          : filtered.length===0
            ? <div style={{padding:'48px',textAlign:'center',color:'var(--muted)',fontSize:'0.9rem'}}>
                {search?'No results found.':filter==='all'?'No bookings yet.':`No ${filter} bookings.`}
              </div>
            : filtered.map(b=>{
                const c   = cfg(b.status);
                const exp = !!expandedRows[b.id];
                const clientWaPhone    = b.clientPhone    ? '91'+b.clientPhone.replace(/\D/g,'').replace(/^91/,'')    : null;
                const therapistWaPhone = b.therapistPhone ? '91'+b.therapistPhone.replace(/\D/g,'').replace(/^91/,'') : null;
                const therapistName    = b.therapistName||b.therapistId||'the therapist';
                const needsAction      = b.status==='admin_pending'||b.status==='scheduled';
                return (
                  <div key={b.id} style={{borderBottom:'1px solid var(--border)'}}>

                    {/* ── Summary row (always visible, tap to expand) ── */}
                    <div onClick={()=>toggleRow(b.id)}
                      style={{padding:'13px 14px',display:'flex',alignItems:'center',gap:'10px',cursor:'pointer',minHeight:'60px',
                        background: exp ? 'rgba(212,175,55,0.05)' : b.status==='admin_pending'?'rgba(243,156,18,0.03)':'transparent',
                        transition:'background .12s'}}>

                      {/* Status stripe */}
                      <div style={{width:'4px',height:'36px',borderRadius:'4px',background:c.color,flexShrink:0,alignSelf:'center'}}/>

                      {/* Main info: stacked on mobile */}
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{display:'flex',alignItems:'center',gap:'6px',flexWrap:'wrap',marginBottom:'4px'}}>
                          <span style={{fontWeight:'700',fontSize:'0.87rem',color:'var(--text)'}}>{b.clientName||'—'}</span>
                          <span style={{display:'inline-flex',padding:'2px 8px',borderRadius:'20px',fontSize:'0.65rem',fontWeight:'700',background:c.bg,color:c.color,border:`1px solid ${c.border}`}}>
                            {c.label||b.status}
                          </span>
                          {b.status==='admin_pending'&&b.needsTherapistAssignment&&(
                            <span style={{fontSize:'0.62rem',background:'rgba(243,156,18,0.18)',color:'#f39c12',border:'1px solid rgba(243,156,18,0.4)',borderRadius:'10px',padding:'1px 7px',fontWeight:'700'}}>ASSIGN</span>
                          )}
                        </div>
                        <div style={{display:'flex',alignItems:'center',gap:'6px',flexWrap:'wrap'}}>
                          <span style={{fontSize:'0.7rem',color:'var(--gold)',fontWeight:'600'}}>{therapistName}</span>
                          {b.serviceType&&<span style={{fontSize:'0.65rem',color:'var(--muted)'}}>· {b.serviceType}</span>}
                          <span style={{fontSize:'0.65rem',color:'var(--muted)'}}>{b.bookingType==='now'?'⚡ Now':`📅 ${b.scheduledDate||''} ${b.scheduledTime||''}`}</span>
                          <span style={{fontSize:'0.65rem',color:'var(--subtle)'}}>{timeAgo(b)}</span>
                        </div>
                      </div>

                      {/* Chevron + delete */}
                      <div style={{display:'flex',alignItems:'center',gap:'6px',flexShrink:0}}>
                        <button onClick={e=>{e.stopPropagation();handleDelete(b);}} disabled={deleting===b.id}
                          style={{background:'transparent',border:'none',color:'var(--subtle)',cursor:'pointer',fontSize:'1rem',padding:'6px',lineHeight:1,minWidth:'32px',minHeight:'32px'}}>
                          {deleting===b.id?<span className="spin" style={{fontSize:'0.7rem'}}>✦</span>:'✕'}
                        </button>
                        <span style={{color:'var(--muted)',fontSize:'0.7rem',display:'inline-block',transition:'transform .2s',transform:exp?'rotate(180deg)':'rotate(0deg)'}}>▼</span>
                      </div>
                    </div>

                    {/* ── Expanded details + actions ── */}
                    {exp&&(
                      <div style={{padding:'10px 16px 14px 34px',borderTop:'1px solid rgba(212,175,55,0.1)',background:'rgba(212,175,55,0.02)'}}>

                        {/* Detail chips */}
                        <div style={{display:'flex',gap:'10px',flexWrap:'wrap',marginBottom:'12px'}}>
                          {clientWaPhone&&(
                            <a href={`https://wa.me/${clientWaPhone}?text=${encodeURIComponent('Hello '+b.clientName+', regarding your Feel Free Spa booking…')}`}
                              target="_blank" rel="noopener noreferrer"
                              style={{display:'inline-flex',alignItems:'center',gap:'5px',background:'rgba(37,211,102,0.12)',color:'#25D366',border:'1px solid rgba(37,211,102,0.3)',borderRadius:'7px',padding:'5px 11px',fontSize:'0.75rem',fontWeight:'600',textDecoration:'none'}}>
                              💬 {b.clientPhone}
                            </a>
                          )}
                          {b.clientLocation&&(
                            <a href={`https://maps.google.com?q=${b.clientLocation.lat},${b.clientLocation.lng}`}
                              target="_blank" rel="noopener noreferrer"
                              style={{display:'inline-flex',alignItems:'center',gap:'5px',background:'rgba(212,175,55,0.1)',color:'var(--gold)',border:'1px solid rgba(212,175,55,0.3)',borderRadius:'7px',padding:'5px 11px',fontSize:'0.75rem',fontWeight:'600',textDecoration:'none'}}>
                              📍 View Location
                            </a>
                          )}
                          {b.notes&&(
                            <span style={{fontSize:'0.75rem',color:'var(--muted)',fontStyle:'italic',alignSelf:'center'}}>📝 "{b.notes}"</span>
                          )}
                        </div>

                        {/* Action buttons */}
                        {b.status==='admin_pending'&&(
                          b.needsTherapistAssignment ? (
                            <div>
                              <p style={{fontSize:'0.72rem',color:'#f39c12',marginBottom:'7px',fontWeight:'600'}}>⚡ Assign a therapist:</p>
                              <div style={{display:'flex',gap:'8px',flexWrap:'wrap',alignItems:'center'}}>
                                <select value={selectedTherapist[b.id]||''} onChange={e=>setSelectedTherapist(prev=>({...prev,[b.id]:e.target.value}))}
                                  style={{background:'var(--elevated)',color:'var(--text)',border:'1px solid rgba(212,175,55,0.5)',borderRadius:'8px',padding:'8px 12px',fontSize:'0.8rem',flex:1,minWidth:'150px',cursor:'pointer'}}>
                                  <option value=''>— Select Therapist —</option>
                                  {therapistList.map(t=>(
                                    <option key={t.id} value={t.id}>{t.name||t.therapistId}{t.available===false?' (unavailable)':''}</option>
                                  ))}
                                </select>
                                <button onClick={()=>assignAndConfirm(b)} disabled={confirming===b.id||!selectedTherapist[b.id]}
                                  style={{background:'linear-gradient(135deg,#27ae60,#2ecc71)',color:'#fff',border:'none',borderRadius:'8px',padding:'9px 16px',fontWeight:'700',fontSize:'0.8rem',cursor:'pointer',minHeight:'38px',display:'inline-flex',alignItems:'center',gap:'6px',opacity:!selectedTherapist[b.id]?0.5:1}}>
                                  {confirming===b.id?<span className="spin">✦</span>:'✓ Assign & Confirm'}
                                </button>
                              </div>
                            </div>
                          ) : (
                            <button onClick={()=>confirmBooking(b)} disabled={confirming===b.id}
                              style={{background:'linear-gradient(135deg,#27ae60,#2ecc71)',color:'#fff',border:'none',borderRadius:'8px',padding:'9px 18px',fontWeight:'700',fontSize:'0.82rem',cursor:'pointer',minHeight:'38px',display:'inline-flex',alignItems:'center',gap:'6px'}}>
                              {confirming===b.id?<span className="spin">✦</span>:'✓ Confirm & Send WhatsApp'}
                            </button>
                          )
                        )}

                        {b.status==='confirmed'&&(
                          <div style={{display:'flex',gap:'8px',flexWrap:'wrap',alignItems:'center'}}>
                            {b.therapistAccepted&&(
                              <span style={{fontSize:'0.7rem',color:'#25D366',fontWeight:'600'}}>✅ Therapist accepted — notify client:</span>
                            )}
                            {clientWaPhone&&(
                              <a href={`https://wa.me/${clientWaPhone}?text=${encodeURIComponent('Hello '+b.clientName+', your appointment with '+therapistName+' at Feel Free Spa is confirmed! They are on the way. 🚗')}`}
                                target="_blank" rel="noopener noreferrer"
                                style={{display:'inline-flex',alignItems:'center',gap:'5px',background:'#25D366',color:'#fff',borderRadius:'7px',padding:'6px 12px',fontSize:'0.75rem',fontWeight:'700',textDecoration:'none'}}>
                                💬 {b.therapistAccepted?'Send WhatsApp to Client':'Resend to Client'}
                              </a>
                            )}
                            {therapistWaPhone&&(
                              <a href={`https://wa.me/${therapistWaPhone}?text=${encodeURIComponent('Hello, your appointment with client '+b.clientName+' has been confirmed. Please proceed.')}`}
                                target="_blank" rel="noopener noreferrer"
                                style={{display:'inline-flex',alignItems:'center',gap:'5px',background:'rgba(37,211,102,0.15)',color:'#25D366',border:'1px solid rgba(37,211,102,0.4)',borderRadius:'7px',padding:'6px 12px',fontSize:'0.75rem',fontWeight:'700',textDecoration:'none'}}>
                                💬 Resend to Therapist
                              </a>
                            )}
                          </div>
                        )}

                        {b.status==='scheduled'&&(
                          <button onClick={()=>confirmBooking(b)} disabled={confirming===b.id}
                            style={{background:'rgba(52,152,219,0.15)',color:'#3498db',border:'1px solid rgba(52,152,219,0.4)',borderRadius:'7px',padding:'8px 16px',fontWeight:'700',fontSize:'0.78rem',cursor:'pointer',display:'inline-flex',alignItems:'center',gap:'6px',minHeight:'36px'}}>
                            {confirming===b.id?<span className="spin">✦</span>:'✓ Confirm Upcoming & WhatsApp'}
                          </button>
                        )}

                        {/* ── Admin status controls ── */}
                        {b.status==='confirmed'&&(
                          <div style={{display:'flex',gap:'8px',flexWrap:'wrap',alignItems:'center'}}>
                            <p style={{fontSize:'0.72rem',color:'#27ae60',fontWeight:'600',margin:0,flex:'0 0 auto'}}>✓ Confirmed</p>
                            <button onClick={()=>updateStatus(b,'on_way')} disabled={confirming===b.id}
                              style={{background:'rgba(74,158,255,0.12)',color:'#4a9eff',border:'1px solid rgba(74,158,255,0.4)',borderRadius:'7px',padding:'6px 12px',fontWeight:'700',fontSize:'0.75rem',cursor:'pointer',display:'inline-flex',alignItems:'center',gap:'5px',minHeight:'32px'}}>
                              {confirming===b.id?<span className="spin">✦</span>:<>🚗 Mark On the Way</>}
                            </button>
                            {b.therapistDocId&&(
                              <button onClick={()=>handleShareTracking(b)} disabled={confirming===b.id}
                                style={{background:'rgba(255,107,53,0.12)',color:'#ff6b35',border:'1px solid rgba(255,107,53,0.4)',borderRadius:'7px',padding:'6px 12px',fontWeight:'700',fontSize:'0.75rem',cursor:'pointer',display:'inline-flex',alignItems:'center',gap:'5px',minHeight:'32px'}}>
                                {confirming===b.id?<span className="spin">✦</span>:<>📍 Share Live Tracking</>}
                              </button>
                            )}
                          </div>
                        )}
                        {b.status==='on_way'&&(
                          <div style={{display:'flex',gap:'8px',flexWrap:'wrap',alignItems:'center'}}>
                            <p style={{fontSize:'0.72rem',color:'#4a9eff',fontWeight:'600',margin:0,flex:'0 0 auto'}}>🚗 On the way…</p>
                            <button onClick={()=>updateStatus(b,'in_session')} disabled={confirming===b.id}
                              style={{background:'rgba(255,165,0,0.12)',color:'#ffa500',border:'1px solid rgba(255,165,0,0.4)',borderRadius:'7px',padding:'6px 12px',fontWeight:'700',fontSize:'0.75rem',cursor:'pointer',display:'inline-flex',alignItems:'center',gap:'5px',minHeight:'32px'}}>
                              {confirming===b.id?<span className="spin">✦</span>:<>✦ Mark In Session</>}
                            </button>
                            {b.therapistDocId&&(
                              <button onClick={()=>handleShareTracking(b)} disabled={confirming===b.id}
                                style={{background:'rgba(255,107,53,0.12)',color:'#ff6b35',border:'1px solid rgba(255,107,53,0.4)',borderRadius:'7px',padding:'6px 12px',fontWeight:'700',fontSize:'0.75rem',cursor:'pointer',display:'inline-flex',alignItems:'center',gap:'5px',minHeight:'32px'}}>
                                {confirming===b.id?<span className="spin">✦</span>:<>📍 Share Live Tracking</>}
                              </button>
                            )}
                          </div>
                        )}
                        {b.status==='in_session'&&(
                          <div style={{display:'flex',gap:'8px',flexWrap:'wrap',alignItems:'center'}}>
                            <p style={{fontSize:'0.72rem',color:'#ffa500',fontWeight:'600',margin:0,flex:'0 0 auto'}}>✦ In session…</p>
                            <button onClick={()=>updateStatus(b,'completed')} disabled={confirming===b.id}
                              style={{background:'rgba(39,174,96,0.12)',color:'#27ae60',border:'1px solid rgba(39,174,96,0.4)',borderRadius:'7px',padding:'6px 12px',fontWeight:'700',fontSize:'0.75rem',cursor:'pointer',display:'inline-flex',alignItems:'center',gap:'5px',minHeight:'32px'}}>
                              {confirming===b.id?<span className="spin">✦</span>:<>✓ Mark Complete</>}
                            </button>
                          </div>
                        )}
                        {b.status==='completed'&&(
                          <p style={{fontSize:'0.72rem',color:'#27ae60',fontWeight:'600',margin:0}}>✓ Session completed successfully.</p>
                        )}
                        {b.status==='pending'&&(
                          <p style={{fontSize:'0.72rem',color:'var(--muted)',fontStyle:'italic',margin:0}}>⏳ Waiting for therapist to accept…</p>
                        )}
                        {(b.status==='declined'||b.status==='expired')&&(
                          <p style={{fontSize:'0.72rem',color:'var(--muted)',fontStyle:'italic',margin:0}}>
                            {b.status==='declined'?'😔 Therapist declined.':'⏰ Timer expired — no response.'}
                          </p>
                        )}
                      </div>
                    )}
                  </div>
                );
              })
        }
      </div>
    </div>
  );
}

// ── Render ─────────────────────────────────────────────
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
