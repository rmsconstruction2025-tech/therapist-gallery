function LinkCreator() {
  const [form, setForm] = useState({bookType:'now',scheduledDate:'',clientName:'',clientPhone:'',serviceType:'',selectedTherapistIds:[],expiryMinutes:60,maxViewsPerImage:2,viewDurationSeconds:3});
  const [links,    setLinks]    = useState([]);
  const [creating, setCreating] = useState(false);
  const [allTherps, setAllTherps] = useState([]);
  const [therapistDropOpen, setTherapistDropOpen] = useState(false);
  const [newLink,  setNewLink]  = useState('');
  const [loading,  setLoading]  = useState(true);
  const [copied,   setCopied]   = useState('');
  const [editing,  setEditing]  = useState(null); // link id being edited
  const [editVals, setEditVals] = useState({});   // {maxViewsPerImage, viewDurationSeconds}
  const [saving,   setSaving]   = useState(false);

  useEffect(()=>{
    fetchLinks();
    db.collection('therapists').orderBy('name').get().then(snap=>{
      setAllTherps(snap.docs.map(d=>({id:d.id,...d.data()})));
    }).catch(()=>{});
  },[]);

  const galleryUrl = (token) => {
    return `${window.location.origin}/gallery.html?token=${token}`;
  };

  const fetchLinks = async () => {
    try {
      const snap = await db.collection('galleryTokens').orderBy('createdAt','desc').get();
      setLinks(snap.docs.map(d=>({id:d.id,...d.data()})));
    } finally { setLoading(false); }
  };

  const handleCreate = async (e) => {
    e.preventDefault();
    if (!form.clientName.trim() || !form.clientPhone.trim()) return;
    setCreating(true);
    try {
      const token     = genToken();
      const expiresAt = new Date(Date.now() + Number(form.expiryMinutes)*60000);
      const doc = {
        token, expiresAt: firebase.firestore.Timestamp.fromDate(expiresAt),
        maxViewsPerImage: Number(form.maxViewsPerImage),
        viewDurationSeconds: Number(form.viewDurationSeconds),
        clientName: form.clientName.trim(), clientPhone: form.clientPhone.trim(),
        serviceType: form.serviceType || '',
        bookType: 'now',
        selectedTherapistIds: form.selectedTherapistIds,
        used: false, createdAt: FieldValue.serverTimestamp(),
      };
      await db.collection('galleryTokens').add(doc);
      setNewLink(galleryUrl(token));
      setForm(f=>({...f,clientName:'',clientPhone:'',scheduledDate:''}));
      await fetchLinks();
    } catch(err) { alert(`Failed: ${err.message}`); }
    finally { setCreating(false); }
  };

  const copyLink = async (url, key) => {
    try { await navigator.clipboard.writeText(url); }
    catch { const el=Object.assign(document.createElement('textarea'),{value:url}); document.body.appendChild(el); el.select(); document.execCommand('copy'); document.body.removeChild(el); }
    setCopied(key); setTimeout(()=>setCopied(''),2000);
  };

  const isExpired = (l) => l.expiresAt?.toDate?.() < new Date();

  const startEdit = (l) => {
    setEditing(l.id);
    setEditVals({ maxViewsPerImage: l.maxViewsPerImage, viewDurationSeconds: l.viewDurationSeconds });
  };
  const cancelEdit = () => { setEditing(null); setEditVals({}); };
  const saveEdit = async (l) => {
    setSaving(true);
    try {
      await db.collection('galleryTokens').doc(l.id).update({
        maxViewsPerImage:   Number(editVals.maxViewsPerImage),
        viewDurationSeconds: Number(editVals.viewDurationSeconds),
      });
      setLinks(prev => prev.map(x => x.id===l.id ? {...x,...editVals, maxViewsPerImage:Number(editVals.maxViewsPerImage), viewDurationSeconds:Number(editVals.viewDurationSeconds)} : x));
      setEditing(null);
    } catch(e) { alert(`Save failed: ${e.message}`); }
    setSaving(false);
  };

  return (
    <div style={{display:'flex',flexDirection:'column',gap:'24px'}}>

      {/* Create link card */}
      <div className="card-gold" style={{padding:'24px'}}>
        <div style={{display:'flex',alignItems:'center',gap:'8px',marginBottom:'20px'}}>
          <span style={{fontSize:'1.1rem'}}>🔗</span>
          <h2 style={{fontSize:'0.95rem',fontWeight:'700',color:'var(--text)'}}>Generate Gallery Link</h2>
        </div>
        <form onSubmit={handleCreate}>

          <div className="form-grid" style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(min(200px,100%),1fr))',gap:'16px',marginBottom:'20px'}}>

            {/* Client name — required */}
            <div>
              <label className="form-label">Client Name <span style={{color:'var(--danger)'}}>*</span></label>
              <input type="text" value={form.clientName}
                onChange={e=>setForm(p=>({...p,clientName:e.target.value}))}
                className="form-input" placeholder="Full name" required/>
            </div>

            {/* Client phone — required */}
            <div>
              <label className="form-label">Client Phone <span style={{color:'var(--danger)'}}>*</span></label>
              <input type="tel" value={form.clientPhone}
                onChange={e=>setForm(p=>({...p,clientPhone:e.target.value}))}
                className="form-input" placeholder="10-digit number" required/>
            </div>

            {/* Service type */}
            <div>
              <label className="form-label">Massage Service</label>
              <select value={form.serviceType} onChange={e=>setForm(p=>({...p,serviceType:e.target.value}))} className="form-input">
                <option value=''>— Select Service —</option>
                {SPA_SERVICES.map(s=><option key={s} value={s}>{s}</option>)}
              </select>
            </div>

            {/* Therapist multi-select */}
            <div style={{gridColumn:'1/-1',position:'relative'}}>
              <label className="form-label">Choose Therapist(s) <span style={{color:'var(--muted)',fontWeight:'400'}}>(optional — leave blank to show all online)</span></label>
              {/* Trigger button */}
              <button type="button" onClick={()=>setTherapistDropOpen(o=>!o)}
                className="form-input"
                style={{width:'100%',textAlign:'left',display:'flex',alignItems:'center',justifyContent:'space-between',cursor:'pointer',background:'var(--elevated)'}}>
                <span style={{color:form.selectedTherapistIds.length?'var(--text)':'var(--muted)'}}>
                  {form.selectedTherapistIds.length===0
                    ? '— All Available Therapists —'
                    : form.selectedTherapistIds.length===1
                      ? (allTherps.find(t=>t.id===form.selectedTherapistIds[0])?.name||'1 therapist selected')
                      : `${form.selectedTherapistIds.length} therapists selected`}
                </span>
                <span style={{fontSize:'0.7rem',color:'var(--muted)'}}>{therapistDropOpen?'▲':'▼'}</span>
              </button>
              {/* Dropdown list */}
              {therapistDropOpen&&(
                <div style={{position:'absolute',zIndex:50,top:'100%',left:0,right:0,marginTop:'4px',background:'var(--surface)',border:'1px solid var(--border)',borderRadius:'10px',overflow:'hidden',boxShadow:'0 8px 32px rgba(0,0,0,0.5)',maxHeight:'220px',overflowY:'auto'}}>
                  {/* Clear all */}
                  <div style={{padding:'8px 14px',borderBottom:'1px solid var(--border)',display:'flex',gap:'10px'}}>
                    <button type="button" onClick={()=>setForm(f=>({...f,selectedTherapistIds:[]}))}
                      style={{fontSize:'0.75rem',color:'var(--muted)',background:'none',border:'none',cursor:'pointer',padding:0}}>Clear all</button>
                    <button type="button" onClick={()=>setForm(f=>({...f,selectedTherapistIds:allTherps.map(t=>t.id)}))}

                  </div>
                  {allTherps.map(t=>{
                    const checked=form.selectedTherapistIds.includes(t.id);
                    const toggle=()=>setForm(f=>({...f,selectedTherapistIds:checked?f.selectedTherapistIds.filter(id=>id!==t.id):[...f.selectedTherapistIds,t.id]}));
                    return (
                      <div key={t.id} onClick={toggle}
                        style={{display:'flex',alignItems:'center',gap:'12px',padding:'10px 14px',cursor:'pointer',background:checked?'rgba(212,175,55,0.06)':'transparent',borderBottom:'1px solid var(--border)',transition:'background .12s'}}>

                  WhatsApp
                </a>
              </div>
            </div>
          </div>
        )}
      </div>

      {/* Links list */}
      <div className="card" style={{overflow:'hidden'}}>
        <div style={{padding:'16px 20px',display:'flex',alignItems:'center',justifyContent:'space-between',borderBottom:'1px solid var(--border)'}}>
          <div style={{display:'flex',alignItems:'center',gap:'10px'}}>
            <span style={{fontSize:'1rem'}}>📋</span>
            <span style={{fontWeight:'700',fontSize:'0.95rem'}}>Created Links</span>
            <span className="badge badge-gray">{links.length}</span>
          </div>
          <span className="badge badge-green">● {links.filter(l=>!isExpired(l)).length} active</span>

//  ADMIN DIRECT BOOKING FORM
// ══════════════════════════════════════════════════════
function AdminBookingForm({ therapistList, onClose }) {
  const [type,        setType]        = useState('now'); // 'now'|'later'
  const [clientName,  setClientName]  = useState('');
  const [clientPhone, setClientPhone] = useState('');
  const [serviceType, setServiceType] = useState(SPA_SERVICES[0]);
  const [duration,    setDuration]    = useState('60 min');
  const [therapistId, setTherapistId] = useState('');
  const [notes,       setNotes]       = useState('');
  const [schedDate,   setSchedDate]   = useState('');
  const [schedTime,   setSchedTime]   = useState('');
  const [locMethod,   setLocMethod]   = useState('text'); // 'text'|'link'|'gps'
  const [locText,     setLocText]     = useState('');
  const [locLink,     setLocLink]     = useState('');
  const [gpsCoords,   setGpsCoords]   = useState(null);
  const [gpsLoading,  setGpsLoading]  = useState(false);
  const [saving,      setSaving]      = useState(false);
  const [err,         setErr]         = useState('');
  const [done,        setDone]        = useState(false);

  const getGPS = () => {
    if (!navigator.geolocation) { setErr('GPS not available in this browser'); return; }
    setGpsLoading(true);
    navigator.geolocation.getCurrentPosition(
      p => { setGpsCoords({lat:p.coords.latitude,lng:p.coords.longitude}); setGpsLoading(false); },
      () => { setErr('Could not get location. Check browser permissions.'); setGpsLoading(false); },
      { enableHighAccuracy:true, timeout:10000 }
    );
  };

  const parseMapLink = (url) => {
    const patterns = [/@(-?\d+\.?\d*),(-?\d+\.?\d*)/, /q=(-?\d+\.?\d*),(-?\d+\.?\d*)/];
    for (const p of patterns) {
      const m = url.match(p);
      if (m) {
        const lat = parseFloat(m[1]), lng = parseFloat(m[2]);
        if (!isNaN(lat) && !isNaN(lng)) return {lat, lng};
      }
    }
    return null;
  };

  const handleSubmit = async (e) => {
    e.preventDefault();
    if (!clientName.trim()) { setErr('Client name is required'); return; }
    if (type === 'later' && (!schedDate || !schedTime)) { setErr('Date and time required for scheduled booking'); return; }
    setSaving(true); setErr('');
    try {
      let clientLocation = null;
      if (locMethod==='text'  && locText.trim())  clientLocation = { address: locText.trim() };
      if (locMethod==='link'  && locLink.trim())  clientLocation = parseMapLink(locLink.trim()) || { address: locLink.trim() };
      if (locMethod==='gps'   && gpsCoords)       clientLocation = gpsCoords;

      const t = therapistList.find(x=>x.id===therapistId);
      const payload = {
        clientName:      clientName.trim(),
        clientPhone:     clientPhone.trim(), // stored in Firestore — NEVER displayed to therapist
        serviceType,
        duration,
        notes:           notes.trim(),
        status:          type==='now' ? 'confirmed' : 'scheduled',
        bookedByAdmin:   true,
        confirmedAt:     FieldValue.serverTimestamp(),
        createdAt:       FieldValue.serverTimestamp(),
      };
      if (clientLocation) payload.clientLocation = clientLocation;
      if (therapistId) {
        payload.therapistDocId    = therapistId;
        payload.therapistId       = t?.therapistId || therapistId;
        payload.therapistName     = t?.name || t?.therapistId || therapistId;
        payload.therapistPhone    = t?.phone || null;
        payload.therapistAccepted = true;
      }
      if (type==='later') {
        payload.bookingType   = 'later';
        payload.scheduledDate = schedDate;
        payload.scheduledTime = schedTime;
      } else {
        payload.bookingType   = 'now';
      }
      await db.collection('bookings').add(payload);
      setDone(true);
      setTimeout(onClose, 1500);
    } catch(e) { setErr(e.message); }
    setSaving(false);
  };

  const INP = {width:'100%',background:'var(--elevated)',border:'1px solid var(--border)',borderRadius:'9px',padding:'9px 14px',color:'var(--text)',fontSize:'0.88rem',outline:'none',fontFamily:'inherit'};
  const LBL = {display:'block',fontSize:'0.7rem',color:'var(--muted)',letterSpacing:'1px',textTransform:'uppercase',fontWeight:'600',marginBottom:'5px'};

  if (done) return (
    <div className="fade-in" style={{background:'rgba(46,204,113,0.07)',border:'1px solid rgba(46,204,113,0.35)',borderRadius:'12px',padding:'20px',textAlign:'center'}}>
      <div style={{fontSize:'1.6rem',marginBottom:'6px'}}>✅</div>
      <p style={{color:'#2ecc71',fontWeight:'700',fontSize:'0.9rem'}}>Booking created successfully!</p>
    </div>
  );

  return (
    <div className="fade-in" style={{background:'var(--card)',border:'1px solid var(--border-gold)',borderRadius:'14px',padding:'20px'}}>
      <p style={{fontWeight:'700',fontSize:'0.9rem',color:'var(--gold)',marginBottom:'14px',letterSpacing:'1px',textTransform:'uppercase'}}>New Booking</p>

      <form onSubmit={handleSubmit} style={{display:'flex',flexDirection:'column',gap:'14px'}}>
        {/* Book type toggle */}
        <div style={{display:'flex',gap:'8px'}}>
          {[['now','⚡ Book Now','Immediate — confirmed right away'],['later','📅 Book Later','Scheduled date & time']].map(([v,l,sub])=>(
            <button key={v} type="button" onClick={()=>setType(v)}
              style={{flex:1,padding:'10px 8px',borderRadius:'10px',cursor:'pointer',textAlign:'left',
                border:`1px solid ${type===v?'var(--gold)':'var(--border)'}`,
                background:type===v?'rgba(212,175,55,0.09)':'transparent',
                color:type===v?'var(--gold)':'var(--muted)',
                fontSize:'0.82rem',fontWeight:type===v?'700':'500',fontFamily:'inherit',transition:'all .15s'}}>
              <p style={{margin:0}}>{l}</p>
              <p style={{margin:'2px 0 0',fontSize:'0.65rem',opacity:.75,fontWeight:'400'}}>{sub}</p>
            </button>
          ))}
        </div>

        {/* Client */}
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'10px'}} className="form-grid">
          <div>
            <label style={LBL}>Client Name *</label>
            <input type="text" value={clientName} onChange={e=>setClientName(e.target.value)} style={INP} placeholder="Full name" required/>
          </div>
          <div>
            <label style={LBL}>Phone <span style={{fontWeight:400,fontSize:'0.7rem',letterSpacing:0,color:'#555',textTransform:'none'}}>(admin only)</span></label>
            <input type="tel" value={clientPhone} onChange={e=>setClientPhone(e.target.value)} style={INP} placeholder="9876543210"/>
          </div>
        </div>

        {/* Service + Duration */}
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'10px'}} className="form-grid">
          <div>
            <label style={LBL}>Service</label>
            <select value={serviceType} onChange={e=>setServiceType(e.target.value)} style={INP}>
              {SPA_SERVICES.map(s=><option key={s}>{s}</option>)}
            </select>
          </div>
          <div>
            <label style={LBL}>Duration</label>
            <select value={duration} onChange={e=>setDuration(e.target.value)} style={INP}>
              {['30 min','45 min','60 min','90 min','120 min'].map(d=><option key={d}>{d}</option>)}
            </select>
          </div>
        </div>

        {/* Therapist */}
        <div>
          <label style={LBL}>Assign Therapist <span style={{fontWeight:400,fontSize:'0.7rem',letterSpacing:0,color:'#555',textTransform:'none'}}>(optional)</span></label>
          <select value={therapistId} onChange={e=>setTherapistId(e.target.value)} style={INP}>
            <option value="">— Not assigned yet —</option>
            {therapistList.map(t=>(
              <option key={t.id} value={t.id}>{t.name||t.therapistId}{t.available?' 🟢':''}</option>
            ))}
          </select>
        </div>

        {/* Date + Time for Book Later */}
        {type==='later'&&(
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'10px'}} className="form-grid">
            <div>
              <label style={LBL}>Date *</label>
              <input type="date" value={schedDate} onChange={e=>setSchedDate(e.target.value)}
                style={{...INP,colorScheme:'dark'}} min={new Date().toISOString().split('T')[0]} required/>
            </div>
            <div>
              <label style={LBL}>Time *</label>
              <input type="time" value={schedTime} onChange={e=>setSchedTime(e.target.value)}
                style={{...INP,colorScheme:'dark'}} required/>
            </div>
          </div>
        )}

        {/* Location */}
        <div>
          <label style={LBL}>Client Location</label>
          <div style={{display:'flex',gap:'6px',marginBottom:'8px'}}>
            {[['text','📝 Address'],['link','🗺️ Maps Link'],['gps','📍 GPS']].map(([v,l])=>(
              <button key={v} type="button" onClick={()=>setLocMethod(v)}
                style={{flex:1,padding:'7px 4px',borderRadius:'8px',cursor:'pointer',
                  border:`1px solid ${locMethod===v?'rgba(212,175,55,0.5)':'var(--border)'}`,
                  background:locMethod===v?'rgba(212,175,55,0.08)':'transparent',
                  color:locMethod===v?'var(--gold)':'var(--muted)',
                  fontSize:'0.72rem',fontWeight:locMethod===v?'700':'500',fontFamily:'inherit',transition:'all .15s'}}>
                {l}
              </button>
            ))}
          </div>
          {locMethod==='text'&&(
            <textarea value={locText} onChange={e=>setLocText(e.target.value)} rows={2}
              placeholder="e.g. 123 Main St, Apartment 4B, Chennai — or any landmark"
              style={{...INP,resize:'none',lineHeight:'1.5'}}/>
          )}
          {locMethod==='link'&&(
            <div style={{display:'flex',flexDirection:'column',gap:'6px'}}>
              <input type="text" value={locLink} onChange={e=>setLocLink(e.target.value)}
                placeholder="Paste Google Maps link (lat/lng auto-extracted)"
                style={INP}/>
              {locLink&&(()=>{
                const p=parseMapLink(locLink);
                return p
                  ? <p style={{fontSize:'0.72rem',color:'#2ecc71'}}>✓ Coords detected: {p.lat.toFixed(5)}, {p.lng.toFixed(5)}</p>
                  : <p style={{fontSize:'0.72rem',color:'var(--muted)'}}>No coords found — address will be saved as text</p>;
              })()}
            </div>
          )}
          {locMethod==='gps'&&(
            <div style={{display:'flex',alignItems:'center',gap:'10px',flexWrap:'wrap'}}>
              <button type="button" onClick={getGPS} disabled={gpsLoading}
                style={{padding:'9px 16px',borderRadius:'9px',border:'1px solid rgba(212,175,55,0.35)',
                  background:'rgba(212,175,55,0.08)',color:'var(--gold)',cursor:'pointer',
                  fontSize:'0.82rem',fontWeight:'700',fontFamily:'inherit',
                  opacity:gpsLoading?.6:1}}>
                {gpsLoading?'Getting location…':'📍 Get Current Location'}
              </button>
              {gpsCoords&&(
                <a href={`https://maps.google.com?q=${gpsCoords.lat},${gpsCoords.lng}`} target="_blank" rel="noopener noreferrer"
                  style={{fontSize:'0.75rem',color:'#2ecc71',fontFamily:'monospace',textDecoration:'none'}}>
                  ✓ {gpsCoords.lat.toFixed(5)}, {gpsCoords.lng.toFixed(5)} ↗
                </a>
              )}
            </div>
          )}
        </div>

        {/* Notes */}
        <div>
          <label style={LBL}>Notes <span style={{fontWeight:400,fontSize:'0.7rem',letterSpacing:0,color:'#555',textTransform:'none'}}>(optional)</span></label>
          <input type="text" value={notes} onChange={e=>setNotes(e.target.value)} style={INP} placeholder="Any special instructions…"/>
        </div>

        {err&&<div style={{background:'var(--danger-bg)',border:'1px solid rgba(231,76,60,.3)',borderRadius:'8px',padding:'9px 14px',color:'var(--danger)',fontSize:'0.82rem'}}>{err}</div>}

        <div style={{display:'flex',gap:'8px'}}>
          <button type="button" onClick={onClose} style={{flex:1,padding:'11px',borderRadius:'9px',border:'1px solid var(--border)',background:'transparent',color:'var(--muted)',fontSize:'0.85rem',cursor:'pointer',fontFamily:'inherit'}}>Cancel</button>
          <button type="submit" disabled={saving} className="btn btn-gold" style={{flex:2,padding:'11px',fontSize:'0.88rem',borderRadius:'9px'}}>
            {saving?<span className="spin">✦</span>:type==='now'?'⚡ Confirm Now':'📅 Schedule Booking'}
          </button>
        </div>
      </form>
    </div>
  );
}

// ── Attendance Admin ────────────────────────────────────
function AttendanceAdmin() {
  const [therapists,  setTherapists]  = useState([]);
  const [records,     setRecords]     = useState([]);
  const [loading,     setLoading]     = useState(true);
  const [selTherapist,setSelTherapist]= useState(null);
  const [saving,      setSaving]      = useState(false);

  const now         = new Date();
  const yr          = now.getFullYear();
  const mo          = now.getMonth();
  const daysInMonth = new Date(yr, mo+1, 0).getDate();
  const todayStr    = now.toISOString().split('T')[0];
  const monthStart  = `${yr}-${String(mo+1).padStart(2,'0')}-01`;
  const monthEnd    = `${yr}-${String(mo+1).padStart(2,'0')}-${String(daysInMonth).padStart(2,'0')}`;

  useEffect(()=>{
    Promise.all([
      db.collection('therapists').get(),
      db.collection('attendance').get()
    ]).then(([tSnap, aSnap])=>{
      setTherapists(tSnap.docs.map(d=>({id:d.id,...d.data()})));
      // Filter client-side — avoids composite index requirement
      setRecords(aSnap.docs.map(d=>({id:d.id,...d.data()})).filter(r=>r.date>=monthStart&&r.date<=monthEnd));
      setLoading(false);
    }).catch(()=>setLoading(false));
  },[]);

  const S_COLOR = { present:'#27ae60','half-day':'#f39c12',absent:'#e74c3c','no-data':'#222',weekend:'#1a1a1a',future:'transparent' };
  const S_LABEL = { present:'Present','half-day':'Half','no-data':'—',absent:'Absent',weekend:'',future:'' };

  const getTherapistRecords = (docId) => records.filter(r=>r.therapistDocId===docId);

  const getStatus = (docId, dayNum) => {
    const ds   = `${yr}-${String(mo+1).padStart(2,'0')}-${String(dayNum).padStart(2,'0')}`;
    const date = new Date(yr, mo, dayNum);
    if (ds > todayStr) return 'future';
    if (date.getDay() === 0) return 'weekend';
    const recs = getTherapistRecords(docId);
    const r = recs.find(x=>x.date===ds);
    if (r) return r.status||'present';
    const firstDate = recs.length>0 ? recs.reduce((m,x)=>x.date<m?x.date:m, recs[0].date) : null;
    if (firstDate && ds>=firstDate && ds<todayStr) return 'absent';
    return 'no-data';
  };

  const summaryFor = (docId) => {
    const recs = getTherapistRecords(docId);
    return {
      present:  recs.filter(r=>r.status==='present').length,
      half:     recs.filter(r=>r.status==='half-day').length,
      absent:   Array.from({length:daysInMonth},(_,i)=>i+1).filter(d=>getStatus(docId,d)==='absent').length,
      hours:    recs.reduce((s,r)=>s+(r.hoursOnDuty||0),0),
      sessions: recs.reduce((s,r)=>s+(r.sessions||0),0),
      today:    recs.find(r=>r.date===todayStr)||null,
    };
  };

  const fmtTime = ts=>{ if(!ts?.toDate) return '—'; return ts.toDate().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',hour12:true}); };
  const fmtHrs  = h=>{ if(!h) return '—'; const hr=Math.floor(h),min=Math.round((h-hr)*60); return min>0?`${hr}h ${min}m`:`${hr}h`; };

  const clickDay = async (docId, day) => {
    const ds   = `${yr}-${String(mo+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const date = new Date(yr, mo, day);
    if (ds > todayStr) return;       // no future
    if (date.getDay() === 0) return; // no Sunday
    if (saving) return;
    const cur = getStatus(docId, day);
    // cycle: no-data / absent → present → half-day → absent
    const next = cur === 'present' ? 'half-day' : cur === 'half-day' ? 'absent' : 'present';
    setSaving(true);
    try {
      const existing = records.find(r => r.therapistDocId === docId && r.date === ds);
      if (existing) {
        await db.collection('attendance').doc(existing.id).update({ status: next });
        setRecords(prev => prev.map(r => r.id === existing.id ? {...r, status: next} : r));
      } else {
        const ref = await db.collection('attendance').add({
          therapistDocId: docId, date: ds, status: next,
          createdAt: FieldValue.serverTimestamp(),
        });
        setRecords(prev => [...prev, {id: ref.id, therapistDocId: docId, date: ds, status: next}]);
      }
    } catch(err) { alert('Error: ' + err.message); }
    setSaving(false);
  };

  if (loading) return <div style={{padding:'60px',textAlign:'center',color:'var(--muted)'}}>Loading…</div>;

  // ── Detail view ──────────────────────────────────────
  if (selTherapist) {
    const t = selTherapist;
    const recs = getTherapistRecords(t.id);
    const byDate = {};
    recs.forEach(r=>{ byDate[r.date]=r; });
    const firstDow = new Date(yr,mo,1).getDay();

    return (
      <div>
        <button onClick={()=>setSelTherapist(null)}
          style={{marginBottom:'20px',background:'transparent',border:'1px solid var(--border)',borderRadius:'8px',padding:'7px 14px',color:'var(--muted)',cursor:'pointer',fontSize:'0.82rem',display:'flex',alignItems:'center',gap:'6px'}}>
          ← Back
        </button>
        <div style={{display:'flex',alignItems:'center',gap:'14px',marginBottom:'24px'}}>
          {t.imageUrl
            ?<img src={t.imageUrl} style={{width:'52px',height:'52px',borderRadius:'50%',objectFit:'cover'}}/>
            :<div style={{width:'52px',height:'52px',borderRadius:'50%',background:'rgba(212,175,55,0.1)',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:'700',color:'var(--gold)',fontSize:'1.2rem'}}>{(t.name||'?')[0]}</div>
          }
          <div>
            <p style={{fontWeight:'700',fontSize:'1.1rem',color:'var(--text)'}}>{t.name}</p>
            <p style={{fontSize:'0.75rem',color:'var(--muted)'}}>{now.toLocaleDateString('en-IN',{month:'long',year:'numeric'})}</p>
          </div>
        </div>
        {/* Month stats */}
        <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:'10px',marginBottom:'24px'}}>
          {[
            [summaryFor(t.id).present + (summaryFor(t.id).half>0?` +${summaryFor(t.id).half}½`:''),'Present','#27ae60'],
            [String(summaryFor(t.id).absent),'Absent','#e74c3c'],
            [`${summaryFor(t.id).hours.toFixed(0)}h`,'Hours','var(--text)'],
            [String(summaryFor(t.id).sessions),'Sessions','var(--gold)'],
          ].map(([v,l,c])=>(
            <div key={l} style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:'12px',padding:'14px 10px',textAlign:'center'}}>
              <p style={{fontSize:'1.3rem',fontWeight:'700',color:c,margin:0}}>{v}</p>
              <p style={{fontSize:'0.65rem',color:'var(--muted)',marginTop:'4px',textTransform:'uppercase',letterSpacing:'0.5px'}}>{l}</p>
            </div>
          ))}
        </div>
        {/* Calendar */}
        <div style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:'16px',padding:'20px',marginBottom:'20px'}}>
          <p style={{textAlign:'center',fontWeight:'700',color:'var(--gold)',marginBottom:'14px',letterSpacing:'1px'}}>
            {now.toLocaleDateString('en-IN',{month:'long',year:'numeric'})}
          </p>
          <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:'3px',marginBottom:'6px',textAlign:'center'}}>
            {['Su','Mo','Tu','We','Th','Fr','Sa'].map(d=><div key={d} style={{fontSize:'0.65rem',color:'var(--muted)',paddingBottom:'4px'}}>{d}</div>)}
          </div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:'3px'}}>
            {Array.from({length:firstDow},(_,i)=><div key={'e'+i}/>)}
            {Array.from({length:daysInMonth},(_,i)=>{
              const day=i+1, s=getStatus(t.id,day), isToday=day===now.getDate();
              const ds=`${yr}-${String(mo+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
              const date=new Date(yr,mo,day);
              const canClick = ds<=todayStr && date.getDay()!==0;
              return(
                <div key={day}
                  onClick={canClick ? ()=>clickDay(t.id,day) : undefined}
                  title={canClick ? `${day}: ${S_LABEL[s]||s||'—'} (tap to change)` : undefined}
                  style={{aspectRatio:'1',borderRadius:'6px',background:S_COLOR[s],
                    border:isToday?`2px solid var(--gold)`:'2px solid transparent',
                    opacity:(s==='future'||s==='no-data')?0.25:1,
                    cursor:canClick?'pointer':'default',
                    display:'flex',alignItems:'center',justifyContent:'center',
                    transition:'transform .1s, opacity .1s',
                  }}
                  onMouseEnter={canClick?e=>{e.currentTarget.style.transform='scale(1.15)';e.currentTarget.style.opacity='1';}:undefined}
                  onMouseLeave={canClick?e=>{e.currentTarget.style.transform='scale(1)';e.currentTarget.style.opacity=(s==='future'||s==='no-data')?'0.25':'1';}:undefined}
                >
                  <span style={{fontSize:'0.65rem',fontWeight:'700',color:s==='present'?'#9be09b':s==='half-day'?'#f5c86f':s==='absent'?'#f1a8a8':'#444',pointerEvents:'none'}}>{day}</span>
                </div>
              );
            })}
          </div>
          <div style={{display:'flex',gap:'12px',flexWrap:'wrap',marginTop:'14px',justifyContent:'center',alignItems:'center'}}>
            {[['#27ae60','Present'],['#f39c12','Half day'],['#e74c3c','Absent']].map(([c,l])=>(
              <div key={l} style={{display:'flex',alignItems:'center',gap:'4px'}}>
                <div style={{width:'10px',height:'10px',borderRadius:'3px',background:c}}/>
                <span style={{fontSize:'0.65rem',color:'var(--muted)'}}>{l}</span>
              </div>
            ))}
            {saving && <span style={{fontSize:'0.65rem',color:'var(--gold)'}}>Saving…</span>}
            {!saving && <span style={{fontSize:'0.6rem',color:'var(--muted)',opacity:0.5}}>Tap a day to change</span>}
          </div>
        </div>
        {/* Log */}
        <div style={{display:'flex',flexDirection:'column',gap:'7px'}}>
          {recs.length===0
            ?<div style={{textAlign:'center',padding:'32px',background:'var(--surface)',border:'1px solid var(--border)',borderRadius:'14px',color:'var(--muted)',fontSize:'0.85rem'}}>No records this month</div>
            :recs.sort((a,b)=>b.date.localeCompare(a.date)).map(r=>{
              const c=S_COLOR[r.status]||'#888';
              return(
                <div key={r.id} style={{display:'flex',alignItems:'center',gap:'12px',background:'var(--surface)',border:'1px solid var(--border)',borderRadius:'12px',padding:'12px 16px'}}>
                  <div style={{width:'8px',height:'8px',borderRadius:'50%',background:c,flexShrink:0}}/>
                  <div style={{flex:1}}>
                    <p style={{fontWeight:'700',fontSize:'0.85rem',color:'var(--text)',marginBottom:'2px'}}>
                      {new Date(r.date+'T00:00:00').toLocaleDateString('en-IN',{weekday:'short',day:'numeric',month:'short'})}
                    </p>
                    <p style={{fontSize:'0.72rem',color:'var(--muted)'}}>
                      {fmtTime(r.checkIn)} → {r.checkOut?fmtTime(r.checkOut):'ongoing'} · {fmtHrs(r.hoursOnDuty)} · {r.sessions||0} sessions
                    </p>
                  </div>
                  <div style={{textAlign:'right',flexShrink:0}}>
                    <span style={{fontSize:'0.65rem',fontWeight:'700',padding:'3px 10px',borderRadius:'20px',background:c+'22',color:c,border:`1px solid ${c}44`}}>
                      {S_LABEL[r.status]||r.status}
                    </span>
                    {r.earnings>0&&<p style={{fontSize:'0.75rem',color:'var(--gold)',fontWeight:'700',marginTop:'3px'}}>₹{(r.earnings||0).toLocaleString('en-IN')}</p>}
                  </div>
                </div>
              );
            })
          }
        </div>
      </div>
    );
  }

  // ── Summary list ──────────────────────────────────────
  return (
    <div>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'20px'}}>
        <div>
          <h2 style={{fontWeight:'700',fontSize:'1rem',color:'var(--text)',margin:0}}>Attendance</h2>
          <p style={{fontSize:'0.75rem',color:'var(--muted)',marginTop:'2px'}}>{now.toLocaleDateString('en-IN',{month:'long',year:'numeric'})}</p>
        </div>
      </div>
      {therapists.length===0
        ?<div style={{textAlign:'center',padding:'48px',color:'var(--muted)',fontSize:'0.9rem'}}>No therapists found</div>
        :<div style={{display:'flex',flexDirection:'column',gap:'10px'}}>
          {therapists.map(t=>{
            const s = summaryFor(t.id);
            const todayRec = s.today;
            const isOnline = t.available;
            return (
              <div key={t.id} onClick={()=>setSelTherapist(t)}
                style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:'14px',padding:'16px 18px',cursor:'pointer',transition:'border-color .15s'}}
                onMouseEnter={el=>el.currentTarget.style.borderColor='rgba(212,175,55,0.4)'}
                onMouseLeave={el=>el.currentTarget.style.borderColor='var(--border)'}>
                <div style={{display:'flex',alignItems:'center',gap:'14px',marginBottom:'12px'}}>
                  <div style={{position:'relative',flexShrink:0}}>
                    {t.imageUrl
                      ?<img src={t.imageUrl} style={{width:'44px',height:'44px',borderRadius:'50%',objectFit:'cover'}}/>
                      :<div style={{width:'44px',height:'44px',borderRadius:'50%',background:'rgba(212,175,55,0.1)',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:'700',color:'var(--gold)'}}>{(t.name||'?')[0]}</div>
                    }
                    <div style={{position:'absolute',bottom:0,right:0,width:'12px',height:'12px',borderRadius:'50%',background:isOnline?'#27ae60':'#666',border:'2px solid var(--surface)'}}/>
                  </div>
                  <div style={{flex:1,minWidth:0}}>
                    <p style={{fontWeight:'700',fontSize:'0.95rem',color:'var(--text)',marginBottom:'2px'}}>{t.name}</p>
                    <p style={{fontSize:'0.72rem',color:'var(--muted)'}}>
                      {todayRec
                        ?<span style={{color:todayRec.status==='present'?'#27ae60':todayRec.status==='half-day'?'#f39c12':'#e74c3c',fontWeight:'600'}}>Today: {S_LABEL[todayRec.status]||todayRec.status} · {fmtTime(todayRec.checkIn)} → {todayRec.checkOut?fmtTime(todayRec.checkOut):'ongoing'}</span>
                        :<span>Not checked in today</span>
                      }
                    </p>
                  </div>
                  <span style={{fontSize:'0.7rem',color:'var(--muted)',flexShrink:0}}>Details →</span>
                </div>
                {/* Mini month strip */}
                <div style={{display:'flex',gap:'3px',flexWrap:'wrap'}}>
                  {Array.from({length:daysInMonth},(_,i)=>{
                    const day=i+1, st=getStatus(t.id,day);
                    return(
                      <div key={day} title={`${day}: ${S_LABEL[st]||st}`} style={{width:'20px',height:'20px',borderRadius:'4px',
                        background:S_COLOR[st],opacity:(st==='future'||st==='no-data')?0.2:1,
                        border:day===now.getDate()?'1.5px solid var(--gold)':'1.5px solid transparent',
                        display:'flex',alignItems:'center',justifyContent:'center'}}>
                        <span style={{fontSize:'0.5rem',color:st==='present'?'#9be09b':st==='half-day'?'#f5c86f':st==='absent'?'#f1a8a8':'#333'}}>{day}</span>
                      </div>
                    );
                  })}
                </div>
                {/* Summary row */}
                <div style={{display:'flex',gap:'16px',marginTop:'10px',paddingTop:'10px',borderTop:'1px solid var(--border)'}}>
                  {[
                    [s.present+(s.half>0?`+${s.half}½`:''),'Present','#27ae60'],
                    [String(s.absent),'Absent','#e74c3c'],
                    [`${s.hours.toFixed(0)}h`,'Hours','var(--text)'],
                    [String(s.sessions),'Sessions','var(--gold)'],
                  ].map(([v,l,c])=>(
                    <div key={l} style={{textAlign:'center'}}>
                      <p style={{fontSize:'0.9rem',fontWeight:'700',color:c,margin:0}}>{v}</p>
                      <p style={{fontSize:'0.6rem',color:'var(--muted)',textTransform:'uppercase',letterSpacing:'0.5px',margin:'2px 0 0'}}>{l}</p>
                    </div>
                  ))}
                </div>
              </div>
            );
          })}
        </div>
      }
    </div>
  );
}

// ══════════════════════════════════════════════════════
//  CLIENTS / RETARGETING TAB
// ══════════════════════════════════════════════════════
function ClientsTab() {
  const [visits,   setVisits]   = useState([]);
  const [loading,  setLoading]  = useState(true);
  const [filter,   setFilter]   = useState('all'); // all | booked | notbooked
  const [search,   setSearch]   = useState('');

  useEffect(()=>{
    // Query galleryTokens that have been visited (visited:true means gallery was opened)
    const unsub = db.collection('galleryTokens')
      .where('visited','==',true)
      .onSnapshot(snap=>{
        const list = snap.docs.map(d=>({id:d.id,...d.data()}))
          .sort((a,b)=>(b.visitedAt?.toMillis?.()??0)-(a.visitedAt?.toMillis?.()??0));
        setVisits(list);
        setLoading(false);
      }, ()=>setLoading(false));
    return ()=>unsub();
  },[]);

  const timeAgoFmt = ts => {
    if(!ts?.toDate) return '—';
    const s = (Date.now()-ts.toDate().getTime())/1000;
    if(s<60) return `${Math.floor(s)}s ago`;
    if(s<3600) return `${Math.floor(s/60)}m ago`;
    if(s<86400) return `${Math.floor(s/3600)}h ago`;
    return `${Math.floor(s/86400)}d ago`;
  };
  const fmtDateTime = ts => {
    if(!ts?.toDate) return '—';
    return ts.toDate().toLocaleString('en-IN',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit',hour12:true});
  };

  const filtered = visits.filter(v=>{
    if(filter==='booked'    && !v.hasBooked) return false;
    if(filter==='notbooked' &&  v.hasBooked) return false;
    if(search.trim()){
      const q=search.toLowerCase();
      if(!(v.clientName||'').toLowerCase().includes(q) && !(v.clientPhone||'').includes(q)) return false;
    }
    return true;
  });

  const totalVisits  = visits.length;
  const totalBooked  = visits.filter(v=>v.hasBooked).length;
  const convRate     = totalVisits>0 ? Math.round(totalBooked/totalVisits*100) : 0;

  const copyPhone = phone => { try{ navigator.clipboard.writeText(phone); }catch{} };

  if(loading) return <div style={{padding:'60px',textAlign:'center',color:'var(--muted)'}}>Loading…</div>;

  return (
    <div>
      {/* Header */}
      <div style={{marginBottom:'20px'}}>
        <h2 style={{fontWeight:'700',fontSize:'1rem',color:'var(--text)',margin:'0 0 4px'}}>Client Retargeting</h2>
        <p style={{fontSize:'0.75rem',color:'var(--muted)',margin:0}}>Everyone who opened a gallery link</p>
      </div>

      {/* Summary cards */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:'10px',marginBottom:'20px'}}>
        {[
          [String(totalVisits),  'Total Visitors', 'var(--text)',  'var(--elevated)'],
          [String(totalBooked),  'Converted',      '#27ae60',     'rgba(39,174,96,0.08)'],
          [`${convRate}%`,       'Conv. Rate',      'var(--gold)', 'rgba(212,175,55,0.08)'],
        ].map(([v,l,c,bg])=>(
          <div key={l} style={{background:bg,border:'1px solid var(--border)',borderRadius:'14px',padding:'14px 10px',textAlign:'center'}}>
            <p style={{fontSize:'1.4rem',fontWeight:'700',color:c,margin:0}}>{v}</p>
            <p style={{fontSize:'0.6rem',color:'var(--muted)',marginTop:'4px',textTransform:'uppercase',letterSpacing:'0.5px'}}>{l}</p>
          </div>
        ))}
      </div>

      {/* Search + filter */}
      <div style={{display:'flex',gap:'8px',marginBottom:'16px',flexWrap:'wrap'}}>
        <input
          value={search} onChange={e=>setSearch(e.target.value)}
          placeholder="Search name or phone…"
          style={{flex:1,minWidth:'160px',background:'var(--elevated)',border:'1px solid var(--border)',borderRadius:'10px',padding:'9px 13px',color:'var(--text)',fontSize:'0.85rem',outline:'none',fontFamily:'inherit'}}
        />
        {['all','booked','notbooked'].map(f=>(
          <button key={f} onClick={()=>setFilter(f)}
            style={{padding:'8px 14px',borderRadius:'20px',fontSize:'0.75rem',fontWeight:'700',cursor:'pointer',fontFamily:'inherit',
              background:filter===f?'var(--elevated)':'transparent',
              color:filter===f?'var(--text)':'var(--muted)',
              border:`1px solid ${filter===f?'rgba(212,175,55,0.35)':'transparent'}`}}>
            {f==='all'?'All':f==='booked'?'✅ Booked':'⏳ Not Booked'}
          </button>
        ))}
      </div>

      {/* List */}
      {filtered.length===0
        ?<div style={{textAlign:'center',padding:'48px',background:'var(--surface)',border:'1px solid var(--border)',borderRadius:'14px',color:'var(--muted)',fontSize:'0.85rem'}}>
          {visits.length===0?'No visitors yet. Share a gallery link to start tracking.':'No results found.'}
        </div>
        :<div style={{display:'flex',flexDirection:'column',gap:'10px'}}>
          {filtered.map(v=><ClientVisitCard key={v.id} v={v} fmtDateTime={fmtDateTime} copyPhone={copyPhone}/>)}
        </div>
      }
    </div>
  );
}

// ══════════════════════════════════════════════════════
//  EARNINGS TAB
// ══════════════════════════════════════════════════════
function EarningsTab() {
  const [bookings,   setBookings]   = useState([]);
  const [therapists, setTherapists] = useState([]);
  const [loading,    setLoading]    = useState(true);
  const [selMonth,   setSelMonth]   = useState(()=>{ const n=new Date(); return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}`; });

  useEffect(()=>{
    Promise.all([
      db.collection('bookings').get(),
      db.collection('therapists').get(),
    ]).then(([bSnap,tSnap])=>{
      setBookings(bSnap.docs.map(d=>({id:d.id,...d.data()})));
      setTherapists(tSnap.docs.map(d=>({id:d.id,...d.data()})));
      setLoading(false);
    }).catch(()=>setLoading(false));
  },[]);

  const PRICE = {'60':2500,'90':3500,'120':5500};
  const priceForBooking = b => {
    if(b.manualEarnings != null) return Number(b.manualEarnings)||0;
    if(b.duration && PRICE[String(b.duration)]) return PRICE[String(b.duration)];
    const m = (b.durationLabel||'').match(/₹(\d+)/);
    if(m) return parseInt(m[1]);
    return null; // null = unknown price
  };

  const completedInMonth = bookings.filter(b=>{
    if(b.status !== 'completed') return false;
    const date = b.appointmentDate || b.scheduledDate || (b.createdAt?.toDate?.()?.toISOString?.()?.split?.('T')?.[0])||'';
    return date.startsWith(selMonth);
  });

  const knownRevenue   = completedInMonth.reduce((s,b)=>{ const p=priceForBooking(b); return s+(p||0); },0);
  const totalBookings  = completedInMonth.length;
  const unknownCount   = completedInMonth.filter(b=>priceForBooking(b)===null).length;

  // Group by therapist
  const byTherapist = {};
  completedInMonth.forEach(b=>{
    const tid = b.therapistDocId || b.therapistId || 'unknown';
    if(!byTherapist[tid]) byTherapist[tid]={ bookings:[], total:0 };
    byTherapist[tid].bookings.push(b);
    byTherapist[tid].total += priceForBooking(b)||0;
  });

  // Build month options (last 6 months)
  const monthOptions = [];
  for(let i=0;i<6;i++){
    const d=new Date(); d.setMonth(d.getMonth()-i);
    const val=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    const lbl=d.toLocaleDateString('en-IN',{month:'long',year:'numeric'});
    monthOptions.push({val,lbl});
  }

  const therapistName = id => therapists.find(t=>t.id===id)?.name || id || 'Unknown';
  const therapistImg  = id => therapists.find(t=>t.id===id)?.imageUrl || '';

  const [expandedBooking, setExpandedBooking] = useState(null);
  const [editPrice, setEditPrice] = useState('');
  const [savingPrice, setSavingPrice] = useState(false);

  const saveManualPrice = async (bookingId) => {
    const val = parseInt(editPrice);
    if(isNaN(val)||val<0) return;
    setSavingPrice(true);
    try {
      await db.collection('bookings').doc(bookingId).update({ manualEarnings: val });
      setBookings(prev => prev.map(b => b.id===bookingId ? {...b, manualEarnings:val} : b));
      setExpandedBooking(null);
    } catch(err){ alert('Error: '+err.message); }
    setSavingPrice(false);
  };

  if(loading) return <div style={{padding:'60px',textAlign:'center',color:'var(--muted)'}}>Loading…</div>;

  return (
    <div>
      {/* Header */}
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'20px',flexWrap:'wrap',gap:'12px'}}>
        <div>
          <h2 style={{fontWeight:'700',fontSize:'1rem',color:'var(--text)',margin:0}}>Earnings</h2>
          <p style={{fontSize:'0.75rem',color:'var(--muted)',marginTop:'2px'}}>Completed bookings revenue</p>
        </div>
        <select value={selMonth} onChange={e=>setSelMonth(e.target.value)}
          style={{background:'var(--elevated)',border:'1px solid var(--border)',borderRadius:'9px',padding:'8px 12px',color:'var(--text)',fontSize:'0.82rem',cursor:'pointer',outline:'none'}}>
          {monthOptions.map(o=><option key={o.val} value={o.val}>{o.lbl}</option>)}
        </select>
      </div>

      {/* Summary cards */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:'10px',marginBottom:'24px'}}>
        {[
          ['₹'+knownRevenue.toLocaleString('en-IN'), 'Total Revenue', 'var(--gold)', 'rgba(212,175,55,0.08)'],
          [String(totalBookings), 'Completed', '#27ae60', 'rgba(39,174,96,0.08)'],
          [totalBookings?'₹'+Math.round(knownRevenue/totalBookings).toLocaleString('en-IN'):'—', 'Avg / Booking', 'var(--text)', 'var(--elevated)'],
        ].map(([v,l,c,bg])=>(
          <div key={l} style={{background:bg,border:'1px solid var(--border)',borderRadius:'14px',padding:'16px 12px',textAlign:'center'}}>
            <p style={{fontSize:'1.4rem',fontWeight:'700',color:c,margin:0}}>{v}</p>
            <p style={{fontSize:'0.62rem',color:'var(--muted)',marginTop:'5px',textTransform:'uppercase',letterSpacing:'0.5px'}}>{l}</p>
          </div>
        ))}
      </div>
      {unknownCount>0 && <p style={{fontSize:'0.72rem',color:'#f39c12',marginBottom:'16px',textAlign:'center'}}>⚠️ {unknownCount} booking{unknownCount>1?'s':''} missing price — tap a row to set it manually</p>}

      {/* Per-therapist breakdown */}
      {Object.keys(byTherapist).length===0
        ? <div style={{textAlign:'center',padding:'48px',background:'var(--surface)',border:'1px solid var(--border)',borderRadius:'14px',color:'var(--muted)',fontSize:'0.85rem'}}>No completed bookings this month</div>
        : <div style={{display:'flex',flexDirection:'column',gap:'10px'}}>
            {Object.entries(byTherapist).sort((a,b)=>b[1].total-a[1].total).map(([tid,data])=>{
              const img  = therapistImg(tid);
              const name = therapistName(tid);
              const pct  = knownRevenue>0 ? Math.round(data.total/knownRevenue*100) : 0;
              return (
                <div key={tid} style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:'14px',padding:'16px 18px'}}>
                  {/* Therapist header */}
                  <div style={{display:'flex',alignItems:'center',gap:'12px',marginBottom:'12px'}}>
                    {img
                      ?<img src={img} style={{width:'40px',height:'40px',borderRadius:'50%',objectFit:'cover',flexShrink:0}}/>
                      :<div style={{width:'40px',height:'40px',borderRadius:'50%',background:'rgba(212,175,55,0.1)',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:'700',color:'var(--gold)',flexShrink:0}}>{(name||'?')[0]}</div>
                    }
                    <div style={{flex:1,minWidth:0}}>
                      <p style={{fontWeight:'700',fontSize:'0.9rem',color:'var(--text)',margin:0,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{name}</p>
                      <p style={{fontSize:'0.72rem',color:'var(--muted)',marginTop:'2px'}}>{data.bookings.length} session{data.bookings.length!==1?'s':''}</p>
                    </div>
                    <p style={{fontWeight:'700',fontSize:'1.05rem',color:'var(--gold)',flexShrink:0}}>₹{data.total.toLocaleString('en-IN')}</p>
                  </div>
                  {/* Progress bar */}
                  <div style={{background:'var(--elevated)',borderRadius:'4px',height:'5px',overflow:'hidden',marginBottom:'4px'}}>
                    <div style={{width:`${pct}%`,height:'100%',background:'linear-gradient(90deg,var(--gold-dark),var(--gold))',borderRadius:'4px',transition:'width .4s'}}/>
                  </div>
                  <p style={{fontSize:'0.62rem',color:'var(--muted)',textAlign:'right',marginBottom:'10px'}}>{pct}% of month revenue</p>

                  {/* Booking rows — CLICKABLE */}
                  <div style={{display:'flex',flexDirection:'column',gap:'5px'}}>
                    {data.bookings.sort((a,b)=>(b.appointmentDate||'').localeCompare(a.appointmentDate||'')).map(b=>{
                      const price    = priceForBooking(b);
                      const isExpand = expandedBooking===b.id;
                      const missing  = price===null;
                      return (
                        <div key={b.id}>
                          {/* Row */}
                          <div
                            onClick={()=>{ setExpandedBooking(isExpand?null:b.id); setEditPrice(String(price||'')); }}
                            style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'9px 12px',
                              background:isExpand?'rgba(212,175,55,0.06)':'var(--elevated)',
                              border:`1px solid ${missing?'rgba(243,156,18,0.3)':isExpand?'rgba(212,175,55,0.25)':'transparent'}`,
                              borderRadius:'9px',gap:'8px',cursor:'pointer',transition:'all .15s'}}>
                            <span style={{fontSize:'0.75rem',color:'var(--text)',fontWeight:'600',flexShrink:0,minWidth:'80px'}}>{b.appointmentDate||b.scheduledDate||(b.createdAt?.toDate?.()?.toISOString?.()?.split?.('T')?.[0])||'—'}</span>
                            <span style={{fontSize:'0.72rem',color:'var(--muted)',flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{b.clientName||'Client'} · {b.serviceType||b.durationLabel||'—'}</span>
                            <span style={{fontSize:'0.75rem',fontWeight:'700',flexShrink:0,color:missing?'#f39c12':'var(--gold)'}}>
                              {missing ? '₹ ?' : '₹'+price.toLocaleString('en-IN')}
                            </span>
                            <span style={{fontSize:'0.6rem',color:'var(--muted)',flexShrink:0}}>{isExpand?'▲':'▼'}</span>
                          </div>

                          {/* Expanded detail + price edit */}
                          {isExpand && (
                            <div style={{background:'rgba(212,175,55,0.04)',border:'1px solid rgba(212,175,55,0.15)',borderRadius:'9px',padding:'12px 14px',marginTop:'3px',display:'flex',flexDirection:'column',gap:'8px'}}>
                              {[
                                ['Service',  b.serviceType||'—'],
                                ['Duration', b.durationLabel||b.duration?(b.duration+' mins'):'—'],
                                ['Time',     b.appointmentTime||b.scheduledTime||'—'],
                                ['Status',   b.status||'—'],
                              ].map(([k,v])=>(
                                <div key={k} style={{display:'flex',justifyContent:'space-between',gap:'8px'}}>
                                  <span style={{fontSize:'0.7rem',color:'var(--muted)'}}>{k}</span>
                                  <span style={{fontSize:'0.7rem',color:'var(--text)',fontWeight:'600',textAlign:'right'}}>{v}</span>
                                </div>
                              ))}
                              {/* Manual price entry */}
                              <div style={{borderTop:'1px solid rgba(212,175,55,0.15)',paddingTop:'8px',marginTop:'2px'}}>
                                <p style={{fontSize:'0.65rem',color:'var(--muted)',marginBottom:'6px'}}>Set amount manually (₹)</p>
                                <div style={{display:'flex',gap:'6px'}}>
                                  <input
                                    type="number" value={editPrice} onChange={e=>setEditPrice(e.target.value)}
                                    placeholder="e.g. 2500"
                                    style={{flex:1,background:'var(--elevated)',border:'1px solid var(--border)',borderRadius:'7px',padding:'7px 10px',color:'var(--text)',fontSize:'0.82rem',outline:'none',fontFamily:'inherit'}}
                                  />
                                  <button onClick={()=>saveManualPrice(b.id)} disabled={savingPrice||!editPrice}
                                    style={{background:'linear-gradient(135deg,var(--gold-dark),var(--gold))',color:'#0a0a0a',border:'none',borderRadius:'7px',padding:'7px 14px',fontWeight:'700',fontSize:'0.78rem',cursor:savingPrice?'not-allowed':'pointer',fontFamily:'inherit',opacity:(!editPrice||savingPrice)?0.5:1}}>
                                    {savingPrice?'…':'Save'}
                                  </button>
                                </div>
                              </div>
                            </div>
                          )}
                        </div>
                      );
                    })}
                  </div>
                </div>
              );
            })}
          </div>
      }
    </div>
  );
}

// ── Shared helpers ─────────────────────────────────────
