<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Portal — Therapist Gallery</title>

  <!-- Firebase compat SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>

  <!-- React 18 + Babel for JSX -->
  <script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.development.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>

<style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── LIGHT MODE (Design 2 — warm parchment) ── */
    :root {
      --bg: #f5f4f0; --surface: #ffffff; --elevated: #eeecea; --card: #ffffff;
      --gold: #9a6f00; --gold-light: #c49a00; --gold-dark: #7a5800; --gold-glow: rgba(154,111,0,0.09);
      --text: #1a1a2e; --muted: #6b7280; --subtle: #9ca3af; --border: rgba(0,0,0,0.08);
      --border-gold: rgba(154,111,0,0.22);
      --danger: #dc2626; --danger-bg: rgba(220,38,38,0.07);
      --success: #16a34a; --success-bg: rgba(22,163,74,0.08);
      --info: #2563eb;
      --sidebar-w: 220px;
      /* card shadow for light mode */
      --card-shadow: 0 1px 3px rgba(0,0,0,0.07), 0 1px 2px rgba(0,0,0,0.04);
    }

    /* ── DARK MODE ── */
    html.dark {
      --bg: #080b12; --surface: #0f1420; --elevated: #1c2235; --card: #141928;
      --gold: #e4b84a; --gold-light: #f0c84a; --gold-dark: #c9982a; --gold-glow: rgba(228,184,74,0.12);
      --text: #e8eaf0; --muted: #8b92a8; --subtle: #4a5270; --border: rgba(255,255,255,0.07);
      --border-gold: rgba(228,184,74,0.28);
      --danger: #f05252; --danger-bg: rgba(240,82,82,0.1);
      --success: #22d07a; --success-bg: rgba(34,208,122,0.1);
      --info: #38bdf8;
      --card-shadow: none;
    }
    html, body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; min-height: 100vh; transition: background 0.2s, color 0.2s; overflow-x: hidden; }
    input, textarea, select { user-select: text; -webkit-user-select: text; }
    img { pointer-events: none; -webkit-user-drag: none; }
    button { cursor: pointer; font-family: inherit; }
    ::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 4px; }
    html.dark ::-webkit-scrollbar-thumb { background: #333; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spin { display: inline-block; animation: spin 0.7s linear infinite; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:none; } }
    .fade-in { animation: fadeIn 0.25s ease forwards; }
    @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.4;} }
    .pulse { animation: pulse 2s ease-in-out infinite; }

    /* Layout */
    .admin-layout { display:flex; min-height:100vh; }
    .sidebar {
      width: var(--sidebar-w); background: var(--surface); border-right: 0.5px solid var(--border);
      display: flex; flex-direction: column; position: fixed; top:0; left:0; height:100vh; z-index:100;
      overflow-y: auto; box-shadow: 1px 0 8px rgba(0,0,0,0.04);
    }
    .sidebar-brand { padding: 22px 20px 18px; border-bottom: 0.5px solid var(--border); }
    .sidebar-nav { padding: 12px 10px; flex:1; display:flex; flex-direction:column; gap:2px; }
    .nav-item {
      display:flex; align-items:center; gap:10px; padding:10px 14px; border-radius:10px;
      color:var(--muted); font-size:0.875rem; font-weight:500; cursor:pointer;
      background:transparent; border:none; text-align:left; width:100%; transition:all .15s;
    }
    .nav-item:hover { background:var(--elevated); color:var(--text); }
    .nav-item.active { background:var(--gold-glow); color:var(--gold); border:1px solid var(--border-gold); font-weight:600; }
    .nav-icon { font-size:1rem; width:20px; text-align:center; flex-shrink:0; }
    .sidebar-footer { padding:16px; border-top:0.5px solid var(--border); }
    .main { margin-left:var(--sidebar-w); flex:1; min-height:100vh; }
    .topbar {
      background:var(--surface); border-bottom:0.5px solid var(--border);
      padding:12px 24px; display:flex; align-items:center; justify-content:space-between;
      position:sticky; top:0; z-index:50; box-shadow:0 1px 4px rgba(0,0,0,0.04);
    }
    .content { padding:24px; }

    /* Theme toggle button */
    .theme-toggle {
      width:34px; height:34px; border-radius:50%; border:0.5px solid var(--border);
      background:var(--elevated); display:flex; align-items:center; justify-content:center;
      cursor:pointer; font-size:1rem; transition:all .2s; flex-shrink:0;
    }
    .theme-toggle:hover { border-color:var(--border-gold); background:var(--gold-glow); }

    /* Cards */
    .card { background:var(--card); border:0.5px solid var(--border); border-radius:14px; box-shadow:var(--card-shadow); }
    .card-gold { background:var(--card); border:1px solid var(--border-gold); border-radius:14px; box-shadow:var(--card-shadow); }
    .stat-card { padding:20px 24px; }

    /* Table */
    .data-table { border:1px solid var(--border); border-radius:12px; overflow:hidden; }
    .table-head { background:var(--elevated); padding:10px 18px; border-bottom:1px solid var(--border); display:grid; align-items:center; }
    .table-head span { font-size:0.68rem; color:var(--muted); letter-spacing:1.5px; text-transform:uppercase; font-weight:600; }
    .table-row { padding:12px 18px; display:grid; align-items:center; border-bottom:1px solid var(--border); transition:background .1s; }
    .table-row:last-child { border-bottom:none; }
    .table-row:hover { background:rgba(212,175,55,0.03); }

    /* Badge */
    .badge { display:inline-flex; align-items:center; gap:5px; padding:3px 10px; border-radius:20px; font-size:0.72rem; font-weight:600; letter-spacing:0.5px; }
    .badge-green { background:var(--success-bg); color:var(--success); border:1px solid rgba(46,204,113,0.3); }
    .badge-red { background:var(--danger-bg); color:var(--danger); border:1px solid rgba(231,76,60,0.3); }
    .badge-gray { background:rgba(255,255,255,0.05); color:var(--muted); border:1px solid var(--border); }
    .badge-gold { background:var(--gold-glow); color:var(--gold); border:1px solid var(--border-gold); }

    /* Buttons */
    .btn { display:inline-flex; align-items:center; justify-content:center; gap:6px; border:none; border-radius:9px; font-weight:600; font-family:inherit; cursor:pointer; transition:all .15s; }
    .btn-gold { background:linear-gradient(135deg,var(--gold-dark),var(--gold)); color:#0a0a0a; }
    .btn-gold:hover { filter:brightness(1.1); }
    .btn-ghost { background:var(--elevated); border:1px solid var(--border); color:var(--text); }
    .btn-ghost:hover { border-color:var(--subtle); }
    .btn-danger { background:var(--danger-bg); border:1px solid rgba(231,76,60,.4); color:var(--danger); }
    .btn-danger:hover { background:rgba(231,76,60,.15); }
    .btn-sm { padding:6px 14px; font-size:0.78rem; }
    .btn-md { padding:9px 20px; font-size:0.85rem; }
    .btn-lg { padding:12px 28px; font-size:0.9rem; }

    /* Form */
    .form-label { display:block; font-size:0.72rem; color:var(--muted); letter-spacing:0.8px; text-transform:uppercase; font-weight:600; margin-bottom:6px; }
    .form-input { width:100%; background:var(--elevated); border:0.5px solid var(--border); border-radius:9px; padding:10px 14px; color:var(--text); font-size:0.92rem; outline:none; transition:border .15s, box-shadow .15s; font-family:inherit; }
    .form-input:focus { border-color:var(--border-gold); box-shadow:0 0 0 3px var(--gold-glow); }
    .form-input::placeholder { color:var(--subtle); }

    /* Divider */
    .divider { height:1px; background:var(--border); margin:0; }

    /* Upload zone */
    .upload-zone { border:2px dashed var(--border); border-radius:14px; display:flex; align-items:center; justify-content:center; cursor:pointer; transition:all .2s; background:var(--card); }
    .upload-zone:hover, .upload-zone.drag { border-color:var(--gold); background:rgba(212,175,55,0.03); }

    /* ── Bottom Nav (mobile) ─────────────────────────── */
    .bottom-nav { display:none; }

    /* ── Item card — used on ALL screen sizes ─────────── */
    /* Single layout: flex row, avatar left, info middle, actions right */
    .item-card {
      display:flex; align-items:center; gap:12px;
      padding:14px 18px; border-bottom:1px solid var(--border);
      transition:background .12s;
    }
    .item-card:last-child { border-bottom:none; }
    .item-card:hover { background:rgba(212,175,55,0.03); }
    .item-avatar { flex-shrink:0; }
    .item-info { flex:1; min-width:0; }
    .item-info .name { font-weight:600; font-size:0.92rem; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .item-info .sub  { font-size:0.7rem; color:var(--muted); font-family:monospace; margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .item-info .meta { margin-top:5px; display:flex; gap:6px; align-items:center; flex-wrap:wrap; }
    .item-actions { display:flex; gap:8px; align-items:center; flex-shrink:0; }

    /* Desktop: actions always inline */
    .item-actions-desktop { display:flex; gap:8px; align-items:center; }
    .item-actions-mobile  { display:none; }

    /* Table header row */
    .table-head { background:var(--elevated); padding:8px 18px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:12px; }
    .table-head span { font-size:0.67rem; color:var(--muted); letter-spacing:1.5px; text-transform:uppercase; font-weight:600; }

    /* ── Tracker layout (desktop) ── */
    .tracker-grid { display:grid; grid-template-columns:260px 1fr; flex:1; min-height:0; }
    .tracker-list { border-right:1px solid var(--border); overflow-y:auto; padding:10px; background:var(--surface); }
    .tracker-map  { position:relative; height:calc(100vh - 120px); min-height:480px; }

    /* ── Booking filter tabs ── */
    .bk-filter-tabs { display:flex; overflow-x:auto; border-bottom:1px solid var(--border); padding:0 6px; scrollbar-width:none; -webkit-overflow-scrolling:touch; }
    .bk-filter-tabs::-webkit-scrollbar { display:none; }

    /* ── Mobile ────────────────────────────────────────── */
    @media (max-width: 768px) {
      :root { --sidebar-w: 0px; }
      .sidebar { display:none !important; }
      .main { margin-left:0; padding-bottom:72px; overflow-x:hidden; }

      /* Bottom nav */
      .bottom-nav {
        display:flex !important; position:fixed; bottom:0; left:0; right:0; z-index:200;
        background:var(--surface); border-top:0.5px solid var(--border);
        box-shadow:0 -2px 12px rgba(0,0,0,0.06);
        padding-bottom: env(safe-area-inset-bottom);
      }
      .bottom-nav-item {
        flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
        gap:4px; background:transparent; border:none; color:var(--muted);
        font-size:0.6rem; font-weight:600; cursor:pointer; font-family:inherit;
        padding:8px 4px 10px; letter-spacing:0.2px; min-height:58px;
        position:relative;
      }
      .bottom-nav-item .bnav-icon { font-size:1.45rem; line-height:1; transition:transform .15s; }
      .bottom-nav-item.active { color:var(--gold); }
      .bottom-nav-item.active .bnav-icon { transform:scale(1.08); }
      .bottom-nav-item.active::before {
        content:''; position:absolute; top:0; left:25%; right:25%; height:2.5px;
        background:var(--gold); border-radius:0 0 3px 3px;
      }

      /* Topbar */
      .topbar { padding:10px 14px; min-height:52px; }
      .topbar-email { display:none !important; }
      .topbar-title { font-size:1rem !important; }
      .content { padding:14px 12px; gap:16px !important; }

      /* Cards */
      .card-gold { padding:16px !important; }
      .upload-zone { min-height:100px !important; padding:18px 12px !important; }
      .form-grid { grid-template-columns:1fr !important; gap:12px !important; }
      .btn-lg { width:100% !important; min-height:48px; }
      .btn-md { min-height:44px; }
      .btn-sm { min-height:38px; padding:8px 14px !important; }

      /* Item cards — mobile: show mobile actions, hide desktop actions */
      .item-card { padding:12px 14px; gap:10px; }
      .item-actions-desktop { display:none !important; }
      .item-actions-mobile  {
        display:flex !important; gap:8px; margin-top:8px; flex-wrap:wrap;
      }

      /* Table header hidden on mobile */
      .table-head { display:none !important; }

      /* Link cards */
      .link-indent { padding-left:0 !important; }

      /* Login */
      .login-split { flex-direction:column !important; }
      .login-deco  { display:none !important; }
      .login-form-panel { padding:32px 20px !important; }

      /* Card header row */
      .card-header-counts { flex-wrap:wrap; gap:6px !important; }

      /* ── Live Tracker mobile ── */
      .tracker-grid { grid-template-columns:1fr !important; }
      .tracker-list { border-right:none !important; border-bottom:1px solid var(--border); max-height:220px; }
      .tracker-map  { height:50vh !important; min-height:280px !important; }
      .tracker-hdr  { padding:10px 12px !important; gap:8px !important; }
      .tracker-hdr-row1 { flex-wrap:wrap; gap:6px; }
      .tracker-hdr-actions { flex-wrap:wrap; gap:6px; }

      /* ── Bookings filter tabs mobile ── */
      .bk-filter-tabs { flex-wrap:wrap; overflow-x:unset !important; padding:6px 8px; gap:4px; }
      .bk-filter-tab  { padding:5px 10px !important; font-size:0.72rem !important; border-bottom:none !important; border:1px solid var(--border) !important; border-radius:20px !important; }
      .bk-filter-tab.active-tab { border-color:var(--gold) !important; background:var(--gold-glow) !important; }

      /* ── Booking header compact ── */
      .bk-header-badges { display:none !important; }

      /* ── Sub-page back bar (mobile only) ── */
      .mobile-back-bar { display:flex !important; }
    }

    @media (max-width:1024px) and (min-width:769px) {
      :root { --sidebar-w: 180px; }
      .content { padding:20px; }
    }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ── Theme toggle ───────────────────────────────────────
const ADMIN_NAME = 'Shiva';
const SPA_SERVICES = ['Wet Massage', 'Oil Massage', 'Dry Massage'];

function useTheme() {
  const [dark, setDark] = useState(() => {
    try { return localStorage.getItem('ffs_theme') === 'dark'; } catch { return false; }
  });
  useEffect(() => {
    document.documentElement.classList.toggle('dark', dark);
    try { localStorage.setItem('ffs_theme', dark ? 'dark' : 'light'); } catch {}
  }, [dark]);
  return [dark, () => setDark(d => !d)];
}

// ════════════════════════════════════════════════════════
// ⚙️  CONFIGURATION — Fill in your Firebase values below
// ════════════════════════════════════════════════════════
const FIREBASE_CONFIG = {
  apiKey:            "AIzaSyAw7KXjgZaHM833PZDwTLUSNGNk7WJx_sY",
  authDomain:        "therapist-gallery.firebaseapp.com",
  projectId:         "therapist-gallery",
  storageBucket:     "therapist-gallery.firebasestorage.app",
  messagingSenderId: "826400735387",
  appId:             "1:826400735387:web:379974d8aa913786f0063e"
};
const ADMIN_EMAIL    = "admin@admin.com";
const ADMIN_PASSWORD = "admin123";
const ADMIN_WHATSAPP = "918148243019";
// ════════════════════════════════════════════════════════

if (!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
const auth    = firebase.auth();
const db      = firebase.firestore();
const storage = firebase.storage();
const FieldValue = firebase.firestore.FieldValue;

// ── Sound alert ───────────────────────────────────────
function playAlert(type='new') {
  try {
    const ctx = new (window.AudioContext||window.webkitAudioContext)();
    const seqs = {
      new:    [[880,0.00],[1100,0.18],[880,0.36],[1100,0.54]],
      accept: [[660,0.00],[880,0.18],[1100,0.36]],
    };
    (seqs[type]||seqs.new).forEach(([freq,t])=>{
      const o=ctx.createOscillator(), g=ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.frequency.value=freq; o.type='sine';
      g.gain.setValueAtTime(0.25, ctx.currentTime+t);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+t+0.16);
      o.start(ctx.currentTime+t); o.stop(ctx.currentTime+t+0.18);
    });
  } catch(e){}
}

// ── Generate short random token (8 chars) ─────────────
function genToken() {
  const c = 'ABCDEFGHJKLMNPQRSTUVWXYZabcdefghjkmnpqrstuvwxyz23456789'; // no confusables (0,O,I,l,1)
  const a = new Uint8Array(8);
  crypto.getRandomValues(a);
  return Array.from(a, b => c[b % c.length]).join('');
}

// ══════════════════════════════════════════════════════
//  APP
// ══════════════════════════════════════════════════════
function App() {
  const [user,    setUser]    = useState(null);
  const [loading, setLoading] = useState(true);
  useEffect(() => auth.onAuthStateChanged(u => { setUser(u); setLoading(false); }), []);
  if (loading) return <Center><span className="spin" style={{fontSize:'2rem',color:'var(--gold)'}}>✦</span></Center>;
  return user ? <Dashboard user={user}/> : <AdminLogin/>;
}

// ══════════════════════════════════════════════════════
//  ADMIN LOGIN
// ══════════════════════════════════════════════════════
function AdminLogin() {
  const [email,   setEmail]   = useState('');
  const [pass,    setPass]    = useState('');
  const [err,     setErr]     = useState('');
  const [loading, setLoading] = useState(false);

  const handle = async (e) => {
    e.preventDefault(); setErr('');
    if (email.trim().toLowerCase() !== ADMIN_EMAIL.toLowerCase()) { setErr('Invalid credentials.'); return; }
    setLoading(true);
    try {
      await auth.signInWithEmailAndPassword(email.trim(), pass);
    } catch (er) {
      if (er.code === 'auth/user-not-found' || er.code === 'auth/invalid-credential') {
        try { await auth.createUserWithEmailAndPassword(email.trim(), pass); }
        catch { setErr('Enable Email/Password auth in Firebase Console.'); }
      } else if (er.code === 'auth/wrong-password') {
        setErr('Wrong password.');
      } else { setErr(er.message); }
    } finally { setLoading(false); }
  };

  return (
    <div style={{minHeight:'100vh',display:'flex',background:'var(--bg)'}} className="login-split">
      {/* Left decorative panel */}
      <div style={{flex:1,background:'linear-gradient(160deg,#1a1a2e,#0f1420)',borderRight:'1px solid rgba(228,184,74,0.2)',display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:'16px',padding:'40px'}} className="login-deco">
        <div style={{width:'64px',height:'64px',borderRadius:'18px',background:'rgba(228,184,74,0.12)',border:'1px solid rgba(228,184,74,0.3)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'2rem'}}>✦</div>
        <h2 style={{color:'#e8eaf0',fontSize:'1.5rem',fontWeight:'700',letterSpacing:'1px',textAlign:'center'}}>Feel Free Spa</h2>
        <p style={{color:'rgba(255,255,255,0.4)',fontSize:'0.82rem',textAlign:'center',lineHeight:'1.6',maxWidth:'240px'}}>Admin portal for {ADMIN_NAME} — manage therapists, bookings & live tracking.</p>
        <div style={{display:'flex',gap:'6px',flexWrap:'wrap',justifyContent:'center',margin:'4px 0 12px'}}>
          {SPA_SERVICES.map(s=>(
            <span key={s} style={{fontSize:'0.72rem',padding:'4px 12px',borderRadius:'20px',background:'rgba(228,184,74,0.1)',color:'#e4b84a',border:'0.5px solid rgba(228,184,74,0.3)',fontWeight:'600'}}>{s}</span>
          ))}
        </div>
        <div style={{display:'flex',flexDirection:'column',gap:'10px',width:'100%',maxWidth:'260px'}}>
          {[['🖼️','Manage therapist photos'],['🔗','Create gallery links'],['📍','Live GPS tracking']].map(([ic,txt])=>(
            <div key={txt} style={{display:'flex',alignItems:'center',gap:'10px',padding:'9px 13px',background:'rgba(255,255,255,0.04)',border:'0.5px solid rgba(255,255,255,0.08)',borderRadius:'10px'}}>
              <span style={{fontSize:'1rem'}}>{ic}</span>
              <span style={{color:'rgba(255,255,255,0.7)',fontSize:'0.8rem'}}>{txt}</span>
            </div>
          ))}
        </div>
      </div>
      {/* Login form */}
      <div style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',padding:'20px',background:'var(--bg)'}} className="login-form-panel">
        <div className="fade-in" style={{width:'100%',maxWidth:'380px'}}>
          <div style={{textAlign:'center',marginBottom:'32px'}}>
            <div style={{width:'52px',height:'52px',borderRadius:'14px',background:'var(--gold-glow)',border:'1px solid var(--border-gold)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'1.5rem',margin:'0 auto 16px'}}>✦</div>
            <h1 style={{fontSize:'1.4rem',fontWeight:'700',color:'var(--text)',marginBottom:'5px',letterSpacing:'-.3px'}}>Welcome back, {ADMIN_NAME}</h1>
            <p style={{color:'var(--muted)',fontSize:'0.83rem'}}>Sign in to Feel Free Spa admin</p>
          </div>
          <form onSubmit={handle} style={{display:'flex',flexDirection:'column',gap:'18px'}}>
            <div>
              <label className="form-label">Email</label>
              <input type="email" value={email} onChange={e=>setEmail(e.target.value)} className="form-input" placeholder="admin@admin.com" required autoComplete="email"/>
            </div>
            <div>

              {loading ? <span className="spin">✦</span> : 'Sign In →'}
            </button>
          </form>
        </div>
      </div>
    </div>
  );
}

const AVATAR_COLORS_T = ['#4a9eff','#9b59b6','#e67e22','#27ae60','#e74c3c','#1abc9c','#c9963a'];
function tAvatarColor(name){ let h=0; for(let i=0;i<(name||'').length;i++) h=(name.charCodeAt(i)+h*31)%AVATAR_COLORS_T.length; return AVATAR_COLORS_T[h]; }
function tInitials(name){ return (name||'?').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2); }

function LiveMapAll({ onDutyList }) {
  const [src, setSrc] = React.useState('');
  const urlRef = React.useRef('');
  const depsKey = onDutyList.map(t=>`${t.id}:${(t.location?.lat||0).toFixed(4)}:${(t.location?.lng||0).toFixed(4)}`).join('|');

  React.useEffect(() => {
    if (!onDutyList.length) return;
    const avgLat = onDutyList.reduce((s,t)=>s+t.location.lat,0)/onDutyList.length;
    const avgLng = onDutyList.reduce((s,t)=>s+t.location.lng,0)/onDutyList.length;
    // Offset markers sharing identical coordinates so they're all visible
    const pins = onDutyList.map((t, i) => {
      const name = (t.name||t.therapistId||'?').replace(/['"<>&]/g,'_');
      const ago  = (t._ago||'').replace(/['"<>&]/g,'_');
      const dupIdx = onDutyList.slice(0, i).filter(o =>
        Math.abs(o.location.lat - t.location.lat) < 0.0001 &&
        Math.abs(o.location.lng - t.location.lng) < 0.0001
      ).length;
      const angle = dupIdx * (2 * Math.PI / 3);
      const d = dupIdx > 0 ? 0.0005 : 0;
      const lat = t.location.lat + d * Math.sin(angle);
      const lng = t.location.lng + d * Math.cos(angle);
      return `markers.push(L.marker([${lat},${lng}]).addTo(m).bindPopup('<b>${name}</b><br/><small>${ago}</small>'));`;
    }).join('\n');
    const html = `<!DOCTYPE html><html><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.css">
<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.js"><\/script>
<style>*{margin:0;padding:0;box-sizing:border-box}html,body{width:100%;height:100%;overflow:hidden}#map{width:100%;height:100%}<\/style>
</head><body><div id="map"></div>
<script>
var m=L.map('map');
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap',maxZoom:18}).addTo(m);
var markers=[];
${pins}
if(markers.length===1){m.setView(markers[0].getLatLng(),15);}
else if(markers.length>1){var g=L.featureGroup(markers);m.fitBounds(g.getBounds().pad(0.25));}
<\/script></body></html>`;
    const blob = new Blob([html],{type:'text/html'});
    const newUrl = URL.createObjectURL(blob);
    const old = urlRef.current;
    urlRef.current = newUrl;
    setSrc(newUrl);
    if(old) setTimeout(()=>URL.revokeObjectURL(old),1000);
  }, [depsKey]);

  React.useEffect(()=>()=>{ if(urlRef.current) URL.revokeObjectURL(urlRef.current); },[]);

  if(!src) return <div style={{height:'100%',display:'flex',alignItems:'center',justifyContent:'center',color:'rgba(255,255,255,0.4)'}}>Loading map…</div>;
  return <iframe src={src} style={{width:'100%',height:'100%',border:'none',display:'block'}} title="All Therapists"/>;
}

const FCM_SERVER_KEY = 'alwo_UykyXjQOLLt7xz55u76ZMaB0tYlRnSaGe7Z40U';

async function sendFCMNotification(tokens, title, body) {
  if(!tokens.length) return {ok:0, fail:0};
  const res = await fetch('https://fcm.googleapis.com/fcm/send', {
    method: 'POST',
    headers: { 'Content-Type':'application/json', 'Authorization':'key='+FCM_SERVER_KEY },
    body: JSON.stringify({
      registration_ids: tokens,
      notification: { title, body, sound:'default', icon:'/icon-192.png', click_action:'https://feelfreespa.in/therapist' },
      data: { url:'https://feelfreespa.in/therapist' },
      android: { priority:'high', notification:{ sound:'default', channel_id:'default' } },
      apns: { payload:{ aps:{ sound:'default', badge:1 } } },
    })
  });
  const json = await res.json();
  return { ok: json.success||0, fail: json.failure||0 };
}

function LiveTracker() {
  const [therapists, setTherapists] = useState([]);
  const [selected,   setSelected]   = useState(null);
  const [view,       setView]       = useState('single');
  const [now,        setNow]        = useState(Date.now());
  const [notifSending, setNotifSending] = useState(false);
  const [notifMsg,     setNotifMsg]     = useState('');

  const sendGPSReminder = async () => {
    const tokens = therapists.map(t=>t.fcmToken).filter(Boolean);
    if(!tokens.length){ setNotifMsg('⚠️ No therapists have notifications enabled.'); return; }
    setNotifSending(true); setNotifMsg('');
    try {
      const {ok, fail} = await sendFCMNotification(
        tokens,
        '📍 Enable GPS — Feel Free Spa',
        'Please allow location access in your browser so admin can track your live location during duty.'
      );
      setNotifMsg(`✓ Sent to ${ok} phone${ok!==1?'s':''}${fail>0?` · ${fail} failed`:''}. `);
    } catch(e) { setNotifMsg(`⚠️ Error: ${e.message}`); }
    setNotifSending(false);
  };

  useEffect(()=>{
    const unsub = db.collection('therapists').onSnapshot(snap=>{
      setTherapists(snap.docs.map(d=>({id:d.id,...d.data()})));
    });
    const tick = setInterval(()=>setNow(Date.now()), 15000);
    return ()=>{ unsub(); clearInterval(tick); };
  },[]);

  const timeAgo = ts => {
    if(!ts?.toDate) return '—';
    const s = (now - ts.toDate().getTime()) / 1000;
    if(s < 60)   return `${Math.floor(s)}s ago`;
    if(s < 3600) return `${Math.floor(s/60)} min ago`;
    return `${Math.floor(s/3600)}h ago`;
  };

  const onDutyList = therapists
    .filter(t => t.onDuty)
    .map(t => ({...t, _hasGPS: t.location?.lat != null, _ago: timeAgo(t.locationUpdatedAt), _activeAgo: timeAgo(t.lastActiveAt)}));
  const onDutyWithGPS = onDutyList.filter(t => t._hasGPS);

  const selId = selected && onDutyList.find(t=>t.id===selected) ? selected : (onDutyWithGPS[0]?.id || onDutyList[0]?.id || null);
  const selT  = onDutyList.find(t=>t.id===selId) || null;

  // ── Google Maps URL builders ───────────────────────
  const singleMapSrc = t => {
    if(!t?._hasGPS) return '';
    const ts = Math.floor((t.locationUpdatedAt?.toMillis?.()??0)/30000);
    return `https://maps.google.com/maps?q=${t.location.lat},${t.location.lng}&z=16&output=embed&key=${ts}`;
  };
  const allMapSrc = () => {
    if(onDutyWithGPS.length===0) return '';
    if(onDutyWithGPS.length===1) return singleMapSrc(onDutyWithGPS[0]);
    const avgLat = onDutyWithGPS.reduce((s,t)=>s+t.location.lat,0)/onDutyWithGPS.length;
    const avgLng = onDutyWithGPS.reduce((s,t)=>s+t.location.lng,0)/onDutyWithGPS.length;
    const ts = Math.floor(now/30000);
    return `https://maps.google.com/maps?q=${avgLat.toFixed(4)},${avgLng.toFixed(4)}&z=14&output=embed&key=${ts}`;
  };

  const btnSty = active => ({
    padding:'5px 14px',borderRadius:'20px',fontSize:'0.74rem',fontWeight:'700',
    cursor:'pointer',fontFamily:'inherit',transition:'all .15s',
    background:active?'var(--elevated)':'transparent',
    color:active?'var(--text)':'var(--muted)',
    border:`1px solid ${active?'rgba(212,175,55,0.35)':'transparent'}`,
  });

  return (
    <div style={{padding:'0',display:'flex',flexDirection:'column',minHeight:'calc(100vh - 130px)'}}>

      {/* Header */}
      <div className="tracker-hdr" style={{padding:'13px 18px',borderBottom:'1px solid var(--border)',flexShrink:0,display:'flex',flexDirection:'column',gap:'8px'}}>
        {/* Row 1: title + toggle */}
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:'8px',flexWrap:'wrap'}}>
          <div style={{display:'flex',alignItems:'center',gap:'9px'}}>
            <div style={{width:'8px',height:'8px',borderRadius:'50%',background:onDutyList.length>0?'#27ae60':'var(--muted)',animation:onDutyList.length>0?'pulse 2s infinite':'none'}}/>
            <h2 style={{margin:0,fontSize:'1rem',fontWeight:'700'}}>Live Tracker</h2>
            <span style={{fontSize:'0.72rem',fontWeight:'700',color:'#27ae60',background:'rgba(39,174,96,0.1)',border:'1px solid rgba(39,174,96,0.25)',borderRadius:'20px',padding:'3px 9px',display:'flex',alignItems:'center',gap:'4px'}}>
              <span style={{width:'5px',height:'5px',borderRadius:'50%',background:'#27ae60',display:'inline-block'}}/>
              {onDutyList.length}/{therapists.length}
            </span>
          </div>
          {/* View toggle */}
          <div style={{display:'flex',gap:'3px',background:'var(--elevated)',borderRadius:'22px',padding:'3px',border:'1px solid var(--border)'}}>

            <button style={btnSty(view==='all')}    onClick={()=>setView('all')}>🗺 All</button>
          </div>
        </div>
        {/* Row 2: GPS reminder button */}
        <div style={{display:'flex',alignItems:'center',gap:'8px',flexWrap:'wrap'}}>
          <button
            onClick={sendGPSReminder}
            disabled={notifSending}
            style={{fontSize:'0.72rem',fontWeight:'700',color:'var(--gold)',background:'var(--gold-glow)',border:'1px solid var(--border-gold)',borderRadius:'20px',padding:'6px 14px',cursor:notifSending?'not-allowed':'pointer',opacity:notifSending?0.7:1,display:'flex',alignItems:'center',gap:'5px',minHeight:'34px'}}
          >
            {notifSending ? <><span className="spin">✦</span> Sending…</> : '📍 Send GPS Reminder'}
          </button>
          {notifMsg && <span style={{fontSize:'0.72rem',color:notifMsg.startsWith('✓')?'#27ae60':'#e74c3c'}}>{notifMsg}</span>}
        </div>
      </div>

      {onDutyList.length===0 ? (
        <div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:'14px',padding:'48px 20px'}}>
          <div style={{width:'64px',height:'64px',borderRadius:'50%',background:'var(--elevated)',border:'1px solid var(--border)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'1.6rem'}}>📍</div>

          <p style={{fontSize:'0.82rem',color:'var(--muted)',margin:0,textAlign:'center'}}>Therapists appear here when they go Online</p>
        </div>
      ) : (
        <div className="tracker-grid">

          {/* Left list */}
          <div className="tracker-list">
            <p style={{fontSize:'0.62rem',color:'var(--muted)',letterSpacing:'1.5px',textTransform:'uppercase',padding:'4px 6px 10px',margin:0}}>Active Therapists</p>

              {onDutyList.map(t=>{
                const isSel = selId===t.id && view==='single';

                return (
                  <div key={t.id} onClick={()=>{ setSelected(t.id); setView('single'); }} style={{
                    background:isSel?'rgba(201,150,58,0.08)':'transparent',

                    borderRadius:'11px',padding:'10px 11px',cursor:'pointer',transition:'all .15s',
                  }}>
                    <div style={{display:'flex',alignItems:'center',gap:'10px'}}>
                      <div style={{position:'relative',flexShrink:0}}>

                          {tInitials(t.name||t.therapistId||'?')}
                        </div>
                        <div style={{position:'absolute',bottom:0,right:0,width:'9px',height:'9px',borderRadius:'50%',background:t._hasGPS?'#27ae60':'#f39c12',border:'2px solid var(--surface)'}}/>
                      </div>
                      <div style={{flex:1,minWidth:0}}>

                        {t._hasGPS
                          ? <p style={{fontSize:'0.67rem',color:'var(--muted)',margin:'2px 0 0'}}>📍 {t._ago} · 🟢 {t._activeAgo}</p>

function DashboardTab({ onNavigate = ()=>{} }) {
  const [bookings,   setBookings]   = useState([]);
  const [therapists, setTherapists] = useState([]);
  const [loadingB,   setLoadingB]   = useState(true);

  useEffect(()=>{
    const unsub = db.collection('bookings').limit(200).onSnapshot(snap=>{
      setBookings(snap.docs.map(d=>({id:d.id,...d.data()}))
        .sort((a,b)=>(b.createdAt?.toMillis?.()??0)-(a.createdAt?.toMillis?.()??0)));
      setLoadingB(false);
    });
    return ()=>unsub();
  },[]);

  useEffect(()=>{
    const unsub = db.collection('therapists').onSnapshot(snap=>{
      const list = snap.docs.map(d=>({id:d.id,...d.data()}));
      setTherapists(list);
    });
    return ()=>unsub();
  },[]);

  // One-time cleanup: clear sessionActive for therapists with no active booking
  useEffect(()=>{
    if(bookings.length===0||therapists.length===0) return;
    therapists.forEach(t=>{
      if(!t.sessionActive) return;
      const hasLive = bookings.some(b=>
        (b.therapistDocId===t.id||b.therapistId===t.therapistId) &&
        ['in_session','on_way','confirmed'].includes(b.status)
      );
      if(!hasLive){
        db.collection('therapists').doc(t.id).update({sessionActive:false}).catch(()=>{});
      }
    });

  const today = new Date(); today.setHours(0,0,0,0);
  const todayCount             = bookings.filter(b=>{ const d=b.createdAt?.toDate?.(); return d&&d>=today; }).length;
  const pendingCount           = bookings.filter(b=>b.status==='pending'||b.status==='admin_pending').length;
  const confirmedCount         = bookings.filter(b=>b.status==='confirmed').length;

  const noGPSCount             = therapists.filter(t=>t.available&&!t.lat&&!t.latitude&&!t.lastLocation).length;
  const ratedTherps            = therapists.filter(t=>t.rating!=null&&parseFloat(t.rating)>0);
  const avgRating              = ratedTherps.length>0?(ratedTherps.reduce((s,t)=>s+parseFloat(t.rating||0),0)/ratedTherps.length).toFixed(1):'—';

    confirmed:     {color:'#2ecc71',     bg:'rgba(46,204,113,0.12)',  label:'Confirmed'},

          <p style={{fontSize:'0.61rem',color:'var(--success)',margin:0,fontWeight:'500'}}>↑{onlineCount} from morning</p>
        </div>

        {/* Bookings Today */}
        <div className="card" style={{padding:'14px 16px'}}>
          <div style={{width:'32px',height:'32px',borderRadius:'9px',background:'var(--gold-glow)',display:'flex',alignItems:'center',justifyContent:'center',marginBottom:'10px',fontSize:'1.1rem'}}>📋</div>

          <p style={{fontSize:'0.72rem',fontWeight:'600',color:'var(--text)',margin:'0 0 2px'}}>Bookings Today</p>

//  THERAPIST MANAGER
// ══════════════════════════════════════════════════════
function TherapistManager() {
  const [therapists, setTherapists] = useState([]);
  const [loading,    setLoading]    = useState(true);
  const [uploading,  setUploading]  = useState(false);
  const [progress,   setProgress]   = useState(0);
  const [preview,    setPreview]    = useState(null);
  const [file,       setFile]       = useState(null);
  const [dragOver,   setDragOver]   = useState(false);
  const [uploadErr,  setUploadErr]  = useState('');
  const [showAddForm, setShowAddForm] = useState(false);
  const fileRef = useRef(null);

  useEffect(()=>{ fetchAll(); },[]);

  const fetchAll = async () => {
    setLoading(true);
    try {
      const snap = await db.collection('therapists').orderBy('createdAt','desc').get();
      setTherapists(snap.docs.map(d=>({id:d.id,...d.data()})));
    } finally { setLoading(false); }
  };

  const pickFile = (f) => {
    if (!f) return;
    if (!f.type.startsWith('image/')) { setUploadErr('Select an image file.'); return; }
    if (f.size > 10*1024*1024) { setUploadErr('Image must be under 10 MB.'); return; }
    setUploadErr(''); setFile(f);
    const r = new FileReader();
    r.onloadend = () => setPreview(r.result);
    r.readAsDataURL(f);
  };

  const clearFile = () => { setFile(null); setPreview(null); setUploadErr(''); setProgress(0); };

  // Resize image and convert to base64 (bypasses Firebase Storage)
  const resizeToBase64 = (f) => new Promise((resolve, reject) => {
    const img = new Image();
    const url = URL.createObjectURL(f);
    img.onload = () => {
      const MAX = 900;
      let w = img.width, h = img.height;
      if (w > MAX || h > MAX) {
        if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
        else        { w = Math.round(w * MAX / h); h = MAX; }
      }
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      URL.revokeObjectURL(url);
      resolve(canvas.toDataURL('image/jpeg', 0.82));
    };
    img.onerror = reject;
    img.src = url;
  });

  const handleUpload = async () => {
    if (!file || uploading) return false;
    setUploading(true); setUploadErr('');
    try {
      setProgress(30);
      const imageUrl = await resizeToBase64(file);
      setProgress(70);
      const therapistId = `TH_${Date.now()}_${Math.random().toString(36).slice(2,7).toUpperCase()}`;
      await db.collection('therapists').add({
        therapistId, imageUrl, available: true,
        createdAt: FieldValue.serverTimestamp()
      });
      setProgress(100);
      clearFile(); await fetchAll();
      return true;
    } catch(err) { setUploadErr(`Upload failed: ${err.message}`); return false; }
    finally { setUploading(false); setProgress(0); }
  };

  const toggleAvailable = async (t) => {
    await db.collection('therapists').doc(t.id).update({available:!t.available});
    setTherapists(prev=>prev.map(x=>x.id===t.id?{...x,available:!x.available}:x));
  };

  const handleDelete = async (t) => {
    if (!confirm(`Delete ${t.therapistId}?`)) return;
    try {
      await db.collection('therapists').doc(t.id).delete();
      setTherapists(prev=>prev.filter(x=>x.id!==t.id));
    } catch(err) { alert(`Delete failed: ${err.message}`); }
  };

  const [rowUploading, setRowUploading] = useState(null); // therapist id being uploaded
  const rowFileRef = useRef(null);
  const rowTargetRef = useRef(null); // which therapist is being updated

  const handleRowPhotoClick = (t) => {
    rowTargetRef.current = t;
    rowFileRef.current?.click();
  };

  const handleRowFileChange = async (e) => {
    const f = e.target.files[0];
    e.target.value = '';
    if (!f || !f.type.startsWith('image/')) return;
    const t = rowTargetRef.current;
    if (!t) return;
    setRowUploading(t.id);
    try {
      const imageUrl = await resizeToBase64(f);
      await db.collection('therapists').doc(t.id).update({ imageUrl });
      setTherapists(prev => prev.map(x => x.id===t.id ? {...x, imageUrl} : x));
    } catch(err) { alert(`Upload failed: ${err.message}`); }
    setRowUploading(null);
  };

  return (
    <div>
      {/* Therapist list */}
      <div className="card" style={{overflow:'hidden'}}>
        <div style={{padding:'16px 20px',display:'flex',alignItems:'center',justifyContent:'space-between',borderBottom: showAddForm ? '1px solid var(--border)' : '1px solid var(--border)'}}>
          <div style={{display:'flex',alignItems:'center',gap:'10px'}}>
            <span style={{fontSize:'1rem'}}>🖼️</span>
            <span style={{fontWeight:'700',fontSize:'0.95rem'}}>Therapists</span>
            <span className="badge badge-gray">{therapists.length}</span>
            <span className="badge badge-green">● {therapists.filter(t=>t.available).length}</span>
          </div>
          <div style={{display:'flex',gap:'8px',alignItems:'center'}}>
            <button
              onClick={async()=>{
                await db.collection('config').doc('appSettings').set({forceRefreshAt:FieldValue.serverTimestamp()},{merge:true});
              }}
              className="btn btn-sm btn-ghost"
              title="Force all therapist phones to reload silently"
              style={{fontSize:'0.78rem',color:'var(--muted)'}}
            >🔄 Refresh All</button>
            <button
              onClick={()=>{ setShowAddForm(v=>!v); if(showAddForm){clearFile();} }}
              className={`btn btn-sm ${showAddForm?'btn-ghost':'btn-gold'}`}
              style={{gap:'5px',display:'flex',alignItems:'center'}}
            >
              {showAddForm ? '✕ Cancel' : '+ Add Therapist'}
            </button>
          </div>
        </div>

        {/* Collapsible add form */}
        {showAddForm && (
          <div style={{padding:'20px',borderBottom:'1px solid var(--border)',background:'var(--elevated)'}}>
            <input ref={fileRef} type="file" accept="image/*" style={{display:'none'}} onChange={e=>pickFile(e.target.files[0])}/>
            <div
              className={`upload-zone${dragOver?' drag':''}`}
              style={{minHeight:'120px',padding:'20px'}}
              onDragOver={e=>{e.preventDefault();setDragOver(true);}}
              onDragLeave={()=>setDragOver(false)}
              onDrop={e=>{e.preventDefault();setDragOver(false);pickFile(e.dataTransfer.files[0]);}}
              onClick={()=>!uploading&&fileRef.current?.click()}
            >
              {preview
                ? <img src={preview} style={{maxHeight:'180px',maxWidth:'100%',objectFit:'contain',borderRadius:'8px'}}/>
                : <div style={{textAlign:'center',pointerEvents:'none'}}>
                    <div style={{fontSize:'2rem',marginBottom:'6px'}}>📷</div>
                    <p style={{color:'var(--text)',fontSize:'0.85rem',fontWeight:'500'}}>Drop photo here or click to browse</p>
                    <p style={{color:'var(--muted)',fontSize:'0.75rem',marginTop:'3px'}}>JPG · PNG · WEBP · Max 10 MB</p>
                  </div>
              }
            </div>
            {uploadErr && <div style={{marginTop:'8px',padding:'8px 12px',background:'var(--danger-bg)',border:'1px solid rgba(231,76,60,.3)',borderRadius:'8px',color:'var(--danger)',fontSize:'0.8rem'}}>{uploadErr}</div>}
            {uploading && <div style={{marginTop:'10px'}}><div style={{height:'3px',background:'var(--border)',borderRadius:'4px',overflow:'hidden'}}><div style={{height:'100%',background:'linear-gradient(90deg,var(--gold-dark),var(--gold))',width:`${progress}%`,transition:'width .2s',borderRadius:'4px'}}/></div><p style={{color:'var(--muted)',fontSize:'0.72rem',marginTop:'5px',textAlign:'center'}}>Uploading… {progress}%</p></div>}
            <div style={{display:'flex',gap:'8px',marginTop:'14px',justifyContent:'flex-end'}}>
              {preview && !uploading && <button onClick={clearFile} className="btn btn-ghost btn-sm">✕ Clear</button>}
              <button onClick={async ()=>{ const ok = await handleUpload(); if(ok) setShowAddForm(false); }} disabled={!file||uploading} className="btn btn-gold btn-sm" style={{opacity:!file||uploading?.5:1,minWidth:'140px'}}>
                {uploading?<span className="spin">✦</span>:'Upload Photo'}
              </button>
            </div>
          </div>
        )}

        {loading
          ? <div style={{padding:'48px',textAlign:'center',color:'var(--muted)'}}><span className="spin" style={{fontSize:'1.5rem',color:'var(--gold)'}}>✦</span></div>
          : therapists.length===0
            ? <div style={{padding:'48px',textAlign:'center',color:'var(--muted)',fontSize:'0.9rem'}}>No therapists yet — click "+ Add Therapist" above.</div>
            : <>
                <input ref={rowFileRef} type="file" accept="image/*" style={{display:'none'}} onChange={handleRowFileChange}/>
                {therapists.map(t=>(
                  <div key={t.id} className="item-card">
                    {/* Avatar — tap to replace photo */}
                    <div className="item-avatar"
                      onClick={()=>rowUploading?null:handleRowPhotoClick(t)}
                      title="Tap to change photo"
                      style={{width:'48px',height:'48px',borderRadius:'10px',overflow:'hidden',background:'var(--elevated)',border:'1px solid var(--border)',cursor:'pointer',position:'relative',flexShrink:0}}
                      onMouseEnter={e=>{const o=e.currentTarget.querySelector('.photo-overlay');if(o)o.style.opacity='1';}}
                      onMouseLeave={e=>{const o=e.currentTarget.querySelector('.photo-overlay');if(o)o.style.opacity='0';}}
                    >
                      {rowUploading===t.id
                        ? <div style={{width:'100%',height:'100%',display:'flex',alignItems:'center',justifyContent:'center'}}><span className="spin" style={{color:'var(--gold)'}}>✦</span></div>
                        : <>
                            <img src={t.imageUrl} style={{width:'100%',height:'100%',objectFit:'cover',display:'block'}} onError={e=>e.target.style.display='none'}/>
                            <div className="photo-overlay" style={{position:'absolute',inset:0,background:'rgba(0,0,0,0.6)',display:'flex',alignItems:'center',justifyContent:'center',opacity:0,transition:'opacity .15s',fontSize:'1.1rem'}}>📷</div>
                          </>
                      }
                    </div>
                    {/* Info */}
                    <div className="item-info">
                      <div className="name">{t.name||<span style={{color:'var(--muted)',fontStyle:'italic'}}>Unnamed</span>}</div>
                      <div className="sub">{t.therapistId}{t.speciality?` · ${t.speciality}`:''}</div>
                      <div className="meta">
                        <button onClick={()=>toggleAvailable(t)} className={`badge ${t.available?'badge-green':'badge-gray'}`} style={{cursor:'pointer',border:'none',fontFamily:'inherit'}}>
                          {t.available?'● Visible':'○ Hidden'}
                        </button>
                        <span style={{fontSize:'0.68rem',color:'var(--muted)'}}>{t.createdAt?.toDate?.()?.toLocaleDateString?.()??'—'}</span>
                      </div>
                      <div className="item-actions-mobile">
                        <button onClick={()=>handleDelete(t)} className="btn btn-danger btn-sm">Delete</button>
                      </div>
                    </div>
                    {/* Desktop actions */}
                    <div className="item-actions item-actions-desktop">
                      <button onClick={()=>handleDelete(t)} className="btn btn-danger btn-sm">Delete</button>
                    </div>
                  </div>
                ))}
              </>
        }
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════════
//  LINK CREATOR
// ══════════════════════════════════════════════════════
function LinkCreator() {
  const [form, setForm] = useState({bookType:'now',scheduledDate:'',clientName:'',clientPhone:'',serviceType:'',expiryMinutes:60,maxViewsPerImage:2,viewDurationSeconds:3});
  const [links,    setLinks]    = useState([]);
  const [creating, setCreating] = useState(false);
  const [newLink,  setNewLink]  = useState('');
  const [loading,  setLoading]  = useState(true);
  const [copied,   setCopied]   = useState('');
  const [editing,  setEditing]  = useState(null); // link id being edited
  const [editVals, setEditVals] = useState({});   // {maxViewsPerImage, viewDurationSeconds}
  const [saving,   setSaving]   = useState(false);

  useEffect(()=>{ fetchLinks(); },[]);

  const galleryUrl = (token) => {
    return `${window.location.origin}/gallery.html?token=${token}`;
  };

  const fetchLinks = async () => {
    try {
      const snap = await db.collection('galleryTokens').orderBy('createdAt','desc').get();
      setLinks(snap.docs.map(d=>({id:d.id,...d.data()})));
    } finally { setLoading(false); }
  };

  const handleCreate = async (e) => {
    e.preventDefault();
    if (!form.clientName.trim() || !form.clientPhone.trim()) return;
    if (form.bookType === 'later' && !form.scheduledDate) return;
    setCreating(true);
    try {
      const token     = genToken();
      const expiresAt = new Date(Date.now() + Number(form.expiryMinutes)*60000);
      const doc = {
        token, expiresAt: firebase.firestore.Timestamp.fromDate(expiresAt),
        maxViewsPerImage: Number(form.maxViewsPerImage),
        viewDurationSeconds: Number(form.viewDurationSeconds),
        clientName: form.clientName.trim(), clientPhone: form.clientPhone.trim(),
        serviceType: form.serviceType || '',
        bookType: form.bookType,
        used: false, createdAt: FieldValue.serverTimestamp(),
      };
      if (form.bookType === 'later') doc.scheduledDate = form.scheduledDate;
      await db.collection('galleryTokens').add(doc);
      setNewLink(galleryUrl(token));
      setForm(f=>({...f,clientName:'',clientPhone:'',scheduledDate:''}));
      await fetchLinks();
    } catch(err) { alert(`Failed: ${err.message}`); }
    finally { setCreating(false); }
  };

  const copyLink = async (url, key) => {
    try { await navigator.clipboard.writeText(url); }
    catch { const el=Object.assign(document.createElement('textarea'),{value:url}); document.body.appendChild(el); el.select(); document.execCommand('copy'); document.body.removeChild(el); }
    setCopied(key); setTimeout(()=>setCopied(''),2000);
  };

  const isExpired = (l) => l.expiresAt?.toDate?.() < new Date();

  const startEdit = (l) => {
    setEditing(l.id);
    setEditVals({ maxViewsPerImage: l.maxViewsPerImage, viewDurationSeconds: l.viewDurationSeconds });
  };
  const cancelEdit = () => { setEditing(null); setEditVals({}); };
  const saveEdit = async (l) => {
    setSaving(true);
    try {
      await db.collection('galleryTokens').doc(l.id).update({
        maxViewsPerImage:   Number(editVals.maxViewsPerImage),
        viewDurationSeconds: Number(editVals.viewDurationSeconds),
      });
      setLinks(prev => prev.map(x => x.id===l.id ? {...x,...editVals, maxViewsPerImage:Number(editVals.maxViewsPerImage), viewDurationSeconds:Number(editVals.viewDurationSeconds)} : x));
      setEditing(null);
    } catch(e) { alert(`Save failed: ${e.message}`); }
    setSaving(false);
  };

  return (
    <div style={{display:'flex',flexDirection:'column',gap:'24px'}}>

      {/* Create link card */}
      <div className="card-gold" style={{padding:'24px'}}>
        <div style={{display:'flex',alignItems:'center',gap:'8px',marginBottom:'20px'}}>
          <span style={{fontSize:'1.1rem'}}>🔗</span>
          <h2 style={{fontSize:'0.95rem',fontWeight:'700',color:'var(--text)'}}>Generate Gallery Link</h2>
        </div>
        <form onSubmit={handleCreate}>

          {/* ── Book type toggle ── */}
          <div style={{marginBottom:'18px'}}>
            <label className="form-label">Booking Type</label>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'8px'}}>
              {[['now','⚡ Book Now'],['later','📅 Book Later']].map(([bt,lbl])=>(
                <button type="button" key={bt}
                  onClick={()=>setForm(f=>({...f,bookType:bt,scheduledDate:''}))}
                  className="btn btn-md"
                  style={{width:'100%',
                    background: form.bookType===bt ? 'linear-gradient(135deg,var(--gold-dark),var(--gold))' : 'var(--elevated)',
                    color: form.bookType===bt ? '#0a0a0a' : 'var(--text)',
                    border: form.bookType===bt ? 'none' : '1px solid var(--border)',
                  }}>
                  {lbl}
                </button>
              ))}
            </div>
          </div>

          <div className="form-grid" style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(min(200px,100%),1fr))',gap:'16px',marginBottom:'20px'}}>

            {/* Date picker — Book Later only */}
            {form.bookType==='later' && (
              <div style={{gridColumn:'1/-1'}}>
                <label className="form-label">Scheduled Date <span style={{color:'var(--danger)'}}>*</span></label>
                <input type="date" value={form.scheduledDate} min={new Date().toISOString().split('T')[0]}
                  onChange={e=>setForm(p=>({...p,scheduledDate:e.target.value}))} className="form-input" required/>
                {form.scheduledDate && (
                  <p style={{fontSize:'0.74rem',color:'var(--muted)',marginTop:'5px'}}>
                    {(()=>{
                      const [y,m,d]=form.scheduledDate.split('-').map(Number);
                      const days=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
                      return `📅 ${days[new Date(y,m-1,d).getDay()]} — only therapists working this day will appear in the gallery`;
                    })()}
                  </p>
                )}
              </div>
            )}

            {/* Client name — required */}
            <div>
              <label className="form-label">Client Name <span style={{color:'var(--danger)'}}>*</span></label>
              <input type="text" value={form.clientName}
                onChange={e=>setForm(p=>({...p,clientName:e.target.value}))}
                className="form-input" placeholder="Full name" required/>
            </div>

            {/* Client phone — required */}
            <div>
              <label className="form-label">Client Phone <span style={{color:'var(--danger)'}}>*</span></label>
              <input type="tel" value={form.clientPhone}
                onChange={e=>setForm(p=>({...p,clientPhone:e.target.value}))}
                className="form-input" placeholder="10-digit number" required/>
            </div>

            {/* Service type */}
            <div>
              <label className="form-label">Massage Service</label>
              <select value={form.serviceType} onChange={e=>setForm(p=>({...p,serviceType:e.target.value}))} className="form-input">
                <option value=''>— Select Service —</option>
                {SPA_SERVICES.map(s=><option key={s} value={s}>{s}</option>)}
              </select>
            </div>

            {/* Link settings */}
            {[
              ['expiryMinutes','Link Expiry (mins)','60','number'],
              ['maxViewsPerImage','Max Views / Photo','2','number'],
              ['viewDurationSeconds','View Duration (sec)','3','number'],
            ].map(([key,label,ph,type])=>(
              <div key={key}>
                <label className="form-label">{label}</label>
                <input type={type} value={form[key]} onChange={e=>setForm(p=>({...p,[key]:e.target.value}))} className="form-input" placeholder={ph}/>
              </div>
            ))}
          </div>

          <button type="submit" disabled={creating} className="btn btn-gold btn-md" style={{width:'100%'}}>
            {creating?<span className="spin">✦</span>:'✦ Generate Link'}
          </button>
        </form>

        {newLink && (
          <div className="fade-in" style={{marginTop:'20px',background:'var(--success-bg)',border:'1px solid rgba(46,204,113,.3)',borderRadius:'10px',padding:'16px'}}>
            <div style={{display:'flex',alignItems:'center',gap:'6px',marginBottom:'10px'}}>
              <span style={{color:'var(--success)',fontWeight:'700',fontSize:'0.88rem'}}>✓ Link created successfully</span>
            </div>
            <div style={{display:'flex',gap:'10px',alignItems:'center',flexWrap:'wrap'}}>
              <code style={{flex:1,background:'var(--elevated)',border:'1px solid var(--border)',borderRadius:'8px',padding:'10px 12px',fontSize:'0.78rem',color:'var(--muted)',wordBreak:'break-all',fontFamily:'monospace',minWidth:'0'}}>{newLink}</code>
              <div style={{display:'flex',gap:'8px',flexShrink:0}}>
                <button onClick={()=>copyLink(newLink,'new')} className="btn btn-gold btn-sm" style={{whiteSpace:'nowrap',minWidth:'80px'}}>{copied==='new'?'✓ Copied':'Copy'}</button>
                <a href={`https://wa.me/?text=${encodeURIComponent(`✨ Hi! View our therapists and book your Feel Free Spa session here:\n${newLink}`)}`}
                  target="_blank" rel="noopener noreferrer"
                  style={{display:'inline-flex',alignItems:'center',gap:'5px',background:'#25D366',color:'#fff',border:'none',borderRadius:'8px',padding:'7px 14px',fontSize:'0.78rem',fontWeight:'700',cursor:'pointer',textDecoration:'none',whiteSpace:'nowrap'}}>
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
                  WhatsApp
                </a>
              </div>
            </div>
          </div>
        )}
      </div>

      {/* Links list */}
      <div className="card" style={{overflow:'hidden'}}>
        <div style={{padding:'16px 20px',display:'flex',alignItems:'center',justifyContent:'space-between',borderBottom:'1px solid var(--border)'}}>
          <div style={{display:'flex',alignItems:'center',gap:'10px'}}>
            <span style={{fontSize:'1rem'}}>📋</span>
            <span style={{fontWeight:'700',fontSize:'0.95rem'}}>Created Links</span>
            <span className="badge badge-gray">{links.length}</span>
          </div>
          <span className="badge badge-green">● {links.filter(l=>!isExpired(l)).length} active</span>
        </div>
        {loading
          ? <div style={{padding:'48px',textAlign:'center'}}><span className="spin" style={{fontSize:'1.5rem',color:'var(--gold)'}}>✦</span></div>
          : links.length===0
            ? <div style={{padding:'48px',textAlign:'center',color:'var(--muted)',fontSize:'0.9rem'}}>No links yet — generate one above.</div>
            : <div style={{display:'flex',flexDirection:'column'}}>
                {links.map((l,i)=>{
                  const expired=isExpired(l); const url=galleryUrl(l.token);
                  return (
                    <div key={l.id} className="link-row" style={{padding:'16px 20px',borderBottom:i<links.length-1?'1px solid var(--border)':'none',opacity:expired?.55:1}}>
                      <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',gap:'12px',marginBottom:'8px'}}>
                        <div style={{display:'flex',alignItems:'center',gap:'10px'}}>
                          <div style={{width:'36px',height:'36px',borderRadius:'50%',background:expired?'var(--elevated)':'var(--gold-glow)',border:`1px solid ${expired?'var(--border)':'var(--border-gold)'}`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:'0.9rem',flexShrink:0}}>
                            {l.bookType==='later'?'📅':(expired?'⏱':'👤')}
                          </div>
                          <div>
                            <div style={{fontWeight:'600',fontSize:'0.92rem'}}>{l.clientName}</div>
                            {l.clientPhone&&<div style={{color:'var(--muted)',fontSize:'0.78rem'}}>📱 {l.clientPhone}</div>}
                            <div style={{marginTop:'5px',display:'flex',gap:'6px',alignItems:'center',flexWrap:'wrap'}}>
                              <span className={`badge ${l.bookType==='later'?'badge-gold':'badge-gray'}`}>{l.bookType==='later'?'📅 Book Later':'⚡ Book Now'}</span>
                              {l.bookType==='later'&&l.scheduledDate&&(()=>{
                                const [y,m,d]=l.scheduledDate.split('-').map(Number);
                                const days=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
                                return <span style={{fontSize:'0.72rem',color:'var(--muted)'}}>{days[new Date(y,m-1,d).getDay()]}, {l.scheduledDate}</span>;
                              })()}
                            </div>
                          </div>
                        </div>
                        <div style={{display:'flex',gap:'8px',alignItems:'center',flexShrink:0}}>
                          <span className={`badge ${expired?'badge-gray':'badge-green'}`}>{expired?'Expired':'Active'}</span>
                          <button onClick={async()=>{if(confirm('Delete this link?')){await db.collection('galleryTokens').doc(l.id).delete();setLinks(p=>p.filter(x=>x.id!==l.id));}}} style={{background:'transparent',border:'none',color:'var(--muted)',fontSize:'1rem',cursor:'pointer',padding:'4px',lineHeight:1}}>✕</button>
                        </div>
                      </div>
                      {editing===l.id ? (
                        <div style={{paddingLeft:'46px',marginBottom:'10px'}}>
                          <div style={{display:'flex',gap:'10px',flexWrap:'wrap',alignItems:'flex-end',background:'var(--elevated)',border:'1px solid var(--border-gold)',borderRadius:'10px',padding:'14px'}}>
                            <div>
                              <label className="form-label">Max Views / Photo</label>
                              <input type="number" min="1" value={editVals.maxViewsPerImage} onChange={e=>setEditVals(v=>({...v,maxViewsPerImage:e.target.value}))}
                                className="form-input" style={{width:'130px'}}/>
                            </div>
                            <div>
                              <label className="form-label">View Duration (sec)</label>
                              <input type="number" min="1" value={editVals.viewDurationSeconds} onChange={e=>setEditVals(v=>({...v,viewDurationSeconds:e.target.value}))}
                                className="form-input" style={{width:'130px'}}/>
                            </div>
                            <div style={{display:'flex',gap:'8px'}}>

                            <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
