<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Portal — Therapist Gallery</title>

  <!-- Firebase compat SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>

  <!-- Google Fonts: Plus Jakarta Sans (neat, modern, stylish) -->
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>

  <!-- React 18 + Babel for JSX -->
  <script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.development.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>

<style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── LIGHT MODE (Design 2 — warm parchment) ── */
    :root {
      --bg: #f5f4f0; --surface: #ffffff; --elevated: #eeecea; --card: #ffffff;
      --gold: #9a6f00; --gold-light: #c49a00; --gold-dark: #7a5800; --gold-glow: rgba(154,111,0,0.09);
      --text: #1a1a2e; --muted: #6b7280; --subtle: #9ca3af; --border: rgba(0,0,0,0.08);
      --border-gold: rgba(154,111,0,0.22);
      --danger: #dc2626; --danger-bg: rgba(220,38,38,0.07);
      --success: #16a34a; --success-bg: rgba(22,163,74,0.08);
      --info: #2563eb;
      --sidebar-w: 220px;
      /* card shadow for light mode */
      --card-shadow: 0 1px 3px rgba(0,0,0,0.07), 0 1px 2px rgba(0,0,0,0.04);
    }

    /* ── DARK MODE ── */
    html.dark {
      --bg: #080b12; --surface: #0f1420; --elevated: #1c2235; --card: #141928;
      --gold: #e4b84a; --gold-light: #f0c84a; --gold-dark: #c9982a; --gold-glow: rgba(228,184,74,0.12);
      --text: #e8eaf0; --muted: #8b92a8; --subtle: #4a5270; --border: rgba(255,255,255,0.07);
      --border-gold: rgba(228,184,74,0.28);
      --danger: #f05252; --danger-bg: rgba(240,82,82,0.1);
      --success: #22d07a; --success-bg: rgba(34,208,122,0.1);
      --info: #38bdf8;
      --card-shadow: none;
    }
    html, body { background: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; min-height: 100vh; transition: background 0.2s, color 0.2s; overflow-x: hidden; }
    input, textarea, select { user-select: text; -webkit-user-select: text; }
    img { pointer-events: none; -webkit-user-drag: none; }
    button { cursor: pointer; font-family: inherit; }
    ::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 4px; }
    html.dark ::-webkit-scrollbar-thumb { background: #333; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spin { display: inline-block; animation: spin 0.7s linear infinite; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:none; } }
    .fade-in { animation: fadeIn 0.25s ease forwards; }
    @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.4;} }
    .pulse { animation: pulse 2s ease-in-out infinite; }

    /* Layout */
    .admin-layout { display:flex; min-height:100vh; }
    .sidebar {
      width: var(--sidebar-w); background: var(--surface); border-right: 0.5px solid var(--border);
      display: flex; flex-direction: column; position: fixed; top:0; left:0; height:100vh; z-index:100;
      overflow-y: auto; box-shadow: 1px 0 8px rgba(0,0,0,0.04);
    }
    .sidebar-brand { padding: 22px 20px 18px; border-bottom: 0.5px solid var(--border); }
    .sidebar-nav { padding: 12px 10px; flex:1; display:flex; flex-direction:column; gap:2px; }
    .nav-item {
      display:flex; align-items:center; gap:10px; padding:10px 14px; border-radius:10px;
      color:var(--muted); font-size:0.875rem; font-weight:500; cursor:pointer;
      background:transparent; border:none; text-align:left; width:100%; transition:all .15s;
    }
    .nav-item:hover { background:var(--elevated); color:var(--text); }
    .nav-item.active { background:var(--gold-glow); color:var(--gold); border:1px solid var(--border-gold); font-weight:600; }
    .nav-icon { font-size:1rem; width:20px; text-align:center; flex-shrink:0; }
    .sidebar-footer { padding:16px; border-top:0.5px solid var(--border); }
    .main { margin-left:var(--sidebar-w); flex:1; min-height:100vh; }
    .topbar {
      background:var(--surface); border-bottom:0.5px solid var(--border);
      padding:12px 24px; display:flex; align-items:center; justify-content:space-between;
      position:sticky; top:0; z-index:50; box-shadow:0 1px 4px rgba(0,0,0,0.04);
    }
    .content { padding:24px; }

    /* Theme toggle button */
    .theme-toggle {
      width:34px; height:34px; border-radius:50%; border:0.5px solid var(--border);
      background:var(--elevated); display:flex; align-items:center; justify-content:center;
      cursor:pointer; font-size:1rem; transition:all .2s; flex-shrink:0;
    }
    .theme-toggle:hover { border-color:var(--border-gold); background:var(--gold-glow); }

    /* Cards */
    .card { background:var(--card); border:0.5px solid var(--border); border-radius:14px; box-shadow:var(--card-shadow); }
    .card-gold { background:var(--card); border:1px solid var(--border-gold); border-radius:14px; box-shadow:var(--card-shadow); }
    .stat-card { padding:20px 24px; }

    /* Table */
    .data-table { border:1px solid var(--border); border-radius:12px; overflow:hidden; }
    .table-head { background:var(--elevated); padding:10px 18px; border-bottom:1px solid var(--border); display:grid; align-items:center; }
    .table-head span { font-size:0.68rem; color:var(--muted); letter-spacing:1.5px; text-transform:uppercase; font-weight:600; }
    .table-row { padding:12px 18px; display:grid; align-items:center; border-bottom:1px solid var(--border); transition:background .1s; }
    .table-row:last-child { border-bottom:none; }
    .table-row:hover { background:rgba(212,175,55,0.03); }

    /* Badge */
    .badge { display:inline-flex; align-items:center; gap:5px; padding:3px 10px; border-radius:20px; font-size:0.72rem; font-weight:600; letter-spacing:0.5px; }
    .badge-green { background:var(--success-bg); color:var(--success); border:1px solid rgba(46,204,113,0.3); }
    .badge-red { background:var(--danger-bg); color:var(--danger); border:1px solid rgba(231,76,60,0.3); }
    .badge-gray { background:rgba(255,255,255,0.05); color:var(--muted); border:1px solid var(--border); }
    .badge-gold { background:var(--gold-glow); color:var(--gold); border:1px solid var(--border-gold); }

    /* Buttons */
    .btn { display:inline-flex; align-items:center; justify-content:center; gap:6px; border:none; border-radius:9px; font-weight:600; font-family:inherit; cursor:pointer; transition:all .15s; }
    .btn-gold { background:linear-gradient(135deg,var(--gold-dark),var(--gold)); color:#0a0a0a; }
    .btn-gold:hover { filter:brightness(1.1); }
    .btn-ghost { background:var(--elevated); border:1px solid var(--border); color:var(--text); }
    .btn-ghost:hover { border-color:var(--subtle); }
    .btn-danger { background:var(--danger-bg); border:1px solid rgba(231,76,60,.4); color:var(--danger); }
    .btn-danger:hover { background:rgba(231,76,60,.15); }
    .btn-sm { padding:6px 14px; font-size:0.78rem; }
    .btn-md { padding:9px 20px; font-size:0.85rem; }
    .btn-lg { padding:12px 28px; font-size:0.9rem; }

    /* Form */
    .form-label { display:block; font-size:0.72rem; color:var(--muted); letter-spacing:0.8px; text-transform:uppercase; font-weight:600; margin-bottom:6px; }
    .form-input { width:100%; background:var(--elevated); border:0.5px solid var(--border); border-radius:9px; padding:10px 14px; color:var(--text); font-size:0.92rem; outline:none; transition:border .15s, box-shadow .15s; font-family:inherit; }
    .form-input:focus { border-color:var(--border-gold); box-shadow:0 0 0 3px var(--gold-glow); }
    .form-input::placeholder { color:var(--subtle); }

    /* Divider */
    .divider { height:1px; background:var(--border); margin:0; }

    /* Upload zone */
    .upload-zone { border:2px dashed var(--border); border-radius:14px; display:flex; align-items:center; justify-content:center; cursor:pointer; transition:all .2s; background:var(--card); }
    .upload-zone:hover, .upload-zone.drag { border-color:var(--gold); background:rgba(212,175,55,0.03); }

    /* ── Bottom Nav (mobile) ─────────────────────────── */
    .bottom-nav { display:none; }

    /* ── Item card — used on ALL screen sizes ─────────── */
    /* Single layout: flex row, avatar left, info middle, actions right */
    .item-card {
      display:flex; align-items:center; gap:12px;
      padding:14px 18px; border-bottom:1px solid var(--border);
      transition:background .12s;
    }
    .item-card:last-child { border-bottom:none; }
    .item-card:hover { background:rgba(212,175,55,0.03); }
    .item-avatar { flex-shrink:0; }
    .item-info { flex:1; min-width:0; }
    .item-info .name { font-weight:600; font-size:0.92rem; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .item-info .sub  { font-size:0.7rem; color:var(--muted); font-family:monospace; margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .item-info .meta { margin-top:5px; display:flex; gap:6px; align-items:center; flex-wrap:wrap; }
    .item-actions { display:flex; gap:8px; align-items:center; flex-shrink:0; }

    /* Desktop: actions always inline */
    .item-actions-desktop { display:flex; gap:8px; align-items:center; }
    .item-actions-mobile  { display:none; }

    /* Table header row */
    .table-head { background:var(--elevated); padding:8px 18px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:12px; }
    .table-head span { font-size:0.67rem; color:var(--muted); letter-spacing:1.5px; text-transform:uppercase; font-weight:600; }

    /* ── Tracker layout (desktop) ── */
    .tracker-grid { display:grid; grid-template-columns:260px 1fr; flex:1; min-height:0; }
    .tracker-list { border-right:1px solid var(--border); overflow-y:auto; padding:10px; background:var(--surface); }
    .tracker-map  { position:relative; height:calc(100vh - 120px); min-height:480px; }

    /* ── Booking filter tabs ── */
    .bk-filter-tabs { display:flex; overflow-x:auto; border-bottom:1px solid var(--border); padding:0 6px; scrollbar-width:none; -webkit-overflow-scrolling:touch; }
    .bk-filter-tabs::-webkit-scrollbar { display:none; }

    /* ── Mobile ────────────────────────────────────────── */
    @media (max-width: 768px) {
      :root { --sidebar-w: 0px; }
      .sidebar { display:none !important; }
      .main { margin-left:0; padding-bottom:calc(56px + env(safe-area-inset-bottom,0px)); overflow-x:hidden; }

      /* ── Bottom nav — Concept C ── */
      .bottom-nav {
        display:flex !important; position:fixed; bottom:0; left:0; right:0; z-index:200;
        background:var(--surface); border-top:0.5px solid var(--border);
        padding-bottom: env(safe-area-inset-bottom);
      }
      .bottom-nav-item {
        flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
        gap:3px; background:transparent; border:none; color:var(--muted);
        font-size:0.58rem; font-weight:600; cursor:pointer; font-family:inherit;
        padding:8px 2px 10px; letter-spacing:0.3px; min-height:56px;
        position:relative; transition:color .15s;
      }
      .bottom-nav-item .bnav-icon { font-size:1.35rem; line-height:1; transition:transform .15s; }
      .bottom-nav-item.active { color:var(--gold); }
      .bottom-nav-item.active .bnav-icon { transform:scale(1.1); }
      .bottom-nav-item.active::after {
        content:''; position:absolute; bottom:0; left:20%; right:20%; height:2px;
        background:var(--gold); border-radius:2px 2px 0 0;
      }

      /* ── Topbar — compact command style ── */
      .topbar {
        padding:10px 16px; min-height:52px;
        background:var(--surface); border-bottom:0.5px solid var(--border);
      }
      .topbar-email { display:none !important; }
      .topbar-title { font-size:1rem !important; }
      .content { padding:14px 12px; gap:16px !important; }

      /* ── Concept C stat cards — gold border on mobile ── */
      .mob-stat-card {
        background:var(--card); border:1px solid var(--border-gold);
        border-radius:12px; padding:14px 12px;
        display:flex; flex-direction:column;
      }
      .mob-stat-icon { width:28px; height:28px; border-radius:8px; display:flex; align-items:center; justify-content:center; margin-bottom:10px; font-size:0.95rem; flex-shrink:0; }
      .mob-stat-num { font-size:1.75rem; font-weight:800; line-height:1; margin:0 0 4px; }
      .mob-stat-label { font-size:0.7rem; font-weight:600; color:var(--text); margin:0 0 2px; letter-spacing:0.1px; }
      .mob-stat-sub { font-size:0.6rem; margin:0; font-weight:500; }

      /* ── Quick action tiles ── */
      .mob-quick-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:14px; }
      .mob-quick-tile {
        display:flex; flex-direction:column; align-items:center; justify-content:center;
        gap:6px; padding:14px 8px; min-height:68px;
        border-radius:12px; border:none; cursor:pointer; font-family:inherit;
        font-size:0.75rem; font-weight:600; transition:opacity .15s; text-align:center;
      }
      .mob-quick-tile:active { opacity:0.72; }
      .mob-quick-icon { font-size:1.5rem; line-height:1; }

      /* ── Collapsible section header ── */
      .mob-section-hdr {
        display:flex; align-items:center; justify-content:space-between;
        padding:12px 14px; cursor:pointer; user-select:none;
        border-bottom:0.5px solid var(--border);
      }
      .mob-section-hdr-left { display:flex; align-items:center; gap:8px; }
      .mob-section-title { font-weight:700; font-size:0.88rem; color:var(--text); }
      .mob-section-badge { font-size:0.62rem; font-weight:700; padding:2px 8px; border-radius:20px; background:var(--gold-glow); color:var(--gold); border:1px solid var(--border-gold); }
      .mob-section-chevron { font-size:0.75rem; color:var(--muted); transition:transform .2s; }
      .mob-section-chevron.open { transform:rotate(180deg); }

      /* ── More menu rows ── */
      .mob-more-row {
        display:flex; align-items:center; gap:14px; padding:14px 16px;
        background:none; border:none; border-bottom:0.5px solid var(--border);
        cursor:pointer; text-align:left; font-family:inherit; width:100%;
        transition:background .1s;
      }
      .mob-more-row:last-child { border-bottom:none; }
      .mob-more-row:active { background:var(--elevated); }
      .mob-more-icon-wrap {
        width:38px; height:38px; border-radius:10px;
        display:flex; align-items:center; justify-content:center;
        font-size:1.15rem; flex-shrink:0;
      }

      /* Cards */
      .card-gold { padding:16px !important; }
      .upload-zone { min-height:100px !important; padding:18px 12px !important; }
      .form-grid { grid-template-columns:1fr !important; gap:12px !important; }
      .btn-lg { width:100% !important; min-height:48px; }
      .btn-md { min-height:44px; }
      .btn-sm { min-height:38px; padding:8px 14px !important; }

      /* Item cards — mobile: show mobile actions, hide desktop actions */
      .item-card { padding:12px 14px; gap:10px; }
      .item-actions-desktop { display:none !important; }
      .item-actions-mobile  {
        display:flex !important; gap:8px; margin-top:8px; flex-wrap:wrap;
      }

      /* Table header hidden on mobile */
      .table-head { display:none !important; }

      /* Link cards */
      .link-indent { padding-left:0 !important; }

      /* Login */
      .login-split { flex-direction:column !important; }
      .login-deco  { display:none !important; }
      .login-form-panel { padding:32px 20px !important; }

      /* Card header row */
      .card-header-counts { flex-wrap:wrap; gap:6px !important; }

      /* ── Live Tracker mobile ── */
      .tracker-grid { grid-template-columns:1fr !important; }
      .tracker-list { border-right:none !important; border-bottom:1px solid var(--border); max-height:220px; }
      .tracker-map  { height:50vh !important; min-height:280px !important; }
      .tracker-hdr  { padding:10px 12px !important; gap:8px !important; }
      .tracker-hdr-row1 { flex-wrap:wrap; gap:6px; }
      .tracker-hdr-actions { flex-wrap:wrap; gap:6px; }

      /* ── Bookings filter tabs mobile ── */
      .bk-filter-tabs { flex-wrap:wrap; overflow-x:unset !important; padding:6px 8px; gap:4px; }
      .bk-filter-tab  { padding:5px 10px !important; font-size:0.72rem !important; border-bottom:none !important; border:1px solid var(--border) !important; border-radius:20px !important; }
      .bk-filter-tab.active-tab { border-color:var(--gold) !important; background:var(--gold-glow) !important; }

      /* ── Booking header compact ── */
      .bk-header-badges { display:none !important; }

      /* ── Sub-page back bar (mobile only) ── */
      .mobile-back-bar { display:flex !important; }
    }

    /* ── Mobile utility: show/hide ── */
    .mob-only  { display:none; }

    /* ── Shared design system (mobile + desktop) ── */
    .ma-sec-lbl { font-size:11px; font-weight:700; letter-spacing:1px; text-transform:uppercase; color:var(--muted); margin:0 0 10px; }
    .ma-section { margin-bottom:28px; }
    .ma-card { background:var(--card); border:0.5px solid var(--border); border-radius:14px; overflow:hidden; }
    .ma-row { display:flex; align-items:center; gap:12px; padding:14px 16px; min-height:56px; border-bottom:0.5px solid var(--border); }
    .ma-row:last-child { border-bottom:none; }
    .ma-av-sq { width:40px; height:40px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700; flex-shrink:0; letter-spacing:-.5px; }
    .ma-av-ci { width:40px; height:40px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:700; flex-shrink:0; overflow:hidden; position:relative; }
    .ma-av-dot { position:absolute; bottom:0; right:0; width:10px; height:10px; border-radius:50%; background:#16a34a; border:2px solid var(--card); }
    .ma-row-body { flex:1; min-width:0; }
    .ma-row-title { font-size:14px; font-weight:600; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin:0 0 3px; line-height:1.3; }
    .ma-row-sub { font-size:12px; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin:0; line-height:1.3; }
    .ma-badge { font-size:11px; font-weight:700; padding:4px 10px; border-radius:20px; flex-shrink:0; white-space:nowrap; }
    .ma-chips { display:flex; gap:8px; overflow-x:auto; scrollbar-width:none; -webkit-overflow-scrolling:touch; margin-bottom:28px; }
    .ma-chips::-webkit-scrollbar { display:none; }
    .ma-chip { flex-shrink:0; display:flex; flex-direction:column; align-items:center; gap:3px; padding:12px 18px; background:var(--card); border:0.5px solid var(--border); border-radius:14px; min-width:72px; text-align:center; cursor:pointer; font-family:inherit; }
    .ma-chip.active { border-color:var(--gold); background:var(--gold-glow); }
    .ma-chip-val { font-size:22px; font-weight:800; line-height:1; }
    .ma-chip-lbl { font-size:11px; color:var(--muted); font-weight:500; white-space:nowrap; }
    .ma-quick-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; }
    .ma-quick-btn { display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px; padding:20px 8px; min-height:82px; border-radius:14px; border:0.5px solid var(--border); background:var(--card); cursor:pointer; font-family:inherit; transition:all .15s; }
    .ma-quick-btn:hover { border-color:var(--border-gold); background:var(--gold-glow); }
    .ma-quick-btn:active { opacity:.7; }
    .ma-quick-ico { font-size:24px; line-height:1; }
    .ma-quick-lbl { font-size:13px; font-weight:600; color:var(--text); }
    .ma-page-hdr { flex-direction:column; gap:16px; margin-bottom:24px; }
    .ma-page-hdr-top { display:flex; align-items:center; justify-content:space-between; }
    .ma-page-title { font-size:20px; font-weight:700; color:var(--text); margin:0; letter-spacing:-.4px; }
    .ma-page-sub { font-size:12px; color:var(--muted); margin:0 0 3px; }
    .ma-alert { align-items:center; gap:12px; padding:13px 16px; border-radius:12px; cursor:pointer; }
    .ma-alert-dot { width:9px; height:9px; border-radius:50%; flex-shrink:0; }
    .ma-alert-body { flex:1; min-width:0; }
    .ma-alert-title { font-size:13px; font-weight:700; margin:0 0 2px; }
    .ma-alert-sub { font-size:12px; color:var(--muted); margin:0; }
    .ma-alert-arr { font-size:16px; color:var(--muted); flex-shrink:0; }
    .ma-sec-hdr { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
    .dash-2col { margin-top:0; }
    .dash-stat-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-bottom:28px; }

    @media (max-width:768px) {
      .mob-only  { display:flex; }
      .desk-only { display:none !important; }

// ── Sound alert ───────────────────────────────────────
function playAlert(type='new') {
  try {
    const ctx = new (window.AudioContext||window.webkitAudioContext)();
    const seqs = {
      new:    [[880,0.00],[1100,0.18],[880,0.36],[1100,0.54]],
      accept: [[660,0.00],[880,0.18],[1100,0.36]],
    };
    (seqs[type]||seqs.new).forEach(([freq,t])=>{
      const o=ctx.createOscillator(), g=ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.frequency.value=freq; o.type='sine';
      g.gain.setValueAtTime(0.25, ctx.currentTime+t);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+t+0.16);
      o.start(ctx.currentTime+t); o.stop(ctx.currentTime+t+0.18);
    });
  } catch(e){}
}

// ── Generate short random token (8 chars) ─────────────
function genToken() {
  const c = 'ABCDEFGHJKLMNPQRSTUVWXYZabcdefghjkmnpqrstuvwxyz23456789'; // no confusables (0,O,I,l,1)
  const a = new Uint8Array(8);
  crypto.getRandomValues(a);
  return Array.from(a, b => c[b % c.length]).join('');
}

  const [src, setSrc] = React.useState('');

  React.useEffect(() => {

    const avgLat = onDutyList.reduce((s,t)=>s+t.location.lat,0)/onDutyList.length;
    const avgLng = onDutyList.reduce((s,t)=>s+t.location.lng,0)/onDutyList.length;
    // Offset markers sharing identical coordinates so they're all visible
    const pins = onDutyList.map((t, i) => {
      const name = (t.name||t.therapistId||'?').replace(/['"<>&]/g,'_');
      const ago  = (t._ago||'').replace(/['"<>&]/g,'_');
      const dupIdx = onDutyList.slice(0, i).filter(o =>
        Math.abs(o.location.lat - t.location.lat) < 0.0001 &&
        Math.abs(o.location.lng - t.location.lng) < 0.0001
      ).length;
      const angle = dupIdx * (2 * Math.PI / 3);
      const d = dupIdx > 0 ? 0.0005 : 0;
      const lat = t.location.lat + d * Math.sin(angle);
      const lng = t.location.lng + d * Math.cos(angle);
      return `markers.push(L.marker([${lat},${lng}]).addTo(m).bindPopup('<b>${name}</b><br/><small>${ago}</small>'));`;
    }).join('\n');
    const html = `<!DOCTYPE html><html><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.css">
<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.js"><\/script>

<script>
var m=L.map('map',{zoomControl:true});
L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',{attribution:'© CartoDB',maxZoom:20}).addTo(m);
var markers=[];
${pins}
if(markers.length===1){m.setView(markers[0].getLatLng(),16);}
else if(markers.length>1){var g=L.featureGroup(markers);m.fitBounds(g.getBounds().pad(0.3));}
<\/script></body></html>`;
    const blob = new Blob([html],{type:'text/html'});
    const newUrl = URL.createObjectURL(blob);
    const old = urlRef.current;
    urlRef.current = newUrl;
    setSrc(newUrl);
    if(old) setTimeout(()=>URL.revokeObjectURL(old),1000);

  React.useEffect(()=>()=>{ if(urlRef.current) URL.revokeObjectURL(urlRef.current); },[]);

async function sendFCMNotification(tokens, title, body) {
  if(!tokens.length) return {ok:0, fail:0};
  const res = await fetch('https://fcm.googleapis.com/fcm/send', {
    method: 'POST',
    headers: { 'Content-Type':'application/json', 'Authorization':'key='+FCM_SERVER_KEY },
    body: JSON.stringify({
      registration_ids: tokens,
      notification: { title, body, sound:'default', icon:'/icon-192.png', click_action:'https://feelfreespa.in/therapist' },
      data: { url:'https://feelfreespa.in/therapist' },
      android: { priority:'high', notification:{ sound:'default', channel_id:'default' } },
      apns: { payload:{ aps:{ sound:'default', badge:1 } } },
    })
  });
  const json = await res.json();
  return { ok: json.success||0, fail: json.failure||0 };
}

                    borderRadius:'11px',padding:'10px 11px',cursor:'pointer',transition:'all .15s',
                  }}>
                    <div style={{display:'flex',alignItems:'center',gap:'10px'}}>
                      <div style={{position:'relative',flexShrink:0}}>
                        <div style={{width:'34px',height:'34px',borderRadius:'50%',background:ac,display:'flex',alignItems:'center',justifyContent:'center',fontSize:'0.72rem',fontWeight:'800',color:'#fff'}}>
                          {tInitials(t.name||t.therapistId||'?')}
                        </div>
                        <div style={{position:'absolute',bottom:0,right:0,width:'9px',height:'9px',borderRadius:'50%',background:t._hasGPS?'#27ae60':'#f39c12',border:'2px solid var(--surface)'}}/>
                      </div>
                      <div style={{flex:1,minWidth:0}}>
                        <p style={{fontWeight:'700',fontSize:'0.85rem',color:isSel?'var(--gold)':'var(--text)',margin:0,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
                          {t.name||t.therapistId||'Therapist'}
                        </p>
                        {t._hasGPS
                          ? <p style={{fontSize:'0.67rem',color:t._locStale?'#e67e22':'var(--muted)',margin:'2px 0 0'}}>
                              {t._locStale?'⚠️':'📍'} {t._ago} · 🟢 {t._activeAgo}
                              {t._locStale && <span style={{marginLeft:'4px',color:'#e67e22'}}>(GPS stale)</span>}
                            </p>
                          : <p style={{fontSize:'0.67rem',color:'#f39c12',margin:'2px 0 0'}}>⚠️ No GPS — waiting for phone</p>
                        }
                      </div>
                      <div style={{width:'9px',height:'9px',borderRadius:'50%',background:ac,flexShrink:0,opacity:0.85}}/>
                    </div>
                    <p style={{fontSize:'0.62rem',color:'var(--muted)',margin:'6px 0 0 44px',fontFamily:'monospace',opacity:0.55}}>
                      {t._hasGPS ? `${t.location.lat.toFixed(4)}, ${t.location.lng.toFixed(4)}` : 'Location pending…'}
                    </p>
                  </div>
                );
              })}
            </div>
          </div>

          {/* Map */}
          <div className="tracker-map">
            {view==='single' && selT && selT._hasGPS ? (
              <LiveMapSingle
                key={`s-${selT.id}-${Math.floor((selT.locationUpdatedAt?.toMillis?.()??0)/30000)}`}
                therapist={selT}
              />
            ) : view==='single' && selT && !selT._hasGPS ? (
              <div style={{height:'100%',display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:'12px'}}>
                <div style={{width:'60px',height:'60px',borderRadius:'50%',background:'rgba(243,156,18,0.1)',border:'1px solid rgba(243,156,18,0.3)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'1.6rem'}}>⚠️</div>
                <p style={{fontWeight:'700',color:'var(--text)',margin:0}}>{selT.name||selT.therapistId} is On Duty</p>
                <p style={{fontSize:'0.82rem',color:'var(--muted)',margin:0,textAlign:'center'}}>No GPS yet — therapist needs to open<br/>the portal on their phone to share location.</p>
              </div>
            ) : view==='all' && onDutyWithGPS.length>0 ? (
              <LiveMapAll onDutyList={onDutyWithGPS} />
            ) : view==='all' ? (
              <div style={{height:'100%',display:'flex',alignItems:'center',justifyContent:'center',color:'var(--muted)',flexDirection:'column',gap:'10px'}}>
                <span style={{fontSize:'2rem'}}>⚠️</span>
                <span style={{fontSize:'0.85rem',fontWeight:'700',color:'var(--text)'}}>No GPS data yet</span>
                <span style={{fontSize:'0.78rem',textAlign:'center'}}>Therapists are on duty but haven't opened<br/>the portal on their phones.</span>
              </div>
            ) : (
              <div style={{height:'100%',display:'flex',alignItems:'center',justifyContent:'center',color:'var(--muted)',flexDirection:'column',gap:'10px'}}>
                <span style={{fontSize:'2rem'}}>🗺️</span>
                <span style={{fontSize:'0.85rem'}}>Select a therapist</span>
              </div>
            )}

            {/* Single overlay */}
            {view==='single' && selT && selT._hasGPS && (
              <div style={{position:'absolute',top:'12px',left:'12px',zIndex:10,background:'rgba(12,12,12,0.86)',border:'1px solid rgba(255,255,255,0.1)',borderRadius:'11px',padding:'8px 13px',display:'flex',alignItems:'center',gap:'9px',pointerEvents:'none'}}>
                <div style={{width:'7px',height:'7px',borderRadius:'50%',background:'#27ae60',animation:'pulse 2s infinite'}}/>
                <div>
                  <p style={{margin:0,fontWeight:'700',fontSize:'0.8rem',color:'#fff'}}>{selT.name||selT.therapistId||'Therapist'}</p>
                  <p style={{margin:0,fontSize:'0.63rem',color:selT._locStale?'#e67e22':'rgba(255,255,255,0.5)'}}>
                    {selT._locStale?'⚠️':'📍'} Location {selT._ago} · 🟢 Active {selT._activeAgo}
                    {selT._locStale && ' — GPS stale'}
                  </p>
                </div>
              </div>
            )}

          </div>

        </div>
      )}
    </div>
  );
}

// ══════════════════════════════════════════════════════
//  MOBILE MORE MENU
// ══════════════════════════════════════════════════════
// ══════════════════════════════════════════════════════
//  CHAT ADMIN — WhatsApp-style admin ↔ therapist chat
// ══════════════════════════════════════════════════════
function ChatAdmin() {
  const [therapists,  setTherapists]  = useState([]);
  const [chatMeta,    setChatMeta]    = useState({});
  const [activeId,    setActiveId]    = useState(null);
  const [messages,    setMessages]    = useState([]);
  const [text,        setText]        = useState('');
  const [sending,     setSending]     = useState(false);
  const [uploading,   setUploading]   = useState(false);
  const [showList,    setShowList]    = useState(true);
  const [recording,   setRecording]   = useState(false);
  const [recSecs,     setRecSecs]     = useState(0);
  const messagesEndRef   = useRef(null);
  const imgInputRef      = useRef(null);
  const videoInputRef    = useRef(null);
  const mediaRecorderRef = useRef(null);
  const audioChunksRef   = useRef([]);
  const recTimerRef      = useRef(null);

  const activeTherapist = therapists.find(t => t.id === activeId) || null;

  /* ── Load therapists ── */
  useEffect(() => {
    const unsub = db.collection('therapists').onSnapshot(snap => {
      setTherapists(snap.docs.map(d => ({ id: d.id, ...d.data() })));
    });
    return () => unsub();
  }, []);

  /* ── Load chat meta (last msg, unread counts) ── */
  useEffect(() => {
    const unsub = db.collection('chats').onSnapshot(snap => {
      const meta = {};
      snap.docs.forEach(d => { meta[d.id] = d.data(); });
      setChatMeta(meta);
    });
    return () => unsub();
  }, []);

  /* ── Load messages for active chat ── */
  useEffect(() => {
    if (!activeId) { setMessages([]); return; }
    const unsub = db.collection('chats').doc(activeId)
      .collection('messages')
      .orderBy('sentAt', 'asc')
      .limit(100)
      .onSnapshot(snap => {
        setMessages(snap.docs.map(d => ({ id: d.id, ...d.data() })));
        // Mark therapist msgs as read; reset admin unread count
        const batch = db.batch();
        let changed = false;
        snap.docs.forEach(doc => {
          if (doc.data().sender === 'therapist' && !doc.data().readByAdmin) {
            batch.update(doc.ref, { readByAdmin: true });
            changed = true;
          }
        });
        if (changed) batch.commit().catch(() => {});
        db.collection('chats').doc(activeId)
          .set({ unreadAdmin: 0 }, { merge: true }).catch(() => {});
      });
    return () => unsub();
  }, [activeId]);

  /* ── Auto-scroll ── */
  useEffect(() => {
    messagesEndRef.current?.scrollIntoView({ behavior: messages.length > 2 ? 'smooth' : 'auto' });
  }, [messages]);

  const openChat = (t) => { setActiveId(t.id); setShowList(false); };
  const backToList = () => setShowList(true);

  /* ── Send text ── */
  const sendText = async () => {
    if (!text.trim() || !activeId || sending) return;
    const msg = text.trim();
    setText('');
    setSending(true);
    try {
      await db.collection('chats').doc(activeId).collection('messages').add({
        text: msg, mediaUrl: null, mediaType: null,
        sender: 'admin', sentAt: FieldValue.serverTimestamp(),
        readByAdmin: true, readByTherapist: false,
      });
      await db.collection('chats').doc(activeId).set({
        lastMessage: msg, lastMessageAt: FieldValue.serverTimestamp(),
        therapistDocId: activeId, therapistName: activeTherapist?.name || '',
        unreadTherapist: firebase.firestore.FieldValue.increment(1),
      }, { merge: true });
    } catch (e) { alert('Send failed: ' + e.message); }
    setSending(false);
  };

  /* ── Send media (image / audio / video) — optimistic UI: bubble appears immediately ── */
  const sendMedia = async (file, mediaType) => {
    if (!file || !activeId) return;
    const preview = mediaType==='image' ? '📷 Photo' : mediaType==='audio' ? '🎵 Voice note' : '🎬 Video';
    // Show bubble instantly using local blob URL
    const localUrl = URL.createObjectURL(file);
    const tempId   = '_tmp_' + Date.now();
    setMessages(prev => [...prev, {
      id: tempId, text: '', mediaUrl: localUrl, mediaType,
      sender: 'admin', _pending: true,
      sentAt: { toMillis: () => Date.now(), toDate: () => new Date() },
    }]);
    setUploading(true);
    try {
      const ext  = file.name.split('.').pop() || 'bin';
      const path = `chats/${activeId}/${Date.now()}_${Math.random().toString(36).slice(2)}.${ext}`;
      const snap = await storage.ref(path).put(file);
      const url  = await snap.ref.getDownloadURL();
      await db.collection('chats').doc(activeId).collection('messages').add({
        text: '', mediaUrl: url, mediaType, fileName: file.name,
        sender: 'admin', sentAt: FieldValue.serverTimestamp(),
        readByAdmin: true, readByTherapist: false,
      });
      await db.collection('chats').doc(activeId).set({
        lastMessage: preview, lastMessageAt: FieldValue.serverTimestamp(),
        therapistDocId: activeId, therapistName: activeTherapist?.name || '',
        unreadTherapist: firebase.firestore.FieldValue.increment(1),
      }, { merge: true });
      // onSnapshot will deliver the real message; remove temp bubble
      setMessages(prev => prev.filter(m => m.id !== tempId));
      URL.revokeObjectURL(localUrl);
    } catch (e) {
      setMessages(prev => prev.filter(m => m.id !== tempId));
      URL.revokeObjectURL(localUrl);
      alert('Upload failed: ' + e.message);
    }
    setUploading(false);
  };

  /* ── Voice recording ── */
  const startRecording = async () => {
    if (recording || uploading || sending) return;
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      audioChunksRef.current = [];
      const mimeType =
        MediaRecorder.isTypeSupported('audio/webm;codecs=opus') ? 'audio/webm;codecs=opus' :
        MediaRecorder.isTypeSupported('audio/mp4')              ? 'audio/mp4' :
        MediaRecorder.isTypeSupported('audio/ogg;codecs=opus')  ? 'audio/ogg;codecs=opus' : 'audio/webm';
      const mr = new MediaRecorder(stream, { mimeType });
      mediaRecorderRef.current = mr;
      mr.ondataavailable = e => { if (e.data && e.data.size > 0) audioChunksRef.current.push(e.data); };
      mr.onerror = () => { clearInterval(recTimerRef.current); stream.getTracks().forEach(t=>t.stop()); setRecording(false); setRecSecs(0); };
      mr.onstop = async () => {
        stream.getTracks().forEach(t => t.stop());
        clearInterval(recTimerRef.current);
        // Wait one tick so any final ondataavailable fires before we read chunks
        await new Promise(r => setTimeout(r, 80));
        const chunks = [...audioChunksRef.current];
        audioChunksRef.current = [];
        setRecording(false);
        setRecSecs(0);
        if (chunks.length === 0) return;
        const actualMime = mr.mimeType || mimeType;
        const blob = new Blob(chunks, { type: actualMime });
        if (blob.size < 100) return;
        const ext = actualMime.includes('mp4') ? 'm4a' : actualMime.includes('ogg') ? 'ogg' : 'webm';
        await sendMedia(new File([blob], `voice_${Date.now()}.${ext}`, { type: actualMime }), 'audio');
      };
      mr.start(200);  // 200ms timeslice — guarantees ondataavailable fires BEFORE onstop
      setRecording(true);
      setRecSecs(0);
      recTimerRef.current = setInterval(() => setRecSecs(s => s + 1), 1000);
    } catch (e) {
      alert(e.name === 'NotAllowedError' ? 'Microphone permission denied.' : 'Recording error: ' + e.message);
    }
  };

  const stopRecording = () => {
    const mr = mediaRecorderRef.current;
    if (mr && mr.state === 'recording') {
      try { mr.requestData(); } catch(e) {}  // flush any buffered chunks before stop
      mr.stop();
    } else if (mr && mr.state === 'paused') {
      mr.stop();
    } else {
      setRecording(false); setRecSecs(0);
    }
  };

  const cancelRecording = () => {
    audioChunksRef.current = [];
    if (mediaRecorderRef.current && mediaRecorderRef.current.state !== 'inactive') {
      mediaRecorderRef.current.onstop = () => {};
      mediaRecorderRef.current.stop();
    }
    clearInterval(recTimerRef.current);
    setRecording(false);
    setRecSecs(0);
  };

  const fmtRec = (s) => `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;

  /* ── Helpers ── */
  const fmtTime = (ts) => {
    if (!ts) return '';
    const d = ts.toDate ? ts.toDate() : new Date(ts);
    const isToday = d.toDateString() === new Date().toDateString();
    return isToday
      ? d.toLocaleTimeString('en-IN', { hour:'2-digit', minute:'2-digit' })
      : d.toLocaleDateString('en-IN', { day:'numeric', month:'short' });
  };
  const initials = (name) =>
    (name || '?').split(' ').map(w => w[0] || '').slice(0, 2).join('').toUpperCase() || '?';

  /* ── Date divider ── */
  const DateDivider = ({ msg, prev }) => {
    if (!msg.sentAt) return null;
    const d = msg.sentAt.toDate ? msg.sentAt.toDate() : new Date(msg.sentAt);
    if (prev?.sentAt) {
      const pd = prev.sentAt.toDate ? prev.sentAt.toDate() : new Date(prev.sentAt);
      if (d.toDateString() === pd.toDateString()) return null;
    }
    const isToday = d.toDateString() === new Date().toDateString();
    const label = isToday ? 'Today' : d.toLocaleDateString('en-IN', { day:'numeric', month:'long', year:'numeric' });
    return (
      <div style={{ display:'flex', alignItems:'center', gap:'10px', margin:'6px 0' }}>
        <div style={{ flex:1, height:'0.5px', background:'var(--border)' }}/>
        <span style={{ fontSize:'11px', color:'var(--muted)', fontWeight:'600', flexShrink:0 }}>{label}</span>
        <div style={{ flex:1, height:'0.5px', background:'var(--border)' }}/>
      </div>
    );
  };

  /* ── Message bubble ── */
  const Bubble = ({ msg }) => {
    const sent = msg.sender === 'admin';
    const [showDel, setShowDel] = useState(false);
    const touchTimer = useRef(null);
    const autoHide  = useRef(null);

    const showDelBtn = () => {
      setShowDel(true);
      clearTimeout(autoHide.current);
      autoHide.current = setTimeout(() => setShowDel(false), 3000);
    };

    const onTouchStart = () => { touchTimer.current = setTimeout(showDelBtn, 500); };
    const onTouchEnd   = () => clearTimeout(touchTimer.current);

    const deleteMsg = async () => {
      setShowDel(false);
      if (!window.confirm('Delete this message?')) return;
      try {
        await db.collection('chats').doc(activeId).collection('messages').doc(msg.id).delete();
      } catch(e) { alert('Could not delete: ' + e.message); }
    };

    const isAudio = msg.mediaType === 'audio';

    return (
      <div
        style={{ display:'flex', flexDirection:'column', alignItems: sent ? 'flex-end' : 'flex-start', gap:'3px' }}
        onMouseEnter={() => setShowDel(true)}
        onMouseLeave={() => setShowDel(false)}
        onTouchStart={onTouchStart}
        onTouchEnd={onTouchEnd}
      >
        <div style={{ display:'flex', alignItems:'center', gap:'6px', flexDirection: sent ? 'row-reverse' : 'row',
          maxWidth: isAudio ? 'min(300px,80vw)' : '75%' }}>

          {isAudio ? (
            /* ── Voice message card (NO bubble bg — native player fights colored bg) ── */
            <div style={{
              background: sent ? 'rgba(212,175,55,0.15)' : 'var(--card)',
              border: `1.5px solid ${sent ? 'rgba(212,175,55,0.45)' : 'var(--border)'}`,
              borderRadius:'14px', padding:'10px 12px',
              minWidth:'200px', maxWidth:'100%',
            }}>
              <div style={{ display:'flex', alignItems:'center', gap:'8px', marginBottom:'8px' }}>
                <div style={{ width:'30px', height:'30px', borderRadius:'50%', flexShrink:0,
                  background: sent ? 'var(--gold)' : 'var(--elevated)',
                  display:'flex', alignItems:'center', justifyContent:'center', fontSize:'13px' }}>
                  🎤
                </div>
                <span style={{ fontSize:'12px', fontWeight:'600', color:'var(--muted)' }}>Voice message</span>
              </div>
              <audio controls src={msg.mediaUrl} preload="none"
                style={{ width:'100%', height:'36px', borderRadius:'8px',
                  display:'block', accentColor:'var(--gold)' }}/>
            </div>
          ) : (
            /* ── Text / image / video bubble ── */
            <div className={sent ? 'chat-bubble-sent' : 'chat-bubble-recv'}
              style={{ padding: msg.mediaType ? '6px' : '10px 14px', display:'inline-block', maxWidth:'100%', minWidth:0 }}>
              {msg.mediaType === 'image' && (
                <img src={msg.mediaUrl} alt="photo"
                  onClick={() => window.open(msg.mediaUrl, '_blank')}
                  style={{ maxWidth:'min(220px,60vw)', maxHeight:'220px', borderRadius:'12px', display:'block',
                    cursor:'pointer', objectFit:'contain' }} />
              )}
              {msg.mediaType === 'video' && (
                <video controls src={msg.mediaUrl}
                  style={{ maxWidth:'min(240px,60vw)', maxHeight:'200px', borderRadius:'12px', display:'block' }} />
              )}
              {msg.text && (
                <p style={{ margin:0, fontSize:'15px', lineHeight:'1.55', wordBreak:'break-word',
                  color: sent ? '#1a1200' : 'var(--text)' }}>
                  {msg.text}
                </p>
              )}
            </div>
          )}

          {/* Delete button — hover on desktop, long-press on mobile */}
          <button onClick={deleteMsg}
            style={{ background:'rgba(220,38,38,0.15)', border:'1px solid rgba(220,38,38,0.3)',
              borderRadius:'50%', width:'28px', height:'28px', minWidth:'28px', color:'#dc2626',
              fontSize:'13px', cursor:'pointer', padding:0, lineHeight:1,
              display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0,
              opacity: showDel ? 1 : 0, pointerEvents: showDel ? 'auto' : 'none',
              transition:'opacity .15s' }}>
            ✕
          </button>
        </div>

        <span style={{ fontSize:'10px', color:'var(--muted)',
          paddingLeft: sent ? 0 : '4px', paddingRight: sent ? '4px' : 0,
          display:'flex', alignItems:'center', gap:'3px' }}>
          {fmtTime(msg.sentAt)}
          {sent && (
            <span style={{ color: msg.readByTherapist ? '#25d366' : 'var(--muted)', fontSize:'11px' }}>
              {msg.readByTherapist ? '✓✓' : '✓'}
            </span>
          )}
        </span>
      </div>
    );
  };

  /* ── Therapist list pane ── */
  const ListPane = () => (
    <div style={{ display:'flex', flexDirection:'column', height:'100%' }}>
      <div style={{ padding:'16px 16px 14px', borderBottom:'0.5px solid var(--border)', flexShrink:0 }}>
        <p style={{ fontSize:'18px', fontWeight:'800', color:'var(--text)', margin:'0 0 2px', letterSpacing:'-.3px' }}>Messages</p>
        <p style={{ fontSize:'12px', color:'var(--muted)', margin:0 }}>Chat with your therapists</p>
      </div>
      <div style={{ flex:1, overflowY:'auto' }}>
        {therapists.length === 0
          ? <p style={{ padding:'32px', textAlign:'center', color:'var(--muted)', fontSize:'14px' }}>No therapists found</p>
          : therapists.map(t => {
              const meta = chatMeta[t.id] || {};
              const unread = meta.unreadAdmin || 0;
              return (
                <div key={t.id} className={`chat-item${activeId===t.id?' active':''}`} onClick={() => openChat(t)}>
                  <div style={{ position:'relative', flexShrink:0 }}>
                    <div style={{ width:'46px', height:'46px', borderRadius:'50%', overflow:'hidden',
                      background:'var(--elevated)', border:'1.5px solid var(--border)',
                      display:'flex', alignItems:'center', justifyContent:'center',
                      color:'var(--muted)', fontWeight:'700', fontSize:'14px' }}>
                      {t.imageUrl ? <img src={t.imageUrl} style={{ width:'100%', height:'100%', objectFit:'cover' }}/> : initials(t.name)}
                    </div>
                    {t.available && <div style={{ position:'absolute', bottom:1, right:1, width:'11px', height:'11px',
                      borderRadius:'50%', background:'#25d366', border:'2px solid var(--card)' }}/>}
                  </div>
                  <div style={{ flex:1, minWidth:0 }}>
                    <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:'3px' }}>
                      <p style={{ fontSize:'14px', fontWeight:'700', color:'var(--text)', margin:0,
                        whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>
                        {t.name || t.therapistId || '—'}
                      </p>
                      {meta.lastMessageAt && (
                        <span style={{ fontSize:'11px', color:'var(--muted)', flexShrink:0, marginLeft:'8px' }}>
                          {fmtTime(meta.lastMessageAt)}
                        </span>
                      )}
                    </div>
                    <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between' }}>
                      <p style={{ fontSize:'12px', color:'var(--muted)', margin:0,
                        whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis', flex:1 }}>
                        {meta.lastMessage || 'No messages yet'}
                      </p>
                      {unread > 0 && (
                        <span style={{ background:'#25d366', color:'#fff', fontSize:'11px', fontWeight:'700',
                          borderRadius:'20px', padding:'2px 7px', marginLeft:'8px', flexShrink:0 }}>
                          {unread}
                        </span>
                      )}
                    </div>
                  </div>
                </div>
              );
            })
        }
      </div>
    </div>
  );

  /* ── Chat window pane ── */
  const WinPane = () => (
    <div style={{ display:'flex', flexDirection:'column', height:'100%' }}>
      {/* Header */}
      <div style={{ padding:'10px 16px', borderBottom:'0.5px solid var(--border)',
        background:'var(--surface)', display:'flex', alignItems:'center', gap:'10px', flexShrink:0 }}>
        <button className="chat-back-btn" onClick={backToList}
          style={{ alignItems:'center', gap:'4px', background:'none', border:'none',
            color:'var(--gold)', fontWeight:'700', fontSize:'18px', cursor:'pointer',
            padding:'4px 8px 4px 0', fontFamily:'inherit', flexShrink:0 }}>
          ‹
        </button>
        <div style={{ position:'relative', flexShrink:0 }}>
          <div style={{ width:'38px', height:'38px', borderRadius:'50%', overflow:'hidden',
            background:'var(--elevated)', border:'1px solid var(--border)',
            display:'flex', alignItems:'center', justifyContent:'center',
            color:'var(--muted)', fontWeight:'700', fontSize:'13px' }}>
            {activeTherapist?.imageUrl
              ? <img src={activeTherapist.imageUrl} style={{ width:'100%', height:'100%', objectFit:'cover' }}/>
              : initials(activeTherapist?.name)}
          </div>
          {activeTherapist?.available && (

        </div>

            {activeTherapist?.available ? 'Online' : 'Offline'}
          </p>
        </div>
        <button onClick={async()=>{
          if(!window.confirm('Clear all messages in this chat?')) return;
          try {
            const snap = await db.collection('chats').doc(activeId).collection('messages').get();
            const batch = db.batch();
            snap.docs.forEach(d => batch.delete(d.ref));
            await batch.commit();
            await db.collection('chats').doc(activeId).update({ unreadAdmin:0, unreadTherapist:0 });
          } catch(e){ alert('Delete failed: '+e.message); }
        }} title="Clear chat" style={{ background:'none', border:'none', cursor:'pointer',

          lineHeight:1, flexShrink:0, transition:'color .15s' }}
          onMouseEnter={e=>e.target.style.color='#dc2626'}
          onMouseLeave={e=>e.target.style.color='var(--muted)'}>
          🗑️

      <div style={{ flex:1, overflowY:'auto', padding:'16px', display:'flex', flexDirection:'column',

            </div>
          : messages.map((msg, i) => (
              <React.Fragment key={msg.id}>
                <DateDivider msg={msg} prev={messages[i - 1]} />
                <Bubble msg={msg} />
              </React.Fragment>
            ))
        }
        <div ref={messagesEndRef} />
      </div>

      {/* Input bar */}
      <div style={{ padding:'10px 12px', borderTop:'0.5px solid var(--border)',
        background:'var(--surface)', display:'flex', alignItems:'flex-end', gap:'8px', flexShrink:0 }}>
        {/* Mic only — no photo/video */}
        <div style={{ display:'flex', gap:'4px', flexShrink:0, paddingBottom:'2px' }}>
          <button title={recording ? 'Stop & send' : 'Voice message'}
            onClick={recording ? stopRecording : startRecording}
            disabled={uploading || sending}
            style={{ width:'36px', height:'36px', borderRadius:'50%',
              background: recording ? '#e74c3c' : 'var(--elevated)',
              border: recording ? 'none' : '0.5px solid var(--border)',
              cursor:'pointer', fontSize:'15px', display:'flex', alignItems:'center',
              justifyContent:'center', transition:'background .2s',
              animation: recording ? 'chatMicPulse 1.2s ease-in-out infinite' : 'none' }}>
            🎤
          </button>
        </div>

        {/* Recording indicator OR text input */}
        {recording
          ? <div style={{ flex:1, background:'rgba(231,76,60,0.1)', border:'0.5px solid rgba(231,76,60,0.4)',
              borderRadius:'22px', padding:'9px 14px', display:'flex', alignItems:'center', gap:'8px', minWidth:0 }}>
              <div style={{ width:'8px', height:'8px', borderRadius:'50%', background:'#e74c3c',
                animation:'chatMicPulse 1.2s ease-in-out infinite', flexShrink:0 }}/>
              <span style={{ fontSize:'14px', color:'#e74c3c', fontWeight:'600', flex:1 }}>
                Recording… {fmtRec(recSecs)}
              </span>
              <button onClick={cancelRecording}
                style={{ background:'none', border:'none', color:'var(--muted)', cursor:'pointer',
                  fontSize:'16px', padding:'0', lineHeight:1 }}>✕</button>
            </div>
          : <div style={{ flex:1, background:'var(--elevated)', border:'0.5px solid var(--border)',
              borderRadius:'22px', padding:'9px 14px', display:'flex', alignItems:'center', minWidth:0 }}>
              <textarea value={text}
                onChange={e => setText(e.target.value)}
                onKeyDown={e => { if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); sendText(); } }}
                placeholder="Type a message…" rows={1}
                style={{ flex:1, background:'transparent', border:'none', outline:'none',
                  color:'var(--text)', fontSize:'14px', fontFamily:'inherit',
                  resize:'none', lineHeight:'1.4', maxHeight:'80px', overflowY:'auto' }}/>
            </div>
        }

        {/* Send button */}
        {!recording && (
          <button onClick={sendText} disabled={!text.trim() || sending || uploading}
            style={{ width:'40px', height:'40px', borderRadius:'50%',
              background: (text.trim() && !sending && !uploading) ? 'var(--gold)' : 'var(--elevated)',
              border:'none', cursor: text.trim() ? 'pointer' : 'default',
              fontSize:'16px', display:'flex', alignItems:'center', justifyContent:'center',
              flexShrink:0, transition:'background .15s',
              color: text.trim() ? '#1a1200' : 'var(--muted)' }}>

          </button>
        )}
      </div>
    </div>
  );

  return (
    <div className="chat-layout">
      {/* Therapist list — called as function to avoid remount on re-render */}
      <div className={`chat-list-pane${!showList ? ' chat-hide-mob' : ''}`}>
        {ListPane()}
      </div>
      {/* Chat window */}
      <div className={`chat-win-pane${showList ? ' chat-hide-mob' : ''}`}>
        {activeId

              <p style={{ fontSize:'13px', margin:0 }}>Pick from the list to start chatting</p>
            </div>
        }
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════════
function DashboardTab({ onNavigate = ()=>{} }) {
  const [bookings,   setBookings]   = useState([]);
  const [therapists, setTherapists] = useState([]);
  const [loadingB,   setLoadingB]   = useState(true);
  const [showTherps,   setShowTherps]   = useState(true);
  const [showBookings, setShowBookings] = useState(true);

  useEffect(()=>{
    const unsub = db.collection('bookings').limit(200).onSnapshot(snap=>{
      setBookings(snap.docs.map(d=>({id:d.id,...d.data()}))
        .sort((a,b)=>(b.createdAt?.toMillis?.()??0)-(a.createdAt?.toMillis?.()??0)));
      setLoadingB(false);
    });
    return ()=>unsub();
  },[]);

  useEffect(()=>{
    const unsub = db.collection('therapists').onSnapshot(snap=>{
      const list = snap.docs.map(d=>({id:d.id,...d.data()}));
      setTherapists(list);
    });
    return ()=>unsub();
  },[]);

  // One-time cleanup: clear sessionActive for therapists with no active booking
  useEffect(()=>{
    if(bookings.length===0||therapists.length===0) return;
    therapists.forEach(t=>{
      if(!t.sessionActive) return;
      const hasLive = bookings.some(b=>
        (b.therapistDocId===t.id||b.therapistId===t.therapistId) &&
        ['in_session','on_way','confirmed'].includes(b.status)
      );
      if(!hasLive){
        db.collection('therapists').doc(t.id).update({sessionActive:false}).catch(()=>{});
      }
    });
  },[bookings.length, therapists.length]);

  const today = new Date(); today.setHours(0,0,0,0);
  const todayCount             = bookings.filter(b=>{ const d=b.createdAt?.toDate?.(); return d&&d>=today; }).length;
  const pendingCount           = bookings.filter(b=>b.status==='pending'||b.status==='admin_pending').length;
  const confirmedCount         = bookings.filter(b=>b.status==='confirmed').length;
  const therapistAcceptedCount = bookings.filter(b=>b.status==='confirmed'&&b.therapistAccepted===true).length;
  const onlineCount            = therapists.filter(t=>t.available).length;
  const noGPSCount             = therapists.filter(t=>t.available&&!t.location?.lat).length;
  const ratedTherps            = therapists.filter(t=>t.rating!=null&&parseFloat(t.rating)>0);
  const avgRating              = ratedTherps.length>0?(ratedTherps.reduce((s,t)=>s+parseFloat(t.rating||0),0)/ratedTherps.length).toFixed(1):'—';
  const activeTherps           = therapists.filter(t=>t.available).slice(0,5).map(t=>({...t,_hasGPS:t.location?.lat!=null}));
  const hour                   = new Date().getHours();
  const greeting               = hour<12?'Morning':hour<17?'Afternoon':'Evening';

  const STATUS_CFG = {
    pending:       {color:'var(--gold)',  bg:'rgba(212,175,55,0.12)',  label:'Pending'},
    admin_pending: {color:'#f39c12',     bg:'rgba(243,156,18,0.12)',  label:'Needs Confirm'},
    confirmed:     {color:'#2ecc71',     bg:'rgba(46,204,113,0.12)',  label:'Confirmed'},
    accepted:      {color:'#2ecc71',     bg:'rgba(46,204,113,0.12)',  label:'Accepted'},
    on_way:        {color:'#4a9eff',     bg:'rgba(74,158,255,0.12)',  label:'On the Way'},
    in_session:    {color:'#ffa500',     bg:'rgba(255,165,0,0.12)',   label:'In Session'},
    completed:     {color:'#27ae60',     bg:'rgba(39,174,96,0.12)',   label:'Completed'},
    scheduled:     {color:'#3498db',     bg:'rgba(52,152,219,0.12)',  label:'Upcoming'},
    declined:      {color:'#e74c3c',     bg:'rgba(231,76,60,0.12)',   label:'Declined'},
    expired:       {color:'var(--muted)',bg:'rgba(100,100,100,0.1)',  label:'Expired'},
  };
  const cfg = s => STATUS_CFG[s] || STATUS_CFG.expired;

  const timeAgo = b=>{
    const d=b.createdAt?.toDate?.(); if(!d) return '—';
    const s=(Date.now()-d)/1000;
    if(s<60) return 'Just now';
    if(s<3600) return `${Math.floor(s/60)}m ago`;
    if(s<86400) return `${Math.floor(s/3600)}h ago`;
    return d.toLocaleDateString('en-IN',{day:'numeric',month:'short'});
  };
  const lastSeen = t => {
    // Cross-check actual bookings — never rely on stale sessionActive flag
    const live = bookings.find(b=>
      (b.therapistDocId===t.id||b.therapistId===t.therapistId) &&
      ['in_session','on_way'].includes(b.status)
    );
    if(live) return live.status==='in_session'
      ? {text:'In Session', color:'#ffa500'}
      : {text:'On the Way', color:'#4a9eff'};
    if(!t.lastActiveAt) return t.available
      ? {text:'Currently online', color:'#2ecc71'}
      : {text:'', color:'var(--muted)'};
    const d = t.lastActiveAt.toDate?.(); if(!d) return {text:'—',color:'var(--muted)'};
    const s = (Date.now()-d)/1000;
    if(s<60)    return {text:'Last seen just now', color:'#2ecc71'};
    if(s<300)   return {text:`Last seen ${Math.floor(s/60)}m ago`, color:'#2ecc71'};
    if(s<3600)  return {text:`Last seen ${Math.floor(s/60)}m ago`, color:'var(--muted)'};
    if(s<86400) return {text:`Last seen ${Math.floor(s/3600)}h ago`, color:'var(--muted)'};
    return {text:`Last seen ${d.toLocaleDateString('en-IN',{day:'numeric',month:'short'})}`, color:'var(--muted)'};
  };

  const stats = [
    { label:'Today',     value:todayCount,     color:'var(--gold)', icon:'📅', sub:`${bookings.length} total` },
    { label:'Online',    value:onlineCount,    color:'#2ecc71',     icon:'👤', sub:`of ${therapists.length} therapists` },
    { label:'Needs Action', value:pendingCount, color:pendingCount>0?'#e74c3c':'var(--muted)', icon:'⚡', sub:pendingCount>0?'pending review':'all clear' },
    { label:'Confirmed', value:confirmedCount, color:'#3498db',     icon:'✓',  sub:'total confirmed' },
  ];

  return (
    <div style={{display:'flex',flexDirection:'column'}}>

      {/* ── Header ── */}
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'24px'}}>

          <p style={{fontSize:'12px',color:'var(--muted)',margin:'0 0 4px'}}>
            {new Date().toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'long'})}
          </p>
          <h1 style={{fontSize:'20px',fontWeight:'700',color:'var(--text)',margin:0,letterSpacing:'-.4px'}}>
            Good {greeting}, {ADMIN_NAME} 👋
          </h1>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:'6px',background:'var(--success-bg)',borderRadius:'20px',padding:'6px 12px',flexShrink:0}}>
          <div style={{width:'7px',height:'7px',borderRadius:'50%',background:'var(--success)'}}/>
          <span style={{fontSize:'12px',color:'var(--success)',fontWeight:'600',whiteSpace:'nowrap'}}>{onlineCount} online</span>
        </div>
      </div>

      {/* ── Stat cards (desktop: 4-col grid; mobile: horizontal scroll chips) ── */}
      <div className="dash-stat-grid">
        {[
          {label:'Today',    value:loadingB?'—':todayCount,  color:'var(--gold)', sub:`${bookings.length} total`},
          {label:'Online',   value:onlineCount,              color:'#16a34a',     sub:`of ${therapists.length}`},
          {label:'Pending',  value:pendingCount,             color:pendingCount>0?'#dc2626':'var(--muted)', sub:pendingCount>0?'need action':'all clear'},
          {label:'Confirmed',value:confirmedCount,           color:'#2563eb',     sub:'confirmed today'},
        ].map(s=>(
          <div key={s.label} style={{background:'var(--card)',border:'0.5px solid var(--border)',borderRadius:'14px',padding:'18px 20px'}}>
            <p style={{fontSize:'11px',fontWeight:'700',letterSpacing:'1px',textTransform:'uppercase',color:'var(--muted)',margin:'0 0 8px'}}>{s.label}</p>
            <p style={{fontSize:'32px',fontWeight:'800',color:s.color,margin:'0 0 4px',lineHeight:1}}>{s.value}</p>
            <p style={{fontSize:'12px',color:'var(--muted)',margin:0}}>{s.sub}</p>
          </div>
        ))}
      </div>
      <div className="mob-only ma-chips">
        <div className="ma-chip"><span className="ma-chip-val" style={{color:'var(--gold)'}}>{loadingB?'—':todayCount}</span><span className="ma-chip-lbl">Today</span></div>
        <div className="ma-chip"><span className="ma-chip-val" style={{color:'#16a34a'}}>{onlineCount}</span><span className="ma-chip-lbl">Online</span></div>
        <div className="ma-chip" style={pendingCount>0?{borderColor:'rgba(220,38,38,0.35)',background:'rgba(220,38,38,0.05)'}:{}}><span className="ma-chip-val" style={{color:pendingCount>0?'#dc2626':'var(--muted)'}}>{pendingCount}</span><span className="ma-chip-lbl">Pending</span></div>
        <div className="ma-chip"><span className="ma-chip-val" style={{color:'#2563eb'}}>{confirmedCount}</span><span className="ma-chip-lbl">Confirmed</span></div>
        <div className="ma-chip"><span className="ma-chip-val" style={{color:noGPSCount>0?'#f59e0b':'var(--muted)'}}>{noGPSCount}</span><span className="ma-chip-lbl">No GPS</span></div>
      </div>

        <div className="ma-quick-grid">
          <button className="ma-quick-btn" onClick={()=>onNavigate('accounts')}>
            <span className="ma-quick-ico">👤</span>

          <button className="ma-quick-btn" onClick={()=>onNavigate('links')}>

            <span className="ma-quick-lbl">Tracker</span>

        </div>
      </div>

      {/* ── Two-column on desktop, stacked on mobile ── */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'20px'}} className="dash-2col">

        {/* ── Active Therapists ── */}
        <div className="ma-section" style={{margin:0}}>

            <p className="ma-sec-lbl" style={{margin:0}}>Active Therapists</p>

                  const ls = lastSeen(t);

                  return (

//  THERAPIST MANAGER
// ══════════════════════════════════════════════════════
function TherapistManager() {
  const [therapists, setTherapists] = useState([]);
  const [loading,    setLoading]    = useState(true);
  const [uploading,  setUploading]  = useState(false);
  const [progress,   setProgress]   = useState(0);
  const [preview,    setPreview]    = useState(null);
  const [file,       setFile]       = useState(null);
  const [dragOver,   setDragOver]   = useState(false);
  const [uploadErr,  setUploadErr]  = useState('');
  const [showAddForm, setShowAddForm] = useState(false);
  const fileRef = useRef(null);

  useEffect(()=>{ fetchAll(); },[]);

  const fetchAll = async () => {
    setLoading(true);
    try {
      const snap = await db.collection('therapists').orderBy('createdAt','desc').get();
      setTherapists(snap.docs.map(d=>({id:d.id,...d.data()})));
    } finally { setLoading(false); }
  };

  const pickFile = (f) => {
    if (!f) return;
    if (!f.type.startsWith('image/')) { setUploadErr('Select an image file.'); return; }
    if (f.size > 10*1024*1024) { setUploadErr('Image must be under 10 MB.'); return; }
    setUploadErr(''); setFile(f);
    const r = new FileReader();
    r.onloadend = () => setPreview(r.result);
    r.readAsDataURL(f);
  };

  const clearFile = () => { setFile(null); setPreview(null); setUploadErr(''); setProgress(0); };

  // Resize image and convert to base64 (bypasses Firebase Storage)
  const resizeToBase64 = (f) => new Promise((resolve, reject) => {
    const img = new Image();
    const url = URL.createObjectURL(f);
    img.onload = () => {
      const MAX = 900;
      let w = img.width, h = img.height;
      if (w > MAX || h > MAX) {
        if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
        else        { w = Math.round(w * MAX / h); h = MAX; }
      }
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      URL.revokeObjectURL(url);
      resolve(canvas.toDataURL('image/jpeg', 0.82));
    };
    img.onerror = reject;
    img.src = url;
  });

  const handleUpload = async () => {
    if (!file || uploading) return false;
    setUploading(true); setUploadErr('');
    try {
      setProgress(30);
      const imageUrl = await resizeToBase64(file);
      setProgress(70);
      const therapistId = `TH_${Date.now()}_${Math.random().toString(36).slice(2,7).toUpperCase()}`;
      await db.collection('therapists').add({
        therapistId, imageUrl, available: true,
        createdAt: FieldValue.serverTimestamp()
      });
      setProgress(100);
      clearFile(); await fetchAll();
      return true;
    } catch(err) { setUploadErr(`Upload failed: ${err.message}`); return false; }
    finally { setUploading(false); setProgress(0); }
  };

  const toggleAvailable = async (t) => {
    await db.collection('therapists').doc(t.id).update({available:!t.available});
    setTherapists(prev=>prev.map(x=>x.id===t.id?{...x,available:!x.available}:x));
  };

  const handleDelete = async (t) => {
    if (!confirm(`Delete ${t.therapistId}?`)) return;
    try {
      await db.collection('therapists').doc(t.id).delete();
      setTherapists(prev=>prev.filter(x=>x.id!==t.id));
    } catch(err) { alert(`Delete failed: ${err.message}`); }
  };

  const [rowUploading, setRowUploading] = useState(null); // therapist id being uploaded
  const rowFileRef = useRef(null);
  const rowTargetRef = useRef(null); // which therapist is being updated

  const handleRowPhotoClick = (t) => {
    rowTargetRef.current = t;
    rowFileRef.current?.click();
  };

  const handleRowFileChange = async (e) => {
    const f = e.target.files[0];
    e.target.value = '';
    if (!f || !f.type.startsWith('image/')) return;
    const t = rowTargetRef.current;
    if (!t) return;
    setRowUploading(t.id);
    try {
      const imageUrl = await resizeToBase64(f);
      await db.collection('therapists').doc(t.id).update({ imageUrl });
      setTherapists(prev => prev.map(x => x.id===t.id ? {...x, imageUrl} : x));
    } catch(err) { alert(`Upload failed: ${err.message}`); }
    setRowUploading(null);
  };

  return (
    <div>
      {/* Therapist list */}
      <div className="card" style={{overflow:'hidden'}}>
        <div style={{padding:'16px 20px',display:'flex',alignItems:'center',justifyContent:'space-between',borderBottom: showAddForm ? '1px solid var(--border)' : '1px solid var(--border)'}}>
          <div style={{display:'flex',alignItems:'center',gap:'10px'}}>
            <span style={{fontSize:'1rem'}}>🖼️</span>
            <span style={{fontWeight:'700',fontSize:'0.95rem'}}>Therapists</span>
            <span className="badge badge-gray">{therapists.length}</span>
            <span className="badge badge-green">● {therapists.filter(t=>t.available).length}</span>
          </div>
          <div style={{display:'flex',gap:'8px',alignItems:'center'}}>
            <button
              onClick={async()=>{
                await db.collection('config').doc('appSettings').set({forceRefreshAt:FieldValue.serverTimestamp()},{merge:true});
              }}
              className="btn btn-sm btn-ghost"
              title="Force all therapist phones to reload silently"
              style={{fontSize:'0.78rem',color:'var(--muted)'}}
            >🔄 Refresh All</button>
            <button
              onClick={()=>{ setShowAddForm(v=>!v); if(showAddForm){clearFile();} }}
              className={`btn btn-sm ${showAddForm?'btn-ghost':'btn-gold'}`}
              style={{gap:'5px',display:'flex',alignItems:'center'}}
            >
              {showAddForm ? '✕ Cancel' : '+ Add Therapist'}
            </button>
          </div>
        </div>

        {/* Collapsible add form */}
        {showAddForm && (
          <div style={{padding:'20px',borderBottom:'1px solid var(--border)',background:'var(--elevated)'}}>
            <input ref={fileRef} type="file" accept="image/*" style={{display:'none'}} onChange={e=>pickFile(e.target.files[0])}/>
            <div
              className={`upload-zone${dragOver?' drag':''}`}
              style={{minHeight:'120px',padding:'20px'}}
              onDragOver={e=>{e.preventDefault();setDragOver(true);}}
              onDragLeave={()=>setDragOver(false)}
              onDrop={e=>{e.preventDefault();setDragOver(false);pickFile(e.dataTransfer.files[0]);}}
              onClick={()=>!uploading&&fileRef.current?.click()}
            >
              {preview
                ? <img src={preview} style={{maxHeight:'180px',maxWidth:'100%',objectFit:'contain',borderRadius:'8px'}}/>
                : <div style={{textAlign:'center',pointerEvents:'none'}}>
                    <div style={{fontSize:'2rem',marginBottom:'6px'}}>📷</div>
                    <p style={{color:'var(--text)',fontSize:'0.85rem',fontWeight:'500'}}>Drop photo here or click to browse</p>
                    <p style={{color:'var(--muted)',fontSize:'0.75rem',marginTop:'3px'}}>JPG · PNG · WEBP · Max 10 MB</p>
                  </div>
              }
            </div>
            {uploadErr && <div style={{marginTop:'8px',padding:'8px 12px',background:'var(--danger-bg)',border:'1px solid rgba(231,76,60,.3)',borderRadius:'8px',color:'var(--danger)',fontSize:'0.8rem'}}>{uploadErr}</div>}
            {uploading && <div style={{marginTop:'10px'}}><div style={{height:'3px',background:'var(--border)',borderRadius:'4px',overflow:'hidden'}}><div style={{height:'100%',background:'linear-gradient(90deg,var(--gold-dark),var(--gold))',width:`${progress}%`,transition:'width .2s',borderRadius:'4px'}}/></div><p style={{color:'var(--muted)',fontSize:'0.72rem',marginTop:'5px',textAlign:'center'}}>Uploading… {progress}%</p></div>}
            <div style={{display:'flex',gap:'8px',marginTop:'14px',justifyContent:'flex-end'}}>
              {preview && !uploading && <button onClick={clearFile} className="btn btn-ghost btn-sm">✕ Clear</button>}
              <button onClick={async ()=>{ const ok = await handleUpload(); if(ok) setShowAddForm(false); }} disabled={!file||uploading} className="btn btn-gold btn-sm" style={{opacity:!file||uploading?.5:1,minWidth:'140px'}}>
                {uploading?<span className="spin">✦</span>:'Upload Photo'}
              </button>
            </div>
          </div>
        )}

        {loading
          ? <div style={{padding:'48px',textAlign:'center',color:'var(--muted)'}}><span className="spin" style={{fontSize:'1.5rem',color:'var(--gold)'}}>✦</span></div>
          : therapists.length===0
            ? <div style={{padding:'48px',textAlign:'center',color:'var(--muted)',fontSize:'0.9rem'}}>No therapists yet — click "+ Add Therapist" above.</div>
            : <>
                <input ref={rowFileRef} type="file" accept="image/*" style={{display:'none'}} onChange={handleRowFileChange}/>
                {therapists.map(t=>(
                  <div key={t.id} className="item-card">
                    {/* Avatar — tap to replace photo */}
                    <div className="item-avatar"
                      onClick={()=>rowUploading?null:handleRowPhotoClick(t)}
                      title="Tap to change photo"
                      style={{width:'48px',height:'48px',borderRadius:'10px',overflow:'hidden',background:'var(--elevated)',border:'1px solid var(--border)',cursor:'pointer',position:'relative',flexShrink:0}}
                      onMouseEnter={e=>{const o=e.currentTarget.querySelector('.photo-overlay');if(o)o.style.opacity='1';}}
                      onMouseLeave={e=>{const o=e.currentTarget.querySelector('.photo-overlay');if(o)o.style.opacity='0';}}
                    >
                      {rowUploading===t.id
                        ? <div style={{width:'100%',height:'100%',display:'flex',alignItems:'center',justifyContent:'center'}}><span className="spin" style={{color:'var(--gold)'}}>✦</span></div>
                        : <>
                            <img src={t.imageUrl} style={{width:'100%',height:'100%',objectFit:'cover',display:'block'}} onError={e=>e.target.style.display='none'}/>
                            <div className="photo-overlay" style={{position:'absolute',inset:0,background:'rgba(0,0,0,0.6)',display:'flex',alignItems:'center',justifyContent:'center',opacity:0,transition:'opacity .15s',fontSize:'1.1rem'}}>📷</div>
                          </>
                      }
                    </div>
                    {/* Info */}
                    <div className="item-info">
                      <div className="name">{t.name||<span style={{color:'var(--muted)',fontStyle:'italic'}}>Unnamed</span>}</div>
                      <div className="sub">{t.therapistId}{t.speciality?` · ${t.speciality}`:''}</div>
                      <div className="meta">
                        <button onClick={()=>toggleAvailable(t)} className={`badge ${t.available?'badge-green':'badge-gray'}`} style={{cursor:'pointer',border:'none',fontFamily:'inherit'}}>
                          {t.available?'● Visible':'○ Hidden'}
                        </button>
                        <span style={{fontSize:'0.68rem',color:'var(--muted)'}}>{t.createdAt?.toDate?.()?.toLocaleDateString?.()??'—'}</span>
                      </div>
                      <div className="item-actions-mobile">
                        <button onClick={()=>handleDelete(t)} className="btn btn-danger btn-sm">Delete</button>
                      </div>
                    </div>
                    {/* Desktop actions */}
                    <div className="item-actions item-actions-desktop">
                      <button onClick={()=>handleDelete(t)} className="btn btn-danger btn-sm">Delete</button>
                    </div>
                  </div>
                ))}
              </>
        }
      </div>
    </div>
  );
}

//  LINK CREATOR
